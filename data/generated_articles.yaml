    Central bank digital currency interoperability and tokenised settlement \u2014\
    \ both of which have advanced through BIS Innovation Hub projects such as mBridge\
    \ and Nexus \u2014 are likely to feature prominently in successor deliberations.\
    \ These architectures introduce new compliance design questions around programmable\
    \ compliance, privacy-preserving identity, and the supervisory perimeter.\n\n\
    The 2027 deadline now functions less as a finishing line and more as a checkpoint\
    \ at which regulators must decide how ambitious the next set of commitments will\
    \ be. Compliance professionals would do well to engage in consultation processes\
    \ early, given that technical standards set in the next chapter will likely embed\
    \ \u2014 or constrain \u2014 financial crime controls for a generation."
