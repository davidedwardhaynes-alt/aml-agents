  full_article: "The deployment of Google's Universal Cart as an agentic commerce\
    \ layer \u2014 capable of autonomously executing multi-retailer purchases on behalf\
    \ of a consumer \u2014 introduces a class of payment intermediation that existing\
    \ AML frameworks were not designed to anticipate. When an AI agent selects merchants,\
    \ compares prices, and completes transactions without real-time human confirmation\
    \ of each step, the traditional nexus between a natural person and a payment instruction\
    \ becomes structurally ambiguous.\n\nFATF Recommendation 16, which governs wire\
    \ transfer transparency and the travel rule, presupposes an identifiable ordering\
    \ customer at the point of initiation. Agentic systems that batch or chain purchases\
    \ across multiple payees within a single session compress that moment into an\
    \ automated sequence, potentially stripping intermediary institutions of the contextual\
    \ signals \u2014 hesitation, unusual merchant selection, atypical geography \u2014\
    \ that trained transaction monitoring models rely upon. The concern is not hypothetical:\
    \ FATF's 2023 guidance on virtual assets already flagged the risks of automated\
    \ intermediation, and the same logic applies to agentic fiat commerce at scale.\n\
    \nFor payment service providers and acquiring banks operating under MAS Notice\
    \ PSN01 or the EU's revised Transfer of Funds Regulation, the compliance question\
    \ is immediate. Where agent-initiated transactions aggregate across multiple merchants\
    \ in a compressed window, firms must determine whether existing velocity controls\
    \ and behavioural analytics remain calibrated for non-human transaction cadences.\
    \ Onboarding frameworks designed around human account holders will also require\
    \ review: the agent's credential store, scope of authority, and revocability need\
    \ to sit within a documented customer due diligence record, not merely in a consumer\
    \ app's terms of service.\n\nMerchants face a parallel exposure. If an agentic\
    \ wallet funds purchases by drawing on layered payment credentials \u2014 stored\
    \ cards, buy-now-pay-later facilities, loyalty balances \u2014 the beneficial\
    \ ownership of the ultimate payer may not be visible at the point of sale, creating\
    \ gaps relevant to Singapore's CDSA, Hong Kong's OSCO, and Australia's AML/CTF\
    \ Act obligations on designated service providers.\n\nSupervisors watching this\
    \ space should note that the technology's commercial rollout is likely to outpace\
    \ rule-making. The more productive near-term intervention is guidance \u2014 clarifying\
    \ how existing customer identification, transaction monitoring, and record-keeping\
    \ obligations apply when the acting party is software operating within a delegated\
    \ authority. The alternative is enforcement action that arrives after the architecture\
    \ has already scaled."
