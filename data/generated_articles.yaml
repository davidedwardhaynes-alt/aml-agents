    \ and automation across back- and middle-office operations. For financial crime\
    \ compliance functions, which sit squarely within the corporate function perimeter,\
    \ the announcement raises immediate questions about how headcount reductions will\
    \ be reconciled with obligations under the Monetary Authority of Singapore's MAS\
    \ Notice 626, the UK's Money Laundering Regulations 2017, and FATF Recommendation\
    \ 18, all of which require adequate resourcing of internal controls and oversight\
    \ mechanisms.\n\nThe restructuring follows a broader industry trajectory. HSBC,\
    \ Citigroup, and Deutsche Bank have each pursued AI-driven efficiency programmes\
