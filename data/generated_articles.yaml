  full_article: "The Financial Conduct Authority will open its Pre-Application Support\
    \ Service to cryptoasset firms from 11 May 2026, allowing businesses to request\
    \ face-to-face discussions with supervisors before the formal authorisation gateway\
    \ opens on 30 September 2026. The move signals that the FCA is seeking to manage\
    \ application quality upstream, reducing the volume of incomplete or structurally\
    \ deficient submissions it expects to receive once the FSMA-based cryptoasset\
    \ regime goes live on 25 October 2027.\n\nThe new regime represents the culmination\
    \ of a legislative journey that began with the Financial Services and Markets\
    \ Act 2023, which granted HM Treasury powers to bring cryptoassets within the\
    \ regulatory perimeter. It builds on the existing anti-money laundering registration\
    \ framework under the Money Laundering, Terrorist Financing and Transfer of Funds\
    \ (Information on the Payer) Regulations 2017, under which the FCA has registered\
    \ \u2014 and rejected \u2014 a significant proportion of applicants since 2020.\
    \ The FATF Recommendation 15 standard on virtual asset service providers forms\
    \ the international baseline, and the new UK regime is expected to go materially\
    \ further, addressing market integrity, custody, and consumer protection alongside\
    \ financial crime controls.\n\nFor compliance officers and MLROs at cryptoasset\
    \ firms, the PASS meetings represent a practical opportunity to road-test financial\
    \ crime frameworks \u2014 particularly transaction monitoring calibration, travel\
    \ rule implementation under the Funds Transfer Regulation, and beneficial ownership\
    \ verification \u2014 before formal scrutiny begins. Firms that previously secured\
    \ AML registration but have not upgraded their control environments to full FSMA-authorisation\
    \ standards face the most acute preparation challenge. The FCA's track record\
    \ of rejecting approximately 80 percent of AML registration applicants at one\
    \ stage suggests supervisors will apply rigorous scrutiny to governance structures,\
    \ algo-surveillance capabilities, and senior manager accountability under the\
    \ SM&CR.\n\nFor international groups, the timeline also intersects with MiCA authorisation\
    \ obligations in the EU, where the grandfathering period for existing crypto-asset\
    \ service providers concluded at the end of June 2025 in most member states, creating\
