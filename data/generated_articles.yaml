  full_article: "The Financial Stability Board's Secretary General John Schindler\
    \ used a July 2026 address to press home a point that resolution planners have\
    \ long acknowledged but inconsistently acted upon: that the failure of a systemically\
    \ important institution no longer respects sectoral boundaries, and that preparedness\
    \ frameworks built within siloed regulatory perimeters are materially inadequate.\n\
    \nThe context is not abstract. The FSB's Key Attributes of Effective Resolution\
    \ Regimes, first adopted in 2011 and refined through successive guidance on operational\
    \ continuity and bail-in execution, were designed with large banks primarily in\
    \ mind. But the intervening decade and a half has produced a financial system\
    \ in which critical functions \u2014 payments, liquidity provision, data infrastructure,\
    \ and increasingly digital-asset settlement \u2014 are distributed across banks,\
    \ central counterparties, insurers, and non-bank financial intermediaries simultaneously.\
    \ A resolution event at one node now transmits stress through contractual, operational,\
    \ and liquidity channels into entities supervised by entirely different authorities\
    \ under entirely different statutory regimes.\n\nFor compliance and financial\
    \ crime professionals, the cross-sectoral dimension carries specific implications.\
    \ Correspondent banking relationships, intragroup funding structures, and shared\
    \ technology vendors each represent potential transmission vectors that AML and\
    \ operational-risk teams must map for recovery and resolution planning purposes.\
    \ Under frameworks such as the EU's Bank Recovery and Resolution Directive, Singapore's\
    \ MAS Notice on Resolution Planning, and equivalent regimes in the UK and Australia,\
    \ firms are expected to demonstrate that critical functions can be separated and\
    \ continued \u2014 but those demonstrations increasingly require coordination\
    \ with counterparties outside the firm's own regulatory perimeter.\n\nSchindler's\
    \ emphasis on collaboration signals that the FSB intends to press home expectations\
    \ around Crisis Management Groups and cross-border information-sharing arrangements,\
    \ particularly where non-bank entities are embedded in the critical-path dependencies\
    \ of a resolvable institution. Jurisdictions that have been slow to bring insurers\
    \ and financial market infrastructures fully within resolution planning expectations\
    \ should treat this as a prompt to revisit their statutory perimeters.\n\nThe\
    \ underlying challenge is one of governance as much as regulation. Resolution\
    \ planning that does not account for the full topology of an institution's operational\
    \ and financial dependencies will, at the moment it is tested, produce outcomes\
    \ its architects did not model. The FSB's renewed emphasis on interconnection\
    \ suggests that supervisors in 2026 are less willing than before to accept plans\
    \ that paper over that gap."
