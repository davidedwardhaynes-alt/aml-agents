    \ infrastructure, sanctions screening engines, or KYC data pipelines, any mandated\
    \ remediation or operational disruption arising from CTP oversight exercises could\
    \ affect a firm's ability to meet its obligations under the Proceeds of Crime\
    \ Act 2002, the Terrorism Act 2000, and relevant FCA and PRA rules. Firms should\
    \ already be assessing, within their third-party risk management frameworks, which\
    \ designated CTPs sit within their financial crime compliance technology supply\
