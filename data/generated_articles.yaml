  full_article: "The structural tension between 24/7 instant payment settlement and\
    \ the batch-cycle rhythms of correspondent banking reached the centre of the EBAday\
    \ 2026 agenda on 18 June, underscoring a compliance and operational fault line\
    \ that financial crime risk managers can no longer treat as a payments team problem.\
    \ As real-time schemes extend across jurisdictions and tokenised asset rails begin\
    \ intersecting with traditional nostro-vostro arrangements, the windows available\
    \ for transaction monitoring, sanctions screening, and STR filing are compressing\
    \ in ways that existing frameworks were not designed to absorb.\n\nCorrespondent\
    \ banking has spent the better part of a decade under sustained regulatory pressure.\
    \ FATF Recommendation 13 and its interpretive note set explicit due-diligence\
    \ obligations on respondent relationships, and supervisors from the MAS \u2014\
    \ through Notice 626 and its revisions \u2014 to FinCEN's 2016 correspondent account\
    \ rules have required ongoing monitoring proportionate to assessed risk. The de-risking\
    \ phenomenon that followed, documented repeatedly in FSB and World Bank surveys,\
    \ already narrowed the correspondent network in higher-risk corridors. Real-time\
    \ liquidity demands now add a further complication: pre-funding nostro accounts\
    \ to cover instant settlement creates concentrated pools of value that move faster\
    \ than many transaction surveillance systems can query against sanctions lists\
    \ or behavioural baselines.\n\nFor MLROs at correspondent banks, the immediate\
    \ concern is the adequacy of automated screening at the point of instruction rather\
    \ than at end-of-day batch. The six-second settlement windows common in Faster\
    \ Payments or SCT Inst environments leave negligible time for manual intervention,\
    \ placing enormous weight on the calibration of automated filters \u2014 and raising\
    \ liability questions when a screened payment later proves to involve a designated\
    \ party. The FATF guidance on virtual assets, updated in 2023, applies analogous\
    \ logic to tokenised payment flows, which are beginning to appear on the same\
    \ EBAday panels as conventional FX and liquidity topics.\n\nFor regulators, the\
    \ forward pressure is toward clearer guidance on what \"real-time\" obligation\
    \ actually means in a correspondent chain \u2014 specifically, which entity bears\
    \ primary screening responsibility when a payment traverses multiple rails before\
    \ final settlement. Without that clarity, compliance functions risk duplicating\
    \ controls at every hop or, more dangerously, assuming another party in the chain\
    \ has absorbed the obligation. As ISO 20022's richer data fields gradually populate\
    \ cross-border messages, there is at least a technical basis for more granular,\
    \ journey-level monitoring; the regulatory and contractual frameworks to mandate\
    \ its use consistently across correspondent relationships remain, as yet, unfinished\
    \ work."
