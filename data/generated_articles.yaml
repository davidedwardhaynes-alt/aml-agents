    \ present a distinct financial crime risk profile. FATF guidance on money laundering\
    \ vulnerabilities in real estate, and the FCA's own Financial Crime Guide, identify\
    \ property as a preferred vehicle for layering and integration. A material increase\
    \ in later life lending volumes would correspondingly expand the population of\
