    \ Resilience Act, which became applicable across EU financial entities in January\
    \ 2025 \u2014 require institutions to maintain contractual control, auditability,\
    \ and concentration-risk awareness when critical functions are hosted by a single\
    \ cloud provider. For AML purposes, the Italian supervisory framework, aligned\
