    markets, the practical implication is straightforward: monitor the EP committee''s
    response to industry submissions over the coming weeks and begin gap assessments
    against the draft report text now, before committee votes crystallise positions
    that prove difficult to reverse. The gap between a draft report and a final Level
    1 text can close faster than internal governance cycles allow.'
