    \ operational decision carries compliance weight that extends well beyond routine\
    \ service delivery: outsourcing customer-facing functions in a regulated payments\
    \ environment introduces third-party risk obligations that MAS-licensed entities\
    \ must manage with demonstrable rigour.\n\ndtcpay holds a Major Payment Institution\
    \ licence under the Monetary Authority of Singapore's Payment Services Act 2019,\
    \ which subjects it to MAS Notice PSN01 and PSN02 requirements on anti-money laundering\
    \ and countering the financing of terrorism. Critically, MAS guidelines on technology\
    \ risk management and outsourcing \u2014 reinforced by the broader expectations\
    \ set out in MAS Notice 1119 for banks and their functional equivalents \u2014\
    \ make clear that regulated firms cannot outsource regulatory responsibility.\
    \ When frontline support agents handle merchant onboarding queries, transaction\
