    \ concerns, while the Financial Action Task Force's guidance on the risk-based\
    \ approach explicitly acknowledges that automated transaction monitoring tools\
    \ must remain explainable and auditable to satisfy Recommendation 10 and Recommendation\
    \ 20 obligations. In the UK, the Proceeds of Crime Act 2002 and the Money Laundering\
    \ Regulations 2017 impose personal liability on nominated officers, meaning any\
    \ AI-generated output that informs a suspicious activity report carries governance\
    \ weight that cannot be entirely delegated to a model.\n\nFor MLROs and Heads\
