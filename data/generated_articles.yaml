  full_article: "Tether Gold (XAUt), the stablecoin pegged to physical gold held in\
    \ Swiss vaults, has gained a dedicated options market on Bybit, creating a new\
    \ derivatives layer atop an asset that already sits at the intersection of two\
    \ high-risk categories under FATF guidance: virtual assets and precious metals.\
    \ The immediate compliance implication is that MLROs at firms offering access\
    \ to Bybit products must now assess whether their existing commodity derivatives\
    \ frameworks adequately capture the specific typology risks this instrument introduces.\n\
    \nGold-backed tokens occupy an analytically awkward position in most jurisdictions.\
    \ Under FATF Recommendation 15 and its 2023 updated guidance on virtual assets,\
