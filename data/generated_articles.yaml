    \ are characterised as securities or commodities domestically. A U.S. legislative\
    \ framework that creates divergent supervisory tracks without explicit AML equivalence\
    \ provisions risks generating the kind of regulatory gap that FATF's mutual evaluation\
    \ process \u2014 and correspondingly the assessments of the Asia/Pacific Group\
