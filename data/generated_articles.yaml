    \ beneficial ownership mapping and the group-wide financial crime risk assessments\
    \ required under FATF Recommendation 18 and, in Asia-Pacific jurisdictions, MAS\
    \ Notice MAS 314 and equivalent regimes. Firms that have already built granular\
    \ legal-entity data architectures for AML purposes are better positioned to satisfy\
