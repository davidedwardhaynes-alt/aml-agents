    \ a structural feature of most permissionless chains \u2014 means that front-end\
    \ operators, liquidity providers, and eventually on- and off-ramp providers bear\
    \ residual exposure. In Singapore, MAS Notice SFA04-N02 and the Payment Services\
    \ Act licensing framework already capture some intermediary activity; in Hong\
