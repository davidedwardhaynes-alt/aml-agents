  full_article: "Hong Kong's Mandatory Reporting of Child Abuse Ordinance, which came\
    \ into force in January 2026, is facing calls for legislative amendment less than\
    \ six months after implementation, following a case in which parents refused a\
    \ DNA test required to register a home-born infant \u2014 a gap that advocates\
    \ argue leaves the child invisible to statutory welfare and identity systems.\n\
    \nThe Ordinance currently designates 25 professional categories \u2014 spanning\
    \ social welfare, education, and medical sectors \u2014 as mandated reporters\
    \ of suspected child abuse. The framework mirrors internationally recognised models,\
    \ including guidance embedded in FATF Recommendation 35 on effective implementation\
    \ of preventive measures, and draws on obligations under the UN Convention on\
    \ the Rights of the Child. However, the present case has exposed a structural\
    \ vulnerability: where a child has no formal birth registration, no professional\
    \ within the mandated network is routinely positioned to observe or report. A\
    \ child without a documented identity exists, in effect, outside the scope of\
    \ any reporting obligation.\n\nFrom a regulatory design perspective, the case\
    \ presents several distinct concerns. First, the enumerated list of 25 professions\
    \ creates a closed perimeter \u2014 any individual interacting with an unregistered\
    \ child who falls outside that list bears no statutory duty, regardless of the\
    \ seriousness of their concern. Child protection advocates are urging an expansion\
    \ of the designated professions, potentially to include community health workers,\
    \ housing officers, and early childhood service providers. Second, the absence\
    \ of a registration event itself \u2014 rather than any observed act of abuse\
    \ or neglect \u2014 is not currently classified as a trigger for mandatory reporting,\
    \ a definitional gap legislators will need to address. Third, enforcement agencies\
    \ have noted the ordinance provides no clear mechanism to compel identification\
    \ of a child whose existence has not been officially recorded.\n\nThe implementation\
    \ timeline is also a complicating factor. With the Ordinance barely operational,\
    \ any legislative revision risks undermining professional confidence in the framework's\
    \ stability, a concern supervisors raised during the original consultation period.\n\
    \nHong Kong authorities, including the Social Welfare Department and the Department\
    \ of Justice, will need to assess whether administrative guidance can address\
    \ the most immediate gaps, or whether a formal amendment process \u2014 with attendant\
    \ public consultation \u2014 is unavoidable. How quickly they act will test whether\
    \ the Ordinance is treated as a living instrument or a completed exercise."
