  full_article: "The accelerating migration of corporate payment flows toward non-bank\
    \ third-party providers carries consequences well beyond commercial revenue loss:\
    \ it restructures the customer due diligence and transaction monitoring relationships\
    \ that banks rely upon to meet their obligations under frameworks such as the\
    \ FATF Recommendations, the EU's Anti-Money Laundering Regulation, and equivalent\
    \ national regimes including the UK's Proceeds of Crime Act and Singapore's MAS\
    \ Notice 626.\n\nBanks have historically anchored their financial crime controls\
    \ around the primacy of the account relationship. Where corporates execute payments,\
    \ manage liquidity, and receive embedded financial services through a third-party\
    \ platform rather than directly through their bank, the bank's visibility into\
    \ transactional behaviour narrows materially. The correspondent and indirect access\
    \ models that regulators have scrutinised heavily since FATF's 2016 guidance on\
    \ de-risking illustrate the structural risk: when a layer of intermediation is\
    \ inserted between a bank and the ultimate corporate client, the originating institution\
    \ may see only aggregated or partially attributed flows, complicating the identification\
    \ of beneficial ownership changes, unusual payment patterns, or sanctions exposure.\n\
    \nFrom a supervisory standpoint, this shift tests the adequacy of existing CDD\
    \ frameworks. Regulators including the EBA and MAS have consistently emphasised\
    \ that outsourcing or technological intermediation does not transfer the regulated\
    \ institution's AML/CFT responsibility. If a corporate treasurer now instructs\
    \ payments through an embedded finance layer provided by a software vendor or\
    \ fintech aggregator, the question of who maintains the complete, audit-ready\
    \ transaction record \u2014 and who files the suspicious activity report \u2014\
    \ becomes operationally and legally consequential. Third-party providers operating\
    \ below the threshold of full authorisation may lack equivalent suspicious transaction\
    \ reporting obligations, creating intelligence gaps that national financial intelligence\
    \ units will find difficult to reconcile.\n\nFor banks, the commercial argument\
    \ for retaining corporate relationships through expanded service offerings overlaps\
    \ directly with their compliance interest. A bank that loses the primary payment\
    \ relationship retains the credit or custody exposure without retaining the monitoring\
    \ coverage that justified the original risk appetite decision. Compliance officers\
    \ should be pressing their product and technology counterparts now on what data-sharing,\
    \ API access, or contractual arrangements would be required to maintain transaction\
    \ transparency if distribution shifts to third-party channels. The regulatory\
    \ expectation, as articulated repeatedly in EBA supervisory convergence reports,\
    \ is that banks cannot outsource their way out of their financial crime obligations\
    \ \u2014 whatever the commercial architecture surrounding them."
