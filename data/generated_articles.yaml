    \ \u2014 raises the practical question of whether VASPs have adequately calibrated\
    \ their transaction monitoring thresholds for conditions in which price dislocations\
    \ and heightened geopolitical risk coincide. Under FATF Recommendation 15 and\
    \ its updated guidance on virtual assets, obligated entities are expected to apply\
    \ a risk-based approach that accounts for both counterparty exposure and broader\
    \ contextual factors, including sanctions risk. A Bitcoin market reacting to potential\
    \ strikes on Iran is, by definition, a higher-risk environment.\n\nFor compliance\
