    \ entity's obligations under two distinct AML/CTF regulatory regimes \u2014 the\
    \ United States Bank Secrecy Act framework overseen by FinCEN, and Canada's Proceeds\
    \ of Crime (Money Laundering) and Terrorist Financing Act administered by FINTRAC.\n\
    \nDeluxe, historically synonymous with cheque printing before its gradual pivot\
    \ toward business payments and data analytics, has spent the better part of a\
