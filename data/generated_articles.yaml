  full_article: "The Senate Banking Committee advanced the Clarity Act out of committee\
    \ on 15 May 2026, moving the United States closer to its first comprehensive federal\
    \ framework for digital asset regulation. For compliance professionals, the immediate\
    \ implication is tangible: a statutory regime defining which digital assets constitute\
    \ commodities versus securities would directly reshape AML/CFT programme obligations\
    \ across exchanges, broker-dealers, and custodians currently operating under fragmented\
    \ and often contradictory guidance.\n\nThe absence of a coherent federal digital\
    \ asset framework has long been identified as a structural gap. FATF's 2019 guidance\
    \ on virtual assets and the subsequent 2021 revisions to Recommendation 15 obliged\
    \ member jurisdictions to apply the Travel Rule and broader VASP obligations,\
    \ yet US implementation has remained uneven, with FinCEN's proposed rulemaking\
    \ on unhosted wallets still unresolved and jurisdictional disputes between the\
    \ SEC and CFTC generating material compliance uncertainty. Institutions have consequently\
    \ been building dual-track compliance architectures to satisfy both regimes simultaneously,\
    \ at considerable cost.\n\nThe Clarity Act's commodity-versus-security classification\
    \ mechanism carries direct consequences for AML programme design. Assets designated\
    \ as commodities would fall primarily under CFTC oversight, with FinCEN retaining\
    \ BSA obligations; securities-classified tokens would remain subject to SEC registration\
    \ requirements alongside existing AML duties. For MLROs and Heads of FCC, the\
    \ practical question is whether the Act provides sufficient definitional precision\
    \ to resolve edge cases\u2014particularly around stablecoins and tokenised real-world\
    \ assets\u2014that have generated the most supervisory friction. Institutions\
    \ with cross-border operations will also need to map the Clarity Act's definitions\
    \ against MAS Notice PSN02, the EU's MiCA regime, and AUSTRAC's AML/CTF Act obligations\
    \ to identify divergence points that could complicate group-wide policy harmonisation.\n\
    \nRepublican sponsorship of the bill and its committee advancement under a sympathetic\
    \ majority improves the legislative outlook, though floor scheduling and potential\
    \ amendment risks remain. Enforcement posture is likely to shift in anticipation:\
    \ supervisors at FinCEN and the CFTC may begin signalling examination priorities\
    \ aligned with the emerging framework even before enactment. Compliance functions\
    \ that have deferred digital asset programme investment pending regulatory clarity\
    \ would be prudent to accelerate gap assessments now, rather than face compressed\
    \ implementation timelines once the Act reaches the President's desk."
