    \ are processing volumes that rival mid-tier centralised venues \u2014 and when\
    \ regulators across the Asia-Pacific region are actively debating whether protocol-layer\
    \ activity constitutes a regulated service requiring licensing or registration.\n\
    \nHyperliquid operates as a purpose-built Layer-1 blockchain optimised for on-chain\
    \ order-book trading, handling notional derivatives volumes that have periodically\
    \ exceeded USD 10 billion in a single day. Unlike earlier DeFi protocols that\
    \ routed trades through automated market makers, its architecture more closely\
    \ resembles a centralised exchange in function, which carries significant supervisory\
    \ implications. Under FATF Recommendation 15 and its 2021 updated guidance on\
    \ virtual assets, entities that facilitate exchange or transfer of value \u2014\
    \ even through smart contracts \u2014 may qualify as Virtual Asset Service Providers\
    \ subject to AML/CFT obligations. The question of whether a sufficiently decentralised\
    \ protocol can have an obligated person remains unresolved in most jurisdictions.\n\
    \nFor compliance professionals, the Grayscale thesis raises practical concerns\
    \ beyond the theoretical. If institutional capital follows the analyst framing\
