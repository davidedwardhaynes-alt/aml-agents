  summary: The U. S.
  full_article: "The U.S. Securities and Exchange Commission has proposed rules that\
    \ would allow newly public companies to conduct follow-on capital raises immediately\
    \ upon listing, collapsing the traditional quiet period that has historically\
    \ separated an initial public offering from subsequent equity issuances. If adopted,\
    \ the change would represent one of the most significant restructurings of U.S.\
    \ public-market mechanics since the Securities Act of 1933 established the foundational\
    \ disclosure regime that governs offerings today.\n\nThe existing framework requires\
    \ newly listed issuers to navigate a seasoning period \u2014 typically one year\
    \ for smaller reporting companies under shelf registration rules \u2014 before\
    \ accessing automatic shelf registration under Rule 462(e). The rationale has\
    \ long been investor protection: markets require time to price-discover a newly\
    \ listed entity, and premature secondary raises carry elevated risks of dilution\
    \ and information asymmetry. The SEC's current posture, under a more capital-markets-friendly\
    \ administration, reflects a broader policy appetite to reduce friction in U.S.\
    \ listings and counter competitive pressure from exchanges in London, Amsterdam,\
    \ and increasingly Singapore and Hong Kong.\n\nFor financial crime compliance\
    \ professionals, the proposal carries meaningful implications. Compressed timelines\
    \ between IPO and follow-on issuance reduce the window available to underwriters,\
    \ transfer agents, and broker-dealers to conduct enhanced due diligence on shareholder\
    \ composition and fund flows. FATF Recommendation 24, which addresses transparency\
    \ of legal persons, implicitly depends on stable post-issuance periods during\
    \ which beneficial ownership can be accurately reported and verified. Rapid successive\
    \ raises complicate that process, particularly for cross-border investors routing\
    \ capital through nominee structures.\n\nIn jurisdictions with extraterritorial\
    \ reach \u2014 such as Australia's AML/CTF Act, which imposes obligations on designated\
    \ services involving securities issuance \u2014 local compliance teams accepting\
    \ subscriptions in U.S. follow-on offerings will need to assess whether accelerated\
    \ timelines adequately support customer due diligence requirements under their\
    \ own frameworks. Similarly, Hong Kong intermediaries governed by AMLO would need\
    \ to ensure that the velocity of new issuances does not outpace their own transaction\
    \ monitoring calibration.\n\nThe SEC is expected to open the proposal for public\
    \ comment in the coming weeks. How it addresses the due diligence gap \u2014 whether\
    \ through enhanced prospectus disclosure requirements, mandatory lock-up provisions,\
    \ or coordination with FINRA's surveillance obligations \u2014 will determine\
    \ whether the efficiency gains justify the corresponding reduction in market opacity\
    \ safeguards."
