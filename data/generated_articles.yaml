    \ From a financial crime standpoint, this architecture carries a dual character.\
    \ Tokenisation reduces the exposure of primary account numbers, narrowing one\
    \ traditional vector for card-not-present fraud. At the same time, any aggregation\
    \ point for payment credentials becomes a concentration risk: a compromised or\
    \ inadequately governed intermediary can silently re-route or clone transaction\
    \ flows in ways that legacy card schemes were not designed to detect at speed.\n\
    \nFor compliance officers operating under MAS Notice PSN01 and PSN02 \u2014 which\
    \ impose transaction monitoring and suspicious transaction reporting obligations\
    \ on licensed payment service providers \u2014 the entry of a third-party certified\
    \ partner into the checkout stack raises a practical question of obligation mapping.\
    \ Where Juspay sits between the merchant and the scheme, acquirers must satisfy\
    \ themselves that contractual and technical arrangements preserve the integrity\
    \ of their own FATF Recommendation 16 wire-transfer and data-passing obligations.\
    \ The outsourcing provisions under MAS Guidelines on Outsourcing (MAS Guidelines\
    \ FSG-G01) would typically require that transaction data remains accessible for\
    \ audit and that the third party's controls are subject to periodic review.\n\n\
    Juspay's prior deployment in Brazil, where Banco Central do Brasil's open finance\
    \ and instant payment infrastructure (Pix) operates alongside SRC, provides a\
    \ partial template. Brazilian regulators have required SRC participants to maintain\
    \ audit trails consistent with COAF reporting obligations. Whether MAS and regional\
    \ counterparts in markets such as India \u2014 where Juspay has a significant\
    \ domestic footprint subject to RBI's Payment Aggregator framework \u2014 will\
    \ impose comparable SRC-specific guidance remains an open question.\n\nThe broader\
    \ trajectory is clear: as Click to Pay penetration grows across Southeast Asia,\
    \ supervisors will need to assess whether existing payment service provider licence\
    \ conditions adequately address the layered accountability structures that certified\
    \ third-party partnerships introduce. The framework exists; the supervisory attention\
    \ to its application at the scheme-intermediary interface is still catching up."
