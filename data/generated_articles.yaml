    \ of approximately \xA31.3 million through a Ponzi scheme operated largely via\
    \ Facebook advertising. The order represents the entirety of assets the court\
    \ found available for recovery \u2014 a figure that covers only around 35% of\
    \ investor losses \u2014 underscoring the persistent gap between proceeds of fraud\
    \ and recoverable assets in retail investment scams.\n\nPugh's case carries characteristics\
    \ the Financial Action Task Force has long identified as high-risk indicators\
    \ under Recommendation 3 and its associated guidance on fraud-predicate offences:\
    \ implausible return promises, social-media solicitation of retail investors,\
    \ minimal actual trading activity \u2014 just 19% of collected funds reached any\
    \ market \u2014 and co-offender structuring. Under the Proceeds of Crime Act 2002,\
    \ the confiscation regime obliges courts to assess a defendant's \"benefit\" from\
    \ criminal conduct and the \"available amount,\" with the latter frequently falling\
    \ well short of the former where funds have been dissipated through lifestyle\
    \ expenditure or concealed transfers.\n\nFor MLROs and transaction monitoring\
    \ teams, the case reaffirms several practical surveillance considerations. Retail-facing\
    \ Ponzi operations of this scale routinely rely on payment flows that, individually,\
    \ appear unremarkable \u2014 consumer card transactions and bank transfers from\
