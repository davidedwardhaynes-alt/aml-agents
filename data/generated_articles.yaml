    \ raises questions that go beyond urban planning. Cross-boundary capital flows,\
    \ land-use financing structures, and the layering of Hong Kong and mainland corporate\
    \ vehicles within a single development zone create precisely the transactional\
    \ complexity that FATF Recommendation 1 \u2014 the risk-based approach \u2014\
