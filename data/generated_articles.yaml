    \ to public censure, potential civil liability, and the kind of scrutiny that\
    \ invites Parliamentary attention. Due diligence on prospective sponsors against\
    \ the FCA Register and Warning List is now, in practical terms, an expected standard\
    \ rather than a courtesy check.\n\nFor AML professionals specifically, the concern\
    \ extends beyond consumer protection. Unauthorised financial firms, particularly\
