    \ pre-IPO instruments, and the cross-product layering risk that arises when customers\
    \ move value between crypto holdings and newly accessible equity products. The\
    \ AI adviser component adds a further dimension: regulators in multiple jurisdictions,\
    \ including the FCA and MAS under its recently updated Notice on technology risk\
    \ management, have signalled that accountability for AI-generated financial advice\
