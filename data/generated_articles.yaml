    \ risk assessments may require revision. Additionally, the systemic designation\
    \ implies heightened supervisory reporting, which raises questions about data-sharing\
    \ obligations and whether transaction monitoring systems calibrated for e-money\
    \ instruments remain adequate for stablecoin flows of the contemplated volume.\n\
    \nFor stablecoin issuers themselves, the Code of Practice will function as a rulebook\
    \ with the force of direction under the Bank's stabilisation powers. Governance,\
