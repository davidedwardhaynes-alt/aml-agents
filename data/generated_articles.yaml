  full_article: "Thunes, the Singapore-headquartered cross-border payments network,\
    \ has opened a New York office in Union Square, adding to existing US operations\
    \ in San Francisco and Atlanta and drawing on capital from its US$150 million\
    \ Series D round. The expansion signals a deliberate push to capture a larger\
    \ share of corporate cross-border payout flows originating from the United States\
    \ \u2014 one of the world's largest remittance-source jurisdictions and a market\
    \ where regulatory and compliance expectations for payment intermediaries are\
    \ among the most demanding globally.\n\nThe move comes as US authorities have\
    \ intensified scrutiny of non-bank payment service providers operating cross-border\
    \ corridors. FinCEN's money services business registration requirements, combined\
    \ with state-level money transmitter licensing obligations across all fifty jurisdictions,\
    \ create a compliance architecture that is materially more complex than the single-licence\
    \ regimes common in Singapore or the EU. For a firm whose network spans over 130\
    \ countries and connects directly to mobile wallets, bank accounts, and cash-out\
