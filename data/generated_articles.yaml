    the proposals signal that supervisory tolerance for opaque collateral structures
    and compressed due-diligence timelines is diminishing.
  full_article: "The Prudential Regulation Authority has published proposals to impose\
    \ enhanced regulatory requirements on funded reinsurance transactions involving\
    \ UK life insurers, a move that directly addresses concentration and counterparty\
    \ risks that have accumulated as the bulk annuity market has expanded sharply\
    \ over the past three years. For compliance officers at life insurers and their\
    \ reinsurance counterparties, the proposals signal that supervisory tolerance\
    \ for opaque collateral structures and compressed due-diligence timelines is diminishing.\n\
    \nFunded reinsurance \u2014 in which a cedant transfers longevity or other insurance\
    \ risk to a reinsurer that simultaneously provides collateral back to the cedant\
    \ \u2014 has become a structurally significant feature of the UK bulk purchase\
    \ annuity market. As defined benefit pension scheme de-risking accelerated following\
    \ the 2022 liability-driven investment crisis, life insurers increasingly relied\
    \ on funded reinsurance to manage Solvency II capital requirements. The PRA flagged\
    \ concentration concerns as early as its 2023 supervisory statement reviews, noting\
    \ that a small number of offshore reinsurers were absorbing a disproportionate\
    \ share of UK longevity exposure. The current proposals represent a more formal\
    \ crystallisation of those concerns into binding or quasi-binding supervisory\
    \ expectations.\n\nFrom a financial crime compliance perspective, the proposals\
    \ carry implications beyond prudential soundness. Enhanced due diligence obligations\
    \ on counterparties, collateral custodians, and special purpose vehicles used\
    \ in these structures will intersect with existing AML frameworks, including the\
    \ Money Laundering Regulations 2017 and the FCA's broader expectations under SYSC\
    \ 6. Where collateral pools include illiquid or alternative assets \u2014 infrastructure\
    \ debt, private credit \u2014 MLROs will need to assess whether beneficial ownership\
    \ transparency meets the standards implied by FATF Recommendation 10 on customer\
    \ due diligence and Recommendation 40 on international cooperation.\n\nReinsurers\
    \ domiciled in jurisdictions with weaker AML/CFT frameworks present a compounded\
    \ risk: prudential opacity and financial crime exposure are not always separable.\
    \ The PRA's proposals, while framed in Solvency UK language, will in practice\
    \ require life insurers to stress-test their third-party risk management frameworks\
    \ in ways that compliance functions cannot treat as solely an actuarial or treasury\
    \ matter.\n\nThe consultation period will determine whether the final rules include\
    \ prescriptive collateral eligibility criteria or retain supervisory discretion.\
    \ Either outcome will require compliance teams to engage early with actuarial\
    \ and investment colleagues \u2014 a coordination that, in several large insurers,\
    \ remains underdeveloped."
