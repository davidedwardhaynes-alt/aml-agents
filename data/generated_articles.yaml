  full_article: "Singapore's Commercial Affairs Department has charged Zhu Juntao,\
    \ former chief executive of crypto lending platform Hodlnaut, with offences related\
    \ to false or misleading statements made in connection with the firm's exposure\
    \ to the Terra-Luna ecosystem collapse of May 2022. The charges mark one of the\
    \ most consequential individual prosecutions to emerge from the broader 2022 digital\
    \ asset crisis in Southeast Asia, and signal that Singaporean authorities remain\
    \ willing to pursue personal criminal liability for executives whose disclosures\
    \ to creditors or regulators fell short of legal requirements.\n\nHodlnaut suspended\
    \ withdrawals in August 2022, citing \"market conditions,\" before it emerged\
    \ that the platform had held significant exposure to the TerraUSD algorithmic\
    \ stablecoin that had imploded months earlier. The Monetary Authority of Singapore\
    \ subsequently withdrew the firm's exemption under the Payment Services Act and\
    \ referred the matter to the CAD. Under Singapore's Penal Code and the relevant\
    \ provisions of the Companies Act, making false statements to deceive creditors\
    \ or investors carries substantial custodial penalties. The case also intersects\
    \ with MAS Notice PSN02, which imposes disclosure and risk-management obligations\
    \ on digital payment token service providers, and with FATF Recommendation 15's\
    \ expectation that virtual asset service providers operate with governance standards\
    \ commensurate with those of traditional financial institutions.\n\nFor compliance\
    \ officers at digital asset firms, the prosecution underlines that narrative risk\
    \ management \u2014 choosing what to disclose and when \u2014 carries direct criminal\
    \ exposure for senior individuals, not merely regulatory sanction at the entity\
    \ level. Creditor communication during a liquidity crisis is not a purely commercial\
    \ decision; it is a potential predicate for fraud or false-accounting charges.\
    \ For MAS and peer regulators in Hong Kong, Australia, and across ASEAN, the case\
    \ provides a live precedent that post-mortem enforcement actions against collapsed\
    \ crypto intermediaries can result in personal indictment years after the triggering\
    \ event.\n\nThe outcome of Zhu's prosecution will be closely watched as Singapore\
