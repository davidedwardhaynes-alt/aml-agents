    \ asset manager for an asset whose issuer, Binance, reached a US\\$4.3 billion\
    \ settlement with the US Department of Justice in November 2023 over Bank Secrecy\
    \ Act and sanctions violations.\n\nThe filing arrives at a moment when the spot\
    \ crypto ETF market, having accommodated Bitcoin and Ether products since 2024,\
    \ is becoming demonstrably competitive. Asset managers are under pressure to differentiate\
