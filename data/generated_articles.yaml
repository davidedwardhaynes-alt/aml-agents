    \ time-of-day clustering, device consistency \u2014 are poorly suited to detecting\
    \ agent-driven activity, which can be deliberately throttled to remain below alert\
    \ triggers. MAS Notice 626 requires Singapore-licensed banks to maintain systems\
    \ commensurate with their risk exposure; if the threat model has materially changed,\
    \ the adequacy of existing controls is a supervisory question, not merely a technical\
    \ one. Similarly, institutions operating under Australia's AML/CTF Act or the\
    \ UK's Proceeds of Crime Act face analogous obligations to keep detection capabilities\
    \ current.\n\nThe mule-recruitment dimension deserves particular attention. Agentic\
