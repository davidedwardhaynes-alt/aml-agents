    \ funds, reputational and financial penalties arising from AML failures translate\
    \ directly into retail investment losses, a factor that APRA has noted in its\
    \ prudential risk appetite discussions and that is increasingly visible in board-level\
    \ risk committee deliberations.\n\nAs Tranche 2 of Australia's AML/CTF reforms\
    \ brings lawyers, accountants, and real estate professionals into the regulated\
    \ population from 2026, banks will face both competitive pressure from newly compliant\
    \ entities and a more complex customer-due-diligence environment. The industry's\
    \ self-presentation as infrastructure will need to be matched by the robustness\
    \ of the controls that characterisation implicitly demands."
