    \ can expose institutions to supervisory scrutiny that frequently extends into\
    \ broader AML and financial crime control assessments.\n\nOTC derivatives have\
    \ occupied regulators since the 2008 financial crisis exposed opacity in bilateral\
    \ exposure networks. The G20 Pittsburgh commitments translated into mandatory\
