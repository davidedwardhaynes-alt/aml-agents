  full_article: "The Financial Conduct Authority confirmed on 18 May 2026 that it\
    \ will consult on the core elements of the consumer credit framework following\
    \ HM Treasury's policy statement on reforming the Consumer Credit Act 1974, signalling\
    \ a fundamental shift in how roughly \xA3200 billion in outstanding consumer credit\
    \ balances will be governed \u2014 moving from rigid statutory prescription toward\
    \ principle-based FCA rulemaking.\n\nThe Consumer Credit Act 1974 has long been\
    \ regarded as structurally ill-suited to a digital lending environment. Its prescriptive\
    \ requirements \u2014 covering pre-contractual disclosure, agreement formation,\
    \ and termination rights \u2014 were designed for a paper-based era and have generated\
    \ persistent compliance friction for firms operating across buy-now-pay-later,\
    \ open banking-linked credit, and embedded finance channels. Multiple Law Commission\
    \ reviews and HM Treasury consultations over the past decade identified the Act's\
    \ inflexibility as a barrier to proportionate regulation, yet legislative reform\
    \ stalled repeatedly given the Act's complexity and the breadth of rights it encodes.\n\
    \nFor MLROs and compliance officers at consumer credit firms, the transition carries\
    \ layered implications. The Consumer Duty \u2014 already in force since July 2023\
    \ \u2014 will serve as the normative spine of the new framework, meaning firms\
    \ must demonstrate good outcomes across the credit lifecycle rather than merely\
    \ satisfy checklist obligations. This raises the evidentiary burden: firms will\
    \ need robust data on customer journeys, complaint root-cause analysis, and outcome\
    \ monitoring, capabilities that many smaller lenders have not yet fully developed.\
    \ Anti-financial crime functions should note that any repricing of credit risk\
    \ assessment or restructuring of agreement terms in response to new FCA rules\
    \ could alter the customer risk profiles embedded in transaction monitoring models,\
    \ warranting timely model review.\n\nConsumer advocacy groups will scrutinise\
    \ whether statutory protections \u2014 particularly Section 75 joint liability,\
    \ early settlement rebate calculations, and termination rights under Section 99\
    \ \u2014 are preserved in substance when translated into FCA rules. The FCA's\
    \ commitment to cost-benefit analysis and stakeholder consultation before any\
    \ proposals are finalised provides some procedural assurance, but the outcome\
    \ will depend heavily on how the regulator weighs commercial flexibility against\
    \ the entrenched rights consumers currently hold under primary legislation.\n\n\
    The consultation process, expected to unfold over several years given the Act's\
    \ scope, will require compliance teams to engage early. Firms that treat this\
    \ solely as a legal redrafting exercise risk missing the broader shift toward\
    \ outcomes-based accountability that the Consumer Duty already demands."
