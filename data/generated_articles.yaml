    \ implications for how compliance teams assess secondary-market fraud and the\
    \ proceeds flowing from it.\n\nTicket touting at major sporting events has long\
    \ occupied a grey zone in financial crime typologies. Secondary-market resale\
    \ can generate proceeds that, depending on jurisdiction, may constitute criminal\
    \ property under instruments such as the UK's Proceeds of Crime Act 2002 or Hong\
    \ Kong's Organised and Serious Crimes Ordinance. FATF's broader guidance on gatekeeping\
    \ and the misuse of legal structures has increasingly been read by supervisors\
    \ to encompass scalping operations that employ shell entities or nominee purchasers\
    \ to obscure beneficial ownership of high-margin ticket portfolios. Where volumes\
    \ are material and structures deliberate, the activity can attract suspicious\
    \ transaction reporting obligations for financial intermediaries processing the\
    \ payment flows.\n\nFor compliance officers, the Avalanche implementation introduces\
    \ a technically enforceable transfer restriction: non-fungible tickets tied to\
    \ verified identity credentials cannot be transferred without protocol-level approval,\
    \ collapsing the anonymous peer-to-peer resale channel that has historically made\
    \ proceeds difficult to trace. If the identity-binding mechanism is robust, the\
    \ primary AML benefit is not the blockchain itself but the KYC layer embedded\
    \ into the issuance process\u2014precisely the control that FATF Recommendation\
    \ 10 demands of obliged entities dealing in high-value assets.\n\nThe practical\
    \ questions for MLROs are predictable. How is the identity verification conducted\
    \ and by whom? Does the verification standard meet the customer due diligence\
    \ requirements applicable in the jurisdictions where tickets are issued and redeemed?\
    \ What happens when credentials are transferred informally, with the original\
    \ purchaser simply handing over a device or seed phrase? Smart-contract enforcement\
    \ of transfer rules does not prevent social-engineering workarounds, and any residual\
    \ grey market that migrates to encrypted messaging platforms will be harder to\
    \ monitor than the open secondary markets it displaces.\n\nThe 2026 tournament\
    \ will serve as a substantial live dataset on whether cryptographic ticketing\
    \ meaningfully reduces scalping proceeds or merely redirects them. Supervisors\
    \ evaluating virtual asset service providers in the ticketing-adjacent space should\
    \ treat the outcome as evidence\u2014positive or otherwise\u2014for the next iteration\
    \ of guidance on VASP risk assessments and the adequacy of technical controls\
    \ as a substitute for conventional CDD."
