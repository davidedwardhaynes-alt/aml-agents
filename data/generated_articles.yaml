    \ to local cloud regions and data-centre capacity \u2014 is reshaping the operational\
    \ substrate on which the country's financial sector runs. For anti-money laundering\
    \ and financial crime compliance functions, that shift is consequential: cloud-hosted\
    \ transaction monitoring, AI-driven name screening, and centralised data lakes\
    \ are moving from pilot programmes to production infrastructure, compressing the\
    \ timeline for regulators and institutions alike to establish adequate governance\
    \ frameworks.\n\nThe backdrop matters. Bank Negara Malaysia's Risk Management\
    \ in Technology (RMiT) policy document, in force since 2020, already imposes obligations\
    \ on financial institutions regarding cloud adoption \u2014 covering concentration\
    \ risk, data residency, and audit access. The National Cloud Computing Policy,\
    \ launched to accelerate public- and private-sector migration, sits alongside\
    \ these prudential requirements but does not automatically harmonise with them.\
    \ Where commercial momentum outpaces policy alignment, compliance gaps tend to\
    \ emerge at the seams.\n\nFor MLROs and heads of financial crime compliance, the\
    \ critical near-term consideration is third-party and outsourcing risk. FATF Recommendation\
    \ 18 requires financial groups to implement group-wide AML/CFT programmes, including\
    \ in respect of branches and subsidiaries that share cloud infrastructure. If\
    \ transaction data \u2014 including that relevant to suspicious transaction reporting\
    \ under Malaysia's Anti-Money Laundering, Anti-Terrorism Financing and Proceeds\
    \ of Unlawful Activities Act 2001 \u2014 is processed or stored by offshore cloud\
    \ providers, institutions must be able to demonstrate that Bank Negara retains\
    \ effective supervisory access and that data integrity is preserved for evidentiary\
    \ purposes.\n\nThere is also an AI governance dimension that compliance professionals\
    \ should not treat as a technology-team concern alone. AI-assisted transaction\
    \ monitoring systems trained on cloud infrastructure introduce model-risk questions\
    \ that intersect directly with AML effectiveness: explainability of alert generation,\
    \ bias in typology detection, and audit-trail sufficiency for regulatory examination.\
    \ MAS's recently updated guidelines on AI governance in financial services offer\
    \ a regional reference point, even where they are not directly binding on Malaysian\
    \ institutions.\n\nMalaysia's positioning as a digital hub is commercially credible.\
    \ Whether the AML supervisory architecture \u2014 and the compliance functions\
    \ within institutions \u2014 can scale commensurately with the infrastructure\
