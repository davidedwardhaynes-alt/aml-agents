    \ infrequency of capital calls, and the absence of real-time transaction monitoring\
    \ have made meaningful risk-scoring difficult. In jurisdictions such as Singapore,\
    \ MAS Notice SFA 04-N02 and the broader Variable Capital Companies framework have\
    \ tightened expectations for fund managers, while the EU's AIFMD II and the US\
    \ Treasury's 2024 investment adviser AML rulemaking have extended formal obligations\
    \ to segments of private capital that previously operated with limited supervisory\
    \ scrutiny.\n\nFor MLROs at fund administrators and general partners, the immediate\
    \ implication is structural: the fragmented data environment of private capital\
    \ \u2014 capital account statements, subscription documents, side-letter arrangements,\
    \ and beneficial ownership registers spread across disparate systems \u2014 is\
    \ precisely the landscape that AI-assisted data aggregation promises to rationalise.\
    \ If Capsa's platform can ingest and normalise these sources reliably, it could\
    \ meaningfully reduce the manual effort that currently sits between raw documentation\
    \ and a defensible risk assessment.\n\nThe investor due diligence angle is equally\
    \ consequential. Identifying politically exposed persons, adverse media, and complex\
    \ ownership chains across a fund's LP base remains labour-intensive. Regulators,\
    \ including AUSTRAC under the AML/CTF Act and FINTRAC under Canada's PCMLTFA,\
    \ have repeatedly cited inadequate beneficial ownership verification as a primary\
    \ finding in private fund examinations. Automation that improves data quality\
    \ and audit trails could translate directly into fewer supervisory findings.\n\
    \nCaution is warranted, however. AI tools operating across unstructured private-market\
    \ data carry model-risk implications that compliance teams will need to govern\
    \ carefully, and regulators have signalled \u2014 most explicitly in MAS's 2024\
    \ guidance on AI governance \u2014 that accountability for automated decisions\
    \ remains with the regulated firm. Whether $18 million is sufficient to build\
    \ the necessary depth of coverage, and the vendor relationships to sustain it,\
    \ will determine whether Capsa becomes infrastructure or a cautionary tale."
