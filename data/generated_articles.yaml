  full_article: "Tokenised US Treasury markets reached $14.6 billion in outstanding\
    \ value by mid-June 2026, a milestone that places distributed-ledger-based fixed\
    \ income squarely within the perimeter of institutional financial markets and,\
    \ consequently, within the direct line of sight of anti-money laundering supervisors\
    \ across multiple jurisdictions.\n\nThe growth trajectory matters as context.\
    \ When FATF updated its Recommendation 15 guidance on virtual assets in 2021 and\
    \ again in its 2023 targeted review, it explicitly flagged tokenised securities\
    \ as instruments requiring the same customer due diligence, travel rule compliance,\
    \ and suspicious transaction reporting obligations as their conventional equivalents.\
    \ Yet regulatory operationalisation has lagged the market. MAS Notice SFA04-N02\
    \ and the broader regulatory perimeter under Singapore's Payment Services Act\
    \ capture certain digital payment tokens but leave nuanced questions about tokenised\
    \ capital market products to MAS's securities licensing regime\u2014a gap that\
    \ grows more consequential as volumes scale. In the United States, FinCEN's existing\
    \ BSA framework applies, but examiner guidance specific to tokenised Treasury\
    \ workflows remains thin.\n\nFor MLROs at broker-dealers, asset managers, and\
    \ custodians now onboarding tokenised Treasury products, the compliance implications\
    \ are layered. The on-chain transfer of a tokenised T-bill between two institutional\
    \ wallets can technically trigger travel rule obligations under FATF standards\
    \ if the intermediary qualifies as a virtual asset service provider, yet the same\
    \ transaction may simultaneously fall under securities settlement rules that carry\
    \ separate recordkeeping requirements. Reconciling these parallel obligations\u2014\
    particularly where smart contract-based atomic settlement removes a traditional\
    \ intermediary entirely\u2014creates genuine ambiguity about which entity holds\
    \ the reporting duty.\n\nSecondary market liquidity is a further concern. As tokenised\
    \ Treasuries develop deeper secondary markets on permissioned and semi-permissioned\
    \ chains, the layering typology risk increases. The instrument's apparent legitimacy\
    \ as a sovereign-backed asset could be exploited to move value across chains under\
    \ the guise of yield management, a pattern AUSTRAC and the UK's FCA have both\
    \ flagged in broader discussions of DeFi-adjacent institutional products.\n\n\
    The more consequential regulatory development to watch is whether the Basel Committee's\
    \ cryptoasset prudential standards, scheduled for phased implementation across\
    \ G10 jurisdictions through 2026 and 2027, will be interpreted to encompass tokenised\
    \ securities held off-balance-sheet through third-party custodians. That determination\
    \ will set the tone for how aggressively supervisors treat the AML perimeter around\
    \ what is rapidly becoming a mainstream fixed income instrument."
