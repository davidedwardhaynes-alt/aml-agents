    \ to the client base \u2014 not as an afterthought once regulatory scrutiny arrives.\n\
    \nWealth management has occupied a distinct position in FATF's risk typologies\
    \ for well over a decade. Recommendation 12 on politically exposed persons, Recommendation\
    \ 25 on beneficial ownership of legal arrangements, and the 2023 FATF guidance\
    \ on risk-based supervision of the sector all underscore that high-net-worth client\
    \ relationships present compounded exposure: larger transaction values, complex\
    \ holding structures, and relationship-driven service models that can inadvertently\
    \ subordinate compliance rigour to client retention. In the United States, FinCEN's\
    \ customer due diligence rule under 31 CFR Part 1010 and the more recent Corporate\
    \ Transparency Act reporting requirements have raised the baseline expectation\
    \ for investment advisers, a category the SEC has been pushing toward full Bank\
    \ Secrecy Act programme obligations for several years.\n\nFor Farther's compliance\
    \ function, the Series D milestone creates several concrete pressure points. Rapid\
    \ adviser onboarding \u2014 a core growth lever for technology-enabled wealth\
