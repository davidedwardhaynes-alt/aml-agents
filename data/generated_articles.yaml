  full_article: "The disappearance of Hong Kong entertainer Stanley Yau's iPhone \u2014\
    \ recovered visibly on sale at a Shenzhen market \u2014 illustrates a data-security\
    \ exposure that compliance professionals routinely underestimate: the downstream\
    \ risk of corporate or personal devices transiting the mainland China border,\
    \ where jurisdictional recovery mechanisms are limited and data extraction capabilities\
    \ are well-documented.\n\nThe cross-boundary movement of lost or stolen devices\
    \ between Hong Kong and Shenzhen sits at the intersection of two distinct legal\
    \ regimes. Hong Kong's Personal Data (Privacy) Ordinance (Cap. 486) imposes obligations\
    \ on data users to take practicable steps to protect personal data from unauthorised\
