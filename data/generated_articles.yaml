  full_article: "The Association of Banks in Singapore will remove the PayNow nickname\
    \ feature for retail customers on 6 June 2026, replacing user-created display\
    \ names with selected letters of the recipient's registered account name. The\
    \ immediate compliance implication is a structural reduction in one social-engineering\
    \ vector that has enabled impersonation fraud, a category that has consistently\
    \ ranked among the top scam typologies in Singapore's annual scam statistics.\n\
    \nThe change sits within a multi-year hardening of Singapore's retail payments\
    \ infrastructure. MAS Notice PSN01 and Notice PSN02 already impose obligations\
    \ on major payment institutions around customer due diligence and transaction\
    \ monitoring, while the Shared Responsibility Framework \u2014 finalised in late\
    \ 2023 and effective October 2024 \u2014 introduced explicit cost-allocation between\
    \ banks and telcos for scam losses. Removing a feature that allowed bad actors\
    \ to mimic legitimate payees, such as displaying a nickname identical to a government\
    \ agency or employer, is consistent with the design-stage fraud prevention logic\
    \ that regulators have increasingly pressed onto financial institutions, rather\
    \ than relying solely on post-event detection.\n\nFor MLROs and fraud-prevention\
    \ teams, the operational read-through is modest but meaningful. Customer complaints\
    \ and misdirected-payment disputes may rise briefly during the transition as users\
    \ adjust to masked account-name verification, creating a short-term uptick in\
    \ case volume. Institutions should review their SAR and internal suspicious transaction\
    \ escalation procedures to ensure the adjustment period does not mask genuine\
    \ mule-account activity behind a noise floor of user-error reports. The change\
    \ also reinforces the name-matching logic that underpins Confirmation of Payee\
    \ regimes elsewhere, notably the UK's under Payment Systems Regulator rules, suggesting\
    \ ABS is aligning PayNow's assurance architecture with international best practice.\n\
    \nFor corporate compliance teams running payroll or vendor disbursements over\
