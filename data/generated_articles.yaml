  full_article: "Goldman Sachs, Morgan Stanley, and several other major Wall Street\
    \ institutions have updated their employee codes of conduct to restrict or prohibit\
    \ participation in prediction markets, according to reports published in July\
    \ 2026 \u2014 a move that signals growing institutional recognition that such\
    \ platforms present material conflicts of interest and, potentially, insider-trading\
    \ exposure for regulated firms.\n\nPrediction markets, which allow participants\
    \ to wager on the probability of future events \u2014 including macroeconomic\
    \ data releases, election outcomes, and corporate actions \u2014 have expanded\
    \ rapidly since the US Commodity Futures Trading Commission granted Kalshi exchange\
    \ status in 2023. That regulatory legitimisation drew mainstream retail and institutional\
    \ attention, but it also created an unresolved tension: employees at banks with\
    \ privileged access to client order flow, earnings guidance, or non-public economic\
    \ research could theoretically use that information to take positions on correlated\
    \ market events. FATF Recommendation 10 and its underlying customer due diligence\
    \ logic was never designed with event-contract platforms in mind, and most jurisdictions'\
    \ market abuse frameworks \u2014 including the SEC's Rule 10b-5 and the EU's Market\
    \ Abuse Regulation \u2014 have yet to issue definitive guidance on whether prediction\
    \ market positions constitute securities or derivatives for insider-trading purposes.\n\
    \nFrom a financial crime compliance perspective, the banks' self-regulatory response\
    \ raises several considerations. First, the conduct risk framing here overlaps\
    \ with market integrity obligations under FINRA rules and MiFID II's personal\
    \ account dealing restrictions; a blanket ban is the administratively straightforward\
    \ solution where regulatory ambiguity would otherwise require case-by-case materiality\
    \ assessments. Second, compliance teams face a monitoring challenge: unlike listed\
    \ securities, prediction market activity on platforms that do not report to consolidated\
    \ audit trails is difficult to surveil through existing trade surveillance infrastructure.\
    \ Third, to the extent employees route bets through third parties or pseudonymous\
    \ accounts, banks could face secondary exposure under Bank Secrecy Act obligations\
    \ if such activity constitutes a suspicious transaction pattern.\n\nFor MLROs\
    \ at non-bank financial institutions \u2014 asset managers, family offices, and\
