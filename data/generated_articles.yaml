    \ and financial crime functions, the practical implications extend beyond conduct.\
    \ BNPL products embedded in e-commerce flows have historically sat outside Know\
    \ Your Customer pipelines that apply to regulated credit. Bringing providers into\
    \ the FCA perimeter activates obligations under the Money Laundering Regulations\
    \ 2017, potentially requiring firms to revisit customer due diligence architecture,\
    \ transaction monitoring calibration, and suspicious activity reporting procedures.\
    \ FATF Recommendation 15, which addresses the risk-based supervision of new products,\
    \ is directly relevant where algorithmic affordability checks are used as a proxy\
    \ for identity verification without meeting the full standard.\n\nFor established\
    \ banks and lenders offering competing instalment products, the development is\
