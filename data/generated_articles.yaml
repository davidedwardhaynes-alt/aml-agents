  full_article: "On 15 May 2026, ISDA and the Asia Securities Industry and Financial\
    \ Markets Association (ASIFMA) submitted a joint response to the Monetary Authority\
    \ of Singapore's consultation on the prudential treatment of crypto assets held\
    \ or transacted on permissionless blockchains \u2014 a development that draws\
    \ a direct line between capital adequacy frameworks and the longstanding AML/CFT\
    \ debate over unhosted wallets and pseudonymous infrastructure.\n\nThe consultation\
    \ sits within MAS's broader effort to align Singapore's prudential standards with\
    \ the Basel Committee on Banking Supervision's framework for crypto asset exposures,\
    \ finalised in late 2022 and phased into implementation across jurisdictions since.\
    \ Under that framework, crypto assets on permissionless, publicly accessible blockchains\
    \ attract Group 2 classification \u2014 and in the most conservative readings,\
    \ full 1,250% risk-weight treatment \u2014 precisely because regulators cannot\
    \ readily verify counterparty identity or impose transaction controls equivalent\
    \ to those on permissioned systems. The prudential and financial crime rationales\
    \ are, in this respect, structurally linked: the same anonymity features that\
    \ complicate KYC and Travel Rule compliance under MAS Notice PSN02 and FATF Recommendation\
    \ 16 also drive elevated capital charges.\n\nISDA and ASIFMA's intervention will\
    \ be closely watched by compliance functions for several reasons. Industry associations\
    \ at this tier typically argue for more granular, risk-proportionate calibration\
    \ \u2014 distinguishing, for instance, between assets where on-chain analytics\
    \ and chain-of-custody controls provide meaningful AML assurance and those where\
    \ they do not. If MAS accepts such arguments, institutions may gain some capital\
    \ relief for permissionless exposures accompanied by robust transaction monitoring\
    \ and counterparty screening, effectively creating a prudential incentive to invest\
    \ in financial crime controls rather than simply exiting the asset class.\n\n\
    For MLROs at Singapore-regulated banks and digital payment token service licensees,\
    \ the outcome carries operational weight beyond the balance sheet. A tighter definitional\
    \ boundary between permissioned and permissionless infrastructure in prudential\
    \ rules would likely sharpen internal classification debates, affect product approval\
    \ processes, and influence how correspondent relationships with crypto-native\
    \ counterparties are risk-rated under existing AML frameworks.\n\nMAS has consistently\
    \ signalled that it views prudential soundness and financial crime integrity as\
    \ complementary rather than sequential policy objectives. How it resolves industry\
    \ pressure on permissionless blockchain treatment will offer a concrete test of\
    \ whether that principle produces convergent or divergent regulatory outcomes\
    \ in practice."
