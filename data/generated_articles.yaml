    \ balance sheets at an accelerating pace. Regulators in multiple jurisdictions\
    \ responded cautiously: the Basel Committee's cryptoasset prudential standard,\
    \ which assigned a 1,250% risk weight to unbacked crypto holdings, came into full\
    \ effect for many G20 banks in January 2026, raising the indirect cost of corporate\
    \ crypto exposure where bank financing is involved. MAS in Singapore similarly\
    \ refined its Notice on Risk Management Practices to address concentration risk\
    \ in digital-asset treasury positions, reinforcing a global supervisory trend\
    \ toward treating large BTC holdings as a distinct risk category requiring board-level\
    \ sign-off.\n\nFor compliance and financial-crime professionals, the slowdown\
    \ carries specific implications. A period of rapid corporate accumulation had\
    \ generated novel typology concerns \u2014 wash-trading through affiliated OTC\
    \ desks, market-manipulation risk where corporate treasury announcements were\
    \ timed to influence spot prices, and inadequate source-of-funds documentation\
    \ on large block purchases. Declining volumes reduce some of that acute pressure,\
    \ but the assets already on balance sheets remain subject to ongoing FATF Recommendation\
    \ 15 obligations and, in Australia, the AML/CTF Act's enhanced customer due diligence\
    \ requirements when those positions are eventually unwound or used as collateral.\
    \ MLROs at prime brokers and custody providers should not interpret reduced inflows\
    \ as reduced risk; the disposition phase of large corporate crypto holdings will\
    \ generate its own set of transaction-monitoring challenges.\n\nThe deceleration\
    \ also complicates voluntary disclosure postures. Several listed companies had\
    \ structured their BTC treasury programmes partly around transparent, predictable\
    \ purchasing schedules \u2014 a quasi-regulatory accommodation designed to deflect\
    \ market-manipulation scrutiny. As those programmes are suspended or scaled back,\
    \ the governance frameworks built around them require revisiting rather than simply\
    \ being mothballed. Whether this pause proves cyclical or structural will depend\
    \ substantially on whether price recovery resumes and, critically, on how prudential\
    \ supervisors across the FATF membership choose to calibrate crypto-asset capital\
    \ treatment in the 2026\u20132027 review cycle."
