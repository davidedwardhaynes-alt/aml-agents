    Rule to virtual asset service providers, and any card-initiated spend that liquidates
    Dogecoin in real time constitutes a crypto-to-fiat conversion event that triggers
    recordkeeping obligations under those rules.


    For MLROs, the central concern is velocity and attribution. Dogecoin''s low unit
    price and high divisibility make it technically straightforward to load large
    notional values onto a card in small increments, a pattern that could frustrate
    standard threshold-based transaction monitoring. Merchant acquirers receiving
    settlement in fiat will see only a conventional card transaction; the cryptoasset
    leg is invisible to them unless Revolut, as the issuing VASP, surfaces it through
    enhanced data-sharing. Under the EU''s Transfer of Funds Regulation as extended
    to cryptoassets, originator and beneficiary information must accompany transfers,
    but point-of-sale card spend sits in a regulatory grey zone that supervisors have
    not yet explicitly resolved.


