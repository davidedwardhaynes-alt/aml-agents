  full_article: "The Australian Federal Police has conducted specialised underwater\
    \ dive training with Pacific Island law-enforcement partners, a capability-building\
    \ exercise with direct implications for the interdiction of narcotics, weapons,\
    \ and illicit financial flows moving through one of the world's most under-policed\
    \ maritime corridors.\n\nThe Pacific has long presented structural vulnerabilities\
    \ that financial-crime professionals recognise from FATF's 2014 and subsequent\
    \ mutual evaluations of Oceania jurisdictions: thin supervisory capacity, porous\
    \ borders, heavy reliance on cash economies, and correspondent banking relationships\
    \ already strained by de-risking. Physical interdiction capability is a necessary\
    \ upstream complement to transaction monitoring; contraband that never reaches\
    \ port does not generate the layering activity that overwhelms compliance teams\
    \ downstream. When law-enforcement agencies lack the technical means to inspect\
    \ vessel hulls, cargo containers submerged during transfer, or semi-submersible\
