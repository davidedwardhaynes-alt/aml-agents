  full_article: "The mBridge platform \u2014 a multi-central-bank digital currency\
    \ corridor developed under the auspices of the BIS Innovation Hub before the BIS\
    \ stepped back from the project in 2024 \u2014 is approaching commercial launch,\
    \ according to reporting by the Financial Times dated June 2026. For compliance\
    \ officers at correspondent banks and payment service providers operating across\
    \ Asia, the Middle East, and beyond, the development represents a material shift\
    \ in the cross-border settlement landscape and introduces unresolved questions\
    \ around transaction monitoring, sanctions exposure, and regulatory equivalence.\n\
    \nmBridge was conceived as a wholesale CBDC infrastructure connecting the central\
    \ banks of China, Hong Kong, Thailand, the UAE, and Saudi Arabia, with the stated\
    \ aim of reducing friction and cost in cross-border payments. Its architecture,\
    \ built on a distributed ledger, allows participating central banks to settle\
    \ transactions directly in local currencies, bypassing the US dollar correspondent\
    \ banking network. That design feature is precisely what draws both operational\
    \ interest from emerging-market treasuries and heightened scrutiny from Western\
    \ regulators and sanctions enforcement bodies, particularly given concerns that\
    \ the platform could provide a mechanism to route transactions outside SWIFT-visible\
    \ channels.\n\nFrom a financial crime compliance standpoint, the core challenge\
