  full_article: "The Monetary Authority of Singapore will remove the mandatory financial\
    \ advice requirement for most retail investors purchasing complex products, replacing\
    \ it with a strengthened disclosure framework centred on revised Product Highlights\
    \ Sheets \u2014 a structural shift that reorders responsibility for investor protection\
    \ from intermediaries to the investor themselves, with material consequences for\
    \ how distribution risk is assessed in anti-money laundering and suitability compliance\
    \ programmes.\n\nThe change follows MAS's consultation on distribution safeguards\
    \ for complex products, itself part of a longer regulatory arc stretching back\
    \ to the 2012 revisions prompted by the Lehman Brothers minibond mis-selling episode\
    \ and subsequent enhancements to the Financial Advisers Act regime. Singapore's\
    \ existing framework required that specified investment products \u2014 a category\
    \ encompassing structured notes, unlisted collective investment schemes, and certain\
    \ derivatives \u2014 be sold only through a licensed financial adviser who assessed\
    \ suitability. The new approach effectively decouples product complexity from\
    \ mandatory intermediation, instead placing disclosure quality at the centre of\
    \ the safeguard architecture.\n\nFor financial crime compliance officers, the\
    \ implications deserve careful consideration. Mandatory advice channels created\
    \ a documented suitability assessment trail that AML and compliance teams used\
    \ as a secondary control layer, providing context for transaction monitoring and\
    \ customer risk profiling. Where retail clients self-direct into complex products\
    \ without adviser intermediation, firms will need to assess whether their existing\
    \ transaction monitoring typologies adequately capture the resulting change in\
    \ flow patterns and client behaviour. Under MAS Notice SFA 04-N02 and the broader\
    \ obligations tied to FATF Recommendation 10 on customer due diligence, the business\
    \ relationship context \u2014 including the nature of products a customer accesses\
    \ \u2014 forms part of the ongoing CDD picture. A client independently purchasing\
    \ structured products may present a different risk profile than one guided through\
    \ an advice process, and automated monitoring rules calibrated to the older distribution\
    \ model may require recalibration.\n\nFrom a conduct and product governance perspective,\
    \ the shift places greater weight on issuers and distributors to ensure Product\
    \ Highlights Sheets are genuinely functional disclosure documents rather than\
    \ compliance formalities, a standard MAS has signalled it intends to enforce through\
    \ supervisory review rather than structural gatekeeping. The practical test will\
    \ be whether retail investors exercise the opt-in advice mechanism in meaningful\
    \ numbers, or whether de facto self-direction becomes the norm across distribution\
    \ channels. Supervisors will be watching mis-selling complaint rates and product\
    \ return statistics closely over the next 18 to 24 months as the clearest early\
    \ signal of whether the disclosure-led model is functioning as intended."
