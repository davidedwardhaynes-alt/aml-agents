    \ inform customer-facing decisions? As AI-mediated banking interfaces proliferate,\
    \ supervisors in Singapore and beyond are unlikely to permit ambiguity over where\
    \ accountability sits when an automated insight \u2014 or its absence \u2014 contributes\
