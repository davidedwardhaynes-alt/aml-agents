    \ America corridor, a market where Intermex has competed aggressively on price,\
    \ particularly in the Mexico and Guatemala lanes. Western Union and Intermex together\
    \ account for a significant share of agent-location remittances in states with\
    \ large Hispanic populations, including New York, Texas, and Florida. Under the\
    \ Dodd-Frank Act's amendments to the Electronic Fund Transfer Act\u2014commonly\
    \ referenced as Regulation E's remittance transfer provisions\u2014senders must\
    \ receive pre-payment fee and exchange-rate disclosures, but those rules govern\
    \ transparency, not the competitive structure that determines the fees disclosed.\n\
    \nFrom a financial crime compliance standpoint, consolidation in the remittance\
    \ sector carries its own supervisory implications. Both Western Union and Intermex\
    \ operate under Bank Secrecy Act obligations, FinCEN's money services business\
    \ registration requirements, and state money transmitter licences. A merged entity\
    \ commanding greater market share would inherit a significantly larger transaction\
    \ monitoring obligation, requiring careful integration of transaction monitoring\
    \ systems, SAR filing protocols, and agent due diligence frameworks across what\
    \ are currently distinct compliance architectures. FATF Recommendation 14, addressing\
    \ the oversight of money or value transfer services, underscores the importance\
    \ of ensuring that consolidation does not create supervisory blind spots during\
    \ integration periods.\n\nConsumer advocates are likely to align with the Mayor's\
    \ position, while Western Union will argue, as is standard in such reviews, that\
