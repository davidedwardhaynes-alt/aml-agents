    \ whose entire corporate identity has been built around indefinite accumulation\
    \ of the asset, raising immediate questions for compliance officers about the\
    \ AML and disclosure obligations that attach to large-scale, concentrated crypto\
    \ liquidations.\n\nThe company, formerly MicroStrategy, pioneered the corporate\
    \ bitcoin treasury model from 2020 onward, attracting regulatory scrutiny from\
    \ the SEC over its yield-metric disclosures and prompting FASB to accelerate fair-value\
    \ accounting guidance for digital assets under ASC 350. That accounting standard,\
    \ adopted at scale from 2025, now requires mark-to-market recognition\u2014meaning\
    \ a forced or strategic sale at a loss carries immediate income-statement consequences\
    \ that are transparent to both investors and supervisors in a way that earlier\
