    \ creating friction that regulators \u2014 balancing financial inclusion objectives\
    \ \u2014 will scrutinise in equal measure.\n\nFor institutions, the survey's timing\
    \ reflects growing board-level attention to payments modernisation as both an\
    \ opportunity and a risk governance question. Technology vendors, correspondent\
    \ banking partners, and national competent authorities are each applying pressure\
