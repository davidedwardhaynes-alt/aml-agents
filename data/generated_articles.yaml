  full_article: "Credit Bureau Singapore and Experian Malaysia are developing a bilateral\
    \ credit data-sharing arrangement that would allow lenders in each jurisdiction\
    \ to access consented cross-border credit histories \u2014 a development with\
    \ direct implications for customer due diligence frameworks on both sides of the\
    \ Causeway.\n\nThe initiative sits at the intersection of credit risk management\
    \ and financial crime compliance. Under FATF Recommendation 10, financial institutions\
    \ are required to understand the nature of a customer's financial dealings and\
    \ assess risk on an ongoing basis. For retail and SME lenders operating across\
    \ the Singapore-Malaysia corridor, the persistent gap in cross-border credit visibility\
    \ has created asymmetric information problems: a borrower with adverse credit\
    \ behaviour in one jurisdiction could present as a clean profile in the other.\
    \ The proposed service, structured around individual consent, would begin to close\
    \ that gap.\n\nFrom a lender's perspective, the arrangement strengthens the evidentiary\
    \ basis for credit decisions and, by extension, supports more granular customer\
    \ risk profiles. Under MAS Notice 626 and Bank Negara Malaysia's Anti-Money Laundering\
    \ and Counter Financing of Terrorism Policy Document, institutions are already\
    \ expected to apply risk-sensitive due diligence. Richer cross-border credit data\
    \ could inform CDD assessments for customers whose income streams, liabilities,\
    \ or transaction patterns span both markets \u2014 a common profile among Malaysian\
    \ workers employed in Singapore and Singaporean businesses with Malaysian operations.\n\
    \nThe consent-based architecture is notable from a data governance standpoint.\
