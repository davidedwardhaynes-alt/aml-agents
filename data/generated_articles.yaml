  full_article: "Perpetual decentralised exchanges continue to fall short of institutional\
    \ requirements on at least three structural dimensions \u2014 counterparty identity,\
    \ settlement finality, and regulatory classification \u2014 according to panellists\
    \ at Consensus 2026, leaving a product category with growing retail liquidity\
    \ stranded at the edge of institutional capital allocation.\n\nThe friction is\
    \ not new. Since FATF revised its Recommendation 15 guidance in 2021 to bring\
    \ virtual asset service providers \u2014 and, by implication, decentralised protocols\
    \ with identifiable controlling parties \u2014 within the travel rule perimeter,\
    \ compliance officers at banks and asset managers have faced a binary problem:\
    \ either the protocol has no legal entity capable of satisfying counterparty due\
    \ diligence requirements, or it has one, at which point its decentralisation claim\
    \ weakens. Perp DEXes, which combine the leverage mechanics of derivatives with\
    \ non-custodial smart-contract execution, sit awkwardly in both categories simultaneously.\n\
    \nFor heads of financial crime compliance at regulated entities, the immediate\
    \ concern is less philosophical than operational. MAS Notice SFA04-N02 and equivalent\
    \ conduct frameworks in the EU under MiCA require that firms trading derivatives\
    \ on behalf of clients can demonstrate best execution, segregation of client assets,\
    \ and recourse mechanisms in the event of protocol failure or oracle manipulation\
    \ \u2014 none of which are straightforward when the \"exchange\" is a set of immutable\
    \ contracts on a public blockchain. OSCO in Hong Kong and the UK's Financial Services\
    \ and Markets Act create comparable obligations around market abuse surveillance,\
    \ which presupposes an intermediary capable of producing audit trails.\n\nFrom\
    \ the protocol side, the response has been incremental: permissioned front-ends,\
    \ on-chain KYC attestations via credential providers such as Coinbase's Base Verified,\
    \ and governance structures that nominally assign legal accountability. Whether\
    \ these measures satisfy a conservative compliance function at a Tier 1 bank or\
    \ a regulated fund remains untested at scale.\n\nThe forward dynamic will likely\
    \ be shaped less by protocol innovation than by regulatory clarification. If jurisdictions\
    \ with developed crypto frameworks \u2014 Singapore, the UAE, the EU \u2014 issue\
    \ guidance specifying which decentralised derivative structures require licensing\
    \ and which compliance controls are deemed sufficient, institutional appetite\
    \ could shift materially. Until that clarity arrives, perp DEXes will continue\
    \ to accumulate retail volume while institutional participation remains largely\
    \ confined to exploratory proof-of-concept work."
