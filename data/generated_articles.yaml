    \ the FCA has confirmed that loan and savings agreements with both credit unions\
    \ are unaffected, and neither institution entered administration. Their primary\
    \ compliance risk is reputational contagion and a potential uptick in customer\
    \ vulnerability \u2014 a factor their own MLRO functions should factor into ongoing\
    \ customer risk assessments, particularly where borrowers experiencing financial\
    \ stress may become targets for fraud or proceeds-of-crime activity.\n\nThe episode\
