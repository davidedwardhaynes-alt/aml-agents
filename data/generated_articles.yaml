  full_article: "India's markets regulator has formalised specific permitted uses\
    \ for fresh borrowings by Infrastructure Investment Trusts whose net borrowings\
    \ exceed 49 percent of the value of their assets, a threshold that sits at the\
    \ upper boundary of the leverage ceiling established under SEBI's InvIT regulations.\
    \ The clarification, issued by the Securities and Exchange Board of India on 15\
    \ May 2026, directly addresses a structural tension that has emerged as several\
    \ large InvITs \u2014 particularly those holding operational road, power transmission,\
    \ and gas pipeline assets \u2014 have approached or breached that limit amid rising\
    \ construction costs and acquisition activity.\n\nThe 49 percent net borrowing\
    \ cap for InvITs was introduced as part of SEBI's broader framework to protect\
    \ unitholders from excessive leverage risk in vehicles that are positioned as\
    \ yield-generating, infrastructure-backed instruments. The ceiling mirrors prudential\
    \ thinking found across comparable trust structures in other Asian markets, including\
    \ MAS Notice SFA04-N14's leverage constraints on Singapore REITs, and reflects\
    \ FATF Recommendation 8's broader concern that complex investment vehicles with\
    \ opaque leverage structures can obscure beneficial ownership and cash flows.\
    \ For Indian InvITs, breaching 49 percent has historically created ambiguity around\
    \ whether refinancing existing obligations or funding committed capital expenditure\
    \ remained permissible.\n\nFor investment managers and their compliance teams,\
    \ the circular provides operational clarity: fresh borrowings at elevated leverage\
    \ levels will be permissible only for defined purposes \u2014 widely understood\
    \ to include refinancing of existing debt and funding contractually committed\
    \ project expenditure \u2014 rather than as general corporate liquidity. This\
    \ distinction is material for transaction monitoring frameworks, since funds flowing\
    \ through an InvIT for non-permitted purposes at elevated leverage could attract\
    \ scrutiny under India's Prevention of Money Laundering Act and SEBI's own governance\
    \ expectations for related-party transactions.\n\nFor lenders and debt capital\
    \ market participants, the circular reduces execution risk on refinancing transactions\
    \ that had stalled pending regulatory certainty, though it also establishes a\
    \ clearer documentary burden: demonstrating that new borrowing proceeds are ring-fenced\
    \ for permitted uses will become a standard condition precedent expectation.\n\
    \nThe longer-term question is whether SEBI will revisit the 49 percent ceiling\
    \ itself, given the capital-intensive nature of greenfield infrastructure pipelines\
    \ that InvITs are increasingly being structured to absorb. A static leverage cap\
    \ applied to asset classes with long construction cycles and lumpy drawdown profiles\
    \ may require further calibration as the InvIT market matures."
