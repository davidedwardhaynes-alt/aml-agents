  full_article: "The European Central Bank intervened last year to constrain Revolut's\
    \ continental expansion amid concerns that the fintech's internal controls were\
    \ failing to keep pace with its commercial growth, according to reporting by Finextra\
    \ dated 10 June 2026. The immediate implication is significant: a prudential supervisor\
    \ has effectively treated control adequacy as a precondition for scale, a posture\
    \ that every rapidly expanding payment institution operating under an EU banking\
    \ licence should treat as precedent.\n\nThe intervention sits within a well-established\
    \ supervisory logic. FATF Recommendation 26 obliges jurisdictions to ensure that\
    \ financial institutions are subject to adequate regulation and supervision proportionate\
    \ to their risk, and the EBA's risk-based supervisory guidelines explicitly link\
    \ authorisation and ongoing licence conditions to the robustness of AML/CFT frameworks.\
    \ Revolut obtained its Lithuanian banking licence in 2021, bringing it within\
    \ the ECB's Single Supervisory Mechanism for significant institutions. That structural\
    \ shift elevated the level of scrutiny it faces well beyond what a mere e-money\
    \ institution would attract.\n\nFor MLROs and heads of financial crime compliance\
    \ at peer institutions, the episode reinforces that supervisory risk appetite\
    \ for control gaps is now symmetric with commercial ambition. Rapid customer onboarding,\
    \ product diversification, and geographic roll-out each expand the typological\
    \ surface for financial crime; supervisors increasingly expect control architecture\
    \ to be built ahead of growth curves, not retrofitted after them. Boards that\
    \ treat compliance investment as a lagging cost centre rather than a leading operational\
    \ requirement face material licence risk.\n\nFrom a regulatory design perspective,\
    \ the ECB's posture also signals how supervisory colleges and joint supervisory\
    \ teams are likely to operationalise the EU's new Anti-Money Laundering Authority,\
    \ AMLA, which assumes direct supervisory responsibility for the highest-risk obliged\
    \ entities from 2028. AMLA's draft methodology already contemplates growth trajectory\
    \ as a variable in risk scoring, suggesting that the ECB's intervention may be\
    \ an early instance of a broader supervisory norm being formalised.\n\nThe enduring\
    \ question for compliance professionals is whether the industry's prevailing model\
    \ \u2014 in which technology-led distribution outpaces governance build-out \u2014\
    \ is structurally compatible with the supervisory environment now taking shape\
    \ across the EU. The ECB's decision to act suggests the answer, at least from\
    \ Frankfurt, is no."
