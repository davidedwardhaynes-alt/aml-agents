    \ affiliates of these groups, where parallel regulatory inquiries remain possible.\n\
    \nThe unwinding of offshore positions by retail investors \u2014 reportedly already\
    \ under way \u2014 will itself generate large-value redemption flows that compliance\
    \ teams must treat with appropriate scrutiny rather than as routine client activity.\
    \ How Hong Kong's SFC and Singapore's MAS engage with Chinese counterparts through\
    \ bilateral information-sharing arrangements established under their respective\
    \ memoranda of understanding with CSRC will likely determine the territorial reach\
    \ of any enforcement outcome. Firms with material mainland Chinese retail exposure\
    \ would be prudent to commission independent reviews of their cross-border client\
