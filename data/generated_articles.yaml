    \ and Futures Ordinance.\n\nFor treasury and risk functions at institutional participants,\
    \ the expiry underscores the importance of stress-testing settlement liquidity\
    \ assumptions. A rapid price convergence toward or away from the dominant strike\
    \ in the days preceding 29 May could generate margin calls that cascade across\
    \ collateral arrangements, particularly where crypto assets serve as cross-margined\
    \ collateral for multiple products simultaneously.\n\nRegulators in several jurisdictions\
    \ have signalled ongoing scrutiny of concentrated positions in crypto derivatives\
    \ markets, and the visibility created by on-chain and exchange-reported open interest\
    \ data means that enforcement agencies are better positioned than at any prior\
    \ cycle to reconstruct positioning patterns after the fact."
