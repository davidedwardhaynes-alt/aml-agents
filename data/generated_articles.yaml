    \ untested.\n\nThe more durable compliance question is governance: who signs the\
    \ MLRO's attestation when the transacting entity is an AI runtime? Industry and\
    \ supervisors will need to resolve that question well before agentic payments\
    \ move from proof-of-concept volumes to systemic scale."
