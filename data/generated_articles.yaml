  title: The Clarity Act isn't a ticket to sanctions evasion, actually
  jurisdiction: All jurisdictions
  topic: Sanctions / Geopolitics
  summary: The United States Congress's passage of the Digital Asset Market Clarity
    Act marks a significant shift in how crypto assets are classified and regulated
    domestically, but compliance professionals should not conflate expanded market
    authorisation with any relaxation of sanctions obligations. OFAC's authority under
    the International Emergency Economic Powers Act and the Trading with the Enemy
    Act operates independently of asset classification under securities or commodities
    law; a token deemed a commodity under the Clarity Act remains fully subject to
    SDN screening, secondary sanctions exposure, and the strict liability standard
    that has defined enforcement actions against exchanges from BitGo to Kraken.
  full_article: 'The United States Congress''s passage of the Digital Asset Market
    Clarity Act marks a significant shift in how crypto assets are classified and
    regulated domestically, but compliance professionals should not conflate expanded
    market authorisation with any relaxation of sanctions obligations. OFAC''s authority
    under the International Emergency Economic Powers Act and the Trading with the
    Enemy Act operates independently of asset classification under securities or commodities
    law; a token deemed a commodity under the Clarity Act remains fully subject to
    SDN screening, secondary sanctions exposure, and the strict liability standard
    that has defined enforcement actions against exchanges from BitGo to Kraken.


    The confusion is understandable given the legislative history. For years, the
    absence of a clear federal framework left crypto firms operating under patchwork
    guidance, and some market participants developed an informal conflation of "regulatory
    grey area" with reduced compliance obligations across the board. The Clarity Act
    resolves the classification ambiguity CFTC and SEC have contested since at least
    the 2017 ICO cycle, but it was never designed to address the separate statutory
    architecture governing sanctions, which FATF Recommendation 35 and the corresponding
    UN Security Council resolutions require all member jurisdictions to implement
    regardless of asset type or underlying technology.


    For MLROs at digital asset businesses, the practical implication is straightforward:
    the compliance stack must be disaggregated. Licensing and registration obligations
    under the Clarity Act demand one set of controls; sanctions screening demands
    another, running in parallel and non-negotiably. Wallet-level screening against
    OFAC''s SDN and Consolidated Sanctions lists, blockchain analytics integration
    capable of identifying exposure to sanctioned jurisdictions such as Iran, North
    Korea, and Russia, and documented escalation procedures remain mandatory irrespective
    of whether a firm''s primary regulator is now clearly the CFTC.


    Firms operating across jurisdictions face compounding obligations. The EU''s Markets
    in Crypto-Assets Regulation and Singapore''s Payment Services Act both carry their
    own sanctions and financial crime requirements, meaning that a Clarity Act registration
    in no way substitutes for compliance with MAS Notice PSN02 or the asset-freeze
    obligations under EU Regulation 2580/2001.


    The broader risk is reputational and supervisory: regulators in Washington, Brussels,
    and Singapore have each signalled they will pursue enforcement where compliance
    programmes treat legislative clarity on classification as a proxy for reduced
    financial crime risk. It is not.'
