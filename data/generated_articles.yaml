    \ assumptions embedded in the UK's Money Laundering, Terrorist Financing and Transfer\
    \ of Funds (Information on the Payer) Regulations 2017 and the broader FATF Recommendation\
    \ 10 requirement for ongoing due diligence tied to transaction purpose and nature.\
    \ When the \"customer\" initiating a payment is an algorithm acting on stored\
    \ preferences and delegated authority, the traditional consent and verification\
    \ touchpoints used to satisfy CDD obligations become structurally ambiguous.\n\
    \nFor PayPal, which operates as a regulated e-money institution under the FCA's\
    \ supervision, the compliance question is not hypothetical. The firm must satisfy\
    \ itself that its transaction monitoring controls can distinguish between a human-initiated\
    \ purchase and an agent-executed one, and that velocity rules, basket-size thresholds,\
    \ and counterparty screening remain effective when cadence and value are determined\
    \ by machine logic rather than human impulse. MLROs at acquiring banks and payment\
    \ processors onboarding merchants integrated with such platforms face a parallel\
    \ challenge: the merchant's customer base now includes both human shoppers and\
    \ delegated AI actors, complicating the risk-rating of transaction flows.\n\n\
    The liability question is equally unresolved. Under the UK Payment Services Regulations\
    \ 2017, the payer's authorisation is a precondition for a payment transaction\
    \ to be considered valid. Whether a one-time delegation to an AI agent constitutes\
    \ ongoing authorisation for each downstream transaction it executes will require\
    \ regulatory clarification \u2014 and potentially FCA guidance \u2014 before institutions\
    \ can confidently embed such flows into their control frameworks.\n\nAs agentic\
    \ commerce scales beyond fashion search into higher-value categories, the pressure\
    \ on FATF member jurisdictions to issue specific typologies guidance on AI-delegated\
    \ payments will intensify. The PayPal-Hey Savi deployment, modest in scope today,\
    \ represents the kind of incremental normalisation that tends to precede regulatory\
    \ frameworks rather than follow them."
