  summary: "The United Kingdom's buy now, pay later regulatory framework took effect\
    \ on 15 July 2026, bringing an estimated \xA330 billion consumer credit market\
    \ under the formal supervisory perimeter of the Financial Conduct Authority for\
    \ the first time and triggering immediate compliance obligations for providers\
    \ including Klarna, Clearpay, and Laybuy across affordability assessment, pre-contractual\
    \ disclosure, and arrears management. The regime's arrival closes a regulatory\
    \ gap that consumer advocates and the FCA itself identified as early as the Woolard\
    \ Review of 2021, which found that BNPL products had grown rapidly outside the\
    \ Consumer Credit Act 1974 framework, leaving borrowers without statutory protections\
    \ routinely available to holders of regulated credit agreements."
  full_article: "The United Kingdom's buy now, pay later regulatory framework took\
    \ effect on 15 July 2026, bringing an estimated \xA330 billion consumer credit\
    \ market under the formal supervisory perimeter of the Financial Conduct Authority\
    \ for the first time and triggering immediate compliance obligations for providers\
    \ including Klarna, Clearpay, and Laybuy across affordability assessment, pre-contractual\
    \ disclosure, and arrears management.\n\nThe regime's arrival closes a regulatory\
    \ gap that consumer advocates and the FCA itself identified as early as the Woolard\
    \ Review of 2021, which found that BNPL products had grown rapidly outside the\
    \ Consumer Credit Act 1974 framework, leaving borrowers without statutory protections\
    \ routinely available to holders of regulated credit agreements. Successive legislative\
    \ delays \u2014 driven partly by industry lobbying and partly by parliamentary\
    \ scheduling \u2014 meant that what the Treasury first consulted on in 2022 took\
    \ four years to reach commencement. The incoming rules require lenders to conduct\
    \ proportionate creditworthiness assessments before extending BNPL credit, provide\
    \ standardised pre-contract information in a form consistent with FCA Consumer\
    \ Duty outcomes, and establish fair treatment pathways for customers who fall\
    \ into arrears, including signposting to free debt advice services.\n\nFor compliance\
    \ officers at BNPL firms, the immediate operational pressure falls on three points:\
    \ embedding affordability checks that are sufficiently robust to withstand FCA\
    \ supervisory review without creating friction that drives customers to unregulated\
    \ alternatives; ensuring that customer-facing disclosures satisfy both the letter\
    \ of the new rules and the spirit of the Consumer Duty's consumer understanding\
    \ outcome; and building arrears management processes that align with the FCA's\
    \ existing expectations under CONC 7. Firms operating across multiple jurisdictions\
    \ will also note that the UK framework broadly mirrors the trajectory of the EU's\
    \ revised Consumer Credit Directive, which entered national transposition phases\
    \ across member states in 2025, creating incentives for harmonised group-level\
    \ policy where possible.\n\nFrom a financial crime perspective, the extension\
    \ of regulated status matters beyond consumer protection. BNPL providers will\
    \ now be subject to the full suite of FCA financial promotions rules and, depending\
    \ on their business model, may face enhanced scrutiny regarding their obligations\
    \ under the Proceeds of Crime Act 2002 and the Money Laundering Regulations 2017\
    \ \u2014 particularly where high-volume, low-value transaction patterns intersect\
    \ with existing typologies for layering through retail credit products. The FCA's\
    \ supervisory approach in the first twelve months will signal how aggressively\
    \ it intends to test firms' readiness, and early enforcement action, if any, will\
    \ define the compliance culture of this sector for years ahead."
