  full_article: "NovaBay Payments \u2014 Kraken's parent entity following its 2024\
    \ rebrand \u2014 has filed an application with the Office of the Comptroller of\
    \ the Currency for a national bank charter, a move that would place the exchange\
    \ under full federal prudential supervision and grant it direct access to Federal\
    \ Reserve payment infrastructure. If approved, Kraken would become the first major\
    \ spot-crypto exchange to hold an OCC charter, fundamentally altering its regulatory\
    \ standing in the United States and potentially its obligations in every jurisdiction\
    \ where it operates.\n\nThe OCC has issued conditional approvals for crypto-adjacent\
    \ institutions before \u2014 most notably to Anchorage Digital in January 2021\
    \ \u2014 but has since applied heightened scrutiny to subsequent applicants amid\
    \ broader concerns about concentration risk and the adequacy of AML controls at\
    \ digital-asset firms. The FATF's 2023 updated guidance on virtual assets explicitly\
    \ calls on member jurisdictions to ensure that VASPs seeking banking licences\
    \ are subject to the same Customer Due Diligence, Travel Rule, and suspicious\
    \ transaction reporting obligations as conventional financial institutions, a\
    \ standard the OCC would be expected to enforce rigorously through its examination\
    \ cycle.\n\nFor compliance officers, a federally chartered Kraken would carry\
    \ significant implications. The firm would fall squarely under the Bank Secrecy\
    \ Act's full programme requirements \u2014 not merely as a Money Services Business\
    \ \u2014 including mandatory independent audits of its AML/CFT framework, enhanced\
    \ SAR filing disciplines, and Regulation CC obligations. Correspondent banking\
    \ relationships, historically reluctant to engage with crypto exchanges operating\
    \ under state money-transmitter licences alone, may become materially easier to\
    \ establish, potentially expanding Kraken's institutional client base and dollar-clearing\
    \ capabilities.\n\nSupervisors in other jurisdictions will watch carefully. An\
    \ OCC charter does not automatically satisfy local licensing requirements: Kraken\
    \ would still need to maintain its FCA registration in the United Kingdom, comply\
    \ with MiCA obligations in the EU upon full implementation, and meet MAS Notice\
    \ PSN02 standards in Singapore. Home-host coordination between the OCC and those\
    \ authorities around consolidated AML oversight would become a live operational\
    \ question, particularly given the cross-border nature of crypto asset flows and\
    \ the absence of a binding international framework for crypto-bank supervision.\n\
    \nThe application is a signal that major exchanges are calculating that regulatory\
    \ embedding \u2014 with its compliance costs \u2014 is now preferable to operating\
    \ in a supervisory grey zone. Whether the OCC concurs, and on what conditions,\
    \ will set a precedent that shapes the structure of the entire sector."
