    \ to maintain under those frameworks. MLROs at exchanges and custody providers\
    \ should treat this as a trigger event for refreshing their asset-specific risk\
    \ assessments.\n\nThe budget cut also arrives as Ethereum faces intensifying competition\
    \ from faster-finalising layer-one networks that have attracted regulatory attention\
