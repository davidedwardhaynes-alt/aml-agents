  full_article: "Apple's reported plan to embed a receipt-scanning, bill-splitting\
    \ function directly within Apple Wallet would extend the platform's footprint\
    \ into peer-to-peer (P2P) payment flows \u2014 a segment that regulators across\
    \ multiple jurisdictions have identified as carrying elevated money-laundering\
    \ and structuring risk.\n\nP2P payment platforms have attracted sustained supervisory\
    \ scrutiny since FATF's 2013 guidance on new payment methods and its subsequent\
    \ 2021 update on virtual assets and related services. While a bill-splitting tool\
    \ of the type described does not involve virtual assets, the underlying concern\
    \ is consistent: frictionless, high-volume small-value transfers between individuals\
    \ can obscure layering activity, particularly when the initiating platform sits\
    \ outside the traditional correspondent-banking perimeter. In Singapore, MAS Notice\
    \ PSN01 and PSN02 impose customer due diligence and transaction monitoring obligations\
    \ on holders of Major Payment Institution licences; in Hong Kong, Schedule 2 of\
    \ AMLO captures remittance and payment services; in Australia, the AML/CTF Act\
    \ 2006 designates designated remittance arrangers and requires AUSTRAC registration.\
    \ The operative question for regulators will be whether Apple's feature constitutes\
    \ a designated payment service in their jurisdictions or whether it routes exclusively\
    \ through already-licensed partners such as Apple Pay's underlying card networks.\n\
    \nFor MLROs at retail banks and e-money institutions, the more immediate concern\
    \ is downstream transaction monitoring. If Apple Wallet's bill-split flows settle\
    \ through bank-held accounts, compliance teams will receive credits and debits\
    \ stripped of merchant-context data, complicating the behavioural baselines used\
    \ to detect structuring patterns. Financial institutions will need to assess whether\
    \ their transaction monitoring systems can ingest and contextualise Apple Wallet\
    \ reference data, and whether correspondent agreements or data-sharing arrangements\
    \ need updating.\n\nFrom Apple's own compliance perspective, any jurisdictional\
    \ roll-out will require a careful mapping of local payment-service licensing thresholds.\
    \ The European Union's PSD2 \u2014 and its forthcoming PSD3 successor \u2014 along\
    \ with the UK Payment Services Regulations 2017 both impose explicit obligations\
    \ on payment initiation service providers; a receipt-based split-payment function\
    \ plausibly triggers those definitions.\n\nThe feature, if launched broadly, will\
    \ arrive at a moment when supervisors in the EU, UK, and Asia-Pacific are actively\
    \ tightening oversight of Big Tech's expansion into financial services. Regulators\
    \ will be watching whether Apple classifies the function as ancillary to an existing\
    \ licensed service or seeks standalone authorisation \u2014 a distinction that\
