  full_article: "The Dutch Ministry of Finance's consultation on dividend stripping,\
    \ to which ISDA and AFME submitted a joint response on 28 May 2026, signals a\
    \ renewed legislative push in the Netherlands to close equity-linked tax arbitrage\
    \ arrangements that have drawn sustained scrutiny from European supervisors and\
    \ finance ministries for more than a decade. The immediate implication for market\
    \ participants is that derivatives documentation standards, stock-lending conventions,\
    \ and total-return swap structures referencing Dutch-listed equities may face\
    \ material redesign requirements depending on how the Ministry translates consultation\
    \ feedback into statute.\n\nDividend stripping \u2014 broadly, the transfer of\
    \ dividend entitlement around a record date through swaps, securities lending,\
    \ or repo arrangements to a counterparty better positioned to claim withholding-tax\
    \ relief \u2014 sits at the intersection of tax law, securities regulation, and\
    \ financial crime compliance. The FATF Recommendations, particularly Recommendation\
    \ 1 on risk-based assessment and Recommendation 3 on money laundering offences,\
    \ are increasingly being read by FIUs and tax authorities as applicable where\
    \ such structures generate proceeds that distort public revenue. The Netherlands'\
    \ own Wet ter voorkoming van witwassen en financieren van terrorisme (Wwft) has\
    \ been invoked in parallel with tax-avoidance provisions, and the European Commission's\
    \ ATAD framework provides the broader supranational context within which the Ministry\
    \ is acting.\n\nISDA and AFME's engagement reflects the industry's interest in\
    \ ensuring that any new Dutch rules distinguish between legitimate dividend-related\
    \ hedging activity \u2014 for instance, equity derivatives used by market-makers\
    \ or index replicators \u2014 and structures designed primarily to manufacture\
    \ tax benefits. Overly broad drafting risks reducing liquidity in Dutch equity\
    \ derivatives markets and could push activity to less-regulated venues, an outcome\
    \ that would concern both the AFM and DNB. Buy-side firms with Dutch equity exposure\
    \ will need to assess whether existing master agreements and credit support annexes\
    \ require amendment, and prime brokers active in Amsterdam-listed names should\
    \ revisit their stock-lending frameworks in anticipation of stricter economic-substance\
    \ tests.\n\nThe consultation outcome will be watched closely by German, French,\
    \ and Danish authorities that have pursued their own cum-ex and cum-cum recovery\
    \ programmes, and by the European Securities and Markets Authority as it considers\
    \ harmonised disclosure standards for securities financing transactions. A Dutch\
    \ legislative response that proves workable without impairing legitimate market\
    \ function could serve as a template; one that is poorly calibrated risks regulatory\
    \ fragmentation at precisely the moment European capital markets integration demands\
    \ greater coherence."
