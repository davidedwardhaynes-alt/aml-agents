  full_article: "The International Swaps and Derivatives Association submitted a formal\
    \ response on 4 June 2026 to the Bank of England's consultation on the permissions\
    \ framework governing the mobilisation of new central counterparties, a development\
    \ with direct implications for how systemic risk is managed at the margin of cleared\
    \ derivatives markets and, by extension, for the anti-money laundering controls\
    \ that surround those structures.\n\nThe consultation sits within the broader\
    \ post-Brexit regulatory architecture under which the Bank of England assumed\
    \ direct supervisory responsibility for UK-recognised CCPs following the departure\
    \ from EMIR's EU framework. The Financial Services and Markets Act 2023 extended\
    \ the BoE's rule-making powers over CCPs, and the mobilisation regime \u2014 analogous\
    \ to the Prudential Regulation Authority's approach to new bank authorisations\
    \ \u2014 is designed to allow nascent clearing houses to operate in a controlled,\
    \ limited-activity state before receiving full recognition. ISDA's engagement\
    \ reflects the derivatives industry's material interest in ensuring that entry\
    \ conditions do not inadvertently concentrate clearing activity among incumbents,\
    \ a concern the Financial Stability Board has flagged repeatedly in its reviews\
    \ of CCP resolution and recovery frameworks.\n\nFrom a financial crime compliance\
    \ perspective, the mobilisation framework carries underappreciated AML/CFT relevance.\
    \ New CCPs entering a permissions-gated environment will be establishing their\
    \ participant onboarding standards, transaction monitoring architectures, and\
    \ suspicious activity reporting obligations under the Proceeds of Crime Act 2002\
    \ and the Money Laundering Regulations 2017 from inception. Supervisors and MLROs\
    \ at clearing member firms will need to assess whether a mobilising CCP has adequate\
    \ controls before extending membership, a due diligence obligation that sits alongside,\
    \ but is distinct from, the prudential fitness assessment. FATF Recommendation\
    \ 13, which addresses correspondent-style relationships in the financial sector,\
    \ provides a useful conceptual reference point for the risk-based scrutiny clearing\
    \ members should apply.\n\nISDA's response is also likely to address margin and\
    \ collateral eligibility conditions during the mobilisation phase, which carry\
    \ their own layering-risk considerations given the fungibility of high-quality\
    \ liquid assets across jurisdictions. How the BoE calibrates permission thresholds\
