  full_article: "The Securities and Exchange Board of India issued a circular on 15\
    \ May 2026 clarifying the regulatory treatment of special purpose vehicles once\
    \ their underlying concession agreements have either run their full term or been\
    \ terminated early \u2014 a development with direct consequences for Infrastructure\
    \ Investment Trust managers, their compliance functions, and the investors relying\
    \ on asset-backed distributions.\n\nInvITs were introduced under SEBI's Infrastructure\
    \ Investment Trust Regulations 2014 as a vehicle to channel long-term capital\
    \ into road, power, and utility projects typically structured through SPVs holding\
    \ concession rights granted by government authorities. The life-cycle mismatch\
    \ between a finite concession \u2014 often 25 to 30 years \u2014 and an open-ended\
    \ listed trust has long created regulatory ambiguity around what obligations,\
    \ reporting duties, and governance standards apply to an SPV that has ceased operating\
    \ its core asset. SEBI's action addresses that gap directly, indicating the regulator\
    \ views dormant or post-concession SPVs as a residual-risk category requiring\
    \ explicit supervisory treatment rather than benign neglect.\n\nFrom an AML and\
    \ financial-crime-control perspective, the circular carries implications beyond\
    \ pure securities law. SPVs that linger without active business purpose following\
    \ concession expiry present identifiable vulnerabilities: attenuated beneficial\
    \ ownership trails, reduced transaction monitoring incentives, and the risk that\
    \ residual cash flows or asset disposals occur outside a robust oversight framework.\
    \ India's Prevention of Money Laundering Act 2002 and the corresponding reporting\
    \ obligations on intermediaries do not disappear because an underlying project\
    \ contract has concluded, and investment managers governed by SEBI who also interact\
    \ with FIU-IND reporting chains must ensure that wind-down procedures address\
    \ these obligations explicitly.\n\nFor InvIT trustees and investment managers,\
    \ the practical priority is integrating the circular's requirements into their\
    \ SPV lifecycle governance frameworks \u2014 covering board continuity, auditor\
    \ appointments, and the treatment of residual assets or liabilities \u2014 before\
    \ a concession expiry becomes an unmanaged event. Investors and their advisers\
    \ will equally need to assess whether fund documents, valuation policies, and\
    \ distribution waterfall mechanics adequately reflect the post-concession scenario\
    \ the circular now defines.\n\nSEBI's intervention reflects a broader maturation\
    \ of the InvIT market as early-vintage trusts approach the midpoint of their concession\
    \ periods. Regulators in comparable markets \u2014 including MAS in Singapore\
    \ through its business trust framework \u2014 have similarly found that the conclusion\
    \ of an operating asset's life-cycle is precisely when governance risks crystallise\
    \ rather than dissipate, and proactive guidance at this stage is considerably\
    \ preferable to supervisory action after problems emerge."
