    \ FCA itself characterised as material for consumers already under pressure from\
    \ elevated household costs.\n\nThe DCA controversy has roots in the FCA's January\
    \ 2021 ban on discretionary commission models in motor finance, a practice under\
    \ which brokers could increase interest rates to boost their own remuneration\
    \ without transparent disclosure to borrowers. The subsequent thematic review,\
    \ accelerated by the Court of Appeal's October 2024 ruling in *Hopcraft, Johnson\
    \ and Wrench*, established that non-disclosure of such arrangements could constitute\
    \ a breach of fiduciary duty under common law, opening the door to mass redress\
    \ well beyond the FCA's original remediation perimeter. The Supreme Court's subsequent\
    \ consideration of the matter added further legal complexity that the FCA's scheme\
    \ was intended to resolve efficiently, avoiding the volume of individual litigation\
    \ that followed the PPI episode.\n\nFor MLROs and compliance functions in consumer\
    \ credit and motor finance, the challenge introduces layered uncertainty. Firms\
    \ that have been provisioning under an anticipated scheme framework \u2014 including\
