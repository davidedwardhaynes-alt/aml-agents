  full_article: "Cr\xE9dit Agricole, Mastercard, and Worldline executed what they\
    \ describe as the first live agentic payment transaction in France on 29 June\
    \ 2026, marking the point at which autonomous AI agents have moved from sandbox\
    \ experimentation into production payment rails \u2014 a development with direct\
    \ implications for transaction monitoring, customer due diligence, and the attribution\
    \ of liability under existing AML frameworks.\n\nThe transaction represents a\
    \ meaningful threshold. Until now, agentic finance \u2014 where large language\
    \ model-driven systems initiate, authorise, and settle financial instructions\
    \ with minimal human intervention \u2014 had been confined largely to proof-of-concept\
    \ environments. France's regulatory perimeter, shaped by the Banque de France's\
    \ oversight mandate and the EU's evolving Payment Services Regulation (PSR), did\
    \ not anticipate an originator that is, in legal terms, neither a natural nor\
    \ a legal person. FATF Recommendation 16 on wire transfers, and its requirement\
    \ to identify the originating customer, was written with humans and incorporated\
    \ entities in mind.\n\nFor MLROs and financial crime compliance teams, the immediate\
    \ concern is attribution. If an AI agent initiates a payment autonomously \u2014\
    \ selecting a beneficiary, determining an amount, and transmitting an instruction\
    \ through Worldline's acquiring infrastructure \u2014 the conventional chain of\
    \ beneficial ownership and intent becomes ambiguous. Existing transaction monitoring\
    \ systems are calibrated to surface anomalous human behaviour; an agent operating\
    \ at machine speed, across multiple accounts simultaneously, could either evade\
    \ behavioural thresholds or flood alert queues with false positives, depending\
    \ on its pattern of activity. Neither outcome is operationally acceptable.\n\n\
    Mastercard's involvement suggests the scheme-level rules will need revision. Card\
    \ network operating regulations currently assign chargeback rights and fraud liability\
    \ to identifiable cardholders. An agent acting on delegated authority raises questions\
    \ that sit uncomfortably between contract law, electronic money regulations, and\
    \ MiCA's provisions on automated systems \u2014 none of which provides clean answers.\n\
    \nThe practical near-term implication is that institutions deploying or accepting\
    \ agentic payments should already be reviewing their customer risk assessments\
    \ to capture the delegated-authority structure, updating their AML policies to\
    \ address non-human initiators, and engaging supervisors proactively. The EBA's\
    \ guidelines on internal governance and the EBA's outsourcing framework offer\
    \ partial analogies, but regulators across the EU and beyond will need to address\
    \ agentic payment actors explicitly. The Cr\xE9dit Agricole transaction has confirmed\
    \ the technology is in production; the compliance architecture to govern it has\
    \ not yet arrived."
