  full_article: "The launch of KAF Investment Funds' global Islamic equity fund in\
    \ May 2026 adds another cross-border Shariah-compliant vehicle to Malaysia's rapidly\
    \ expanding capital markets, with immediate implications for customer due diligence\
    \ frameworks, fund-level AML controls, and the oversight obligations of designated\
    \ non-financial businesses and professions engaged in fund distribution.\n\nMalaysia's\
    \ unit trust sector operates under a layered compliance architecture. Fund managers\
    \ are licensed under the Securities Commission's Guidelines on Unit Trust Funds\
    \ and are subject to Bank Negara Malaysia's Anti-Money Laundering, Anti-Terrorism\
    \ Financing and Proceeds of Unlawful Activities Act 2001 (AMLA) obligations, including\
    \ the Customer Due Diligence requirements codified in BNM's AML/CFT and Targeted\
    \ Financial Sanctions Policy Documents. Distributors \u2014 including digital\
    \ platforms increasingly prominent in retail fund access \u2014 carry their own\
    \ CDD and suspicious transaction reporting duties. For an Islamic fund with a\
    \ global mandate, the compliance perimeter extends materially: investments spanning\
    \ developed and emerging markets introduce jurisdictional risk differentials that\
    \ FATF Recommendation 10 requires firms to reflect in their risk-based due diligence\
    \ calibration.\n\nFrom a fund governance perspective, the thematic focus \u2014\
    \ artificial intelligence, electric vehicles, energy transition, and consumer\
    \ technology \u2014 raises specific considerations. These sectors attract capital\
    \ from politically exposed persons, state-linked entities, and sovereign vehicles\
    \ in higher-risk jurisdictions, necessitating enhanced due diligence protocols\
    \ for institutional and high-net-worth subscribers. The Shariah-compliance layer,\
    \ while imposing its own asset-screening discipline, does not substitute for AML/CFT\
    \ controls; MLROs should resist any institutional assumption that Shariah screening\
    \ provides meaningful financial crime risk mitigation.\n\nFor supervisors, the\
    \ proliferation of thematically broad global Islamic funds also sharpens questions\
    \ around beneficial ownership transparency. Where fund units are held through\
    \ nominee structures or omnibus accounts operated by foreign intermediaries, compliance\
    \ teams must ensure look-through capabilities align with BNM's expectations on\
    \ ultimate beneficial ownership identification \u2014 a standard reinforced by\
    \ Malaysia's 2023 FATF Mutual Evaluation follow-up commitments.\n\nAs Malaysian\
    \ asset managers increasingly position themselves as regional hubs for Islamic\
    \ capital, the compliance infrastructure supporting cross-border fund distribution\
    \ will face growing scrutiny from both domestic supervisors and foreign counterpart\
    \ regulators. Firms that treat AML controls as product-launch prerequisites rather\
    \ than afterthoughts are better placed to sustain market access as that scrutiny\
    \ intensifies."
