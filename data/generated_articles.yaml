  full_article: "A live poll of payments and transaction banking executives at EBAday\
    \ 2026 found that 78% of respondents identified cross-institutional data sharing\
    \ as the most effective mechanism for strengthening fraud risk mitigation \u2014\
    \ a finding that underscores persistent industry frustration with the fragmented,\
    \ siloed intelligence environment in which most financial crime controls currently\
    \ operate.\n\nThe result arrives at a moment when regulatory architects on both\
    \ sides of the Atlantic are actively constructing frameworks to enable exactly\
    \ that. In the European Union, the Payment Services Regulation and the forthcoming\
    \ Anti-Money Laundering Regulation establish clearer legal grounds for sharing\
    \ fraud-related data within and across member states, while the UK's fraud strategy\
    \ has leaned heavily on voluntary intelligence-sharing consortia such as Stop\
    \ Scams UK. FATF Recommendation 18 and its interpretive notes have long encouraged\
    \ group-level information exchange, but the practical barriers \u2014 data protection\
    \ constraints, liability concerns, and competitive sensitivities \u2014 have historically\
    \ limited uptake beyond intra-group flows.\n\nFor MLROs and heads of financial\
    \ crime compliance, the poll figure is significant less as a measure of enthusiasm\
    \ than as evidence of where operational confidence currently sits. Fraud typologies,\
    \ particularly authorised push payment scams and first-party fraud, move across\
    \ institution boundaries faster than any single firm's transaction monitoring\
    \ can track them. Where bilateral or multilateral data-sharing arrangements have\
    \ been operationalised \u2014 the UK's MAST programme or Singapore's Collaborative\
    \ Sharing of ML/TF Information and Cases framework under MAS Notice 626 \u2014\
    \ detection rates for mule account networks have measurably improved. The industry\
    \ consensus at EBAday reflects that practitioners recognise this empirically,\
    \ even if legal and governance architecture has not yet caught up uniformly.\n\
    \nThe more difficult question is what 78% consensus translates into at the implementation\
    \ level. Data-sharing initiatives routinely stall on the legal interoperability\
