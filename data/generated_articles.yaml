    \ CFTC and state money-transmitter supervisors are likely to scrutinise whether\
    \ Robinhood's facilitation role constitutes control sufficient to attract AML\
    \ programme obligations even over nominally decentralised legs of a transaction.\n\
    \nThe broader significance is that Robinhood's scale would effectively industrialise\
    \ the KYC-to-DeFi pipeline. If ten million verified users enter decentralised\
    \ markets through a single regulated gateway, the quality of that gateway's transaction\
    \ monitoring and suspicious activity reporting infrastructure becomes a systemic\
