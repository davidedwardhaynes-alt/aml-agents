    \ an architecture that carries material implications for transaction monitoring,\
    \ data residency compliance, and financial crime oversight across the region.\n\
    \nSingapore's positioning as the hub is legally consequential. MAS Notice PSN01\
    \ and the broader Payment Services Act framework impose obligations on licensed\
