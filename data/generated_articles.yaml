    \ through retail brokerage accounts, a typology documented in FATF's 2021 guidance\
    \ on securities sector vulnerabilities.\n\nFor MLROs at UK brokerages and investment\
    \ platforms, the immediate operational question is whether existing transaction-monitoring\
    \ thresholds and scenarios are calibrated to distinguish genuine retail IPO participation\
    \ from structuring or layering. A broad-based funding increase of this magnitude,\
    \ if not adequately contextualised by customer segmentation data, risks generating\
    \ either a flood of low-quality alerts or, conversely, suppressing alerts through\
    \ blanket whitelisting of IPO-related inflows \u2014 both outcomes that regulators\
    \ view unfavourably. The FCA's financial crime guidance (FCG 3) is explicit that\
    \ firms must ensure monitoring systems remain effective under changed market conditions.\n\
    \nThere is also a source-of-funds dimension. Retail allocations in large IPOs\
    \ tend to attract a wider customer demographic than secondary-market equity trading,\
    \ potentially including individuals whose wealth origin has not been recently\
    \ re-verified. Firms relying on open-banking rails for funding have the advantage\
    \ of confirmed account ownership and bank-to-bank traceability, which partially\
    \ addresses source-of-funds concerns \u2014 but does not substitute for the enhanced\
    \ due diligence that Regulation 33 of the MLRs 2017 may require where higher-risk\
    \ indicators are present.\n\nAs IPO pipelines remain active and retail participation\
    \ mechanisms become more accessible, supervisors will increasingly scrutinise\
