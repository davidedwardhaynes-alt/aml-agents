  full_article: "Survey data presented at NextGen FinCrime 2026 in London this week\
    \ offered fresh empirical grounding for a debate that UK regulators and financial\
    \ institutions have long conducted largely on anecdote: how the British public\
    \ understands, experiences, and assigns responsibility for fraud. The findings\
    \ carry immediate operational implications for firms navigating the Payment Systems\
    \ Regulator's mandatory reimbursement framework, which came into force in October\
    \ 2024 under the PSR's APP fraud rules and places liability squarely on receiving\
    \ and sending payment service providers.\n\nThe timing is not incidental. The\
    \ UK's fraud landscape has been reshaped over the past three years by a convergence\
    \ of legislative and supervisory pressure. The Economic Crime and Corporate Transparency\
    \ Act 2023 introduced the failure-to-prevent fraud offence for large organisations,\
    \ while the FCA's Consumer Duty\u2014effective since July 2023\u2014requires firms\
    \ to demonstrate that retail customers achieve good outcomes, a standard that\
    \ is difficult to meet when authorised push payment losses continue to run at\
    \ several hundred million pounds annually. Against that backdrop, understanding\
    \ public perception is not merely a communications exercise; it directly informs\
    \ how firms calibrate friction in payment journeys, design warning interventions,\
    \ and demonstrate proportionality to supervisors.\n\nSeveral tensions emerge from\
    \ the survey context. If consumers attribute primary responsibility for fraud\
    \ losses to their banks rather than to themselves or the platforms where fraud\
    \ is initiated\u2014social media, telecoms, e-commerce marketplaces\u2014firms\
    \ face asymmetric reputational and financial exposure even where their own controls\
    \ are demonstrably sound. This misalignment has been a persistent concern for\
    \ UK Finance and the banking industry in their representations to the PSR, particularly\
    \ regarding the \xA385,000 reimbursement cap and the standard of consumer caution\
    \ required before a claim is reduced.\n\nFor MLROs and fraud teams, the survey's\
    \ value lies less in any single data point than in its potential to inform risk\
    \ appetite statements and board-level narratives around fraud typologies. FATF's\
    \ Recommendation 29 requires financial intelligence units to receive and analyse\
    \ disclosures; the quality of those disclosures depends in part on whether firms\
    \ correctly identify the fraud vectors their customers are actually experiencing\
    \ rather than those they assume are prevalent.\n\nThe broader question is whether\
    \ public perception data will prompt the government's forthcoming fraud strategy\u2014\
    expected later in 2026\u2014to revisit the allocation of liability across the\
    \ ecosystem, including tech platforms, a conversation that the Online Safety Act\
    \ 2023 began but did not resolve."
