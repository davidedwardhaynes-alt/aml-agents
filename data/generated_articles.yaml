  full_article: "Meta's decision to disburse creator payments in stablecoins shifts\
    \ a material compliance burden downstream \u2014 onto the exchanges, wallet providers,\
    \ and payment processors that will ultimately handle the off-ramp \u2014 rather\
    \ than absorbing it within Meta's own financial crime controls.\n\nThe move arrives\
    \ as stablecoin issuance has entered a more structured regulatory era. The EU's\
    \ Markets in Crypto-Assets Regulation is fully operational, the US GENIUS Act\
    \ has advanced stablecoin reserve and issuer requirements, and MAS Notice PSN02\
    \ in Singapore imposes CDD and transaction monitoring obligations on digital payment\
    \ token service providers. In each jurisdiction, the entity that facilitates the\
    \ conversion or transfer of value \u2014 not necessarily the originating payer\
    \ \u2014 bears the primary AML/CFT obligation. By positioning itself as a commercial\
    \ payer rather than a payment service provider, Meta is making a deliberate jurisdictional\
    \ argument about where its regulatory perimeter ends.\n\nFor MLROs at virtual\
    \ asset service providers and e-money institutions, the practical implication\
    \ is an influx of retail-volume transactions from creators who may have limited\
    \ understanding of their own tax and KYC obligations. Under FATF Recommendation\
    \ 16, the travel rule requires originator and beneficiary information to accompany\
    \ virtual asset transfers above threshold. If Meta's disbursement infrastructure\
    \ does not transmit that information in a FATF-compliant format, receiving VASPs\
    \ face an immediate data-quality problem that cannot be remedied after the fact.\
    \ FATF's 2021 updated guidance on virtual assets explicitly places responsibility\
    \ on the VASP receiving a transfer to obtain missing travel rule data or consider\
    \ suspending the transaction.\n\nFrom a supervisory perspective, the arrangement\
    \ also raises questions about whether Meta itself should be licensed. Regulators\
    \ in the UK, EU, and Hong Kong have each signalled that entities which issue or\
    \ transmit value \u2014 even if labelled as creator monetisation programs \u2014\
    \ may fall within the perimeter of payment institution or VASP licensing. The\
    \ substance-over-form principle that underpins most AML frameworks does not easily\
    \ accommodate the argument that paying millions of users in a fungible, transferable\
    \ digital asset is merely a content reward scheme.\n\nThe broader pattern here\
    \ is familiar: a large technology platform externalises compliance friction while\
    \ capturing the commercial benefit of a new payment rail. Supervisors who have\
    \ watched similar dynamics play out with buy-now-pay-later products and embedded\
    \ finance will recognise the tempo. Regulatory clarification, when it arrives,\
    \ tends to follow the money rather than the marketing."
