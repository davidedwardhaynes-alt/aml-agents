    \ by ghost brokers operating outside any regulated perimeter.\n\nGhost broking\
    \ is not a new phenomenon, but its migration onto platforms such as Instagram,\
    \ WhatsApp, and TikTok has materially lowered the cost of reach for fraudsters.\
    \ Historically, bogus policies were sold through informal community networks or\
    \ small-ads websites; the algorithmic amplification available on social media\
    \ allows a single operator to target cost-sensitive demographics at volume with\
    \ minimal overhead. The conduct falls squarely within the FCA's authorisation\
    \ and financial promotion frameworks under the Financial Services and Markets\
    \ Act 2000, yet enforcement against anonymous or offshore social media accounts\
    \ remains operationally difficult.\n\nFor compliance professionals, the consumer\
    \ harm here is layered. Victims are not merely defrauded of premium payments;\
    \ they face criminal exposure under the Road Traffic Act 1988 for driving without\
    \ valid insurance, potential vehicle seizure, and fixed penalties. The FCA's research\
    \ finding that 39% of this cohort lack confidence in identifying a fake policy\
    \ compounds the risk: harm often goes unreported because victims do not immediately\
    \ discover their exposure. From an AML perspective, ghost broking operations generate\
    \ proceeds of fraud that require laundering, frequently through mule accounts\
    \ recruited from the same demographic \u2014 a typology consistent with patterns\
    \ flagged in the National Crime Agency's annual threat assessments.\n\nLegitimate\
    \ insurers and comparison platforms carry an indirect reputational stake. Where\
    \ consumers associate low-cost insurance discovery with social media channels\
