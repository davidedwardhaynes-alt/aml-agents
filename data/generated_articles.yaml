    \ implication for financial crime compliance functions is that internal governance\
    \ expectations around AI-assisted transaction monitoring, customer risk scoring,\
    \ and adverse media screening are now subject to a formalised accountability framework\
    \ within one of the UK's largest retail and commercial banks.\n\nThe move arrives\
    \ as regulators intensify scrutiny of algorithmic decision-making in financial\
