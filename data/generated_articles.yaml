    \ imminent \u2014 new or amended reporting obligations in one jurisdiction frequently\
    \ trigger enhanced transaction monitoring requirements and counterparty risk reassessments.\
    \ Second, compressed compliance timelines increase operational pressure on front-office\
    \ and middle-office functions, creating conditions in which control gaps can emerge.\
    \ AML supervisors in particular should note that periods of regulatory transition\
    \ in derivatives markets have historically preceded upticks in suspicious transaction\
    \ reporting as institutions recalibrate their monitoring parameters.\n\nSell-side\
