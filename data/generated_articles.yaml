    \ on technology risk management that institutions bear responsibility for demonstrating\
    \ that automated controls achieve equivalent or superior outcomes to the human\
    \ processes they replace. Standard Chartered's ability to evidence that equivalence,\
    \ transaction-monitoring false-negative rates included, will determine whether\
    \ the efficiency narrative survives its next supervisory review."
