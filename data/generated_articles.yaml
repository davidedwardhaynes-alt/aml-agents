    \ is that FMIs \u2014 and the financial institutions that rely on them as critical\
    \ nodes in clearing and settlement chains \u2014 now face more explicitly delineated\
    \ supervisory expectations from each authority, reducing the ambiguity that has\
    \ periodically complicated compliance planning since the post-Brexit regulatory\
    \ restructuring.\n\nThe backdrop is significant. The original division of FMI\
    \ supervisory responsibility between the Bank and the FCA was codified under the\
    \ Financial Services and Markets Act 2000 and subsequently refined through the\
    \ Banking Act 2009, which granted the Bank of England systemic oversight powers\
    \ over recognised clearing houses and interbank payment schemes. The relationship\
    \ has evolved further following the Financial Services and Markets Act 2023, which\
    \ expanded the regulators' remit over critical third parties and introduced new\
    \ provisions affecting how systemic risk within FMI chains is assessed. FATF Recommendation\
    \ 1's risk-based approach implicitly demands that authorities overseeing payment\
    \ and settlement infrastructure maintain coherent, non-duplicative supervisory\
    \ arrangements \u2014 precisely the gap a revised MoU is designed to address.\n\
    \nFor MLROs and heads of financial crime compliance at firms that are direct participants\
    \ in FMIs, the practical consequence is a clearer regulatory map. Where previously\
    \ accountability for AML-relevant obligations touching on settlement finality,\
    \ transaction monitoring at the infrastructure layer, and suspicious transaction\
    \ reporting could appear diffuse across two authorities, the revised MoU should\
    \ reduce instances of conflicting guidance. Firms operating under MAS Notice SFA\
