  full_article: "The Reserve Bank of Australia published its 2026 self-assessment\
    \ of the Reserve Bank Information and Transfer System (RITS) against the Committee\
    \ on Payments and Market Infrastructures and International Organization of Securities\
    \ Commissions Principles for Financial Market Infrastructures (PFMI) on 19 June\
    \ 2026, reaffirming the system's compliance posture across the core principles\
    \ governing settlement finality, credit and liquidity risk, and operational resilience.\
    \ For compliance professionals, the significance lies not in the assessment itself\
    \ \u2014 an annual regulatory obligation \u2014 but in what the PFMI framework\
    \ demands of the institutions that settle through RITS, particularly regarding\
    \ intraday liquidity management and the operational controls underpinning real-time\
    \ gross settlement.\n\nRITS serves as Australia's high-value interbank settlement\
    \ infrastructure, processing the final settlement of obligations arising across\
    \ the New Payments Platform, Bulk Electronic Clearing System, and equity and fixed-income\
    \ markets. The PFMI, adopted by the RBA following the 2012 CPMI-IOSCO publication\
    \ and mirrored in APRA's prudential expectations for systemically important institutions,\
    \ sets internationally agreed benchmarks across 24 principles encompassing governance,\
    \ risk management, settlement, and access. Australia's implementation aligns with\
    \ equivalent frameworks applied to systemically important payment systems in Singapore\
    \ under MAS Notice PSN01 and in the United Kingdom under the Bank of England's\
    \ supervision of CHAPS.\n\nFor MLROs and financial crime compliance teams, the\
    \ relevance of RITS assessments extends beyond operational risk. Settlement infrastructure\
    \ underpins the finality and irrevocability of transactions that financial institutions\
    \ are required to monitor under Australia's *Anti-Money Laundering and Counter-Terrorism\
    \ Financing Act 2006*, particularly in relation to threshold transaction reporting\
    \ and suspicious matter obligations where same-day settlement creates compressed\
    \ windows for pre-settlement screening. Any identified weakness in operational\
    \ resilience or access controls within RITS carries downstream implications for\
    \ correspondent banking relationships and the integrity of transaction records\
    \ used in AML investigations.\n\nThe assessment also carries weight for institutions\
    \ managing intraday liquidity buffers under APRA's APS 210, where RITS participation\
    \ requires maintaining sufficient exchange settlement account balances to meet\
    \ net settlement obligations without central bank credit. Gaps in liquidity governance\
    \ identified through PFMI assessments can surface in supervisory discussions with\
    \ APRA and, indirectly, in due diligence conducted by international correspondent\
    \ banks benchmarking Australian counterparts against FATF Recommendation 6 standards\
    \ on targeted financial sanctions.\n\nThe 2026 assessment will feed into the RBA's\
    \ ongoing review of RITS functionality as the Australian payments ecosystem continues\
    \ its transition toward 24/7 infrastructure, a shift that will test operational\
    \ and compliance frameworks in equal measure."
