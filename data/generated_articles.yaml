    \ to revisit one of the more persistent structural fault lines between its two\
    \ primary capital markets regulators. For compliance and financial crime functions\
    \ at broker-dealers and futures commission merchants, the initiative carries direct\
    \ implications for how margin models are governed, monitored, and subjected to\
    \ AML-related controls.\n\nThe divergence between SEC and CFTC margin regimes\
    \ has long been a source of operational friction. Securities margin is governed\
    \ primarily under Regulation T and the SEC's net capital rules, while derivatives\
    \ margining falls under CFTC Part 39 and Part 23 rules for clearing organisations\
    \ and swap dealers respectively. Efforts to align the two frameworks date back\
    \ at least to the Dodd-Frank Act of 2010, which mandated greater inter-agency\
    \ coordination, yet material differences in margin calculations, eligible collateral,\
    \ and account segregation requirements have persisted for over a decade.\n\nFrom\
