    \ chain: the originating customer is onboarded and risk-rated by a foreign institution\
    \ operating under a different AML/CTF regime, and the receiving Vietnamese merchant\
    \ is onboarded by NCB under SBV Circular 09/2023 and Vietnam's Anti-Money Laundering\
    \ Law (amended 2022). FATF Recommendation 16, which governs information accompanying\
    \ wire transfers and increasingly informs expectations around fast payment schemes,\
    \ creates an expectation that adequate originator and beneficiary data travel\
    \ with the transaction \u2014 an expectation that QR-mediated retail flows frequently\
    \ strain. Supervisors will want to understand how NCB's settlement layer captures\
    \ and retains this data for suspicious transaction reporting purposes.\n\nFrom\
    \ a merchant-acceptance standpoint, Vietnamese businesses receiving cross-border\
    \ QR payments gain incremental revenue from inbound tourism, particularly from\
    \ China's large outbound travel market. The risk, however, is that without robust\
    \ merchant due diligence and transaction velocity controls, the channel could\
    \ be exploited for trade-based money laundering or to circumvent capital controls\
    \ in either jurisdiction.\n\nAs VietQR Global expands to additional source countries,\
    \ the SBV and peer regulators will face pressure to establish bilateral information-sharing\
    \ arrangements aligned with FATF Recommendation 40, ensuring that AML oversight\
    \ keeps pace with the commercial convenience the scheme delivers."
