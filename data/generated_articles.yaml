  full_article: "UOB Private Bank has appointed Judy Chan as Managing Director in\
    \ Hong Kong, signalling the Singapore-headquartered lender's intent to deepen\
    \ its footprint in the territory's high-net-worth segment ahead of what demographers\
    \ and wealth managers broadly characterise as the largest intergenerational wealth\
    \ transfer in Asian history. Chan will oversee client coverage and advisory teams,\
    \ with a mandate to deliver tailored wealth solutions to a client base whose complexity\
    \ \u2014 in terms of cross-border structures, beneficial ownership, and source-of-wealth\
    \ documentation \u2014 has grown considerably in recent years.\n\nThe appointment\
    \ arrives in a well-defined regulatory environment. In Hong Kong, private banks\
    \ serving HNW and ultra-HNW clients operate under the Anti-Money Laundering and\
    \ Counter-Terrorist Financing Ordinance (AMLO), with the SFC and HKMA each maintaining\
    \ supervisory oversight depending on the activities involved. MAS Notice 626,\
