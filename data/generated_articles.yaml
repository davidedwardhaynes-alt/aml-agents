  jurisdiction: Hong Kong (JFIU)
  topic: AML enforcement
  summary: The relative ease with which smaller, family-owned enterprises in mainland
    China are deploying artificial intelligence tools compared with their larger counterparts
    carries direct implications for financial crime compliance functions that monitor
    those business segments. Where technology adoption is rapid, informal, and under-documented,
