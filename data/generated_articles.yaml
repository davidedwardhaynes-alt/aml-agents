    \ horizon.\n\nThe FCA's position reflects a deliberate regulatory philosophy that\
    \ has been building since the joint Discussion Paper on AI and machine learning\
    \ published with the Bank of England and PRA in 2022. It also aligns with the\
    \ broader international posture visible in FATF's guidance on the use of new technologies\
    \ for AML/CFT purposes, which similarly resists creating parallel rulebooks and\
    \ instead asks firms to demonstrate that existing risk management obligations\
    \ are met regardless of the tool used. The EU AI Act, by contrast, takes a more\
    \ prescriptive classification approach \u2014 a divergence that firms operating\
