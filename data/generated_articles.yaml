    \ Notice PSN02, VASPs licensed under the Payment Services Act are required to\
    \ monitor for and report such anomalies. In Hong Kong, the same conduct may engage\
    \ obligations under the Anti-Money Laundering and Counter-Terrorist Financing\
    \ Ordinance, while Australian reporting entities must assess materiality thresholds\
    \ under the AML/CTF Act 2006, particularly Part 7 suspicious matter reporting.\n\
    \nFor compliance functions, the practical challenge is distinguishing legitimate\
    \ profit-taking by early adopters \u2014 a commercially rational act during a\
    \ supply rotation cycle \u2014 from layering activity using aged wallets as a\
    \ distancing mechanism. The two can appear identical at the transaction layer.\
    \ VASPs receiving inflows from reactivated LTH wallets should ensure their transaction\
    \ monitoring rules are calibrated to weight wallet age and dormancy period as\
