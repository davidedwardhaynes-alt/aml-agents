    \ and the FSA's reinforced guidance under the Act on Prevention of Transfer of\
    \ Criminal Proceeds \u2014 giving institutions a degree of regulatory predictability.\
    \ Jurisdictions with pending or recent mutual evaluations, or those carrying elevated\
    \ FATF grey-list exposure, present a materially different risk calculus, prompting\
    \ firms to de-prioritise or stage their entry plans accordingly.\n\nFor MLROs\
