  full_article: "At EBAday 2026, payments strategist Brett King framed the emergence\
    \ of agentic artificial intelligence \u2014 systems capable of autonomous decision-making\
    \ and executing multi-step financial transactions without human intervention \u2014\
    \ not merely as a technology trend but as a structural re-ordering of how economic\
    \ value is created and intermediated. For compliance officers, that framing carries\
    \ an immediate and practical implication: autonomous agents transacting at scale\
    \ introduce counterparty obscurity that existing customer due diligence frameworks\
    \ were not designed to resolve.\n\nThe regulatory architecture governing financial\
    \ institution obligations was built around identifiable human principals. FATF\
    \ Recommendation 10 requires CDD on customers and beneficial owners; MAS Notice\
    \ 626 and its equivalents across APAC operationalise that requirement for regulated\
    \ entities in Singapore. Neither framework contemplates a scenario in which the\
    \ instructing party is a software agent operating under delegated authority from\
    \ a natural person or legal entity, potentially across multiple jurisdictions\
    \ and ledgers simultaneously. The gap is not theoretical \u2014 agent-to-agent\
    \ payment rails are already in early commercial deployment among fintech and embedded\
    \ finance providers.\n\nFrom a financial crime perspective, agentic systems compress\
    \ the window available for transaction monitoring intervention. Typologies that\
    \ rely on detecting behavioural anomalies over time \u2014 structuring, layering\
    \ through multiple correspondent accounts \u2014 become harder to identify when\
    \ velocity is dictated by machine logic rather than human decision cycles. Equally,\
    \ the accountability question is non-trivial: under the Serious Organised Crime\
    \ Ordinance in Hong Kong or Australia's AML/CTF Act, establishing the mental element\
    \ for facilitation offences requires tracing intent to a legal person, a task\
    \ complicated when autonomous agents sit in the transactional chain.\n\nPrudential\
    \ and AML supervisors will face pressure to clarify whether an AI agent constitutes\
    \ a customer, an intermediary, or a product feature \u2014 a distinction with\
    \ material consequences for which entity carries the CDD obligation and how suspicious\
    \ transaction reports are attributed. The European Banking Authority's ongoing\
    \ work on AI governance under the EU AI Act provides one template, though its\
    \ intersection with AMLD6 obligations remains unresolved. FATF's current review\
    \ cycle, which is expected to address virtual assets and emerging technology,\
    \ is the more likely venue for durable international guidance.\n\nThe jurisdictions\
    \ that move earliest to define the legal personhood \u2014 or its absence \u2014\
    \ of agentic systems in financial transactions will shape not only their own compliance\
    \ landscapes but the structural advantage their financial sectors hold in an increasingly\
    \ automated payments economy. Regulatory clarity, in this instance, is competitive\
    \ infrastructure."
