    \ trading position, a characterisation that supervisors reviewing corporate treasury\
    \ disclosures under securities law will find relevant.\n\nWhether this sale proves\
    \ a tactical rebalancing or a structural retreat, it signals that the compliance\
    \ infrastructure surrounding institutional crypto holdings must be calibrated\
