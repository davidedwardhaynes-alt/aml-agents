  full_article: "Visa and Revolut's joint rollout of Click to Pay across Europe \u2014\
    \ reaching more than 40 million customers through a tokenised checkout architecture\
    \ \u2014 extends the surface area of card-not-present transactions at a scale\
    \ that warrants structured review from financial crime compliance functions, even\
    \ as the technology is designed principally to reduce fraud.\n\nClick to Pay operates\
    \ through EMVCo's tokenisation standard, replacing primary account numbers with\
    \ network tokens at the point of transaction. The control rationale is straightforward:\
    \ a compromised token cannot be replayed across merchants, and the underlying\
    \ card credential is not exposed to the accepting merchant's environment. From\
    \ a fraud-prevention standpoint, the model improves on static card-entry CNP flows\
    \ that have historically been the dominant vector for unauthorised account use\
    \ in European e-commerce, a problem the European Banking Authority's Strong Customer\
    \ Authentication requirements under PSD2 only partially addressed in practice.\n\
    \nFor MLROs and transaction monitoring teams, however, the architecture introduces\
    \ considerations that sit alongside the fraud narrative. Tokenised credentials\
    \ abstracted from underlying account numbers can complicate the traceability of\
    \ individual transaction chains when alerts are generated downstream. Where a\
    \ customer holds multiple tokens across devices and merchant relationships \u2014\
    \ a likely outcome given Revolut's multi-product wallet structure \u2014 reconciliation\
    \ between a flagged payment and a specific instrument requires that financial\
    \ institutions maintain robust token-to-PAN mapping disciplines within their transaction\
    \ data ingestion pipelines. FATF Recommendation 16 on wire transfers, and its\
    \ application to electronic payment chains under the EU's Transfer of Funds Regulation,\
    \ continues to require that originator and beneficiary information travel with\
    \ transactions; compliance teams should confirm that token-layer messaging does\
    \ not interrupt that information flow in practice.\n\nRevolut's regulatory position\
    \ also remains a relevant backdrop. The group secured its UK banking licence in\
    \ 2024 after an extended process, and its European bank operates under a Lithuanian\
    \ licence supervised by the Bank of Lithuania. The scale implied by 40 million\
    \ European customers places the entity firmly within the higher-risk population\
    \ thresholds that trigger enhanced supervisory expectations under EBA guidelines\
    \ on internal governance and ML/TF risk frameworks.\n\nAs tokenised payment rails\
    \ become the default rather than the exception across European retail banking,\
    \ compliance infrastructures built around static card identifiers will require\
    \ deliberate re-engineering. The Visa-Revolut deployment is a prompt, not an endpoint."
