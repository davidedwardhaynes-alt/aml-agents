    \ AFCA arrangements. Third, regulators in the region are watching closely: MAS's\
    \ Enforcement Report for 2025 signalled heightened scrutiny of controls gaps where\
    \ technology risk and financial crime risk intersect.\n\nThe more durable challenge\
