  full_article: "Enrolment of Hong Kong students at United Kingdom private schools\
    \ fell 17 per cent in the year to 2026, with new admissions dropping 26 per cent\
    \ \u2014 figures that represent the steepest single-year decline on record, according\
    \ to the UK Independent Schools census. The proximate cause is the UK government's\
    \ decision, effective January 2025, to remove the VAT exemption on independent\
    \ school fees, adding 20 per cent to tuition costs and placing British education\
    \ at a material price disadvantage relative to competing jurisdictions.\n\nThe\
    \ decline reverses an enrolment surge that accompanied Hong Kong's post-2020 emigration\
    \ wave, during which the BN(O) visa pathway and political uncertainty drove significant\
    \ outflows of middle-class families toward the UK. That demographic was already\
