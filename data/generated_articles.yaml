  full_article: "The United States Congress's continued deliberation on the Clarity\
    \ Act \u2014 ISDA's podcast coverage of which aired on 11 May 2026 \u2014 signals\
    \ that the long-contested question of whether digital assets constitute securities\
    \ or commodities remains unresolved, even as federal regulators are visibly adjusting\
    \ their supervisory posture ahead of any legislative outcome. For compliance officers\
    \ at institutions with crypto-linked counterparty exposure, the absence of a settled\
    \ framework is not merely a political inconvenience; it directly affects how transaction\
    \ monitoring typologies, counterparty due diligence, and SAR filing obligations\
    \ are calibrated.\n\nThe jurisdictional ambiguity between the SEC and CFTC over\
    \ digital assets has persisted since at least the 2017\u201318 ICO boom, and successive\
    \ regulatory guidance \u2014 including the SEC's application of the Howey test\
    \ to token issuances and the CFTC's assertion of jurisdiction over Bitcoin and\
    \ Ether derivatives \u2014 has produced an overlapping patchwork rather than a\
    \ coherent regime. The Clarity Act, broadly framed as an effort to assign primary\
    \ oversight to the CFTC for mature digital commodities while preserving SEC authority\
    \ over digital securities, would, if enacted, constitute the most significant\
    \ structural change to US crypto oversight since FinCEN's 2013 guidance on virtual\
    \ currency administrators and exchangers.\n\nFrom an AML/CFT standpoint, the implications\
    \ are material across several dimensions. Institutions relying on FATF Recommendation\
    \ 15 \u2014 which requires countries to apply a risk-based approach to virtual\
    \ asset service providers \u2014 must reconcile that standard with domestic rules\
    \ that remain in flux. If the Clarity Act designates a larger class of tokens\
    \ as commodities, the corresponding VASP registration and Travel Rule obligations\
    \ under FinCEN's framework may require recalibration. Equally, correspondent banks\
    \ and prime brokers assessing crypto-native clients under existing BSA programmes\
    \ will need to revisit their customer risk-rating matrices once the legislative\
    \ perimeter is fixed.\n\nRegulators, for their part, appear to be acting pragmatically:\
    \ the SEC's withdrawal of several high-profile enforcement actions and the CFTC's\
    \ expanded engagement with tokenised derivatives suggest agencies are preserving\
    \ optionality rather than entrenching positions that Congress may soon overturn.\
    \ For MLROs, the prudent response is to document the current uncertainty explicitly\
    \ within their risk appetite statements and to build scenario-contingent compliance\
    \ architectures that can be adapted once legislative clarity \u2014 if not the\
    \ Clarity Act specifically \u2014 eventually arrives."
