    \ convicted following the July 2020 enactment of the NSL and the subsequent mass\
    \ prosecution arising from the unofficial primary election organised by the pro-democracy\
    \ camp. For compliance officers, the cases have never been straightforward to\
    \ classify: defendants were neither designated individuals on United Nations or\
    \ OFAC sanctions lists nor, in many instances, subjects of explicit asset-freezing\
    \ orders, yet the reputational and legal exposure attached to maintaining business\
    \ relationships with them or their families required careful, documented assessment\
    \ under Hong Kong's Anti-Money Laundering and Counter-Terrorist Financing Ordinance\
    \ (Cap. 615) and the Organised and Serious Crimes Ordinance.\n\nThe release of\
    \ a convicted individual does not automatically reset the compliance calculus.\
    \ Under FATF Recommendation 12 and its interpretive notes, politically exposed\
    \ person status and heightened due diligence obligations do not necessarily lapse\
    \ upon completion of a criminal sentence, particularly where the underlying conviction\
    \ carries national-security dimensions that may attract continuing regulatory\
    \ scrutiny. Institutions operating under MAS Notice 626 in Singapore or equivalent\
    \ regimes in other jurisdictions will similarly need to assess whether correspondent\
    \ relationships touching these individuals warrant re-evaluation. The HKMA's Supervisory\
    \ Policy Manual module AML/CFT likewise requires that enhanced due diligence be\
    \ maintained where elevated risk persists, irrespective of changed personal circumstances.\n\
    \nA secondary layer of exposure concerns former associates, campaign donors, and\
    \ civil-society organisations that intersected with convicted individuals during\
    \ the period under prosecution. Several such organisations have since dissolved,\
    \ but transaction records dating to 2019\u20132021 remain within standard retention\
    \ windows and could attract regulatory inquiry.\n\nWhat Wan's release does not\
    \ provide is regulatory clarity on the broader population of individuals who participated\
    \ in opposition politics during that period but were not prosecuted. Compliance\
    \ teams should resist the temptation to treat a high-profile release as a signal\
    \ that NSL-related risk appetite has normalised; supervisory expectations in Hong\
    \ Kong, and among correspondent banks assessing Hong Kong-linked flows, remain\
    \ attentive to this category of exposure."
