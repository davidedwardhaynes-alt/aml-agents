    \ models. Institutions that delayed full transition infrastructure build-out following\
    \ the 2023 LIBOR cessation will find that the expanding HKMA issuance calendar\
    \ leaves diminishing justification for residual legacy-rate dependencies in new\
    \ business. From a liquidity management perspective, HONIA FRNs issued by the\
    \ HKMA carry sovereign-equivalent standing and are eligible collateral under established\
    \ repo frameworks, making them relevant instruments for high-quality liquid asset\
    \ buffers under the Liquidity Coverage Ratio requirements applicable to category\
    \ one and two institutions under the Banking (Liquidity) Rules.\n\nFor compliance\
    \ and financial crime professionals, the relevance is less direct but not negligible.\
    \ Benchmark integrity sits within the broader market conduct perimeter; MAS Notice\
