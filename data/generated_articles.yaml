    Asset managers preparing comment letters would do well to address not only investment\
    \ policy and liquidity management but also the AML governance architecture of\
    \ proposed vehicles \u2014 an area the SEC has increasingly treated as within\
    \ its own supervisory interest, as evidenced by its coordination with FinCEN on\
