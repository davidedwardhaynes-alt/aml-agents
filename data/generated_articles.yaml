  full_article: "The cautious pace at which Asian retail investors are being granted\
    \ access to private markets reflects not only commercial uncertainty but a set\
    \ of unresolved compliance and due-diligence obligations that intermediaries have\
    \ yet to fully absorb. ASIFMA's acknowledgement of \"tremendous hesitation\" among\
    \ asset managers and distributors underscores that regulatory readiness, rather\
    \ than appetite alone, is shaping the democratisation timeline.\n\nPrivate asset\
    \ classes \u2014 encompassing private equity, private credit, and infrastructure\
    \ funds \u2014 have historically sat within the institutional perimeter partly\
    \ because their opacity and illiquidity create structural challenges for know-your-customer\
    \ and suitability frameworks. When distributed to a broader investor base, those\
    \ challenges multiply. Under FATF Recommendation 10, enhanced customer due diligence\
    \ obligations attach where the business relationship or transaction presents higher\
    \ risk; extending private fund access to mass-affluent or retail segments through\
    \ multi-layered feeder structures can obscure beneficial ownership in ways that\
    \ strain existing CDD workflows.\n\nFor distribution platforms and licensed intermediaries\
    \ in Hong Kong and Singapore, the compliance calculus is particularly pointed.\
    \ The MAS Notice on Prevention of Money Laundering (Notice SFA 04-N02, among others)\
    \ and Hong Kong's Anti-Money Laundering and Counter-Terrorist Financing Ordinance\
    \ (AMLO) both require intermediaries to conduct ongoing monitoring commensurate\
    \ with risk. Private assets, given their infrequent valuations, limited secondary\
    \ market activity, and complex capital-call mechanics, are harder to monitor against\
    \ transaction-pattern anomalies than listed securities. Compliance functions that\
    \ have not yet developed fit-for-purpose controls for these instruments will rationally\
    \ counsel caution before distribution scales.\n\nFund managers face a parallel\
    \ tension. Broadening the investor base expands potential exposure to source-of-funds\
    \ risk at subscription and creates obligations around politically exposed persons\
