    \ rather than crime-prevention oriented.\n\nLooking ahead, the joint statement\
    \ may foreshadow more prescriptive guidance \u2014 potentially aligned with the\
    \ EU AI Act's risk-tiered obligations \u2014 requiring firms to document how their\
    \ financial crime control frameworks specifically account for frontier model threat\
    \ scenarios. Firms that integrate AI threat modelling into their annual EWRA cycles\
    \ now will be better positioned when that guidance arrives."
