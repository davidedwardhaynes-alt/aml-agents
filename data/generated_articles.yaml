  full_article: "The expiry of the Commodity Futures Trading Commission's large trader\
    \ reporting framework for swaps \u2014 codified under 17 C.F.R. Part 20 \u2014\
    \ moved closer to resolution on 20 May 2026, when ISDA, FIA and SIFMA submitted\
    \ a joint letter urging the CFTC to allow the rules to sunset without replacement\
    \ in their current form. The immediate implication for swap dealers, major swap\
    \ participants and their compliance functions is that position-level reporting\
    \ obligations that have shaped trade surveillance and AML-adjacent monitoring\
    \ architectures since 2012 may be materially restructured or eliminated.\n\nPart\
    \ 20 was introduced in the aftermath of the Dodd-Frank Wall Street Reform and\
    \ Consumer Protection Act as part of a broader effort to give the CFTC visibility\
    \ into large exposures in the swaps market, complementing exchange-traded futures\
    \ reporting under Part 17. The rules require reporting of consolidated physical\
    \ commodity swaps positions on a daily basis, enabling regulators to detect potential\
    \ manipulation, cornering, and \u2014 indirectly \u2014 the kind of concentrated\
    \ position-building that can intersect with market abuse typologies relevant to\
    \ financial crime compliance. For MLROs operating at firms subject to both CFTC\
    \ jurisdiction and market abuse regimes under frameworks such as the EU's MAR\
    \ or the UK's FSMA 2000, the Part 20 dataset has served as one input into broader\
    \ surveillance programmes.\n\nThe trade associations' argument, consistent with\
    \ longstanding industry positions, is that Part 20 imposes duplicative burdens\
    \ where swap data repository reporting under Parts 43, 45 and 46 already provides\
    \ the CFTC with granular transaction and position-level data. From a supervisory\
    \ standpoint, that argument has some merit: FATF Recommendation 29 calls for competent\
    \ authorities to have adequate powers and data access, but not necessarily through\
    \ redundant parallel streams. However, prudential and market-integrity supervisors\
    \ have historically viewed convergence of reporting channels with caution, noting\
    \ that aggregated SDR data and large-trader snapshots serve different analytical\
    \ purposes.\n\nFor compliance officers at FCMs, swap dealers and asset managers,\
    \ the practical question is whether any successor framework will align more closely\
    \ with existing SDR reporting workflows, reducing the reconciliation burden that\
    \ Part 20 currently imposes. The CFTC's response, expected within the current\
    \ rulemaking calendar, will also signal how the commission intends to calibrate\
    \ market surveillance capacity at a moment when derivatives market structure is\
    \ already under review. Firms should avoid dismantling Part 20-specific reporting\
    \ infrastructure until a formal CFTC position is published."
