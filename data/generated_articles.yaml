  full_article: "Three consecutive halts of the Sui mainnet within a 48-hour window,\
    \ attributed by developers to a software upgrade defect, illustrate a systemic\
    \ operational-risk dimension of public blockchain infrastructure that compliance\
    \ officers at virtual asset service providers (VASPs) have been slow to price\
    \ into their frameworks.\n\nThe episode is not, in isolation, a financial-crime\
    \ event. Yet for institutions relying on Sui-based settlement, custody, or tokenised-asset\
    \ rails, prolonged or unpredictable chain unavailability creates precisely the\
    \ conditions under which transaction monitoring gaps emerge. FATF Recommendation\
    \ 15 and its Interpretive Note on virtual assets require VASPs to maintain effective\
    \ controls on an ongoing basis; a network halt that prevents the broadcast or\
    \ confirmation of transactions does not suspend those obligations. Jurisdictions\
    \ including Singapore, through MAS Notice PSN02, and Australia, through the AML/CTF\
    \ Act 2006, impose continuous transaction monitoring requirements that assume\
    \ underlying infrastructure availability. When the chain goes dark, alert queues\
    \ freeze, suspicious activity may go undetected in real time, and post-halt reconciliation\
    \ becomes operationally fraught.\n\nFrom a prudential perspective, VASPs and financial\
    \ institutions with Sui exposure should revisit their business continuity arrangements.\
    \ A single halt might be dismissed as an isolated anomaly; three within two days\
    \ suggests a fragility in the upgrade governance process that warrants escalation\
    \ to risk committees. Incident response plans should explicitly address what constitutes\
    \ a \"material\" network disruption sufficient to trigger notification to supervisors\
    \ \u2014 a threshold MAS, for instance, expects institutions to define under its\
