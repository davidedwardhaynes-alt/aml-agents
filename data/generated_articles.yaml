  full_article: "Therese Chambers, the FCA's joint executive director of enforcement\
    \ and market oversight, used a keynote address at the International Bar Association's\
    \ Anti-Corruption Conference on 17 June 2026 to make a pointed argument: the most\
    \ consequential financial crime work rarely produces a headline. The speech signals\
    \ that the regulator intends to defend the resource-intensive, low-visibility\
    \ enforcement activity that underpins systemic deterrence, even as external scrutiny\
    \ of its caseload efficiency intensifies.\n\nChambers drew on a career of more\
    \ than three decades to frame what practitioners already know but seldom articulate\
    \ publicly \u2014 that the visible enforcement record, including a \xA344 million\
    \ fine against Nationwide for AML failings, a \u20AC250 million investor redress\
    \ outcome from H2O Asset Management, a seven-figure fine and prohibition against\
    \ former Barclays chief executive Jes Staley, and an eleven-year combined custodial\
    \ sentence for the Korfuzi siblings on insider trading charges, represents only\
    \ the portion of the workload that resolves into something courts and journalists\
    \ can quantify. The deeper infrastructure of disclosures, supervisory engagement,\
    \ intelligence development, and deferred outcomes consumes proportionally far\
    \ greater resources and produces proportionally less public credit.\n\nThe timing\
    \ matters for compliance professionals. With the UK's Economic Crime and Corporate\
    \ Transparency Act 2023 expanding the failure-to-prevent fraud offence and raising\
    \ expectations around corporate governance of financial crime risk, firms face\
    \ a parallel dynamic: their own unseen controls work \u2014 transaction monitoring\
    \ calibration, PEP and sanctions screening refinement, SAR quality improvement\
    \ \u2014 is increasingly expected by regulators as a baseline rather than a differentiator.\
    \ FATF Recommendation 35, which underpins effective, proportionate, and dissuasive\
    \ sanctions, implicitly demands precisely this kind of systemic, unglamorous infrastructure\
    \ investment from both supervisors and regulated entities alike.\n\nFor MLROs\
    \ and heads of financial crime compliance, Chambers's framing offers useful institutional\
    \ cover for resource conversations internally. Demonstrating the volume and rigour\
