    \ controls. The censure stops short of a formal financial penalty \u2014 CACEIS\
    \ UK qualified for a reduced sanction under the FCA's settlement discount scheme\
    \ \u2014 but the reputational and financial consequences are substantial. The\
    \ action brings total FCA-secured restitution for WealthTek clients to more than\
    \ \xA357 million in just over twelve months, with Barclays Bank UK and Sapia Partners\
    \ having faced separate proceedings.\n\nThe WealthTek case has become a test of\
    \ how the FCA interprets the obligations of custodians and sub-custodians under\
    \ CASS rules and the broader financial crime framework. CACEIS UK assumed the\
    \ sub-custodian role for WealthTek \u2014 then operating as Vertus Asset Management\
    \ LLP \u2014 in November 2020. On three separate occasions the firm consulted\
    \ the Financial Services Register and identified that WealthTek lacked authorisation\
    \ to hold certain client assets. It also failed to identify that WealthTek was\
    \ not permitted to hold client money. Despite these findings, CACEIS UK opened\
    \ client accounts, then allowed transaction monitoring alerts to age without timely\
    \ resolution. Under FATF Recommendation 10 and the FCA's own rules implementing\
    \ the Money Laundering Regulations 2017, ongoing due diligence and monitoring\
    \ are not discretionary activities; adverse information discovered during a review\
    \ creates a positive obligation to act, not merely a record-keeping requirement.\n\
    \nFor MLROs at custodian and prime services firms, the case crystallises a frequently\
    \ misread compliance boundary: awareness of a red flag that is documented but\
    \ not escalated into operational consequence \u2014 account restriction, enhanced\
    \ review, or exit \u2014 does not satisfy the standard. The FCA's framing suggests\
    \ that passivity in the face of known control weaknesses is itself a regulatory\
    \ failing, a reading consistent with its approach in earlier cases including the\
    \ Santander and NatWest enforcement actions involving inadequate transaction monitoring\
    \ responses.\n\nThe involvement of three separate financial institutions in a\
    \ single underlying fraud also signals that the FCA is prepared to distribute\
    \ accountability across an entire service chain rather than confining enforcement\
    \ to the primary wrongdoer. Custodians, prime brokers, and payment firms that\
    \ act as infrastructure for smaller or less-scrutinised counterparts should expect\
    \ their own due diligence and monitoring standards to be assessed against the\
    \ risks those counterparts present. As the FCA continues its work on the Consumer\
    \ Duty and strengthens its supervisory focus on non-bank financial intermediaries,\
    \ the WealthTek series of actions may serve as a durable benchmark for what adequate\
    \ third-party oversight looks like in practice."
