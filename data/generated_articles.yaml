    \ with IDEMIA Secure Transactions, with eleven domestic banks now offering cardholders\
    \ the ability to add MyDebit credentials to digital wallets \u2014 AmBank customers\
    \ leading the initial rollout. The immediate compliance implication is that each\
    \ tokenised transaction introduces a layer of abstraction between the underlying\
    \ card credential and the transaction record, requiring participating institutions\
    \ to ensure their transaction monitoring systems can resolve tokens back to verified\
    \ customer identities without disruption to suspicious transaction reporting obligations.\n\
    \nTokenisation of payment credentials is not new to Malaysian supervisory expectations.\
    \ Bank Negara Malaysia's Risk Management in Technology (RMiT) policy document\
    \ and the Payment Card Industry Data Security Standard already establish baseline\
    \ requirements for how institutions handle card data at rest and in transit. However,\
    \ the extension of a domestic debit scheme \u2014 historically processed through\
    \ relatively transparent card-present rails \u2014 into wallet environments governed\
    \ by multiple intermediaries raises questions about data lineage. Under BNM's\
    \ Anti-Money Laundering, Anti-Terrorism Financing and Proceeds of Unlawful Activities\
    \ Act 2001 (AMLA), obligated institutions must maintain adequate records to support\
    \ transaction reconstruction; when a token issued by IDEMIA's platform sits between\
    \ the acquiring bank, the issuer, and PayNet's clearing infrastructure, each party's\
    \ understanding of where the audit trail resides requires contractual and technical\
    \ clarity.\n\nFor MLROs at the eleven participating banks, the practical concern\
    \ is whether existing AML transaction monitoring rules \u2014 calibrated to card\
    \ numbers or account identifiers \u2014 will reliably de-tokenise and match wallet-initiated\
    \ transactions to the correct customer risk profile. FATF Recommendation 10 on\
    \ customer due diligence and Recommendation 16 on wire transfers both carry implicit\
    \ expectations that institutions can attribute transactions to a named, verified\
    \ customer in near real time. A tokenised MyDebit payment that routes through\
    \ a third-party wallet may not automatically carry the full originator data needed\
    \ to satisfy those obligations without deliberate systems integration.\n\nBroader\
    \ wallet adoption across eleven institutions simultaneously also concentrates\
    \ operational and financial-crime risk at the scheme level. PayNet, as a designated\
    \ payment system operator, carries supervisory accountability under the Financial\
    \ Services Act 2013, and its governance of IDEMIA's token vault will likely draw\
    \ scrutiny in BNM's next examination cycle. As Malaysia advances its Digital Economy\
    \ Blueprint commitments, the pace of scheme-level tokenisation rollouts will test\
    \ whether supervisory frameworks can keep pace with credential abstraction at\
    \ scale."
