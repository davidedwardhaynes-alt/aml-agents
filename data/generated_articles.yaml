    \ units have historically observed increased exploitation of interest-bearing\
    \ products and short-duration instruments as layering vehicles, a pattern noted\
    \ in earlier FATF guidance on professional money laundering networks and reflected\
    \ in the UK's own National Risk Assessments. The Financial Services and Markets\
    \ Act 2000, alongside the Proceeds of Crime Act 2002, provides the domestic framework\
    \ within which firms must calibrate their transaction monitoring to shifts in\
    \ product usage driven by macro conditions.\n\nFor MLROs at deposit-taking institutions,\
    \ the practical implication is a review of product-level typology assumptions\
    \ embedded in automated monitoring systems. Rules and scenarios calibrated during\
    \ the near-zero rate era of 2012\u20132021 may underweight the risk associated\
    \ with structured placements into savings products or treasury instruments now\
