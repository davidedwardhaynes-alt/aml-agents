    \ most technologically advanced financial systems. The immediate compliance implication\
    \ is unambiguous: participating institutions will need to operationalise AML/CFT\
    \ controls specifically calibrated for programmable digital currency flows before\
    \ go-live, not after.\n\nSouth Korea has spent several years developing its CBDC\
    \ framework under the supervision of the Bank of Korea, running sandbox pilots\
    \ and engaging the Financial Services Commission and Financial Intelligence Unit\
