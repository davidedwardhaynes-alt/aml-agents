    \ transaction monitoring systems rely on to flag and, where necessary, pause suspicious\
    \ payments. Firms operating across Icelandic and European corridors will need\
    \ to ensure their real-time screening capabilities \u2014 covering sanctions lists,\
    \ PEP databases, and behavioural analytics \u2014 are calibrated to sub-second\
    \ decisioning. This is consistent with obligations under FATF Recommendation 16\
    \ on wire transfers and the EU's Instant Payments Regulation (Regulation 2024/886),\
    \ which requires payment service providers to perform sanctions screening without\
    \ delaying settlement.\n\nIceland's existing AML framework is broadly FATF-compliant,\
