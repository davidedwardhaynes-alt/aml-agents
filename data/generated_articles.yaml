    \ portion of institutional allocators are reducing exposure in response to broader\
    \ macro conditions, credit-market stress, or internal risk-limit triggers \u2014\
    \ the same factors that drive rebalancing in any regulated fund structure. For\
    \ compliance officers, the episode is a reminder that the ETF wrapper normalises\
    \ Bitcoin's correlation with traditional risk-off dynamics, not just its upside.\n\
    \nFrom a financial-crime perspective, sharp price dislocations historically precede\
    \ elevated suspicious-activity volumes. When asset values compress rapidly, distressed\
    \ holders \u2014 including those who may have used crypto as a layering vehicle\
    \ \u2014 face pressure to liquidate, potentially generating transaction patterns\
    \ that warrant enhanced scrutiny under FATF Recommendation 16 and travel-rule\
    \ obligations applicable in Singapore (MAS Notice PSN02), the EU (TFR), and Australia\
