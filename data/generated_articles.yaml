    \ settlement agreements, a gap that has historically complicated asset recovery\
    \ and sanctions-related remediation efforts.\n\nIOMed was established under a\
    \ United Nations framework following years of advocacy for a multilateral mediation\
    \ convention analogous to the New York Convention on arbitral awards. For financial-crime\
    \ compliance professionals, the institutional architecture is consequential. When\
    \ a mediated settlement agreement between counterparties in different jurisdictions\
    \ carries enforceable treaty status, it creates a documented paper trail \u2014\
    \ parties, amounts, terms \u2014 that feeds directly into know-your-customer and\
    \ transaction-monitoring workflows. Regulators in signatory states may eventually\
