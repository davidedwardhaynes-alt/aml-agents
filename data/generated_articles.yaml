  full_article: "On 9 March 2026, ISDA, ASIFMA, and the Global Foreign Exchange Division\
    \ jointly submitted a letter to the Reserve Bank of India addressing reporting\
    \ obligations for INR-denominated FX derivatives \u2014 a signal that international\
    \ dealer banks and buy-side participants are seeking regulatory clarity before\
    \ compliance timelines harden into enforcement risk.\n\nThe backdrop is the RBI's\
    \ sustained effort to internationalise the rupee while retaining oversight of\
    \ offshore derivative activity referencing INR. India's Foreign Exchange Management\
    \ Act and the RBI's successive master directions on derivative products have extended\
    \ the regulatory perimeter incrementally, and the parallel growth of the offshore\
    \ non-deliverable forward market \u2014 concentrated in Singapore, London, and\
    \ Dubai \u2014 has made transaction reporting a persistent point of friction.\
    \ FATF Recommendation 2 on national AML/CFT co-ordination and Recommendation 15\
    \ on new financial products both implicitly require that regulatory frameworks\
    \ keep pace with the instruments being traded; fragmented or duplicative reporting\
    \ regimes between onshore and offshore jurisdictions complicate that objective.\n\
    \nFrom the perspective of compliance and financial-crime functions, the stakes\
    \ extend beyond operational burden. Where trade-reporting fields are inconsistently\
    \ defined across jurisdictions, transaction monitoring systems struggle to construct\
    \ coherent counterparty exposure pictures, undermining the typology work that\
    \ AML teams rely on to detect layering through derivatives. Dealers operating\
    \ under MAS Notice SFA04-N02 or the FCA's EMIR Refit obligations simultaneously\
    \ face the prospect of conflicting field-level requirements if RBI reporting mandates\
    \ diverge from established global data standards such as the CPMI-IOSCO harmonised\
    \ identifiers.\n\nFor Indian regulators, the letter reflects a familiar tension:\
    \ asserting jurisdictional reach over instruments that affect the rupee's stability\
    \ while avoiding a regulatory design that disadvantages onshore venues relative\
    \ to offshore alternatives. The RBI has previously calibrated this balance through\
    \ measures such as the IFSC derivatives framework at GIFT City, which offers a\
    \ controlled internationalisation pathway.\n\nThe resolution of these reporting\
    \ standards will have downstream consequences for correspondent banks and prime\
