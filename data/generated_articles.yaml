    \ tooling that intersects directly with FATF Recommendation 15 obligations on\
    \ virtual asset service providers to conduct technology risk assessments. A leaner\
    \ Foundation does not render Ethereum ungoverned, but it does concentrate development\
    \ decisions among a smaller set of funded contributors, a concentration that risk\
    \ and compliance teams will need to factor into their virtual asset exposure assessments.\n\
    \nFrom a supervisory standpoint, regulators across the Asia-Pacific region \u2014\
    \ including the Monetary Authority of Singapore under MAS Notice PSN02 and the\
