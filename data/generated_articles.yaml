    \ non-deliverable forward market \u2014 concentrated in Singapore, London, and\
    \ Dubai \u2014 has made transaction reporting a persistent point of friction.\
    \ FATF Recommendation 2 on national AML/CFT co-ordination and Recommendation 15\
