    \ UK-regulated market activity may narrow meaningfully over the medium term, a\
    \ variable that AML supervisors and MLROs conducting periodic risk assessments\
    \ of their institutional exposure to listed-company counterparties would be prudent\
    \ to incorporate into their 2026 and 2027 planning cycles."
