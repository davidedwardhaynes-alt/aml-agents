  full_article: "Lagos-based SmartComply formally entered the UK market on 26 May\
    \ 2026, positioning its AI-powered AML platform as a direct response to the de-risking\
    \ decisions that have progressively closed or degraded payment corridors between\
    \ Britain and sub-Saharan Africa over the past decade. For compliance officers\
    \ at UK-authorised payment institutions, the launch signals a growing vendor market\
    \ specifically designed to make the risk calculus on African correspondent relationships\
    \ commercially viable again.\n\nThe corridor-closure problem has structural roots.\
    \ Following the post-2012 wave of major bank fines and the subsequent tightening\
    \ of FATF Recommendation 13 guidance on correspondent banking, many UK firms applied\
    \ blanket elevated-risk designations to African jurisdictions rather than conducting\
    \ the granular, country-by-country and customer-segment analysis that the Joint\
    \ Money Laundering Steering Group's guidance explicitly requires. The FCA's own\
    \ supervisory work under its Payment Services and Electronic Money approach document\
    \ has repeatedly flagged inadequate customer risk assessment as a recurring weakness,\
    \ yet the compliance cost of building bespoke due-diligence frameworks for markets\
    \ with fragmented data environments remained prohibitive for mid-tier payment\
    \ firms.\n\nSmartComply's proposition rests on the premise that AI-assisted transaction\
    \ monitoring and entity resolution\u2014drawing on local registry data, mobile\
    \ money infrastructure signals, and regional sanctions lists\u2014can lower that\
    \ cost sufficiently to shift the risk-reward calculation. That claim will face\
    \ immediate scrutiny. UK firms remain bound by the Money Laundering Regulations\
    \ 2017, which require that any automated system used for customer due diligence\
    \ and ongoing monitoring is subject to human oversight and documented validation.\
    \ MLROs will need to satisfy themselves that SmartComply's models have been trained\
    \ and tested against sufficiently representative African financial-crime typologies,\
    \ and that the system's outputs are explainable enough to withstand FCA supervisory\
    \ review.\n\nThere is also a reciprocal regulatory dimension. Several target markets\u2014\
    Nigeria, Ghana, Kenya\u2014operate their own AML frameworks aligned, to varying\
    \ degrees, with FATF standards; Nigeria's SCUML and the Central Bank's AML/CFT\
    \ regulations impose obligations on local counterparties that a UK firm's vendor\
    \ cannot unilaterally satisfy on their behalf. A platform that genuinely bridges\
