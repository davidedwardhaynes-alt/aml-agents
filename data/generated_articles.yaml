    \ ensure that temporary or provisional status does not inadvertently create an\
    \ account that transacts before full identification documentation is in place,\
    \ a scenario that could engage obligations under FATF Recommendation 10 on customer\
    \ due diligence and the corresponding domestic rules under PMLA's Rule 9 framework.\n\
    \nFrom a supervisory perspective, SEBI's willingness to issue \"removal of difficulties\"\
    \ orders reflects its broader posture of reducing structural friction for foreign\
    \ capital without compromising identification standards \u2014 consistent with\
    \ the regulator's 2023 amendments tightening disclosure norms for high-risk FPI\
    \ categories, particularly those with concentrated exposures or opaque ownership\
    \ structures.\n\nThe longer-term watch point is whether the PAN allotment fix\
    \ is accompanied by enhanced data-sharing protocols between SEBI and the income\
    \ tax authorities, which would reduce the underlying sequencing mismatch rather\
    \ than simply providing regulatory dispensation around it."
