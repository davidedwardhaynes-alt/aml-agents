    \ been an informal, poorly documented, and legally ambiguous area of customer\
    \ account management.\n\nThe initiative arrives against a backdrop of longstanding\
    \ regulatory pressure on firms to treat vulnerable customers as a distinct operational\
    \ category rather than an edge case. The FCA's Consumer Duty, in force since July\
    \ 2023, obliges firms to deliver good outcomes for all retail customers including\
    \ those with characteristics of vulnerability, and its accompanying guidance on\
    \ the fair treatment of vulnerable customers explicitly identifies those with\
    \ limited cognitive capacity as a priority cohort. Yet translating that principle\
    \ into payment-system architecture has remained largely unsolved; most firms default\
    \ to either full third-party mandate \u2014 which removes autonomy \u2014 or no\
