  full_article: "A Swiss popular initiative to compel the Swiss National Bank to hold\
    \ bitcoin as part of its official foreign-exchange reserves has failed to gather\
    \ the 100,000 signatures required under Article 139 of the Federal Constitution,\
    \ foreclosing at least the near-term prospect of a G10 central bank formally integrating\
    \ a crypto-asset into its reserve portfolio. The shortfall is procedurally definitive:\
    \ without certified signatures, the initiative cannot proceed to a federal vote,\
    \ removing what would have been a significant stress test for Switzerland's existing\
    \ regulatory perimeter around digital assets.\n\nThe initiative, championed by\
    \ a coalition of bitcoin advocates, drew its intellectual lineage from Senator\
    \ Cynthia Lummis's proposed U.S. Strategic Bitcoin Reserve legislation and broader\
    \ arguments that hard-capped digital assets offer an inflation hedge analogous\
    \ to gold. Switzerland already holds gold equivalent to roughly eight percent\
    \ of its total reserves, and proponents argued that a modest bitcoin allocation\
    \ would be consistent with the SNB's mandate to invest reserves in liquid, high-quality\
    \ instruments \u2014 a contention the SNB itself publicly rejected on grounds\
    \ of excessive volatility and insufficient market depth relative to the institution's\
    \ balance-sheet scale.\n\nFor compliance professionals and supervisors, the failure\
    \ carries several implications. First, it temporarily reduces pressure on the\
    \ Financial Market Supervisory Authority (FINMA) and the SNB to articulate formal\
    \ reserve-eligibility criteria for digital assets, a question that intersects\
    \ with FATF Recommendation 15 obligations around virtual asset exposure at systemically\
    \ important institutions. Second, it leaves Switzerland's existing framework \u2014\
    \ anchored in the DLT Act of 2021 and FINMA's established licensing categories\
    \ \u2014 as the operative boundary, without the complicating variable of sovereign\
    \ bitcoin ownership. Third, asset managers and banks operating under FINMA's Anti-Money\
    \ Laundering Ordinance who had monitored the initiative for signals about legitimation\
    \ of bitcoin-denominated collateral and custody arrangements will need to look\
    \ elsewhere for regulatory direction.\n\nThe episode nonetheless illustrates that\
    \ institutional appetite for bitcoin reserve arguments has migrated well beyond\
    \ fringe discourse; the initiative reached a meaningful portion of the signature\
    \ threshold. Jurisdictions with lower direct-democracy barriers \u2014 or executive-branch\
    \ discretion over reserve composition, as in El Salvador or potentially the United\
    \ States \u2014 remain the more credible near-term laboratories. Swiss regulators\
    \ will be watching those experiments carefully before any domestic conversation\
    \ restarts."
