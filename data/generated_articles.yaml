    \ Authority have separately consulted on conduct and payment-system rules. The\
    \ Bank's intervention addresses the systemic tier\u2014issuers whose scale or\
    \ interconnectedness could threaten financial stability\u2014a designation conceptually\
    \ aligned with FATF Recommendation 15's call for jurisdictions to subject virtual\
    \ asset service providers to risk-proportionate oversight, though the Bank's framework\
    \ operates on prudential rather than purely AML grounds.\n\nFor MLROs and heads\
