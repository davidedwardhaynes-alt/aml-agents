    \ whether a transaction price is consistent with market rates, a due-diligence\
    \ step that the FATF's Recommendation 10 on customer due diligence and its guidance\
    \ on trade-based money laundering both require financial institutions to perform.\
    \ Faster, higher-frequency valuation could sharpen anomaly-detection models that\
    \ flag off-market pricing.\n\nFrom an operational-risk standpoint, however, MLROs\
    \ and risk officers should note that quantum-enhanced systems introduce new model-validation\
    \ questions. MAS's Guidelines on Model Risk Management, issued in 2023, set expectations\
