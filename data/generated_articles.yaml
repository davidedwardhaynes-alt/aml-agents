    \ novel typologies not reflected in training data. Institutions that reduce headcount\
    \ aggressively may find themselves relying on models whose explainability limitations\
    \ conflict with the documentation expectations embedded in the Joint Money Laundering\
    \ Steering Group's guidance.\n\nThwaite's caveat\u2014that overall headcount need\
    \ not fall\u2014points toward role transformation rather than elimination, a thesis\
    \ consistent with how AI has reshaped other knowledge-intensive functions. Whether\
    \ that transition is managed carefully enough to preserve the institutional expertise\
    \ that effective AML programmes depend on will be a test that supervisors, and\
    \ eventually enforcement records, will ultimately grade."
