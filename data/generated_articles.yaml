    \ Article 23 of the Basic Law. Each legislative iteration has prompted fresh reviews\
    \ by financial institutions conducting country-risk and business-relationship\
    \ due diligence under frameworks including FATF Recommendation 1 (risk-based approach),\
    \ MAS Notice 626 on correspondent banking, and internal policies anchored to FATF's\
