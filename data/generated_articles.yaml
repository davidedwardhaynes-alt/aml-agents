    \ updates that adverse-media and regulatory-action profile. Depository participants\
    \ holding securities in accounts linked to the named individual must assess whether\
    \ restraint or attachment orders accompany the recovery action. Financial intelligence\
    \ units may also treat the published certificate as relevant typology input when\
    \ reviewing suspicious transaction reports involving options-segment activity.\n\
    \nThe persistence of illiquid-options manipulation cases on SEBI's enforcement\
    \ docket \u2014 years after the initial crackdown \u2014 suggests that deterrence\
    \ through adjudication alone has proven incomplete. The shift toward active recovery\
    \ proceedings, which can include attachment of bank accounts and securities under\
    \ the Securities and Exchange Board of India (Recovery of Amounts) Regulations,\
    \ 2013, indicates the regulator is testing whether compelled asset recovery produces\
    \ a more durable behavioural response than penalty orders that remain unpaid.\
    \ Whether that escalation meaningfully reduces recidivism in this segment will\
    \ be watched closely by both market participants and FATF evaluators assessing\
    \ India's technical compliance ahead of its next mutual evaluation cycle."
