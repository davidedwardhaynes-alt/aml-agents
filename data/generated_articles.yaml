  full_article: "Visa's dedicated Scam Disruption unit has identified more than $2.6\
    \ billion in fraud attempts globally in just over two years of operation, a figure\
    \ that underscores the scale at which authorised push payment and card-linked\
    \ scams continue to circulate through the international payments infrastructure\
    \ despite tightening regulatory pressure on financial institutions to intervene\
    \ earlier in the transaction chain.\n\nThe unit's formation coincides with a broader\
    \ industry pivot toward proactive disruption rather than post-event reporting.\
    \ FATF Recommendation 16 \u2014 the so-called travel rule \u2014 has long obliged\
    \ financial institutions to transmit originator and beneficiary information alongside\
    \ wire transfers, yet gaps in implementation, particularly across non-bank payment\
    \ service providers, have allowed mule networks to route proceeds with relative\
    \ impunity. Jurisdictions including Singapore, under MAS Notice PSN02, and Australia,\
    \ under the AML/CTF Act 2006, have progressively expanded transaction monitoring\
    \ obligations to cover stored-value facilities and digital payment tokens, creating\
    \ a compliance architecture that private-sector disruption units can increasingly\
    \ plug into.\n\nFor MLROs and heads of financial crime compliance, the Visa data\
    \ point carries operational weight in two directions. First, it reinforces the\
    \ case for investing in network-level intelligence sharing arrangements \u2014\
    \ mechanisms that Visa, as an omnipresent card scheme, is uniquely positioned\
    \ to operate across member institutions. Second, it raises a governance question:\
    \ when a card scheme identifies a fraud pattern touching a member bank's customers,\
    \ what disclosure obligations flow back to that institution, and how should those\
    \ feeds be integrated into the institution's own suspicious transaction reporting\
    \ under frameworks such as Hong Kong's OSCO or the UK Proceeds of Crime Act? The\
    \ answer is not yet standardised.\n\nFor supervisors, the statistic also offers\
    \ a calibration point. Authorities designing mandatory reimbursement regimes \u2014\
    \ as the UK's Payment Systems Regulator did with its APP fraud rules effective\
    \ October 2024 \u2014 will need to assess whether private-sector disruption metrics\
    \ translate into actual liability reduction for consumers, or primarily serve\
    \ as a deterrent signal without commensurate recovery rates.\n\nAs payment networks\
    \ accumulate richer behavioural and counterparty data, the boundary between scheme-level\
    \ fraud controls and regulated AML surveillance will continue to blur. Regulatory\
    \ clarity on how network-generated intelligence interacts with statutory STR obligations\
    \ will be an increasingly necessary piece of the global financial crime architecture."
