    \ FCA-authorised intermediary sitting upstream of credit-union balance sheets\
    \ \u2014 is common in the community finance sector, where fintech distribution\
    \ rails have been used to extend the reach of mutual lenders without requiring\
    \ the unions themselves to build acquisition infrastructure. The model brings\
    \ efficiency gains but also concentrates operational and reputational risk at\
    \ the intermediary layer, as the present case illustrates.\n\nFor compliance and\
    \ AML functions, the administration creates specific obligations that warrant\
    \ immediate attention. Under the FCA's Senior Managers and Certification Regime,\
    \ responsibility for financial crime controls does not lapse upon insolvency;\
    \ joint administrators assume the regulated firm's compliance posture and must\
    \ ensure that transaction monitoring, suspicious activity reporting obligations\
    \ under the Proceeds of Crime Act 2002, and customer due diligence records remain\
    \ accessible and intact. Administrators at Interpath Advisory will need to satisfy\
    \ themselves that any live SAR obligations are discharged and that customer data\
    \ is preserved in a manner consistent with both regulatory requirements and the\
    \ UK GDPR framework.\n\nFor MCB and CCB, the practical disruption should be contained:\
    \ the FCA has confirmed that loan and savings agreements with both credit unions\
    \ are unaffected, and neither institution entered administration. Their primary\
    \ compliance risk is reputational contagion and a potential uptick in customer\
    \ vulnerability \u2014 a factor their own MLRO functions should factor into ongoing\
    \ customer risk assessments, particularly where borrowers experiencing financial\
    \ stress may become targets for fraud or proceeds-of-crime activity.\n\nThe episode\
    \ is unlikely to be isolated. Rising funding costs and compressed margins have\
    \ placed several non-bank consumer lenders under strain, and the community finance\
    \ sector's dependence on third-party distribution intermediaries means that supervisors\
    \ should expect further stress events. The FCA's Consumer Duty, now fully in force,\
    \ will sharpen scrutiny of how administrators prioritise consumer outcomes over\
    \ creditor recovery in any wind-down scenario."
