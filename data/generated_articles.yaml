  full_article: "The International Swaps and Derivatives Association published on\
    \ 12 May 2026 a landscape paper mapping the EU's post-EMIR 3.0 clearing environment,\
    \ signalling that industry bodies are now moving from legislative interpretation\
    \ to operational stock-taking \u2014 a shift with direct consequences for firms\
    \ managing counterparty exposure and associated financial crime controls across\
    \ EU-linked derivatives books.\n\nEMIR 3.0, which entered into force following\
    \ protracted trilogue negotiations, introduced the active account requirement\
    \ compelling EU financial counterparties to hold operationally active accounts\
    \ at EU central counterparties for specified product categories, most notably\
    \ euro- and zloty-denominated interest rate swaps. The measure was explicitly\
    \ designed to reduce EU market dependency on LCH Ltd in London, a geopolitical\
    \ objective that intersects uneasily with the efficiency logic that has historically\
    \ concentrated clearing in deep, liquid pools. ISDA has consistently flagged the\
    \ liquidity fragmentation risks inherent in mandated account splitting.\n\nFor\
    \ MLROs and financial crime compliance functions, the ISDA paper arrives at a\
    \ moment when the structural reshaping of clearing flows creates tangible monitoring\
    \ challenges. Fragmented clearing across multiple CCPs \u2014 EU27-domiciled alongside\
    \ third-country recognised CCPs \u2014 multiplies the data streams against which\
    \ transaction monitoring typologies must be calibrated. Where clearing migration\
    \ relocates notional volumes to less established venues, compliance teams will\
    \ need to reassess whether their current surveillance parameters remain adequately\
    \ sensitive to layering patterns or fictitious trading activity that can be obscured\
    \ within legitimate hedging flows. FATF Recommendation 10 and, for MAS-regulated\
    \ entities, MAS Notice SFA04-N02 both require that customer due diligence and\
    \ transaction monitoring remain proportionate to the risk profile of the business\
    \ relationship, including the instruments and venues involved.\n\nFor EU supervisors,\
    \ including ESMA and national competent authorities, the paper provides a reference\
    \ point for calibrating supervisory expectations around CCP concentration risk,\
    \ but also serves as a reminder that market structure decisions carry downstream\
    \ AML implications that prudential and conduct frameworks do not automatically\
    \ address.\n\nThe more consequential question in the medium term is whether the\
    \ active account requirement achieves sufficient liquidity depth at EU CCPs to\
    \ make the fragmentation cost acceptable. If clearing volumes remain thin at mandated\
    \ venues, the price discovery distortions that follow could themselves create\
    \ conditions that financial crime actors exploit \u2014 a second-order risk that\
    \ neither EMIR 3.0's drafters nor, apparently, the ISDA paper's scope fully addresses."
