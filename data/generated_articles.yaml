    \ implications for how counterparty credit risk is assessed and managed across\
    \ institutions that rely on SMF facilities \u2014 with downstream consequences\
    \ for liquidity risk frameworks and, less obviously, financial crime controls.\n\
    \nThe SMF governs the terms on which eligible counterparties access central bank\
    \ liquidity, including through the Indexed Long-Term Repo, the Discount Window\
    \ Facility, and contingency lending operations. Collateral eligibility criteria\
    \ within this framework determine which assets banks and building societies can\
    \ pledge against central bank funding. Changes to those criteria \u2014 whether\
    \ tightening haircuts, adjusting issuer or instrument eligibility, or altering\
    \ the treatment of pooled collateral \u2014 affect the composition of liquidity\
    \ buffers across the sector and, by extension, the asset quality assumptions underpinning\
    \ firms' internal liquidity adequacy assessments.\n\nFrom a financial crime compliance\
    \ perspective, the relevance is less immediate but not negligible. Where collateral\
    \ eligibility changes affect the viability of certain structured instruments,\
    \ securitisation vehicles, or cross-border asset classes, compliance and treasury\
    \ functions should consider whether any affected instruments carry elevated beneficial\
    \ ownership opacity or jurisdiction risk. FATF Recommendation 24 and the UK's\
    \ own beneficial ownership registers impose transparency requirements, but structured\
    \ credit instruments can still obscure ultimate economic exposure. MLROs whose\
    \ firms use or originate such assets within collateral pools should satisfy themselves\
