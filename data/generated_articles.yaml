  full_article: "Kalshi's decision to offer crypto perpetual contracts has reignited\
    \ a long-running jurisdictional dispute between the Commodity Futures Trading\
    \ Commission and the Securities and Exchange Commission over the precise classification\
    \ of instruments that carry characteristics of both futures and swaps \u2014 a\
    \ distinction that carries direct consequences for which AML and market-integrity\
    \ obligations apply.\n\nThe classification question is not new. The Dodd-Frank\
    \ Act of 2010 drew a formal boundary between futures, regulated under the Commodity\
    \ Exchange Act and subject to CFTC oversight, and swaps, which attracted a separate\
    \ registration and reporting regime including swap dealer obligations and CFTC\
    \ Part 45 real-time reporting rules. Perpetual contracts \u2014 which lack an\
    \ expiry date and use a funding-rate mechanism to anchor prices to spot markets\
    \ \u2014 were designed for offshore venues precisely because they sat awkwardly\
    \ across that boundary. Kalshi, operating as a designated contract market, has\
    \ now brought that ambiguity onshore.\n\nFor compliance officers, the classification\
    \ outcome is not merely academic. If perpetuals are deemed swaps, dealing entities\
    \ face swap dealer registration thresholds, variation margin requirements, and\
    \ enhanced counterparty-identity obligations. If classified as futures, the framework\
    \ shifts to FCM registration and CFTC-supervised AML programmes under the Bank\
    \ Secrecy Act, with FinCEN's rules requiring customer identification, suspicious\
    \ activity reporting, and transaction monitoring calibrated to exchange-traded\
    \ derivatives. Either path carries material onboarding and surveillance obligations,\
    \ but the operational architecture differs substantially.\n\nThe FATF dimension\
    \ adds a cross-border layer. Recommendation 15 and its updated guidance on virtual\
    \ assets require jurisdictions to ensure that virtual asset service providers\
    \ \u2014 and, implicitly, derivatives platforms referencing crypto underlyings\
    \ \u2014 are licensed and subject to commensurate AML/CFT controls. An unresolved\
    \ domestic classification creates gaps that foreign regulators and FATF mutual\
    \ evaluation teams will scrutinise when assessing the United States' technical\
    \ compliance and effectiveness ratings in its next review cycle.\n\nThe likely\
    \ resolution will depend on whether the CFTC treats the funding-rate mechanism\
    \ as constituting a notional principal contract, which would push the instrument\
    \ toward swap characterisation. Until that determination is made, compliance teams\
    \ at firms accessing Kalshi's product should document their own legal-risk analysis,\
    \ apply the more stringent of the two frameworks as a conservative baseline, and\
    \ monitor CFTC staff guidance closely. Regulatory ambiguity at the product level\
    \ is itself a compliance risk that supervisors will expect to see actively managed."
