    \ development that, if adopted at scale, would materially expand the perimeter\
    \ of bank-grade assets operating on distributed ledger infrastructure and raise\
    \ immediate questions for AML/CFT programme design across participating institutions.\n\
    \nTokenized deposits are distinct from stablecoins in a legally significant way:\
    \ they remain claims on a licensed deposit-taking institution, subject to existing\
    \ prudential regulation and deposit insurance frameworks, rather than representing\
    \ a new liability issued by a non-bank entity. This distinction has been central\
    \ to regulators' thinking since the Basel Committee's 2022 consultation on cryptoasset\
    \ exposures and is reflected in the careful language of the Financial Stability\
    \ Board's 2023 recommendations on global stablecoin arrangements. In the Asia-Pacific\
