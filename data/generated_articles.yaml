  full_article: "Adyen's agreement to acquire usage-based billing specialist Orb for\
    \ US$335 million, funded entirely from existing cash reserves, extends the Dutch\
    \ payments platform's footprint beyond transaction processing into the broader\
    \ revenue-management infrastructure that enterprise clients use to calculate,\
    \ invoice, and reconcile complex commercial arrangements. For compliance officers,\
    \ the integration of billing logic directly into a regulated payments platform\
    \ raises immediate questions about data flows, customer due diligence scope, and\
    \ whether consolidated billing and settlement functions will alter existing transaction\
    \ monitoring architectures.\n\nThe acquisition sits within a well-documented strategic\
    \ pattern among global payment service providers seeking to deepen wallet share\
    \ with large enterprise merchants. Adyen's model has historically centred on a\
    \ unified platform that collapses acquiring, issuing, and treasury into a single\
    \ stack. Adding upstream billing\u2014where revenue recognition and invoicing\
    \ occur before a payment instruction is generated\u2014means Adyen will now sit\
    \ closer to the commercial terms of underlying business relationships, not merely\
    \ their financial settlement. That proximity has regulatory texture: under FATF\
    \ Recommendation 10 and analogous frameworks such as MAS Notice PSN01 and the\
    \ EU's revised Transfer of Funds Regulation, understanding the business purpose\
