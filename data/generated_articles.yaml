  full_article: "Starling Bank has deployed a motion-detection control within its\
    \ mobile application that automatically locks account access when the device registers\
    \ movement patterns consistent with a snatch theft, a direct operational response\
    \ to what the City of London Police and Metropolitan Police have both identified\
    \ as a material and rising fraud vector in urban centres across the United Kingdom.\n\
    \nThe measure arrives against a regulatory backdrop in which the Payment Systems\
    \ Regulator's mandatory reimbursement framework for authorised push payment fraud\u2014\
    effective October 2023\u2014has sharpened incentive structures for retail payment\
    \ firms to invest in fraud prevention upstream rather than absorb reimbursement\
    \ costs downstream. While snatch theft resulting in unauthorised account access\
    \ technically falls under unauthorised fraud provisions of the Payment Services\
    \ Regulations 2017, the blurring of device-level compromise and social-engineering\
    \ elements in such incidents has complicated liability attribution for firms and\
    \ customers alike. The FCA's Consumer Duty, fully in force since July 2023, adds\
    \ a further obligation for firms to take reasonable steps to protect retail customers\
    \ from foreseeable harm\u2014a standard that physical-world fraud scenarios now\
    \ plainly engage.\n\nFor MLROs and fraud teams, the Starling initiative illustrates\
    \ a convergence of financial crime risk typologies that traditional transaction-monitoring\
    \ frameworks handle imperfectly. A stolen, unlocked device provides an actor with\
    \ authenticated access that bypasses behavioural biometrics and device-fingerprinting\
    \ controls calibrated for remote account takeover. Once inside, fund transfers\
    \ may appear entirely consistent with the legitimate account holder's historical\
    \ patterns, reducing the signal-to-noise ratio for any automated suspicious activity\
    \ detection. Compliance functions at peer institutions should consider whether\
    \ their fraud risk assessments\u2014required under the Money Laundering, Terrorist\
    \ Financing and Transfer of Funds Regulations 2017 and informed by FATF Recommendation\
