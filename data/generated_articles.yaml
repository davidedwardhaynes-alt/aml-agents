    \ diligence framework. The persistent de-risking problem in correspondent banking\
    \ \u2014 documented in successive FATF typologies reports \u2014 is as much a\
    \ compliance cost and liability question as a commercial one. Any successor framework\
    \ that seeks to expand access will need to resolve how originator and beneficiary\
