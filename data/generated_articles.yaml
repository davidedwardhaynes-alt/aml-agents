    \ the baseline obligations on credit firms around fair value, consumer understanding,\
    \ and vulnerability. In parallel, HM Treasury's long-anticipated review of the\
    \ Consumer Credit Act 1974 \u2014 a statute widely criticised as ill-suited to\
