    \ tools. The UK's Financial Conduct Authority has, in parallel, encouraged proportionate\
    \ adoption of RegTech under its own innovation frameworks, while stopping well\
    \ short of prescribing staffing ratios. That regulatory space has given institutions\
    \ latitude to restructure compliance operations without immediate supervisory\
    \ friction.\n\nFor MLROs and heads of financial crime compliance, the workforce\
    \ implications are more nuanced than headline job-loss figures suggest. Automation\
    \ of first-line alert disposition does not extinguish the Senior Managers and\
    \ Certification Regime accountability that sits with the MLRO personally, nor\
    \ does it reduce the legal exposure attached to Suspicious Activity Report decisions\
    \ under the Proceeds of Crime Act 2002. If anything, shrinking analyst pools increase\
    \ the concentration of judgement risk at the point where human review remains\
    \ mandatory. Governance frameworks will need to articulate clearly where model\
    \ outputs end and accountable human decision-making begins\u2014a question the\
