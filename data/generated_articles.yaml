  full_article: "The Financial Conduct Authority published proposals on 9 June 2026\
    \ to liberalise mortgage affordability rules, seeking to extend access to first-time\
    \ buyers, self-employed borrowers, and older homeowners who currently fall outside\
    \ conventional lending criteria. The changes would permit lenders to apply more\
    \ holistic, circumstance-specific assessments rather than the standardised income\
    \ and repayment templates that have defined responsible lending practice since\
    \ the Mortgage Market Review rules took effect in 2014.\n\nThe MMR framework was\
    \ itself a corrective response to pre-crisis origination practices that prioritised\
    \ volume over sustainability. Embedded in the FCA's Mortgage Conduct of Business\
    \ sourcebook, those rules required lenders to stress-test affordability against\
    \ rate rises and apply consistent income verification standards. The Consumer\
    \ Duty, which came into full force in July 2023, subsequently elevated the standard\
    \ further, requiring firms to demonstrate that products deliver good outcomes\
    \ rather than merely meet procedural thresholds. The new proposals sit in acknowledged\
    \ tension with both legacies: loosening prescriptive criteria while asserting\
    \ that flexibility, properly applied, is itself consistent with good outcomes\
    \ under the Duty.\n\nFor mortgage lenders and their compliance functions, the\
    \ proposals shift the locus of risk. Greater discretion in underwriting demands\
    \ more robust internal governance frameworks, model risk controls, and audit trails\
    \ demonstrating that individual decisions reflect genuine affordability analysis\
    \ rather than commercial pressure. Firms will need to revisit their credit policies\
    \ and ensure that any expanded use of variable-income evidence or non-standard\
    \ repayment structures is supported by documented methodology, not ad hoc judgment.\n\
    \nFrom a financial crime perspective, the reforms carry secondary but non-trivial\
    \ implications. Enhanced flexibility around income verification for self-employed\
    \ borrowers and the elderly will require firms to maintain proportionate source-of-funds\
    \ due diligence. FATF Recommendation 10 requires ongoing customer due diligence\
    \ calibrated to risk, and the FCA's own financial crime guidance makes clear that\
    \ product-level vulnerability\u2014including complexity and opacity of income\
    \ streams\u2014should inform customer risk ratings. Supervisors will watch whether\
    \ broadened underwriting discretion creates gaps that could be exploited for mortgage\
    \ fraud or proceeds placement.\n\nThe FCA's direction aligns with the broader\
    \ UK government push to stimulate homeownership and long-term economic growth,\
    \ but the regulator will face continued scrutiny as to whether relaxed affordability\
    \ standards, even outcome-focused ones, adequately guard against the systemic\
    \ arrears risk that a prolonged rate environment could expose."
