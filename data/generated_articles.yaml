    \ firm that represents itself as capable of real-time payments participation while\
    \ retaining manual screening steps may be mischaracterising its residual risk\
    \ exposure to its board and to regulators alike. MAS Notice MAS 626 and equivalent\
    \ instruments in other jurisdictions require that transaction monitoring systems\
    \ be commensurate with the bank's risk profile; a risk profile that includes real-time\
    \ payment rails but monitoring tools that cannot match their velocity is an evident\
    \ mismatch.\n\nAs domestic fast-payment schemes continue to expand \u2014 and\
    \ cross-border linkages such as Project Nexus advance toward operational readiness\
    \ \u2014 the compliance cost of deferred automation will only increase. Banks\
