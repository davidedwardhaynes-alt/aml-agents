    \ currency exchange registration requirements have both signalled, through recent\
    \ supervisory guidance, that market integrity risk in crypto should be assessed\
    \ dynamically rather than against static thresholds. An on-chain signal suggesting\
    \ buyer exhaustion is not, on its own, a compliance event \u2014 but it is precisely\
    \ the kind of contextual market intelligence that robust risk appetite frameworks\
    \ should be ingesting. As the gap between holder conviction and new demand widens,\
    \ compliance teams that treat crypto market structure data as peripheral rather\
    \ than integral to their monitoring programmes may find their coverage assumptions\
    \ lag reality by the time conditions normalise."
