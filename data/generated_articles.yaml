    \ legal and compliance functions will have assessed how Canton's privacy model\
    \ interacts with suspicious transaction reporting obligations and whether smart-contract-executed\
    \ transfers satisfy the record-keeping standards required under instruments such\
    \ as the UK's Proceeds of Crime Act and Hong Kong's OSCO. That due diligence,\
    \ conducted at scale, may itself produce the de facto compliance standards that\
    \ smaller participants will subsequently follow.\n\nFor AML supervisors, the more\
    \ pressing question is jurisdictional coherence. Onchain settlement that achieves\
    \ atomic finality across multiple time zones compresses the window available for\
    \ pre-settlement screening and correspondent-bank-style controls. Regulators including\
    \ the BIS, IOSCO, and individual central banks have flagged this compression risk\
    \ in consultation papers on DLT settlement finality; Canton's growth will test\
    \ whether existing regulatory expectations are operationally achievable at institutional\
    \ throughput.\n\nIf this funding accelerates commercial deployment through 2026\
    \ and into 2027, financial intelligence units and supervisors will need to engage\
    \ directly with Digital Asset's governance documentation and the Canton Network's\
    \ node operator requirements before adoption becomes sufficiently widespread that\
    \ retrospective rule-setting is the only option remaining."
