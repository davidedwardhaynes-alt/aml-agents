    \ rates across dealer and non-dealer participants \u2014 giving compliance officers\
    \ a concrete benchmark against which to assess their institutions' progress and\
    \ counterparty exposure profiles.\n\nThe clearing mandate's trajectory dates to\
    \ December 2023, when the SEC finalised rules requiring eligible secondary market\
    \ transactions in US Treasury securities, including repo and reverse repo, to\
    \ be submitted to a covered clearing agency. The phased implementation timeline\
    \ placed cash transactions first, with repo obligations following. For financial\
    \ crime compliance professionals, the structural shift matters because centralised\
    \ clearing concentrates settlement risk, netting exposure, and \u2014 critically\
    \ \u2014 transaction visibility in ways that alter both the typology landscape\
    \ and the data available for suspicious transaction monitoring under frameworks\
    \ such as the Bank Secrecy Act and FinCEN's implementing rules.\n\nFor MLROs at\
