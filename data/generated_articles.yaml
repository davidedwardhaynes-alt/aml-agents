    \ criteria will feed through to firms' LCR calculations and their ILAAP submissions.\
    \ Treasurers and chief risk officers will need to map revised eligibility rules\
    \ against current pool compositions and model any funding gap that emerges.\n\n\
    The timing, mid-year against a backdrop of sustained gilt market volatility and\
