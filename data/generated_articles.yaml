  full_article: "Hong Kong's ambition to consolidate its position as a tier-one artificial\
    \ intelligence financial hub carries an infrastructure constraint that regulators\
    \ and compliance functions have not yet fully priced in: the city's power grid\
    \ may not be adequate to sustain the compute density that serious AI deployment\
    \ demands. That gap has direct implications for the operational resilience of\
    \ financial institutions running AI-dependent transaction monitoring, adverse\
    \ media screening, and real-time sanctions matching.\n\nThe Monetary Authority\
    \ of Singapore's Technology Risk Management Guidelines and Hong Kong's own HKMA\
    \ Supervisory Policy Manual TM-G-1 both require institutions to demonstrate that\
    \ critical systems maintain defined recovery time and recovery point objectives.\
    \ Where AI models underpin AML detection engines \u2014 increasingly the case\
    \ as firms migrate from legacy rules-based systems \u2014 power instability is\
    \ not merely an operational inconvenience; it is a compliance risk that touches\
    \ directly on a firm's ability to satisfy continuous monitoring obligations under\
    \ the Anti-Money Laundering and Counter-Terrorist Financing Ordinance and FATF\
    \ Recommendation 10's ongoing due diligence requirements.\n\nThe paradox identified\
    \ in the SCMP analysis \u2014 that the most AI-competitive jurisdictions often\
    \ face the sharpest energy constraints \u2014 has a financial-crime dimension\
    \ that deserves attention. Firms that offshore compute workloads to data centres\
    \ in lower-cost, energy-abundant jurisdictions to compensate for Hong Kong's grid\
    \ limitations introduce cross-border data residency questions and third-party\
    \ risk concentrations that supervisors are already scrutinising under MAS Notice\
    \ 655 and equivalent HKMA outsourcing guidance. The compliance architecture solving\
    \ one infrastructure problem may inadvertently create another.\n\nFrom a supervisory\
    \ standpoint, the Securities and Futures Commission and HKMA have signalled through\
    \ successive circulars on responsible AI adoption that model governance and explainability\
    \ are priorities. Those expectations assume the underlying infrastructure is reliable.\
    \ An institution whose transaction monitoring system degrades or fails during\
    \ a power event, even briefly, faces potential regulatory exposure if that window\
    \ coincides with a suspicious transaction that goes unflagged.\n\nHong Kong's\
    \ ranking third on the Global AI Competitiveness Index reflects genuine strengths\
    \ in data access, legal infrastructure, and financial talent. Whether that ranking\
    \ is durable will depend partly on how quickly energy capacity is treated as a\
    \ precondition for regulated AI deployment rather than a secondary infrastructure\
    \ question left to property developers and utilities alone."
