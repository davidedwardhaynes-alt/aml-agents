    \ MAS Notice 626 imposes customer due diligence obligations on fund managers with\
    \ exposure to such structures, while in Australia the AML/CTF Act 2006 reaches\
    \ certain designated services that touch private lending arrangements. The FSB\
    \ report implicitly acknowledges that this patchwork coverage creates arbitrage\
