    \ introduces a credit-provider responsibility for supplier default that will require\
    \ careful product structuring from BNPL firms unaccustomed to contingent balance-sheet\
    \ exposures.\n\nThe regime's proportionality provisions will face their first\
    \ real test in supervisory practice. Whether the FCA treats BNPL affordability\
    \ failures as conduct breaches alone, or pursues a broader consumer harm thesis\
    \ that touches financial crime controls, will become clearer once the first cohort\
    \ of firms seeks authorisation."
