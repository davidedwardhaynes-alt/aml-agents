    \ transaction monitoring calibration under frameworks such as Hong Kong's AMLO\
    \ and the EU's MiCA, both of which embed risk-sensitive obligations.\n\nThe broader\
    \ trajectory is instructive. As tokenised real-world assets mature from spot holdings\
