    \ payment rails. Regulators in Singapore\u2014where MAS Notice PSN02 already governs\
    \ single-currency stablecoin issuers\u2014and the European Union under MiCA provide\
    \ reference points, but the Bank's systemic threshold introduces a distinctly\
    \ macroprudential layer that neither framework fully replicates. How the Bank\
