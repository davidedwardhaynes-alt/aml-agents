    \ its consumer protection dimension. A market characterised by fragmentation and\
    \ \"brittleness\" is one with uneven due diligence standards, inconsistent data-sharing\
    \ practices, and variable governance \u2014 all conditions that financial crime\
    \ actors can exploit. The FCA has previously noted in its Financial Crime Guide\
    \ that consumer credit products, particularly high-cost short-term credit and\
    \ buy-now-pay-later instruments, present meaningful money-laundering and fraud\
    \ vectors. A more cohesive market structure, if the reform agenda delivers, would\
