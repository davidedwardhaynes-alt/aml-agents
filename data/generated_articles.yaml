    \ unhosted wallet activity \u2014 each presenting distinct transaction-monitoring\
    \ challenges under frameworks such as the US Bank Secrecy Act, Australia's AML/CTF\
    \ Act 2006, or Hong Kong's AMLA. Firms that calibrated their inherent-risk ratings\
    \ or typology libraries on the assumption of continued ETF-led institutionalisation\
    \ should treat this data point as a prompt to revisit those models.\n\nFrom a\
    \ market-integrity perspective, sustained AUM stagnation may also reflect redemption\
