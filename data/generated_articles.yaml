    \ laundering obligations \u2014 as a material drag on productive capacity, with\
    \ implications for how regulators and legislators may calibrate the cost-benefit\
    \ framing of forthcoming AML/CTF reforms.\n\nAustralia's AML/CTF regime has been\
    \ in a prolonged state of transition. The landmark *Anti-Money Laundering and\
    \ Counter-Terrorism Financing Amendment Act 2024* extended Tranche 2 obligations\
    \ to designated non-financial businesses and professions, but banks have simultaneously\
    \ absorbed significant remediation costs following AUSTRAC enforcement actions\
    \ \u2014 most notably against Commonwealth Bank and Westpac \u2014 that collectively\
    \ resulted in penalties exceeding A$2 billion. Against that backdrop, compliance\
    \ expenditure has become a boardroom-level line item, and the ABA's productivity\
    \ framing reflects genuine institutional sensitivity to regulatory burden accumulation.\n\
    \nFor MLROs and heads of financial crime compliance, the committee appearance\
    \ carries a nuanced message. The ABA is not arguing for weaker AML/CTF standards;\
    \ the FATF Mutual Evaluation process, in which Australia received its fourth-round\
    \ assessment, makes any overt weakening of technical compliance politically untenable.\
    \ Rather, the industry appears to be advocating for rationalisation \u2014 reduced\
    \ duplication between AUSTRAC reporting obligations and APRA prudential requirements,\
    \ streamlined customer due diligence rules, and greater regulatory certainty that\
    \ allows compliance functions to be engineered efficiently rather than reactively.\
    \ FATF Recommendation 1 itself endorses a risk-based approach precisely because\
    \ disproportionate measures impose costs without commensurate financial crime\
    \ reduction.\n\nFor supervisors, the productivity framing introduces a political\
    \ economy risk: if parliament internalises the narrative that compliance is purely\
    \ a cost centre, future legislative debates around AML/CTF Act amendments could\
    \ face pressure to dilute substance under the banner of efficiency. AUSTRAC and\
    \ Treasury will need to ensure that any productivity review of banking regulation\
    \ explicitly preserves the primacy of FATF-aligned outcomes.\n\nThe more constructive\
    \ path \u2014 one that serves both interests \u2014 lies in technology-enabled\
    \ compliance simplification: expanded use of digital identity frameworks under\
    \ the *Digital ID Act 2024*, shared utilities for sanctions screening, and clearer\
    \ AUSTRAC guidance that reduces defensive over-reporting. Whether the Senate committee's\
    \ final recommendations reflect that balance, or default to deregulatory instinct,\
    \ will determine the trajectory of Australia's AML/CTF effectiveness over the\
