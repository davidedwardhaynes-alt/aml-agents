  full_article: "The headline alone\u2014that quantum computing's gravest threat to\
    \ Bitcoin may lie beyond private-key compromise\u2014carries immediate implications\
    \ for financial institutions holding or custodying digital assets, and for supervisors\
    \ assessing the operational resilience of virtual asset service providers (VASPs)\
    \ under frameworks such as MAS Notice PSN02 and FATF Recommendation 15.\n\nThe\
    \ conventional quantum-risk narrative has centred on Shor's algorithm eventually\
    \ rendering elliptic-curve cryptography (ECDSA), which secures Bitcoin wallet\
    \ keys, vulnerable to sufficiently powerful quantum machines. That concern has\
    \ been well-documented since at least the 2022 Biden administration's National\
    \ Security Memorandum on quantum-resistant cryptography and NIST's subsequent\
    \ post-quantum cryptography standardisation process, finalised in 2024. Compliance\
    \ teams at exchanges and custodians have largely framed their quantum transition\
    \ planning around key-management infrastructure upgrades.\n\nThe suggestion that\
    \ a more systemic risk exists\u2014potentially targeting the integrity of the\
    \ transaction ordering mechanism, the finality assumptions embedded in proof-of-work,\
    \ or the cryptographic primitives underpinning the peer-to-peer network itself\u2014\
    shifts the threat model in ways that matter to regulators and compliance officers.\
    \ If transaction finality cannot be assured, the foundational premise of settlement\
    \ certainty that justifies treating confirmed Bitcoin transfers as discharge of\
    \ payment obligations under frameworks such as Singapore's Payment Services Act\
    \ or Hong Kong's AMLO collapses. AML monitoring systems that treat on-chain confirmations\
    \ as immutable records would face similar conceptual challenges, with direct consequences\
    \ for suspicious transaction reporting and chain-of-custody evidence in financial\
    \ investigations.\n\nFor MLROs at licensed VASPs, the practical near-term concern\
    \ is whether current technology risk disclosures to supervisors adequately address\
    \ quantum scenarios beyond key theft. The European Union's Markets in Crypto-Assets\
    \ Regulation (MiCA) requires issuers and service providers to maintain operational\
    \ resilience frameworks; quantum risks that affect consensus integrity rather\
    \ than individual wallets may not be captured in existing business-continuity\
    \ assessments. Prudent institutions would be well-served to engage their technology\
    \ and legal teams now on whether quantum resilience clauses appear in custodial\
    \ agreements and insurance policies.\n\nRegulators have generally been ahead of\
    \ the industry on post-quantum planning in traditional finance, with the Basel\
    \ Committee and FSB each signalling attention to cryptographic agility. Whether\
    \ supervisors extend that scrutiny systematically to crypto-asset infrastructure\u2014\
    and specifically to risks beyond the wallet-key layer\u2014will likely define\
    \ the next iteration of VASP licensing conditions in the more rigorous jurisdictions."
