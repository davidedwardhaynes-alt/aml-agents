  full_article: "National Bank of Canada has led a $25 million Series C extension\
    \ into Sardine, the AI-driven risk platform covering fraud detection, compliance\
    \ monitoring, and credit underwriting \u2014 a strategic equity commitment that\
    \ signals growing institutional appetite for integrated financial crime and credit\
    \ risk tooling at a time when regulators across multiple jurisdictions are pressing\
    \ firms to demonstrate technological adequacy in their AML controls.\n\nThe investment\
    \ arrives against a backdrop of intensifying supervisory expectations. FATF's\
    \ Recommendation 15 explicitly requires jurisdictions and financial institutions\
    \ to identify and assess ML/TF risks arising from new technologies, while guidance\
    \ published since 2021 has increasingly encouraged \u2014 rather than merely permitted\
    \ \u2014 the use of machine learning for transaction monitoring and customer risk\
    \ scoring. In Canada specifically, FINTRAC's compliance expectations under the\
    \ *Proceeds of Crime (Money Laundering) and Terrorist Financing Act* require reporting\
    \ entities to deploy risk-based systems commensurate with their exposure, creating\
    \ demand for third-party platforms capable of providing auditable, adaptive detection\
    \ logic.\n\nFor National Bank, the move is both a financial bet and a procurement\
    \ signal. Canadian Schedule I banks have faced scrutiny over the adequacy of their\
    \ transaction monitoring systems in recent years, and embedding a vendor relationship\
    \ through equity participation provides a degree of roadmap influence that conventional\
    \ procurement cannot. The bank can shape Sardine's product development toward\
    \ Canadian regulatory specifics \u2014 including FINTRAC's suspicious transaction\
    \ reporting thresholds and the dual-risk framework that links fraud typologies\
    \ to money laundering predicate offences under PCMLTFA section 7.\n\nFrom a vendor\
    \ landscape perspective, the round underscores a consolidation trend: compliance\
    \ officers have grown wary of managing discrete point solutions for fraud, AML,\
