  full_article: "Richard Faithfull, 36, was returned to custody on 8 May 2026 after\
    \ a City of London court activated an additional 499-day prison term for his failure\
    \ to satisfy a Confiscation Order imposed following his 2021 conviction for laundering\
    \ \xA32.5 million. The case underscores a recurring enforcement challenge: securing\
    \ a conviction is legally and practically distinct from recovering criminal proceeds.\n\
    \nFaithfull was originally sentenced to five years and ten months after a prosecution\
    \ brought by the Financial Conduct Authority established that he had served as\
    \ a conduit for a transnational organised crime group responsible for at least\
    \ seven overseas investment frauds \u2014 so-called boiler room schemes. The court\
    \ required him to repay \xA3529,961, reflecting findings on his available assets\
    \ under the Proceeds of Crime Act 2002. He has paid \xA3349,214.37, leaving a\
    \ shortfall of approximately \xA3180,747 \u2014 the non-payment that triggered\
    \ the default sentence.\n\nThe enforcement mechanism at work here is well-established\
    \ but imperfect. Under POCA 2002, courts may impose a default custodial term to\
    \ run consecutively with the original sentence when a confiscation order goes\
    \ unsatisfied. Critically, however, activation of that default term does not extinguish\
    \ the underlying debt; Faithfull remains liable for the unpaid balance upon release.\
    \ For compliance professionals, the case is a reminder that asset dissipation\
    \ between arrest and confiscation proceedings \u2014 a window that can span years\
    \ \u2014 materially reduces the practical yield of even successful prosecutions.\
    \ FATF Recommendation 4 explicitly calls on jurisdictions to adopt measures that\
    \ prevent this erosion, and the FCA's own financial investigation capacity is\
    \ specifically oriented toward tracing and freezing assets at the earliest practicable\
    \ stage.\n\nFrom a deterrence standpoint, the FCA's willingness to pursue default\
    \ activation sends a measured signal to individuals who calculate that non-compliance\
    \ with a confiscation order carries lower personal cost than disclosure of hidden\
    \ assets. Steve Smart, the FCA's executive director of enforcement and market\
    \ oversight, stated plainly that failing to repay what is owed has direct custodial\
    \ consequences.\n\nFor MLROs and financial crime teams, the case also reinforces\
    \ the typology of investment fraud proceeds moving through layered account structures\
    \ controlled by intermediaries \u2014 precisely the pattern that robust transaction\
    \ monitoring and suspicious activity reporting under the Proceeds of Crime Act\
    \ and FATF Recommendation 20 are designed to intercept before funds are dissipated\
    \ beyond recovery."
