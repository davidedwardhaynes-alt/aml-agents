    \ asset's primary liquidity venues meet acceptable AML/CTF standards \u2014 a\
    \ consideration directly relevant under FATF's updated Recommendation 15 guidance\
    \ on virtual assets.\n\nThe SEC's own review will likely centre on market manipulation\
