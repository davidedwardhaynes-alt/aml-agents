    \ decentralised protocols have identifiable natural or legal persons exercising\
    \ control or sufficient influence. Periodic eruptions of internal conflict make\
    \ that assessment harder to dismiss as settled.\n\nFor financial institutions\
    \ operating under MAS Notice PSN02 or equivalent licensing regimes, the reputational\
    \ and operational dimension matters as much as the legal one. Governance instability\
