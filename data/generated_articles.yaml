  full_article: "The public launch of Record OS, a Making Tax Digital compliance platform\
    \ founded by alumni of Wise and backed by $2 million in pre-seed funding led by\
    \ Episode 1, arrives as HMRC's phased MTD for Income Tax Self Assessment mandate\
    \ prepares to capture sole traders and landlords earning above \xA320,000 from\
    \ April 2026 \u2014 a cohort estimated at several million individuals who have\
    \ historically operated with limited digital financial infrastructure.\n\nThe\
    \ relevance to financial crime compliance professionals extends beyond tax administration.\
    \ MTD's requirement for quarterly digital submissions of income and expenditure\
    \ data through HMRC-recognised software creates, as a structural byproduct, a\
    \ more granular and time-stamped audit trail for each enrolled taxpayer. For AML\
    \ supervisors, this has meaningful implications: the same digital record-keeping\
    \ obligations that HMRC is leveraging to close the tax gap also address a longstanding\
    \ vulnerability identified in FATF's Recommendation 10 and its accompanying guidance\
    \ on beneficial ownership and transaction transparency. Self-employed individuals\
    \ and small landlords have historically been a difficult segment to monitor, precisely\
    \ because informal cash flows left limited documentary evidence.\n\nFrom a platform\
    \ risk perspective, Record OS and competitors in the MTD software space will themselves\
    \ become obligated parties under existing UK AML frameworks if they handle client\
    \ funds or provide certain accountancy-adjacent services. Even where they remain\
    \ outside the scope of the Money Laundering Regulations 2017, the data they aggregate\
    \ \u2014 linking bank feeds, invoicing, and rental income \u2014 creates a resource\
    \ that law enforcement and supervisors may increasingly seek to access under existing\
    \ production order powers or through future data-sharing mechanisms under the\
    \ Economic Crime and Corporate Transparency Act 2023.\n\nFor MLROs at accountancy\
    \ firms and fintech platforms, the MTD ecosystem introduces a new category of\
    \ third-party data source that can substantiate or undermine client-provided information\
    \ during customer due diligence and ongoing monitoring reviews. The ability to\
    \ cross-reference declared income against quarterly digital submissions offers\
    \ a practical enhancement to existing source-of-wealth verification processes,\
    \ particularly for higher-risk clients in the property and self-employment sectors.\n\
    \nWhether HMRC and the Financial Intelligence Unit choose to formalise data-sharing\
    \ arrangements with MTD software providers remains an open question, but the legislative\
    \ architecture to do so exists. As the enrolled taxpayer base expands through\
    \ 2027 and beyond, the compliance audit trail that MTD generates will quietly\
    \ become one of the more consequential datasets available to financial crime investigators."
