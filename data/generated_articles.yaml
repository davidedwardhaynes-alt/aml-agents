    \ escalation that carries direct implications for asset attachment and civil consequences\
    \ under the SEBI Act, 1992.\n\nIlliquid stock options on Indian exchanges have\
    \ been a persistent vector for tax evasion and money laundering, enabling parties\
    \ to manufacture fictitious capital gains or losses through pre-arranged, off-market\
    \ trades in thinly traded contracts. SEBI has pursued this category of manipulation\
    \ systematically since its 2018 investigations, which implicated hundreds of entities\
    \ across BSE's options segment. The underlying conduct typically engages provisions\
    \ of the SEBI (Prohibition of Fraudulent and Unfair Trade Practices) Regulations,\
    \ 2003, and where structured financial flows are involved, may attract scrutiny\
    \ under the Prevention of Money Laundering Act, 2002, given that fabricated trading\
    \ profits can constitute proceeds of a scheduled offence.\n\nFor financial institutions\
    \ and intermediaries, the publication of a recovery certificate against a named\
    \ PAN holder carries immediate customer due diligence relevance. Banks, brokers,\
    \ and depository participants maintaining accounts linked to this individual are\
    \ on constructive notice of a regulatory default determination. Under PMLA obligations\
    \ and RBI's KYC Master Directions, negative news of this nature informs enhanced\
