  full_article: "NMI's acquisition of Dwolla, announced on 19 May 2026, consolidates\
    \ two embedded-payments infrastructure providers into a single entity capable\
    \ of processing both card-based and account-to-account (A2A) transactions \u2014\
    \ a combination that materially expands the acquirer's exposure to ACH and real-time\
    \ payment rails and, with it, the compliance obligations that attach to those\
    \ channels.\n\nThe deal arrives as A2A volumes in the United States continue to\
    \ grow through FedNow and the RTP network, both of which carry instant-irrevocability\
    \ characteristics that regulators and financial intelligence units have consistently\
