    \ smaller operators cannot match\u2014a not entirely implausible claim given the\
    \ cost of maintaining effective AML programmes across thousands of agent locations.\
    \ Regulators will need to weigh that argument against documented evidence of price\
    \ effects in concentrated remittance corridors. Whether the political pressure\
    \ accelerates or merely colours the formal antitrust and consumer protection review\
    \ remains to be seen, but it signals that remittance market structure is increasingly\
    \ a matter of public policy, not merely competition law."
