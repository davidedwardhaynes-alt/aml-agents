    \ implication for compliance functions is that the contours of a supervised tokenisation\
    \ regime in the United Kingdom are moving from conceptual discussion toward framework\
    \ definition, with AML and market-integrity obligations likely to be embedded\
    \ at the architecture stage rather than retrofitted.\n\nThe submission follows\
    \ a sustained period of supervisory experimentation. The FCA's Digital Securities\
    \ Sandbox, established under the Financial Services and Markets Act 2023, and\
    \ the Bank of England's parallel work on a wholesale settlement infrastructure\
    \ have provided controlled environments in which tokenised bond and repo structures\
    \ have been tested against existing custody, settlement finality, and prudential\
    \ requirements. FATF has separately noted in its guidance on virtual assets that\
    \ the travel rule and beneficial ownership obligations apply irrespective of the\
    \ underlying technology, a principle that any UK tokenisation framework will need\
    \ to operationalise across potentially fragmented ledger environments.\n\nFor\
    \ MLROs and financial crime compliance teams, the ISDA-GDF response matters on\
    \ several dimensions. First, derivatives documentation standards \u2014 master\
    \ agreements, collateral arrangements, close-out netting \u2014 will need to accommodate\
    \ smart-contract execution in ways that preserve the auditability and counterparty\
    \ identification requirements underpinning Proceeds of Crime Act and Terrorism\
    \ Act suspicious activity reporting. Second, interoperability between permissioned\
    \ and public ledger environments raises correspondent-banking-style due diligence\
