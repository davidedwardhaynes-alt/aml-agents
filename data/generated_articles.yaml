    \ frameworks such as MAS Notice 626, Japan's Act on Prevention of Transfer of\
    \ Criminal Proceeds, or Australia's AML/CTF Act.\n\nAgentic AI differs materially\
    \ from conventional machine-learning tools. Rather than surfacing alerts for human\
    \ review, orchestrated agents can autonomously sequence tasks \u2014 querying\
    \ sanctions lists, generating suspicious transaction reports, escalating cases,\
    \ and closing loops with minimal human intervention. This architecture sits in\
    \ direct tension with the human oversight expectations embedded in FATF Recommendation\
    \ 26, which requires that financial institutions maintain adequate and appropriately\
    \ structured compliance management, and with most supervisors' existing guidance\
    \ on model risk and automated decision-making. The Monetary Authority of Singapore's\
    \ FEAT principles and the FSA of Japan's evolving AI governance expectations both\
