  full_article: "The Hong Kong Monetary Authority has moved its wholesale central\
    \ bank digital currency programme into live-market testing, deploying e-HKD in\
    \ a pilot that processes advance margin payments for after-hours derivatives trades\
    \ \u2014 a use case that carries direct implications for how settlement finality,\
    \ counterparty exposure, and financial crime controls interact in real time.\n\
    \nThe pilot sits within the HKMA's broader Project e-HKD+ agenda, itself part\
    \ of the multi-jurisdictional Project mBridge architecture that has drawn participation\
    \ from the Bank for International Settlements, the People's Bank of China, and\
    \ the central banks of the UAE and Thailand. Wholesale CBDC for settlement has\
    \ been a stated priority under FATF's ongoing work on virtual assets and emerging\
    \ payment rails, with Recommendation 16 travel-rule obligations and Recommendation\
    \ 10 CDD requirements already prompting debate about how tokenised central bank\
    \ money should be treated relative to commercial bank money and stablecoins under\
    \ existing AML/CTF frameworks.\n\nFor MLROs and compliance functions at licensed\
    \ entities in Hong Kong, the pilot raises a set of operational questions that\
    \ will not wait for final policy. Under the Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance, institutions remain responsible for transaction monitoring\
    \ irrespective of the settlement instrument. If margin flows settle in e-HKD on\
    \ a distributed ledger, compliance teams will need to determine whether existing\
    \ transaction monitoring systems can ingest on-chain data, how pseudonymous wallet\
    \ addresses map to verified legal entities, and whether instantaneous finality\
    \ compresses the window available for pre-settlement screening. The Securities\
    \ and Futures Commission's requirements under the Securities and Futures Ordinance\
    \ regarding position reporting and suspicious transaction reporting add a further\
    \ supervisory layer for derivatives participants specifically.\n\nFrom a systemic\
    \ perspective, the after-hours timing of the pilot is notable. Margin calls outside\
    \ standard settlement windows have historically represented a period of elevated\
    \ operational risk; programmable settlement in CBDC could reduce that risk or,\
    \ if AML controls are not embedded at the protocol layer, create a new vector\
    \ for layering through rapid, automated transfers that clear before morning surveillance\
    \ runs.\n\nThe HKMA has not yet indicated a timeline for broader rollout or published\
    \ detailed technical standards for AML integration. Compliance functions that\
    \ treat this as a distant infrastructure question rather than an immediate policy-design\
    \ opportunity risk finding the standards written without their input \u2014 a\
    \ pattern the industry has repeated, to its cost, with each preceding wave of\
    \ payment system innovation."
