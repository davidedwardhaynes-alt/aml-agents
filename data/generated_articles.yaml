  full_article: 'A House of Lords committee has called on the Bank of England to revise
    its proposed stablecoin regulatory framework, warning that overly restrictive
    prudential requirements risk driving sterling-denominated stablecoin activity
    offshore and ceding competitive ground to jurisdictions that have already enacted
    comprehensive regimes. The committee''s intervention signals a rare and pointed
    parliamentary challenge to a central bank position, carrying direct implications
    for firms currently mapping their digital-asset compliance architectures against
    an uncertain UK timeline.


    The backdrop matters. The EU''s Markets in Crypto-Assets Regulation entered full
    application in late 2024, establishing passportable e-money token and asset-referenced
    token categories with explicit AML obligations aligned to the Sixth Anti-Money
    Laundering Directive. The United States, meanwhile, advanced federal stablecoin
    legislation through 2025 that imposes reserve, redemption, and Bank Secrecy Act
    compliance requirements on issuers. The UK''s Financial Services and Markets Act
    2023 granted HM Treasury powers to bring stablecoins into the regulatory perimeter,
    but the Bank of England''s subsequent consultation on systemic stablecoin oversight
    drew industry criticism for reserve-backing and operational resilience proposals
    that some characterised as more burdensome than equivalent fiat payment authorisation.


    For MLROs and financial crime compliance teams, the committee''s critique has
    immediate operational relevance. A prolonged UK regulatory gap does not suspend
    AML obligations; firms onboarding stablecoin counterparties remain subject to
    the Proceeds of Crime Act 2002, the Terrorism Act 2000, and the Money Laundering,
    Terrorist Financing and Transfer of Funds Regulations 2017. Where issuers operate
    from less-regulated jurisdictions, enhanced due diligence under Regulation 33
    becomes harder to apply consistently, and correspondent-style exposure assessments
    become more consequential. FATF Recommendation 15 requires jurisdictions to regulate
    virtual asset service providers regardless of where issuers are domiciled; an
    unresolved domestic framework complicates that obligation in practice.


    The supervisory tension the Lords have surfaced is ultimately a calibration question:
    how much prudential conservatism is necessary to protect monetary stability without
    inadvertently concentrating financial crime risk in less transparent channels.
    The Bank of England is expected to publish revised proposals later in 2026. Whether
    it accommodates the committee''s position or defends its original architecture
    will shape not only the UK''s stablecoin market structure but the quality of the
    AML controls that govern it.'
