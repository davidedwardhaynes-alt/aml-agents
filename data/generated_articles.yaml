  full_article: "The White House has directed the Federal Reserve to examine expanding\
    \ direct access to US payment infrastructure \u2014 including Fedwire and the\
    \ RTP network \u2014 for non-bank fintech firms, a move that would structurally\
    \ alter the risk perimeter that financial crime compliance frameworks are currently\
    \ designed to manage. The executive order, signed on 20 May 2026, stops short\
    \ of mandating change but signals political intent to accelerate a deregulatory\
    \ shift in payments access that the Fed has historically approached with considerable\
    \ caution.\n\nThe question of master account access for fintechs and non-bank\
    \ payment firms has been contested since at least 2021, when the Federal Reserve\
    \ Bank of Kansas City's provisional rejection of Custodia Bank's application drew\
    \ sustained industry and Congressional attention. FATF Recommendation 14 obliges\
    \ jurisdictions to ensure money or value transfer services are licensed and subject\
    \ to adequate AML/CFT supervision; the unresolved tension has always been whether\
    \ entities accessing central bank rails indirectly \u2014 through sponsored participation\
    \ or correspondent arrangements \u2014 face equivalent scrutiny to chartered institutions\
    \ with direct access.\n\nFor MLROs and heads of financial crime compliance at\
    \ correspondent banks, the immediate concern is counterparty risk. Sponsored access\
    \ arrangements have long allowed banks to impose contractual AML obligations on\
    \ fintech partners, providing a chokepoint for transaction monitoring and SAR\
    \ escalation. Direct Fed access would attenuate that leverage, potentially fragmenting\
    \ the compliance chain at precisely the junction where banks currently exercise\
    \ the most control. FinCEN's programme requirements under 31 USC \xA75318 apply\
    \ to \"financial institutions\" broadly, but supervisory depth across a more fragmented\
    \ access landscape would require both FinCEN and the Fed's supervision function\
    \ to scale accordingly.\n\nFor regulators in jurisdictions with significant US\
    \ dollar clearing exposure \u2014 MAS, the FCA, AUSTRAC \u2014 the development\
    \ warrants attention in the context of correspondent banking de-risking. If direct-access\
    \ fintechs become credible USD clearing intermediaries, respondent banks in Southeast\
    \ Asia and the Pacific may face a new category of counterparty whose AML programme\
    \ maturity is less legible than that of a supervised US depository institution.\n\
    \nThe Fed is under no obligation to act on the executive order, and any rule change\
    \ would require notice-and-comment rulemaking. The more durable effect may be\
    \ the signal it sends to compliance functions: the architecture of payment access\
    \ \u2014 and with it, the architecture of AML accountability \u2014 is under active\
    \ political renegotiation."
