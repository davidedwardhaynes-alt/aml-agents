  full_article: 'The deployment of generative AI by BBVA to analyse relationship manager
    conversations signals an operational shift with direct implications for financial
    crime compliance frameworks, particularly where customer interactions form part
    of the evidential record underpinning know-your-customer and suspicious activity
    monitoring obligations.


    BBVA''s initiative sits within a broader industry movement toward AI-augmented
    supervision of front-line conduct. Regulators including the European Banking Authority
    and the Bank of Spain have for several years encouraged proportionate use of technology
    in customer due diligence and ongoing monitoring, while FATF Recommendation 10
    explicitly requires firms to understand the nature of business relationships on
    a continuous basis. Conversation analytics tools, when applied to relationship
    manager dialogues, can in principle serve both service-quality and compliance
    objectives simultaneously, though institutions must carefully delineate which
    outputs feed which governance function.


    For MLROs and heads of financial crime compliance, the immediate question is data
    governance: if AI-transcribed and AI-analysed conversations are retained as business
    records, they may become disclosable in regulatory investigations or subject to
    legal professional privilege considerations depending on jurisdiction. Under Spain''s
    Law 10/2010 on prevention of money laundering and terrorist financing, and analogous
    regimes elsewhere, conversation content touching on source of funds, business
    purpose, or transaction rationale could constitute CDD documentation. Firms adopting
    similar tools should ensure their data retention policies, model governance frameworks,
    and second-line oversight procedures are updated before deployment scales.


    There is also a model-risk dimension. Generative AI applied to unstructured audio
    or text introduces hallucination risk if outputs are used to populate CDD records
    or inform risk ratings without human review. Supervisors in Singapore under MAS
    Notice 626, and in Australia under the AML/CTF Act''s program requirements, already
    expect firms to validate automated decisioning tools used in customer risk assessment.
    Boards should expect equivalent scrutiny to extend to conversation-analytics systems
    as regulators become more familiar with their application.


    The longer-term trajectory is one where service-quality analytics and compliance
    monitoring converge into a single AI-mediated layer across the customer relationship
    lifecycle. How institutions manage the legal, ethical, and supervisory boundaries
    of that convergence will be a defining compliance challenge of the latter half
    of this decade.'
