  full_article: 'The International Swaps and Derivatives Association submitted formal
    comments to European Parliament policymakers on 15 July 2026 regarding draft reports
    on the Markets in Financial Instruments and Services Package (MISP), signalling
    that the derivatives industry intends to shape the legislative text before it
    advances further through the EU''s ordinary legislative procedure. The timing
    matters: MISP represents the most significant overhaul of the EU''s wholesale
    markets framework since MiFID II took effect in 2018, and industry engagement
    at the rapporteur-draft stage carries considerably more weight than lobbying after
    trilogues have narrowed political room for manoeuvre.


    MISP sits within a broader European Capital Markets Union agenda that has repeatedly
    stalled on questions of competitive equivalence with the United Kingdom and the
    United States. For derivatives markets specifically, the unresolved legacy of
    the EMIR clearing obligation, the derivatives trading obligation, and post-Brexit
    venue fragmentation means that any revision to the trading and reporting perimeter
    touches operational structures that global dealers have spent years recalibrating.
    ISDA''s intervention follows a consistent pattern: the association submitted analogous
    comment letters during the EMIR 3.0 negotiations and the MiFIR review, both of
    which resulted in material amendments on transparency waivers and systematic internaliser
    thresholds.


    From a financial crime compliance standpoint, MISP''s proposed revisions to transaction
    reporting and data quality standards carry direct AML/CFT relevance. Enhanced
    granularity in trade reporting, if adopted, would improve the data available to
    competent authorities conducting suspicious transaction analysis under Article
    16 of the Fourth Anti-Money Laundering Directive and equivalent obligations in
    member-state legislation. Conversely, if ISDA''s comments seek to limit the scope
    of reportable fields or introduce exemptions for certain OTC structures, compliance
    officers at EU-facing firms will need to assess whether their existing controls
    remain adequate under any revised perimeter.


