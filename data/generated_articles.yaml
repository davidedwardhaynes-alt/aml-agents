    \ a sustained enforcement campaign that SEBI intensified following its 2015\u2013\
    2018 examination of manipulative trading in BSE's stock options segment. That\
    \ investigation identified a pattern in which thinly traded contracts were used\
    \ to generate artificial turnover, facilitating the movement of unaccounted funds\
    \ between connected parties \u2014 conduct that regulators and courts have consistently\
    \ characterised as having a dual character: securities fraud and a potential predicate\
    \ offence for proceeds-of-crime purposes under the Prevention of Money Laundering\
    \ Act, 2002. The Enforcement Directorate has separately pursued PMLA proceedings\
    \ against several entities identified in the same cluster of cases, illustrating\
    \ how a SEBI enforcement trail can become a gateway for parallel financial-crime\
    \ scrutiny.\n\nFor compliance officers at brokers and depository participants,\
    \ the issuance of a General Remittance Order \u2014 a mechanism under the SEBI\
    \ Act, 1992 and the SEBI (Recovery of Penalties) Rules \u2014 is operationally\
    \ significant. It authorises SEBI to approach banks and other depositories directly\
    \ to attach and remit funds, bypassing further voluntary compliance by the defaulting\
    \ entity. Institutions receiving such an order carry an obligation to act promptly;\
    \ failure to do so can attract their own regulatory consequences. MLROs should\
    \ also note that an entity subject to a recovery order of this nature warrants\
    \ enhanced due diligence review under FATF Recommendation 12 principles and any\
    \ applicable internal PEP and adverse-media screening frameworks, even where the\
    \ entity is not formally listed on a sanctions register.\n\nThe broader pattern\
    \ of illiquid options enforcement also carries typology value. SEBI's disclosures\
    \ in this segment have repeatedly documented circular trading structures that\
    \ mirror the layering stage of classic money-laundering schemes \u2014 artificial\
    \ price discovery, matched orders between related counterparties, and extraction\
    \ of value through settlement. Financial intelligence units in jurisdictions that\
    \ receive inbound remittances from Indian corporate structures would be well advised\
