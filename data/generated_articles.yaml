    \ Executive Accountability Regime via the *Financial Accountability Regime Act\
    \ 2023*, imposes obligations on ADIs and their accountable persons to act with\
    \ due skill, care and diligence, and to take reasonable steps within their areas\
    \ of responsibility. Compliance infrastructure \u2014 including the maintenance\
