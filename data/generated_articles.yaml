  full_article: 'The Reserve Bank of India has reiterated its preference for an outright
    prohibition on private cryptocurrencies, citing tax evasion risks as a primary
    concern, according to Reuters reporting from July 2026. The position signals that
    India''s central bank remains at odds with the more permissive regulatory frameworks
    taking shape across major jurisdictions, and raises material questions for virtual
    asset service providers (VASPs) and financial institutions with exposure to Indian
    counterparties.


    The RBI''s stance is not new, but its persistence carries weight. India introduced
    a 30 percent tax on crypto gains and a one percent tax deducted at source on transfers
    in 2022, measures widely interpreted as punitive rather than integrative. Despite
    the government''s separate exploration of a digital rupee under the Reserve Bank
    of India Act, the central bank has consistently argued that the speculative and
    cross-border nature of private crypto assets makes effective tax and anti-money
    laundering controls structurally difficult. That argument draws implicitly on
    FATF Recommendation 15, which requires jurisdictions to regulate VASPs for AML/CFT
    purposes, a standard the RBI appears to regard as insufficient in practice rather
    than principle.


    For compliance professionals, the RBI''s position has layered implications. Indian
    banks remain effectively restricted from providing services to crypto exchanges
    under earlier RBI guidance, even after the Supreme Court''s 2020 circular quashing
    a formal ban. Any institution operating cross-border correspondent relationships
    with Indian banks must assess whether crypto-related transaction flows create
    reputational or de-risking exposure. In jurisdictions such as Singapore, where
    MAS Notice PSN02 imposes conduct requirements on digital payment token service
    providers, firms onboarding Indian retail clients should reassess customer risk
    ratings in light of unresolved regulatory ambiguity in the client''s home jurisdiction.


    The broader geopolitical context also matters. The EU''s Markets in Crypto-Assets
    Regulation is now fully operational, and the United States has moved toward a
    structured federal framework. India''s continued prohibition preference increasingly
    isolates it from G20 peers, despite New Delhi having chaired the G20 in 2023 and
    helped produce a synthesis paper on crypto regulation that stopped well short
    of endorsing bans. Whether the Indian government, which holds legislative authority
    over currency matters rather than the RBI, will defer to the central bank''s prohibitionist
    instinct or press ahead with a licensing framework remains the decisive open question
    as parliamentary deliberations continue.'
