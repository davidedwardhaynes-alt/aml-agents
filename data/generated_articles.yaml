  full_article: "The Online Safety Commission (OSC), which begins operations on 29\
    \ June 2026, gives Singapore a dedicated administrative body through which victims\
    \ of online harassment and doxxing can seek redress \u2014 a development with\
    \ direct implications for financial institutions managing insider-threat risks\
    \ and personal data exposure involving staff or clients.\n\nSingapore's legislative\
    \ groundwork for tackling online harms has been laid incrementally. The Protection\
    \ from Harassment Act (POHA) was amended in 2019 to introduce Protection Orders\
    \ and Expedited Protection Orders, and the Online Safety Act extended regulatory\
    \ reach over online platforms. The OSC represents a consolidation of that architecture\
    \ into a single point of contact, requiring victims to submit structured evidence\
    \ \u2014 screenshots, images, and videos \u2014 to substantiate complaints. For\
    \ compliance officers, the evidentiary framework mirrors documentation standards\
    \ already familiar from suspicious transaction reporting under the Corruption,\
    \ Drug Trafficking and Other Serious Crimes (Confiscation of Benefits) Act.\n\n\
    For financial institutions, the OSC's remit intersects with AML/CFT concerns in\
    \ at least two respects. First, doxxing \u2014 the deliberate exposure of personal\
