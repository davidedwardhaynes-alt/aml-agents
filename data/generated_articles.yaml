  full_article: "The International Monetary Fund has warned that tokenisation of financial\
    \ assets risks displacing systemic risk from bank balance sheets onto service\
    \ providers and market infrastructures \u2014 a structural shift that would leave\
    \ existing monetary policy and prudential frameworks poorly calibrated to the\
    \ exposures that actually matter.\n\nThe warning arrives as tokenised asset markets\
    \ have moved from proof-of-concept to operational scale. Several jurisdictions\
    \ have already issued live tokenised bonds and funds under frameworks including\
    \ Singapore's MAS Project Guardian and the EU's DLT Pilot Regime, while FATF's\
    \ updated Recommendation 15 guidance on virtual assets continues to evolve to\
    \ address the blurring boundary between traditional securities and tokenised instruments.\
    \ The IMF's concern is not that tokenisation is inherently destabilising, but\
    \ that regulatory perimeters were drawn around entities \u2014 primarily banks\
    \ \u2014 rather than functions, making them poorly suited to a world where custody,\
    \ settlement, and liquidity provision migrate to technology infrastructure providers.\n\
    \nFor financial crime compliance professionals, the risk-migration thesis has\
    \ direct operational consequences. If systemic exposures concentrate in smart-contract\
    \ layers, token issuance platforms, or third-party wallet infrastructure, the\
    \ transaction monitoring and suspicious activity reporting obligations that currently\
    \ sit with licensed deposit-takers may need to extend more consistently to those\
    \ intermediaries. Under FATF's virtual asset service provider framework, some\
    \ of this ground is already covered, but unevenness in national implementation\
    \ \u2014 particularly across emerging markets \u2014 leaves material gaps. MLROs\
    \ at banks with tokenised asset programmes should review whether their counterparty\
    \ due diligence adequately captures the risk profile of the infrastructure providers\
    \ on which settlement now depends.\n\nCentral banks and macro-prudential authorities\
    \ face a parallel challenge. Monetary transmission mechanisms assume that reserve\
    \ requirements and liquidity coverage ratios applied to banks shape broad credit\
    \ conditions. Where tokenised money-market instruments or stablecoin settlement\
    \ assets absorb functions previously performed by bank deposits, those levers\
    \ lose traction without corresponding oversight of the new liquidity pools.\n\n\
    The IMF's intervention is unlikely to produce immediate regulatory change, but\
    \ it adds institutional weight to arguments that activity-based regulation \u2014\
    \ taxing function rather than legal form \u2014 must accelerate. For compliance\
    \ professionals, the more pressing question is whether internal risk frameworks\
    \ have kept pace with the operational structures their institutions have already\
    \ built."
