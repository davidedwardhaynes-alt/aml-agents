  full_article: "TSB reported in May 2026 that impersonation scam cases recorded in\
    \ the first quarter alone had already exceeded the total for full-year 2025, with\
    \ associated losses running 116 percent higher year-on-year \u2014 a trajectory\
    \ that, if sustained, would place the bank's authorised push payment fraud exposure\
    \ at roughly four times its 2025 level by year-end.\n\nThe disclosure arrives\
    \ less than eighteen months after the Payment Systems Regulator's mandatory reimbursement\
    \ regime took effect in October 2024, requiring UK payment service providers to\
    \ refund most authorised push payment fraud victims up to \xA385,000 per claim.\
    \ The regime was designed in part to sharpen firms' commercial incentive to invest\
    \ in fraud controls, operating on the assumption that loss-sharing would translate\
    \ into stronger detection. TSB's figures suggest that assumption is being tested:\
    \ where liability is distributed between sending and receiving institutions, neither\
    \ party bears the full cost of a single incident, potentially diluting the deterrent\
    \ effect.\n\nFrom a financial crime compliance standpoint, the data reinforces\
    \ concerns about the adequacy of transaction monitoring typologies for impersonation\
    \ vectors. Unlike traditional money-laundering red flags \u2014 structuring, layered\
    \ transfers, jurisdictional risk \u2014 impersonation fraud payments are typically\
    \ single, plausible transactions initiated by the account holder under social\
