  full_article: "OKX, BlackRock, and Standard Chartered have operationalised a tri-party\
    \ collateral framework under which eligible institutional clients can pledge units\
    \ of BlackRock's USD Institutional Digital Liquidity Fund (BUIDL) as off-exchange\
    \ margin against trading positions on OKX Middle East, with custody of the collateral\
    \ held at Standard Chartered rather than transferred onto the exchange itself.\
    \ The arrangement directly addresses one of the persistent structural frictions\
    \ in institutional digital-asset trading: the need to move assets onto centralised\
    \ venues, thereby concentrating counterparty and operational risk.\n\nThe framework\
    \ builds on a broader regulatory push to bring tokenised real-world assets into\
    \ mainstream financial infrastructure. BUIDL, launched in early 2024 on Ethereum\
    \ and subsequently expanded to additional networks, is registered under SEC Rule\
    \ 2a-7 equivalence standards and invests primarily in US Treasury bills and repurchase\
    \ agreements, giving it a risk profile familiar to institutional treasury desks.\
    \ OKX Middle East operates under a Virtual Asset Service Provider licence from\
    \ Abu Dhabi's Financial Services Regulatory Authority (FSRA), whose 2023 Digital\
    \ Asset Framework aligns closely with FATF Recommendation 15 guidance on virtual\
    \ asset transfers and custody segregation.\n\nFrom a financial-crime compliance\
    \ standpoint, the structure introduces layered obligations across three regulated\
    \ entities. Standard Chartered, as custodian, remains subject to its own AML/CFT\
    \ policies under the respective jurisdictions in which it operates and must conduct\
    \ ongoing due diligence on collateral provenance consistent with FATF Recommendation\
    \ 10 on customer due diligence and Recommendation 16 on wire transfers \u2014\
    \ principles that extend, by regulatory interpretation in several jurisdictions,\
    \ to tokenised asset transfers. OKX, as the trading venue, retains responsibility\
    \ for transaction monitoring under its FSRA licence conditions, while BlackRock's\
    \ fund structure imposes investor eligibility gates that serve as an upstream\
    \ filter on who can access the arrangement at all. That layering may offer regulators\
    \ greater comfort than single-entity crypto custody models, though it also distributes\
    \ AML accountability in ways that supervisors will want to map carefully across\
    \ jurisdictions.\n\nFor compliance functions at institutional participants, the\
    \ immediate practical question is how collateral movements are treated under existing\
    \ transaction monitoring rules. Where tokenised fund units traverse on-chain infrastructure\
    \ before being recognised by a custodian, Travel Rule obligations under FATF Recommendation\
    \ 16 \u2014 and local implementations such as MAS Notice PSN02 or the UAE's Virtual\
    \ Assets Regulatory Authority transfer requirements \u2014 will need to be applied\
    \ with precision. As tokenised collateral arrangements proliferate, the absence\
    \ of harmonised cross-border guidance on when a collateral pledge constitutes\
    \ a \"transfer\" under Travel Rule definitions remains a material gap that industry\
    \ bodies and supervisors alike will need to close."
