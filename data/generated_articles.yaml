    \ funds.\n\nThe scam typology \u2014 commonly termed \"virtual kidnapping\" or\
    \ \"Mainland law enforcement impersonation fraud\" \u2014 is well documented in\
    \ FATF guidance on fraud-related money laundering and features prominently in\
    \ the Hong Kong Monetary Authority's supervisory expectations around retail customer\
    \ fraud. Proceeds typically transit multiple jurisdictions through layered transfers,\
    \ frequently involving cryptocurrency exchanges, third-party payment platforms,\
    \ or mule accounts opened in Southeast Asia, before being repatriated to principal\
    \ beneficiaries. For institutions subject to Hong Kong's Organised and Serious\
