    \ source, a structuring pattern \u2014 could be deprioritised or bypassed if the\
    \ agent's objective function is weighted toward speed and approval rates. AML\
    \ teams will need assurance that SAR obligations under national financial intelligence\
    \ frameworks, including the Netherlands' Wwft, are not inadvertently subordinated\
