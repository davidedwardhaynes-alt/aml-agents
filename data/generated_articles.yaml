  full_article: "The International Swaps and Derivatives Association has called for\
    \ a technical correction to the Standardised Approach for Counterparty Credit\
    \ Risk framework, arguing that a structural flaw in the methodology is producing\
    \ capital outcomes that systematically overstate exposure for certain derivatives\
    \ portfolios. The immediate implication for compliance and risk officers is that\
    \ institutions relying on SA-CCR for regulatory capital calculations under Basel\
    \ III final standards may be carrying inflated risk-weighted assets, with downstream\
    \ consequences for leverage ratios, internal capital allocation, and client pricing.\n\
    \nSA-CCR replaced the older Current Exposure Method and Mark-to-Market Method\
    \ as the mandated framework for measuring counterparty credit risk exposures in\
    \ the Basel Committee's 2014 standard, subsequently incorporated into jurisdictional\
    \ rules including the Federal Reserve's capital rules, the European Union's Capital\
    \ Requirements Regulation, and MAS Notice 637 in Singapore. The methodology was\
    \ designed to be more risk-sensitive than its predecessors, recognising netting\
    \ and collateral benefits more precisely. However, its aggregation mechanics\u2014\
    particularly the treatment of offsetting positions across hedging sets\u2014have\
    \ long drawn technical criticism from practitioners.\n\nFrom a prudential standpoint,\
    \ supervisors may view conservative capital outcomes as broadly consistent with\
    \ the post-GFC reform agenda, and will be cautious about endorsing changes that\
    \ reduce headline capital requirements without robust empirical justification.\
    \ The Basel Committee's Regulatory Consistency Assessment Programme process also\
    \ means that unilateral national deviations from agreed standards carry their\
    \ own supervisory risk. MLROs and heads of financial crime compliance are less\
    \ directly affected by the capital mechanics, but treasury and risk teams at major\
    \ dealers will be acutely focused on how the flaw interacts with exposure calculations\
    \ used for large exposure limits and margin requirements under BCBS-IOSCO margin\
    \ rules.\n\nFor the derivatives market more broadly, an unresolved miscalibration\
    \ in SA-CCR creates competitive distortions: institutions using internal model\
    \ method approvals face a different capital landscape than those on the standardised\
    \ approach, potentially influencing product structuring and the economics of cleared\
    \ versus bilateral derivatives. ISDA's intervention follows a pattern of its technical\
    \ committees identifying implementation asymmetries before regulatory cycles fully\
    \ embed them across member jurisdictions. Whether the Basel Committee treats this\
    \ as a priority agenda item\u2014given the current focus on implementing the finalised\
    \ Basel III output floor\u2014will determine how quickly affected institutions\
    \ can expect relief."
