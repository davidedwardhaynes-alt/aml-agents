    \ Auto Finance \u2014 with the full legal hearing scheduled for December 2026\
    \ or February 2027. The suspension is procedural rather than substantive: firms\
    \ must continue preparing for the scheme and may progress complaints to the point\
    \ of determination, but are relieved from completing steps whose repetition would\
