    \ onboarding logic verifies the commercial substance behind each invoice \u2014\
    \ specifically whether buyer-seller relationships, goods or service descriptions,\
    \ and settlement flows are authenticated before financing is extended. Embedded\
    \ distribution models by design separate the regulated entity from the end borrower,\
    \ creating a reliance chain that FATF Recommendation 17 on third-party reliance\
