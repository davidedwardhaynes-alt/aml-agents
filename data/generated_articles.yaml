  full_article: "London-based payments orchestration firm Primer has closed a $100\
    \ million Series C round, accelerating its stated ambition to embed artificial\
    \ intelligence across every transaction processed through its platform \u2014\
    \ a development that carries material implications for transaction monitoring,\
    \ fraud detection, and the governance of AI-assisted payment decisions.\n\nPrimer,\
    \ founded by former Braintree and PayPal executives, operates as an infrastructure\
    \ layer sitting between merchants and multiple payment processors, acquirers,\
    \ and fraud tools. At that position in the payments stack, it handles routing\
    \ logic, retry waterfalls, and increasingly, the decisioning that determines how\
    \ a transaction is processed in real time. Introducing AI at that orchestration\
    \ layer concentrates significant analytical and operational power in a single\
    \ intermediary \u2014 one that may not itself be a regulated payment institution\
    \ in every jurisdiction where its merchant clients operate.\n\nFor compliance\
    \ officers, the architecture raises questions of accountability that regulators\
    \ are only beginning to formalise. Under the EU's AI Act, high-risk AI systems\
    \ used in creditworthiness assessment or fraud detection carry obligations around\
    \ explainability, human oversight, and audit trails. The FCA's Consumer Duty similarly\
    \ demands that firms \u2014 including those relying on third-party technology\
    \ \u2014 can demonstrate that automated outcomes are fair and do not produce harm\
    \ at scale. FATF Recommendation 16 on wire transfers and the broader Recommendation\
    \ 10 framework on customer due diligence presuppose that unusual transaction patterns\
    \ can be identified and escalated; if AI models embedded in orchestration infrastructure\
    \ begin suppressing or rerouting flagged transactions without transparent audit\
    \ logs, the integrity of suspicious activity detection could be compromised.\n\
    \nFrom the perspective of acquiring banks and merchant acquirers, increased AI\
    \ capability at the orchestration layer may improve genuine fraud suppression\
    \ and reduce false positives \u2014 a longstanding pain point that inflates operational\
    \ costs and degrades customer experience. MAS Notice PSN01, among similar instruments,\
    \ requires that licensed payment service providers maintain effective controls\
    \ irrespective of where in the processing chain a tool sits.\n\nThe funding round\
    \ reflects a broader investor thesis that infrastructure-layer AI offers stickier\
    \ returns than point solutions. The compliance question that will follow Primer's\
    \ expansion is less about the technology itself and more about whether supervisory\
    \ frameworks can keep pace with a model where consequential payment decisions\
    \ are increasingly delegated to systems whose logic sits outside the direct governance\
    \ perimeter of any single regulated entity."
