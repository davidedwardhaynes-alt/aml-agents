    \ relationships serving hedge funds active in digital assets should examine whether\
    \ client activity has shifted in ways that alter their suspicious activity reporting\
    \ obligations.\n\nThe practical lesson is that regulatory product structures do\
    \ not, on their own, determine where capital flows. Compliance frameworks designed\
    \ around the assumption of continued formalisation of crypto markets may need\
