  full_article: "The Paris-based embedded invoice financing platform Aria has secured\
    \ \u20AC7 million in a Series A extension alongside a \u20AC240 million debt facility,\
    \ a capital structure designed to substantially expand its lending capacity to\
    \ small and medium-sized enterprises. For compliance functions at the banks, funds,\
