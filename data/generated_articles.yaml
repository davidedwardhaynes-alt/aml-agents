    \ improvements to its compliance infrastructure \u2014 automated KYC, real-time\
    \ name screening, and enhanced fraud analytics \u2014 but scale and liquidity\
    \ equally expand the platform's attractiveness for layering and smurfing activity.\
    \ AMLC's capacity to supervise a systemically significant, publicly traded e-money\
    \ issuer at the necessary intensity will itself come under scrutiny from international\
    \ assessors ahead of the Philippines' next FATF follow-up review. How regulators\
    \ calibrate that supervisory intensity without impeding financial inclusion objectives\
    \ will be the defining tension of GCash's post-IPO compliance story."
