  full_article: "The Monetary Authority of Singapore added Bybit to its Investor Alert\
    \ List on 17 June 2026, a designation that stops short of prohibition but signals\
    \ to retail and institutional participants that the exchange operates outside\
    \ Singapore's regulatory perimeter \u2014 a distinction with meaningful compliance\
    \ consequences for any counterparty maintaining a relationship with the platform.\n\
    \nThe IAL has long served as MAS's principal tool for flagging entities that have\
    \ not obtained the licences or exemptions required under the Payment Services\
    \ Act 2019 or the Securities and Futures Act. Inclusion does not constitute a\
    \ finding of wrongdoing, but it activates a market-wide obligation for licensed\
    \ firms to reassess business relationships: under MAS Notice PSN02 and the broader\
    \ expectations set out in MAS's AML/CFT guidelines, a counterparty's appearance\
    \ on a regulatory alert list is a recognised trigger for enhanced due diligence\
    \ and, in some cases, relationship termination. FATF Recommendation 13, on correspondent\
    \ relationships, reinforces that principle at an international level.\n\nBybit's\
    \ public response \u2014 that it does not actively solicit or serve Singapore-based\
    \ users \u2014 raises a compliance question that is familiar from prior enforcement\
    \ contexts: the adequacy of geofencing and IP-blocking controls as evidence of\
    \ jurisdictional ring-fencing. Regulators in multiple markets have found such\
    \ technical measures insufficient when Singapore-resident users demonstrably accessed\
    \ services, whether through VPNs or simply by virtue of imprecise controls. The\
    \ exchange's stated intention to seek clarification from MAS is procedurally sensible,\
    \ but the absence of any stated rationale in the IAL entry means counterparties\
    \ cannot wait for that dialogue to conclude before conducting their own risk assessments.\n\
    \nFor MLROs at Singapore-licensed digital payment token service providers and\
    \ banks with crypto-sector clients, the immediate practical task is to determine\
    \ whether any existing correspondent, liquidity, or settlement arrangements touch\
    \ Bybit entities and to document the due diligence basis for continuing or discontinuing\
    \ those relationships. Customer-facing teams should also review whether any retail\
    \ clients are transferring funds to Bybit wallets, given that such flows may warrant\
    \ enhanced scrutiny under Section 45 of the Corruption, Drug Trafficking and Other\
    \ Serious Crimes (Confiscation of Benefits) Act if associated with proceeds-related\
    \ risk.\n\nThe episode illustrates a recurring regulatory dynamic in Singapore:\
    \ the IAL functions as a quiet but effective pressure instrument, compelling unlicensed\
    \ platforms to either formalise their market position or demonstrate credibly\
    \ that they have exited it. MAS's willingness to list a globally prominent exchange\
    \ suggests the authority's patience with regulatory ambiguity in the crypto sector\
    \ has a defined limit."
