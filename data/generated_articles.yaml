    \ Singapore's AML framework \u2014 anchored in the Corruption, Drug Trafficking\
    \ and Other Serious Crimes (Confiscation of Benefits) Act, MAS Notices 626 and\
    \ 824, and aligned to FATF Recommendations 10, 15, and 16 \u2014 has been adapted\
    \ to accommodate machine-learning-assisted due diligence without removing human\
    \ accountability for suspicious transaction reporting obligations.\n\nFor MLROs\
