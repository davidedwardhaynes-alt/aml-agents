  full_article: "Visa has launched a dedicated threat intelligence platform aimed\
    \ at helping financial institutions identify and respond to cyber-enabled financial\
    \ crime, while separately confirming the completion of a series of agentic commerce\
    \ transactions with European banking partners \u2014 a development that places\
    \ autonomous, AI-driven payment execution squarely within the operational perimeter\
    \ of regulated institutions.\n\nThe timing is consequential. FATF's ongoing work\
    \ on virtual assets and emerging technology, alongside the European Banking Authority's\
    \ evolving guidance on ICT and security risk under DORA \u2014 which became fully\
    \ applicable in January 2025 \u2014 has created regulatory pressure on payment\
    \ firms and their bank counterparties to demonstrate not merely reactive but anticipatory\
    \ controls around cyber threats. Visa's platform enters a market where correspondent\
    \ banks and acquiring institutions are increasingly scrutinised on the adequacy\
    \ of their third-party risk frameworks, including the intelligence-sharing arrangements\
    \ they maintain with network operators.\n\nFor MLROs and heads of financial crime\
    \ compliance, the more structurally significant development may be the agentic\
