  full_article: "The Bank of Japan raised its benchmark interest rate to a 31-year\
    \ high on 16 June 2026, and Bitcoin responded with an upward price movement \u2014\
    \ a correlation that carries meaningful implications for financial institutions\
    \ monitoring virtual asset exposure and cross-border capital flows under existing\
    \ AML frameworks.\n\nThe reaction is consistent with a pattern that has become\
