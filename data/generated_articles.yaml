    \ banking networks. Any phased release would require OFAC to issue specific general\
    \ licences or amendments to the Specially Designated Nationals list before institutions\
    \ could act without exposure to secondary sanctions. The precedent of the 2015\
    \ Joint Comprehensive Plan of Action is instructive: banks in Singapore, Hong\
    \ Kong, and elsewhere remained deeply cautious even after formal sanctions relief,\
    \ wary of residual US enforcement risk and the reputational consequences of reconnecting\
    \ with Iranian entities whose beneficial ownership structures had not been fully\
    \ unwound.\n\nFor Singapore-licensed institutions, MAS Notice 626 and the Terrorism\
    \ (Suppression of Financing) Act impose obligations that track the UN Security\
