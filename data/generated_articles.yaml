    \ layering and wash trading \u2014 patterns flagged in FATF Guidance on Virtual\
    \ Assets and Virtual Asset Service Providers. A platform accepting U.S. persons\
    \ will fall within FinCEN's money services business framework, triggering Bank\
    \ Secrecy Act obligations including suspicious activity reporting, customer identification\
