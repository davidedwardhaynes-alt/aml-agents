    \ 2021 Updated Guidance on Virtual Assets explicitly flags situations of network\
    \ uncertainty as elevating the risk that actors exploit chain ambiguity for layering\
    \ purposes.\n\nFor VASPs, a fork that does not materialise carries its own compliance\
    \ cost. Firms that pre-positioned for a bifurcation\u2014adjusting wallet infrastructure,\
    \ suspending withdrawals, or issuing customer notices\u2014must now reconcile\
