    \ services \u2014 that appear consistently in European proceeds-of-crime typologies.\
    \ Transaction monitoring calibrated to retail or corporate banking behaviour may\
    \ not capture the velocity and volume patterns characteristic of invoice cycling.\n\
    \nAs embedded finance matures as an asset class across the EU, supervisors are\
    \ likely to use cases such as Aria's growth round to test how far third-party\
    \ reliance agreements genuinely transfer AML accountability versus creating supervisory\
    \ gaps. The ACPR's evolving posture on delegated origination will be worth monitoring\
    \ closely over the next 12 to 18 months."
