    \ and have not been fully resolved.\n\nFor AML supervisors, the concern is structural\
    \ rather than anecdotal. If Hong Kong's legal framework is progressively re-engineered\
    \ to accommodate mainland development logic \u2014 as the SCMP commentary implies\
