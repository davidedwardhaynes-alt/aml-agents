  full_article: "Monument Technology's \xA318 million fundraise \u2014 nearly double\
    \ its \xA310 million target \u2014 signals continued institutional appetite for\
    \ Banking-Platform-as-a-Service infrastructure, even as regulators on both sides\
    \ of the Atlantic tighten scrutiny of the third-party technology arrangements\
    \ that such platforms underpin.\n\nThe \"bank in a box\" model, in which a single\
    \ vendor supplies core banking, onboarding, ledgering and increasingly compliance\
    \ tooling to licensed institutions, has expanded rapidly since the Prudential\
    \ Regulation Authority and Financial Conduct Authority began encouraging modular,\
    \ cloud-native architectures as an alternative to legacy monoliths. That regulatory\
    \ tolerance has not, however, been unconditional. The FCA's operational resilience\
    \ rules \u2014 fully in force since March 2025 \u2014 require firms to map every\
    \ important business service to its underlying third-party dependencies, and the\
