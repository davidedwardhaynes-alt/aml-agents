    \ across hundreds of currencies \u2014 brings point-of-sale crypto conversion\
    \ squarely into the scope of existing electronic money and virtual asset service\
    \ provider frameworks, with immediate implications for transaction monitoring\
    \ obligations on both sides of the card network.\n\nThe product arrives at a moment\
