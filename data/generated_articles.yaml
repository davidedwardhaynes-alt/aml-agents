    \ with FATF Recommendation 16. The country has also been subject to FATF's mutual\
    \ evaluation scrutiny, and the FSA has demonstrated a willingness to issue business\
    \ improvement orders against exchanges that fall short. Any volume surge therefore\
    \ lands on a supervisory infrastructure already primed for close attention.\n\n\
    For compliance officers at Japanese CASPs and their correspondent institutions,\
    \ the risk calculus is nuanced. A policy-driven inflow of retail investors\u2014\
    potentially less financially sophisticated than existing crypto participants\u2014\
    raises concerns around source-of-funds verification, particularly where individuals\
    \ liquidate traditional savings products to rotate into digital assets. Enhanced\
    \ due diligence obligations under the Act on Prevention of Transfer of Criminal\
    \ Proceeds would apply where transaction patterns suggest layering or where customer\
    \ profiles change materially. At the same time, gold-linked instruments and ETFs\
    \ present their own typology considerations, given historic misuse of precious\
    \ metals in trade-based money laundering schemes documented in FATF's 2020 sector\
    \ guidance.\n\nFor regional MLROs at banks and brokers with Japan exposure, the\
    \ secondary effect is equally relevant. If capital flows through correspondent\
    \ channels or cross-border wallets increase materially, suspicious transaction\
    \ reporting volumes are likely to rise, placing pressure on Japan Financial Intelligence\
    \ Center (JAFIC) processing capacity and on the quality of information exchanged\
    \ under bilateral financial intelligence arrangements.\n\nThe policy's ultimate\
    \ effect on illicit-finance risk depends heavily on whether the FSA moves in parallel\
    \ to update its supervisory expectations for CASPs handling elevated volumes\u2014\
    and whether international counterparts receive timely typology guidance before\
    \ new flow patterns become entrenched."
