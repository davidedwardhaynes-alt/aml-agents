    \ framework introduces genuine complexity. FATF Recommendation 10 requires customer\
    \ due diligence on the beneficial owner and the person acting on their behalf;\
    \ a supported payments model effectively creates a layered principal-agent relationship\
    \ that existing onboarding workflows are not consistently designed to capture.\
    \ Compliance teams will need to determine whether the trusted third party constitutes\
    \ a controller for CDD purposes, how to document the scope of their authority,\
    \ and how transaction monitoring rules should be calibrated when flagging anomalous\
