    \ customer onboarding or transaction monitoring, accountability for FATF Recommendation\
    \ 10 customer due diligence and Recommendation 16 wire-transfer data does not\
    \ transfer with the contract. Under the UK's Money Laundering Regulations 2017,\
    \ as amended, the regulated firm remains the obliged entity; outsourcing the process\
    \ does not outsource the obligation. Where a single vendor services multiple challenger\
    \ banks simultaneously, compliance teams must also consider whether shared screening\
