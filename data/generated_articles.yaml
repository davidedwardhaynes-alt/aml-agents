  full_article: "The Australian Prudential Regulation Authority has disqualified the\
    \ former chair of the collapsed neobank Xinja Bank under the Financial Accountability\
    \ Regime (FAR), marking one of the first high-profile individual accountability\
    \ actions taken under legislation that only extended to the banking sector in\
    \ March 2024. The disqualification bars the individual from holding an accountable\
    \ person position at any APRA-regulated entity, signalling that the regulator\
    \ intends to use FAR's enhanced enforcement toolkit against governance failures\
    \ at failed institutions, not merely prospectively against living firms.\n\nXinja\
    \ surrendered its banking licence in January 2021 after failing to secure the\
    \ capital necessary to sustain its deposit-taking operations, returning approximately\
    \ A$300 million in deposits to customers. The collapse was widely attributed to\
    \ an over-reliance on a single prospective foreign investor and a board that supervisors\
    \ concluded lacked adequate oversight of material business risks. FAR \u2014 which\
    \ replaced the Banking Executive Accountability Regime (BEAR) and was co-administered\
    \ by APRA and ASIC \u2014 strengthened obligations on accountable persons by requiring\
    \ them to take reasonable steps to prevent foreseeable governance failures, with\
    \ civil penalty provisions and disqualification powers that BEAR had only partially\
    \ established.\n\nFor MLROs and heads of financial crime compliance at authorised\
    \ deposit-taking institutions, the action is a reminder that accountability obligations\
    \ attach to the substance of a role, not merely its title or the institution's\
    \ survival. Boards of neobanks and challenger institutions \u2014 which frequently\
    \ operate with lean governance structures and compressed capital runways \u2014\
    \ should reassess whether their chair and senior executive accountability maps\
    \ accurately reflect actual decision-making authority, as FAR requires. ASIC's\
    \ concurrent administration of FAR means conduct dimensions, including whether\
    \ disclosures to regulators were timely and complete, remain live considerations\
    \ alongside prudential ones.\n\nThe disqualification also carries implications\
    \ for insurers and superannuation trustees, to whom FAR obligations extended from\
    \ March 2025. APRA has now demonstrated willingness to pursue individuals retrospectively\
    \ through institutional failure, rather than limiting enforcement to supervisory\
    \ findings in going-concern entities. Regulators in comparable jurisdictions \u2014\
    \ including the MAS under its Guidelines on Individual Accountability and Conduct\
    \ and the FCA under the Senior Managers and Certification Regime \u2014 will note\
    \ whether APRA follows this action with civil penalty proceedings, which would\
    \ test FAR's deterrent architecture more fully than disqualification alone."
