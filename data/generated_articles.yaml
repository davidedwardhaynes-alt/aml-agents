    \ across reporting thresholds when denominated in fiat, requiring transaction\
    \ monitoring systems to apply value-agnostic, volume-based detection logic rather\
    \ than relying solely on currency thresholds.\n\nWhether this represents a temporary\
    \ correction or a sustained retrenchment will partly depend on macroeconomic conditions\
    \ in the second half of 2026. What is less uncertain is that compliance functions\
