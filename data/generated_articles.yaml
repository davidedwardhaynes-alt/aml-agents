    \ platforms that allow fractional ownership of treasuries, money-market instruments,\
    \ or real estate compress that same structural complexity into programmable contracts,\
    \ often with settlement finality that outpaces conventional CDD cycles. MAS has\
    \ addressed some of this in its Project Guardian frameworks and updated Notice\
