  full_article: "The Hong Kong Monetary Authority's Coin Collection Programme, which\
    \ periodically invites the public to deposit accumulated coins at designated bank\
    \ branches and collection points, carries compliance implications that extend\
    \ beyond routine retail banking operations. For financial institutions participating\
    \ in the scheme, bulk coin deposits \u2014 particularly those tendered in large\
    \ volumes by walk-in customers without established account relationships \u2014\
    \ warrant consideration under transaction monitoring frameworks and customer due\
    \ diligence obligations set out in the HKMA's Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance (AMLO) and the associated Guideline on Anti-Money Laundering\
    \ and Counter-Financing of Terrorism.\n\nCoin-based transactions have historically\
    \ occupied a grey zone in AML typology work. While individually low-value, aggregated\
    \ coin deposits can represent a structuring risk, and cash-intensive businesses\
    \ \u2014 laundries, vending operators, parking facilities \u2014 are among the\
    \ legitimate sources that generate such accumulations. FATF Recommendation 10\
    \ on customer due diligence does not exempt low-denomination currency from scrutiny\
    \ where patterns suggest layering, and Hong Kong's AMLO obligations apply to \"\
    transaction\" broadly construed, irrespective of denomination.\n\nFor participating\
    \ institutions, the operational risk lies primarily in the tension between public-service\
    \ accessibility and risk-based onboarding. Branches accepting coins from non-customers\
    \ under a government-endorsed programme may face internal escalation questions:\
    \ at what volume threshold does a walk-in coin deposit require enhanced scrutiny,\
    \ and how should tellers document the source of funds without creating friction\
    \ that undermines the programme's public utility? Institutions with mature transaction\
    \ monitoring systems will likely have pre-configured thresholds and exemption\
    \ logic for scheme-related activity, but smaller or less-resourced participants\
    \ may need to revisit their policies.\n\nFrom a supervisory standpoint, the HKMA's\
    \ parallel role as both scheme administrator and prudential regulator creates\
    \ an implicit expectation that participating banks have thought through the compliance\
    \ architecture before accepting deposits. Examiners reviewing AML frameworks under\
    \ the HKMA's risk-based supervisory approach could reasonably inquire whether\
    \ institutions have documented their rationale for any simplified due diligence\
    \ applied to programme participants.\n\nAs digital payment adoption continues\
    \ to erode everyday coin usage in Hong Kong, the volumes channelled through collection\
    \ programmes may increase, concentrating risk into periodic, high-throughput events.\
    \ Compliance teams would be well served by treating each programme cycle as a\
    \ discrete operational risk event requiring advance policy review rather than\
    \ ad hoc teller discretion."
