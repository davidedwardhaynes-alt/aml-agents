    \ proprietary key management or third-party qualified custodians \u2014 now fall\
    \ within the scope of operational risk assessments that regulators expect to see\
    \ reflected in documented policies. Transaction monitoring systems must be capable\
    \ of handling on-chain activity alongside traditional payment flows, and the absence\
    \ of that capability is increasingly treated as a control gap rather than a technology\
    \ limitation. Under Malaysia's Anti-Money Laundering, Anti-Terrorism Financing\
    \ and Proceeds of Unlawful Activities Act 2001, reporting institutions are required\
    \ to implement adequate systems to detect suspicious transactions irrespective\
    \ of the asset class involved.\n\nFor prudential supervisors, the concern is concentration\
    \ risk in custody arrangements and the adequacy of third-party due diligence where\
    \ institutions rely on external infrastructure providers. A single custody failure\
    \ at scale, as demonstrated by the FTX collapse in 2022, can generate rapid contagion\
    \ across otherwise unconnected compliance programmes.\n\nThe practical implication\
    \ for institutions operating in Malaysia and across ASEAN is that the compliance\
    \ burden is now proportionate to operational depth, not to asset volume alone.\
    \ Institutions that have embedded digital asset workflows without a corresponding\
    \ uplift in their AML/CFT governance, Travel Rule tooling, and suspicious transaction\
    \ reporting capabilities will face a narrowing window before supervisory scrutiny\
    \ becomes supervisory action."
