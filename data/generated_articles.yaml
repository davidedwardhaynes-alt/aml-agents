    \ the risks they pose, and the U.S. Bank Secrecy Act's customer identification\
    \ programme rules under 31 C.F.R. \xA7 1020.220 have long set the benchmark against\
    \ which those controls are measured. Until now, stablecoin issuers have occupied\
    \ a regulatory grey zone: subject to FinCEN's money-services business registration\
    \ requirements in many cases, but not to the full CIP apparatus that governs deposit-taking\
    \ institutions. The GENIUS Act, passed earlier in 2026, created the statutory\
    \ foundation for a federal licensing regime for payment stablecoin issuers; agencies\
