    \ amounts, a step that carries direct implications for brokers, depositories,\
    \ and financial institutions carrying any related assets.\n\nSEBI's enforcement\
    \ focus on illiquid stock options is not new. The regulator has pursued a sustained\
    \ campaign against circular trading and fictitious booking of profits or losses\
    \ through thinly traded options contracts on Indian exchanges since at least 2018,\
    \ when it first issued large-scale orders identifying hundreds of entities allegedly\
    \ using these instruments to launder undisclosed income or generate artificial\
    \ book losses. The mechanism typically involves coordinated buy-sell arrangements\
    \ in low-volume contracts that move prices artificially, allowing participants\
    \ to claim tax-advantaged capital gains or losses while obscuring the origin of\
    \ funds \u2014 conduct that engages market manipulation provisions under the SEBI\
    \ Act, 1992 and raises predicate offence concerns under the Prevention of Money\
    \ Laundering Act, 2002 (PMLA).\n\nFor compliance officers at broking firms and\
    \ banks, a published recovery certificate carries practical obligations. Under\
