    \ of US compliance functions, the reciprocal implication is a growing intake of\
    \ foreign private issuers subject to SEC Rule 10b-5 and FinCEN's customer due\
    \ diligence rule, but with beneficial ownership histories documented under UK\
    \ rather than US standards \u2014 a reconciliation challenge that transaction\
    \ monitoring calibration will need to accommodate.\n\nWhether the 200-company\
