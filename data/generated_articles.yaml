    \ that flow directly from Singapore's Corruption, Drug Trafficking and Other Serious\
    \ Crimes (Confiscation of Benefits) Act and the broader FATF Recommendation 10\
    \ framework on CDD.\n\nFor compliance officers at dtcpay, the practical implications\
