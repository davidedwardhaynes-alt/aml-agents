    \ FATF-member jurisdictions. Co-leading a round in an AI vendor that its own regulated\
    \ subsidiaries may eventually procure creates conflicts-of-interest and third-party\
    \ risk management questions that internal audit and compliance functions will\
    \ need to document carefully under existing outsourcing and vendor due diligence\
    \ standards.\n\nFor prospective adopters, the critical due diligence question\
