    \ framework, and FATF's 2023 mutual evaluation of the Philippines \u2014 which\
    \ led to the country's removal from the grey list in January 2023 \u2014 identified\
    \ customer due diligence gaps in the digital-payments sector as a residual concern.\
    \ GCash, which claims over 94 million registered users, sits at the centre of\
    \ that regulatory attention given the transaction volumes it intermediates for\
    \ unbanked and underbanked segments where beneficial-ownership verification remains\
    \ operationally difficult.\n\nFor MLROs and compliance functions at correspondent\
    \ banks and institutional investors evaluating the IPO, the public offering introduces\
    \ a dual layer of scrutiny. Securities regulations will require Mynt to disclose\
