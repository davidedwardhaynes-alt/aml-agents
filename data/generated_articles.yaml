    \ and compliance officers at counterparty institutions, the authorisation carries\
    \ practical significance. Luxembourg's CSSF is a FATF-standard supervisor; PI\
    \ authorisation requires demonstrable compliance with the EU's Transfer of Funds\
    \ Regulation, which since 2023 has extended travel-rule obligations to crypto-asset\
    \ transfers without threshold, aligning with FATF Recommendation 16. Zodia's regulated\
    \ status under multiple frameworks reduces correspondent-risk friction for banks\
    \ and asset managers conducting due diligence under their own AML programme obligations,\
    \ whether governed by the EU's forthcoming AMLA regulation, the UK's Money Laundering\
