  full_article: "Temenos's launch of composable, API-connected retail deposits and\
    \ lending modules on 7 May 2026 places modular core banking firmly within scope\
    \ for financial crime compliance officers, not merely for technology teams. By\
    \ enabling banks to modernise discrete product lines without full core replacement,\
    \ the architecture introduces new integration seams that carry direct implications\
    \ for transaction monitoring, customer data integrity, and regulatory reporting\
    \ obligations.\n\nThe context is important. Legacy core banking environments have\
    \ long frustrated AML functions because data silos, batch-processing cycles, and\
    \ fragmented customer records impede the real-time transaction monitoring now\
    \ expected by regulators. MAS Notice 626 in Singapore, for instance, requires\
    \ financial institutions to have robust systems for ongoing customer due diligence\
    \ and suspicious transaction detection. Similar obligations flow from FATF Recommendation\
    \ 10 on continuous monitoring and Recommendation 20 on suspicious transaction\
    \ reporting. A patchwork of composable modules connected via event-driven APIs\
    \ does not automatically satisfy these requirements; it reframes where the compliance\
    \ risk sits.\n\nFor MLROs and heads of financial crime compliance, the critical\
    \ question is data lineage. When a retail lending module operates as a standalone\
    \ capability feeding into a legacy core through API calls, the institution must\
    \ be able to demonstrate that transaction data remains complete, timestamped,\
    \ and auditable across the entire chain. Any latency, transformation loss, or\
    \ reconciliation gap between the composable layer and the system of record could\
    \ compromise the integrity of suspicious transaction reports and breach record-keeping\
    \ requirements under frameworks such as Singapore's AMLA or Australia's AML/CTF\
    \ Act Part 10.\n\nTechnology vendors of this class are also increasingly subject\
