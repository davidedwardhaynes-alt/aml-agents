    \ settlement that implies systemic failures in creditworthiness assessment could\
    \ also attract heightened scrutiny under DORA operational resilience provisions\
    \ if process failures are linked to automated decisioning models.\n\nThe broader\
    \ lesson for compliance professionals is structural: as BNPL becomes fully regulated\
    \ credit, the liability architecture that governs traditional lenders \u2014 supervisory,\
    \ civil, and increasingly criminal \u2014 follows in parallel. Litigation foundations\
