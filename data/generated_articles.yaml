  summary: "The deployment of autonomous AI agents as intermediaries in cryptocurrency\
    \ transactions introduces a structural gap in beneficial ownership identification\
    \ that existing AML frameworks were not designed to address. Where a human customer\
    \ initiates a wallet-to-wallet transfer, obligated entities can apply standard\
    \ CDD procedures under FATF Recommendation 10; where an AI agent executes that\
    \ same transfer autonomously\u2014potentially across dozens of protocols within\
