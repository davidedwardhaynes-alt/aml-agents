    \ with investigators can expect materially better enforcement outcomes, a development\
    \ that recalibrates the cost-benefit calculus for boards and compliance functions\
    \ weighing disclosure decisions against litigation risk.\n\nThe guidance arrives\
    \ against a backdrop of sustained regulatory pressure on corporate Australia.\
    \ The AML/CTF Act 2006 already imposes mandatory reporting obligations on designated\
    \ reporting entities via suspicious matter reports to AUSTRAC, but voluntary disclosure\
    \ of broader criminal conduct\u2014including bribery, fraud, and tax evasion with\
    \ money-laundering dimensions\u2014has historically lacked a clear prosecutorial\
    \ framework. The AFP's position aligns with FATF Recommendation 30, which calls\
    \ on competent authorities to develop proportionate and dissuasive enforcement\
    \ policies, and mirrors deferred prosecution agreement regimes operating in the\
    \ United Kingdom and United States that explicitly reward early cooperation.\n\
    \nFor MLROs and Heads of Financial Crime Compliance, the practical implication\
    \ is immediate. Where internal investigations surface conduct that falls outside\
    \ existing AUSTRAC reporting triggers\u2014overseas bribery under the Criminal\
    \ Code Act, for instance, or internal fraud without a clear predicate reporting\
    \ obligation\u2014the AFP guidance provides a documented basis for recommending\
    \ proactive disclosure to the board and external legal counsel. The reputational\
    \ and financial calculus shifts when enforcement leniency is not merely implied\
    \ but institutionally articulated.\n\nCorporate lawyers will note that the guidance\
    \ does not constitute a statutory safe harbour, and the AFP retains prosecutorial\
    \ discretion in all cases. The quality and timing of cooperation will matter:\
    \ disclosures that follow regulatory detection rather than precede it are unlikely\
    \ to attract the same treatment. Boards should therefore ensure that internal\
    \ escalation pathways, triage protocols, and legal privilege considerations are\
    \ stress-tested before an incident occurs rather than after.\n\nThe broader signal\
