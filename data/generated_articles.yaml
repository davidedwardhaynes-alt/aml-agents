    \ That architecture came under intensified scrutiny following the FDIC's 2024\
    \ consent orders against multiple sponsor banks and the OCC's non-objection framework\
    \ guidance on third-party relationships, which together raised the compliance\
    \ bar for banks that white-label deposit infrastructure. Mercury itself drew attention\
    \ in 2023 when its then-partner Evolve Bank & Trust appeared in Federal Reserve\
    \ enforcement actions related to third-party oversight deficiencies\u2014a reminder\
    \ that the AML and onboarding controls of the fintech front-end are only as robust\
    \ as the sponsor institution's own BSA/AML programme, examined under 31 U.S.C.\
    \ \xA7 5318 and its implementing rules at 31 C.F.R. Part 1020.\n\nFor MLROs and\
    \ heads of financial crime compliance, the growth trajectory of platforms like\
    \ Mercury raises practical questions about correspondent and downstream exposure.\
    \ Institutions that receive or transmit funds on behalf of fintech intermediaries\
    \ must satisfy themselves\u2014under FATF Recommendation 13 on correspondent banking\
    \ and domestic equivalents\u2014that the intermediary's customer due diligence\
    \ and transaction monitoring standards are commensurate. A $5.2 billion entity\
    \ serving tens of thousands of early-stage companies, many with complex beneficial\
    \ ownership structures or offshore incorporation, represents a meaningful concentration\
    \ risk if its CDD uplift has not kept pace with its balance-sheet growth.\n\n\
    From an investor perspective, the valuation implicitly prices in the assumption\
    \ that Mercury will either obtain its own charter or cement sufficiently stable\
    \ sponsor-bank relationships to sustain growth without regulatory disruption\u2014\
    neither outcome being straightforward. The de novo charter pathway remains lengthy\
    \ and capital-intensive under current OCC and state-banking-department timelines.\n\
    \nThe broader lesson for supervisors is structural: as capital continues to validate\
    \ fintech-native banking models, the adequacy of third-party oversight frameworks\u2014\
    not just the fintechs' own controls\u2014will determine whether AML risks are\
    \ being managed or merely displaced to the balance sheets of regulated sponsors."
