  full_article: "The United States Congress is advancing the GENIUS Act and the broader\
    \ digital-asset framework known as the Clarity Act without fully resolving how\
    \ anti-corruption obligations will be operationalised across decentralised market\
    \ structures \u2014 a gap that carries direct consequences for global AML supervisors\
    \ whose institutions maintain correspondent or counterparty relationships with\
    \ US-licensed digital-asset entities.\n\nThe legislative context matters. The\
    \ Bank Secrecy Act and its implementing regulations already impose customer due\
    \ diligence, suspicious activity reporting, and beneficial ownership identification\
    \ requirements on money services businesses, including many crypto intermediaries.\
    \ FATF Recommendation 16 \u2014 the travel rule \u2014 and its interpretive guidance\
    \ on virtual assets, updated in 2021, established an internationally agreed baseline\
    \ that the Financial Crimes Enforcement Network has proposed incorporating through\
    \ its own rulemaking. The Clarity Act's current drafts risk creating a tiered\
    \ system in which certain decentralised finance protocols and token issuers fall\
    \ outside the perimeter of those obligations, depending on how \"digital commodity\"\
    \ and \"digital asset broker\" are ultimately defined.\n\nFive structural concerns\
    \ have been identified by transparency advocates and compliance professionals.\
    \ These include the absence of a statutory beneficial ownership look-through requirement\
    \ for on-chain governance tokens; ambiguity over which regulator \u2014 the SEC\
    \ or CFTC \u2014 bears primary AML supervision where a token migrates between\
    \ classifications; limited provisions addressing politically exposed persons transacting\
    \ through self-hosted wallets; no explicit prohibition on Congressional insiders\
    \ trading tokens whose regulatory treatment is shaped by pending legislation;\
    \ and an enforcement gap for foreign digital-asset service providers accessing\
    \ US retail investors without a physical presence.\n\nFor compliance officers\
    \ outside the United States, particularly in Singapore where MAS Notice PSN02\
    \ imposes conduct standards on digital payment token service providers, or in\
    \ Hong Kong where the SFC's VASP licensing regime carries its own AML obligations\
    \ under AMLO, the Clarity Act's definitions will have extraterritorial relevance.\
    \ Correspondent relationships and token listings both create nexus points.\n\n\
    Congress has an opportunity before finalisation to incorporate explicit statutory\
    \ language addressing each gap, drawing on the existing BSA architecture rather\
    \ than constructing parallel obligations. Whether political momentum \u2014 and\
    \ the commercial interests now openly lobbying on Capitol Hill \u2014 allows for\
    \ that level of technical rigour remains the central question as the legislation\
    \ moves toward a floor vote."
