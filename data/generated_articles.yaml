    \ for a category of digital asset that regulators have long identified as capable\
    \ of transmitting risk across financial markets at scale. For compliance officers\
    \ at firms holding, distributing, or integrating sterling-backed stablecoins,\
    \ the publication triggers a concrete re-evaluation of counterparty due diligence\
    \ frameworks and reserve-asset treatment.\n\nThe move follows a protracted legislative\
    \ and supervisory journey. The Financial Services and Markets Act 2023 granted\
    \ HM Treasury powers to bring stablecoins used as a means of payment into the\
    \ UK regulatory perimeter, and the Payment Systems Regulator and Financial Conduct\
    \ Authority have separately consulted on conduct and payment-system rules. The\
    \ Bank's intervention addresses the systemic tier\u2014issuers whose scale or\
    \ interconnectedness could threaten financial stability\u2014a designation conceptually\
    \ aligned with FATF Recommendation 15's call for jurisdictions to subject virtual\
    \ asset service providers to risk-proportionate oversight, though the Bank's framework\
    \ operates on prudential rather than purely AML grounds.\n\nFor MLROs and heads\
    \ of financial crime compliance, the draft Code introduces several pressure points.\
    \ Reserve-asset composition requirements and redemption-at-par obligations will\
    \ affect how firms assess the money-laundering and sanctions risks embedded in\
    \ the assets backing a stablecoin. If reserves include tokenised securities or\
    \ cross-border holdings, existing customer-asset and correspondent-relationship\
    \ risk assessments may require revision. Additionally, the systemic designation\
    \ implies heightened supervisory reporting, which raises questions about data-sharing\
    \ obligations and whether transaction monitoring systems calibrated for e-money\
    \ instruments remain adequate for stablecoin flows of the contemplated volume.\n\
    \nFor stablecoin issuers themselves, the Code of Practice will function as a rulebook\
    \ with the force of direction under the Bank's stabilisation powers. Governance,\
    \ operational resilience, and wind-down planning requirements mirror expectations\
    \ already familiar from the Prudential Regulation Authority's operational resilience\
    \ framework, but their application to a novel liability structure will require\
    \ boards to commission fresh legal analysis.\n\nThe consultation period will determine\
    \ how far the final rules accommodate the practical realities of programmable\
    \ payment rails. Regulators in Singapore\u2014where MAS Notice PSN02 already governs\
    \ single-currency stablecoin issuers\u2014and the European Union under MiCA provide\
    \ reference points, but the Bank's systemic threshold introduces a distinctly\
    \ macroprudential layer that neither framework fully replicates. How the Bank\
    \ calibrates that threshold, and whether it publishes quantitative criteria, will\
    \ be the detail compliance teams watch most closely."
