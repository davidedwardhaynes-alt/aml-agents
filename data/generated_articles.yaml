  full_article: "The United States Securities and Exchange Commission has formally\
    \ proposed rescinding its climate-related disclosure rules, originally adopted\
    \ in March 2024, which required public companies to report Scope 1 and Scope 2\
    \ greenhouse gas emissions, climate-related risks, and certain financial statement\
    \ disclosures. The proposal, published on 29 May 2026, signals a definitive regulatory\
    \ retreat that carries material implications for cross-border capital markets\
    \ compliance and the coherence of global ESG disclosure frameworks.\n\nThe 2024\
    \ rules had themselves been a years-long undertaking, drawing over 24,000 comment\
    \ letters and surviving immediate legal challenge before being voluntarily stayed\
    \ by the Commission pending judicial review. Their proposed rescission follows\
    \ a broader deregulatory posture adopted under the current administration and\
    \ mirrors the SEC's earlier withdrawal from the Net-Zero Financial Services Providers\
    \ Alliance. For compliance officers operating across jurisdictions, the development\
    \ creates an asymmetry: the European Union's Corporate Sustainability Reporting\
    \ Directive and the ISSB's IFRS S1 and S2 standards \u2014 both of which have\
    \ influenced disclosure regimes in Singapore, Hong Kong, and Australia \u2014\
    \ remain in force or are advancing, while the US retreats.\n\nFrom a financial\
    \ crime compliance standpoint, the practical concern is less about emissions data\
    \ per se and more about the integrity of public disclosures on which AML and market-integrity\
    \ assessments depend. MAS Notice SFA 04-N02 and equivalent instruments in other\
    \ jurisdictions embed reliance on audited public filings when assessing issuer\
    \ risk. If US-listed entities reduce climate-related disclosures, analysts conducting\
    \ due diligence on those securities \u2014 or on funds holding them \u2014 face\
    \ a thinner evidentiary base when evaluating whether sustainability claims in\
    \ prospectuses or fund marketing materials constitute materially misleading statements\
    \ under instruments such as Section 390 of the Securities and Futures Act or corresponding\
    \ provisions of the US Securities Exchange Act.\n\nAsset managers with fiduciary\
    \ duties under ERISA or equivalent frameworks will also need to reassess how they\
    \ document ESG-related investment decisions absent standardised underlying data,\
    \ increasing the litigation and regulatory surface area around greenwashing allegations.\
    \ The SEC's own enforcement division has pursued greenwashing cases on the premise\
    \ that voluntary ESG claims can constitute actionable misrepresentations; that\
    \ enforcement theory does not disappear with mandatory disclosure rules.\n\nThe\
    \ proposal now enters a public comment period. Whether it proceeds to final rule\
    \ or is further contested in court, the divergence between US and international\
    \ disclosure standards will require compliance functions at multinational firms\
    \ to maintain dual-track monitoring \u2014 a structural complexity that shows\
    \ little sign of resolving in the near term."
