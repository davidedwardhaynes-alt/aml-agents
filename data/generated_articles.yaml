  full_article: "The automation of remortgage processing at HSBC UK, through the adoption\
    \ of LMS's conveyancing network technology, removes manual document handling from\
    \ a transaction type that carries non-trivial exposure under the Proceeds of Crime\
    \ Act 2002 and the Money Laundering, Terrorist Financing and Transfer of Funds\
    \ (Information on Payer) Regulations 2017. The immediate implication for compliance\
    \ functions is that accelerated straight-through processing compresses the time\
    \ available for transaction monitoring and customer due diligence reviews at the\
    \ point of application.\n\nRemortgaging has long occupied an awkward position\
    \ in property-sector AML frameworks. Unlike a purchase transaction, it does not\
    \ introduce new funds into the property market in a straightforward sense, yet\
    \ it can facilitate equity release that obscures the origins of embedded value\
    \ \u2014 a dynamic acknowledged in FATF Guidance on the Real Estate Sector (2022),\
    \ which specifically notes refinancing as a vehicle for layering. The UK's regulated\
    \ sector obligations under the MLRs 2017, including ongoing monitoring requirements,\
    \ apply equally to mortgage lenders as to conveyancers, meaning automation at\
    \ one node does not extinguish obligations across the chain.\n\nFor MLROs at mortgage\
    \ lenders, the practical question is whether automated workflow has been designed\
    \ with AML controls embedded rather than bolted on afterward. Straight-through\
    \ processing that bypasses manual document review requires compensating controls:\
    \ automated identity verification aligned with Regulation 28 enhanced due diligence\
    \ triggers, real-time sanctions screening, and case-flagging logic calibrated\
    \ to beneficial ownership changes or unusual equity-release patterns. The FCA's\
    \ Financial Crime Guide (FCG 3) is explicit that technology adoption does not\
    \ transfer or dilute a firm's responsibility for risk-based controls.\n\nConveyancers\
    \ operating within the LMS panel retain their own obligations under the MLRs 2017\
    \ and the Solicitors Regulation Authority's AML guidance. Automation that streamlines\
    \ data-sharing between lender and conveyancer can, if properly architected, improve\
    \ information symmetry and reduce the duplicated CDD burden that the SRA and LSAG\
    \ guidance have historically flagged as an inefficiency. The risk is the reverse:\
    \ speed becoming a proxy for diligence.\n\nAs UK Finance and the FCA continue\
    \ to scrutinise mortgage fraud and property-linked money laundering in the post-Economic\
    \ Crime and Corporate Transparency Act 2023 environment, lenders integrating automation\
    \ into high-value secured lending will face increasing supervisory interest in\
    \ whether their control frameworks have kept pace with their operational ones."
