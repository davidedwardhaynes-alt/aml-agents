    \ regulatory attention \u2014 with direct consequences for AML/CFT control frameworks\
    \ and board-level accountability.\n\nThe trajectory is neither sudden nor surprising.\
    \ Bank Negara Malaysia's Financial Technology Regulatory Sandbox and the Securities\
    \ Commission's Digital Asset Exchange framework have progressively normalised\
    \ institutional participation in digital asset markets since the late 2010s. Regionally,\
    \ MAS Notice PSN02 and the amendments to Singapore's Payment Services Act extended\
    \ licensing obligations to digital payment token service providers, while FATF's\
    \ updated Recommendation 15 and its Guidance on Virtual Assets and Virtual Asset\
    \ Service Providers have established a baseline expectation that covered institutions\
    \ apply full risk-based AML/CFT controls \u2014 including Travel Rule compliance\
    \ \u2014 to virtual asset activity. Institutions that treated digital assets as\
