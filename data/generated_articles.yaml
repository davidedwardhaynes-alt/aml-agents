  full_article: "Minnesota's legislature has moved to authorise state-chartered banks\
    \ to offer digital-asset custody and related services directly to retail and commercial\
    \ clients, a measure designed to retain cryptocurrency revenue within community\
    \ and regional institutions rather than cede it to larger money-centre banks with\
    \ established crypto infrastructure. The practical implication is immediate: smaller\
    \ depositories that previously referred digital-asset business to third-party\
    \ custodians or out-of-state platforms may now compete on custody, staking administration,\
    \ and tokenised-asset settlement without requiring a separate trust charter or\
    \ federal licence overlay.\n\nThe backdrop is a years-long tension between state\
    \ and federal regulatory perimeters for digital assets. The OCC's interpretive\
    \ letters of 2020 and 2021 confirmed that federally chartered banks could custody\
    \ crypto assets, giving national institutions a first-mover advantage. State-chartered\
    \ members of the Federal Reserve system faced ambiguity under the Fed's 2022 guidance\
    \ requiring prior supervisory non-objection for novel activities, effectively\
    \ slowing community bank entry. Minnesota's move mirrors earlier actions in Wyoming\
    \ \u2014 which created the Special Purpose Depository Institution framework \u2014\
    \ and Texas, reflecting a broader state-level effort to legislate certainty where\
    \ federal guidance has remained fragmented ahead of any comprehensive US digital-asset\
    \ statute.\n\nFor compliance officers at affected institutions, the authorisation\
    \ creates new obligations rather than merely new opportunities. Custody of digital\
    \ assets triggers customer due diligence requirements under FinCEN's existing\
    \ BSA framework, and the FATF Travel Rule \u2014 implemented domestically through\
    \ FinCEN's 2019 proposed rule and subsequent guidance \u2014 applies to virtual\
    \ asset transfers above threshold. Institutions will need to assess whether their\
    \ transaction monitoring systems can ingest on-chain data, identify unhosted wallet\
    \ counterparties, and flag mixer or privacy-protocol exposure consistent with\
    \ FATF Recommendation 15. Board-level risk appetite statements and written programme\
    \ updates will be necessary preconditions to launch.\n\nFor supervisors at the\
    \ Minnesota Department of Commerce, the challenge is calibrating examination capacity.\
    \ Community banks accustomed to traditional asset safekeeping have limited internal\
    \ crypto expertise, and third-party technology reliance \u2014 likely for key\
    \ management and blockchain analytics \u2014 introduces vendor concentration risk\
    \ that examiners will need to assess under existing third-party risk management\
    \ standards.\n\nThe federal picture will ultimately determine how durable Minnesota's\
    \ competitive positioning proves. Should Congress pass baseline digital-asset\
    \ market-structure legislation aligning custody standards nationally, the advantage\
    \ conferred on state-chartered institutions may narrow. Until then, the state's\
    \ action functions as both a market-development tool and a test of whether community\
    \ banks can absorb the compliance infrastructure that digital-asset services genuinely\
    \ require."
