    \ closely associated with a decentralised perpetuals exchange that sits in regulatory\
    \ grey areas across multiple jurisdictions.\n\nFor firms operating under MAS Notice\
    \ SFA 04-N02 or the expanded digital payment token service requirements under\
    \ the Payment Services Act, the rotation matters because product-level risk assessments\
    \ cannot be ported from one asset class to another without adjustment. XRP's long-running\
    \ litigation history with the US Securities and Exchange Commission, now largely\
    \ resolved, created documentation gaps in some firms' legal-risk registers that\
    \ may not yet have been formally closed. HYPE, meanwhile, raises questions under\
