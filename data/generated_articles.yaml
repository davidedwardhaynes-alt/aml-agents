    \ entities should review obligations under the AML/CTF Act 2006 where Russian-origin\
    \ virtual asset transactions touch their platforms.\n\nThe deeper concern is not\
    \ Sberbank's wallet product itself, but the normalisation signal it sends. As\
    \ sanctioned-jurisdiction state actors embed themselves in regulated-looking crypto\
    \ infrastructure, the correspondent banking and VASP communities face increasing\
    \ pressure to maintain substantive \u2014 rather than procedural \u2014 compliance\
    \ boundaries. Regulatory guidance on this specific configuration remains thin,\
