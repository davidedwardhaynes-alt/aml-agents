    \ under AML/CTF Rule 15 apply if a PEP nexus or terrorism-financing indicator\
    \ is identified. Second, if a suspicious matter report (SMR) has not yet been\
    \ filed in relation to such a customer, compliance teams should assess whether\
    \ the threshold under section 41 of the AML/CTF Act \u2014 \"suspects on reasonable\
    \ grounds\" \u2014 has been met. Third, social media-facilitated threats increasingly\
    \ appear in AUSTRAC typologies as precursors to financial crime, including fundraising\
    \ for extremist causes.\n\nFrom a supervisory standpoint, the AFP's willingness\
    \ to prosecute online threats at the federal level signals that law enforcement\
