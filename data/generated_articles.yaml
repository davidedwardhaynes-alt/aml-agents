  summary: "Kalshi's decision to offer crypto perpetual contracts has reignited a\
    \ long-running jurisdictional dispute between the Commodity Futures Trading Commission\
    \ and the Securities and Exchange Commission over the precise classification of\
    \ instruments that carry characteristics of both futures and swaps \u2014 a distinction\
