  full_article: "The Prudential Regulation Authority published a consultation on 19\
    \ June 2026 setting out proposed adjustments to the internal model approach (IMA)\
    \ for market risk, completing the UK's legislative translation of the Basel 3.1\
    \ framework. For financial crime and compliance professionals, the development\
    \ is consequential not because it directly rewrites AML obligations, but because\
    \ the capital treatment of trading book exposures will materially affect how firms\
    \ resource their front-to-back control environments, including transaction monitoring\
    \ infrastructure that spans both prudential and financial crime perimeters.\n\n\
    The Basel Committee's Fundamental Review of the Trading Book (FRTB), finalised\
    \ in 2019, replaced value-at-risk with expected shortfall as the primary sensitivity\
    \ measure and introduced tighter model approval criteria. The UK's post-Brexit\
    \ implementation path diverged modestly from the EU's CRR3 timeline, and this\
    \ consultation represents the PRA's effort to close that gap while preserving\
    \ national discretion on certain desk-level aggregation rules. For internationally\
    \ active banks operating under MAS Notice 637, the EU's CRR3, and UK CRR2/CRR3\
    \ simultaneously, the resulting patchwork of model standards will require careful\
    \ reconciliation across booking locations.\n\nFrom a financial crime governance\
    \ perspective, the IMA consultation matters for at least two reasons. First, banks\
    \ that face higher capital requirements for specific trading desks may reduce\
    \ activity in those areas, altering the product and counterparty risk profiles\
    \ that feed into FATF Recommendation 10 customer due diligence and Recommendation\
    \ 16 wire-transfer assessments. Second, internal model approvals involve PRA supervisors\
    \ scrutinising data quality and governance frameworks \u2014 disciplines that\
    \ overlap substantially with the data integrity requirements underpinning transaction\
    \ monitoring systems referenced in, for instance, the UK's Money Laundering Regulations\
    \ 2017 (as amended) and equivalent provisions in Hong Kong's AMLO.\n\nCompliance\
    \ functions should therefore engage with their prudential colleagues during the\
    \ consultation period, which will run according to the PRA's standard 13-week\
    \ window. Firms that allow IMA implementation to proceed in isolation from financial\
    \ crime architecture reviews risk embedding inconsistencies between their risk-data\
    \ aggregation capabilities \u2014 governed by BCBS 239 \u2014 and the audit-trail\
    \ requirements that AML supervisors increasingly scrutinise during thematic reviews.\
    \ The PRA's completion of Basel 3.1 is a prudential milestone, but its downstream\
    \ effects on compliance resource allocation and data infrastructure will reward\
    \ cross-functional attention now rather than after final rules are published."
