    \ due diligence on fintech lending partners deserves renewed attention. MAS's\
    \ Guidelines on Individual Accountability and Conduct place explicit responsibility\
    \ on senior managers to ensure that third-party risk does not become a compliance\
    \ blind spot.\n\nBizcap's expansion reflects genuine demand from Singapore's approximately\
    \ 280,000 SMEs, many of whom remain underserved by bank credit committees that\
    \ are risk-averse at the sub-S$2 million level. The commercial logic is sound.\
    \ Whether the compliance infrastructure has scaled commensurately with the lending\
    \ cap is a question supervisors, and the lender's own risk function, should be\
    \ asking in parallel with the growth strategy."
