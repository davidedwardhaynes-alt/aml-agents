    \ a move that signals the regulator's intent to develop a more structured framework\
    \ for products that have, until now, operated in an ambiguous approval environment.\
    \ The immediate implication for compliance professionals is that product governance\
    \ and anti-money laundering controls applicable to these vehicles are likely to\
