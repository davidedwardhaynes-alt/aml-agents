  full_article: "The rapid expansion of decentralised finance protocols across Latin\
    \ America\u2014where remittance flows exceeded USD 160 billion in 2024 and formal\
    \ banking penetration remains below 50% in several jurisdictions\u2014presents\
    \ compliance professionals with a structural challenge that existing supervisory\
    \ frameworks were not designed to anticipate. When individuals in El Salvador,\
    \ Argentina, or Venezuela access liquidity pools or stablecoin rails outside any\
    \ licensed intermediary, the correspondent and originator identification obligations\
    \ that underpin FATF Recommendation 16 on wire transfers have no obvious point\
    \ of attachment.\n\nFATF's updated guidance on virtual assets, revised in 2023,\
    \ attempted to address this by extending the Travel Rule to virtual asset service\
    \ providers and flagging DeFi arrangements where a \"controlling person\" could\
    \ be identified as a de facto VASP. In practice, however, automated market makers\
    \ and non-custodial wallets present no such controlling person, leaving jurisdictions\
    \ that have transposed FATF standards\u2014including through instruments such\
    \ as Singapore's MAS Notice PSN02, Australia's AML/CTF Act Part 6A, or Hong Kong's\
    \ expanded VASP licensing regime\u2014with enforcement gaps when transactions\
    \ originate or terminate in protocols governed only by smart contract logic.\n\
    \nFor MLROs at banks and payment firms processing Latin American remittance corridors,\
    \ the practical implication is elevated exposure in correspondent relationships.\
    \ Where a beneficiary institution cannot demonstrate that funds did not pass through\
    \ an unhosted wallet or DeFi bridge, transaction monitoring typologies need updating\
    \ to flag stablecoin on-ramp and off-ramp activity, particularly USDT and USDC\
    \ flows through exchanges serving the region. The intersection of hyperinflationary\
    \ pressures in Argentina and Venezuela with permissionless dollar-denominated\
    \ protocols creates genuine financial-inclusion utility, but it also produces\
    \ transaction patterns that are difficult to attribute and nearly impossible to\
    \ reverse.\n\nRegulators in Brazil and Mexico have moved incrementally: Brazil's\
    \ Receita Federal has asserted tax reporting obligations over crypto assets since\
    \ 2019, and Mexico's Fintech Law nominally covers certain digital asset operations,\
    \ though DeFi sits outside its practical perimeter. Neither framework imposes\
    \ CDD obligations on protocol users directly.\n\nThe more durable supervisory\
    \ question is whether the FATF plenary\u2014next scheduled to revisit virtual\
    \ asset standards in late 2026\u2014will move toward outcome-based requirements\
    \ that place enhanced due diligence obligations on fiat on-ramp and off-ramp points,\
    \ effectively treating those choke points as the regulated perimeter regardless\
    \ of what occurs on-chain between them. For compliance teams, building monitoring\
    \ capability now around those fiat interfaces is a more tractable near-term response\
    \ than waiting for that consensus to form."
