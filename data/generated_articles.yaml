    \ standards.\n\nWhether comparable programmes emerge at peer institutions will\
    \ likely depend on how supervisors in the UK and internationally begin weighting\
    \ staff AI competency in thematic reviews and individual firm assessments. NatWest's\
    \ initiative may prove instructive less as a benchmark of best practice than as\
    \ an early indicator of where the regulatory floor is moving."
