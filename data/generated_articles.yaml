  full_article: "Neil Woodford, whose Woodford Equity Income Fund collapsed in 2019\
    \ trapping approximately 300,000 retail investors in a prolonged liquidity crisis,\
    \ faces fresh civil proceedings from the Financial Conduct Authority over allegations\
    \ that he and the UAE-registered vehicle W4.0 \u2014 trading through the subscription\
