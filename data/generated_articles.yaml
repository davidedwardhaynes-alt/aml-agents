    \ intervention points. Batch-processing cycles and cut-off times create opportunities\
    \ to apply screening, review queued payments, and act on alerts before funds move\
    \ irrevocably. The Financial Action Task Force's Recommendation 16 on wire transfers\
    \ requires obligated institutions to obtain, hold, and transmit originator and\
    \ beneficiary information in real time \u2014 a standard that becomes operationally\
    \ sharper when settlement itself becomes continuous. The UK's own Money Laundering\
    \ Regulations 2017 and the Proceeds of Crime Act 2002 impose obligations that\
