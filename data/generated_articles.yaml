  full_article: "Monzo's partnership with credit marketplace ClearScore to streamline\
    \ debt consolidation carries implications that extend well beyond consumer convenience.\
    \ By integrating open-banking data and pre-qualification flows directly into a\
    \ current account interface, the arrangement concentrates a more complete picture\
    \ of a customer's liability profile within a single regulated entity \u2014 a\
    \ development with material consequences for financial crime risk frameworks.\n\
    \nDebt consolidation products have historically attracted scrutiny from financial\
    \ intelligence units precisely because they can obscure the provenance of funds.\
    \ When multiple credit lines are retired simultaneously through a single new facility,\
    \ transaction monitoring systems must be configured to distinguish legitimate\
    \ deleveraging from layering activity, where a bad actor uses a consolidation\
    \ loan to replace traceable illicit liabilities with ostensibly clean structured\
    \ debt. The UK's Proceeds of Crime Act 2002 and the FCA's Senior Management Arrangements,\
    \ Systems and Controls sourcebook both place obligations on firms to ensure their\
    \ products are not used to facilitate such arrangements, regardless of how those\
    \ products are packaged commercially.\n\nFor Monzo's Money Laundering Reporting\
    \ Officer, the integration raises questions about customer risk re-scoring at\
    \ the point of consolidation. Under the Joint Money Laundering Steering Group\
    \ guidelines and FATF Recommendation 10, ongoing due diligence must be commensurate\
    \ with assessed risk; a customer who retires several external credit products\
    \ and takes on a single large Monzo facility presents a materially different profile\
    \ than one with a stable, longstanding credit relationship. ClearScore's role\
    \ as a data intermediary \u2014 holding bureau, open-banking, and affordability\
    \ signals \u2014 adds a third-party dependency that compliance teams will need\
    \ to map against outsourcing and data-sharing obligations under the FCA's SYSC\
    \ 8 framework.\n\nThere is also a customer due diligence dimension specific to\
    \ the source-of-debt question. Firms undertaking consolidation should understand\
    \ not merely a customer's ability to repay, but the nature of the underlying obligations\
    \ being retired. Undisclosed liabilities connected to predicate offences \u2014\
    \ fraud, tax evasion, or organised crime \u2014 could, in theory, be laundered\
    \ through an otherwise routine consolidation transaction.\n\nAs embedded finance\
