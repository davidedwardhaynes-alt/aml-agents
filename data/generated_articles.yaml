    \ due diligence on higher-risk business relationships, and in Australia, where\
    \ the reformed AML/CTF Act imposes expanded reporting entity obligations from\
    \ 2026, compliance teams should be stress-testing whether existing typologies\
    \ adequately capture the risk profile of corporate treasury programmes whose acquisition\
    \ pace rivals some exchange-level flows. The divergence between these two firms\
    \ is less a curiosity of market sentiment and more a prompt for supervisors to\
    \ examine whether beneficial ownership registries and transaction reporting obligations\
    \ keep pace with the scale at which institutional capital now moves through crypto-asset\
    \ markets."
