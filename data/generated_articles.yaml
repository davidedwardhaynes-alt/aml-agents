  full_article: "Capsa AI's $18 million Series A, announced on 11 June 2026, arrives\
    \ at a moment when private capital managers are under mounting pressure from supervisors\
    \ to demonstrate that their AML and investor-due-diligence controls are fit for\
    \ purpose \u2014 pressure that generic enterprise software has largely failed\
    \ to address.\n\nPrivate markets have long occupied an awkward position in financial\
