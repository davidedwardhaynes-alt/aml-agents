    \ guidance on virtual assets and virtual asset service providers extends to tokens\
    \ that confer rights equivalent to securities, meaning that platforms facilitating\
    \ such trading are expected to apply the same risk-based approach to customer\
    \ identification, transaction monitoring, and suspicious transaction reporting\
    \ as traditional brokers. In jurisdictions such as Singapore, MAS Notice SFA04-N02\
