  full_article: "The US Securities and Exchange Commission published proposals on\
    \ 19 May 2026 to streamline registered offering procedures and simplify disclosure\
    \ requirements for public companies, a package that, if finalised, would materially\
    \ reduce the compliance burden of shelf registrations, prospectus delivery, and\
    \ periodic reporting \u2014 with downstream implications for the due-diligence\
    \ frameworks that financial institutions rely on when onboarding or transacting\
    \ with listed counterparties.\n\nThe proposals arrive against a backdrop of longstanding\
    \ industry criticism that the Securities Act of 1933 and Exchange Act of 1934\
    \ reporting architecture has accumulated layers of redundant disclosure that add\
    \ cost without commensurate investor-protection benefit. The SEC's own Advisory\
    \ Committee on Small and Emerging Companies has periodically flagged friction\
    \ in Form S-1 and S-3 eligibility thresholds, while the JOBS Act of 2012 introduced\
    \ scaled disclosures for emerging growth companies as an earlier attempt at rationalisation.\
    \ The current package appears to extend that logic more broadly across the issuer\
    \ population.\n\nFor compliance professionals at broker-dealers, investment banks,\
    \ and buy-side institutions, the practical significance lies in how simplified\
    \ prospectus content and consolidated reporting forms affect the documentary evidence\
    \ base for customer due diligence and transaction monitoring. Under FATF Recommendation\
    \ 10 and its interpretive notes, reliance on publicly available information \u2014\
    \ including exchange filings \u2014 is a recognised component of CDD on corporate\
    \ customers. Any reduction in the granularity of mandated disclosures, particularly\
    \ around beneficial ownership, related-party transactions, or risk factors, could\
    \ narrow the evidentiary value of public filings as a CDD source, requiring institutions\
    \ to compensate through enhanced proprietary screening.\n\nSecurities regulators\
    \ and AML supervisors operate in parallel but not always coordinated frameworks.\
    \ The SEC's mandate centres on investor protection and market efficiency; FinCEN's\
    \ Customer Due Diligence Rule and the Corporate Transparency Act's beneficial\
    \ ownership registry address the financial-crime dimension separately. A divergence\
    \ \u2014 where issuer-facing disclosure obligations shrink while AML obligations\
    \ on intermediaries remain unchanged or expand \u2014 places the operational gap\
    \ squarely on compliance teams at underwriting banks and transfer agents.\n\n\
    Whether the proposals are adopted in their current form will depend heavily on\
    \ the comment process and the composition of the Commission. MLROs at institutions\
    \ with significant US capital-markets exposure should treat the consultation period\
    \ as an opportunity to assess whether existing CDD procedures are sufficiently\
    \ independent of SEC-mandated disclosure content to remain robust under a lighter-touch\
    \ reporting regime."
