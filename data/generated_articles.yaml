    \ that intersects with Australia's financial crime architecture in ways that compliance\
    \ professionals should not overlook. Where credible threats against public officials\
    \ are made, financial intelligence obligations under the *Anti-Money Laundering\
    \ and Counter-Terrorism Financing Act 2006* (AML/CTF Act) may be engaged, particularly\
    \ where the conduct suggests links to politically motivated financing or the broader\
    \ predicate-offence landscape.\n\nAustralia's framework for protecting public\
    \ officials from financially enabled harassment or intimidation has been reinforced\
    \ progressively since FATF's 2015 Mutual Evaluation of Australia identified gaps\
    \ in how designated non-financial businesses and professionals assessed politically\
    \ exposed persons (PEPs) and related threat actors. AUSTRAC's subsequent guidance\
    \ has emphasised that reporting entities must maintain transaction monitoring\
    \ rules sensitive not only to conventional financial crime typologies but also\
    \ to indicators of extremism financing, which can precede or accompany threats\
    \ against government figures.\n\nFor MLROs and heads of financial crime compliance,\
    \ this case raises several operational considerations. First, where an individual\
