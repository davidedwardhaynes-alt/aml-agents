    \ have occupied an ambiguous position, particularly where distributed ledger infrastructure\
    \ blurs the line between a regulated trading venue and a bilateral settlement\
    \ mechanism.\n\nFrom a financial crime perspective, several tensions merit close\
    \ attention. Programmable settlement raises the prospect of automated compliance\
    \ controls embedded directly in smart contracts \u2014 for instance, restricting\
    \ token transfers to wallets that have passed KYC verification \u2014 but it equally\
    \ introduces novel layering risks if cross-chain bridges or atomic swaps are used\
    \ to circumvent those controls. Custody arrangements for tokenised assets may\
    \ also fragment beneficial ownership transparency, complicating the customer due\
    \ diligence requirements under Regulation 28 of the MLRs. Firms operating across\
    \ jurisdictions will additionally need to consider how MAS Notice SFA04-N02 or\
    \ equivalent regimes treat the same instrument if it settles on a shared ledger\
    \ with non-UK nodes.\n\nIndustry responses to the discussion paper are unlikely\
    \ to resolve these tensions quickly. The more consequential question is whether\
    \ the FCA and the Prudential Regulation Authority will coordinate with the Home\
    \ Office and HMRC to ensure that financial crime frameworks evolve at a pace commensurate\
    \ with the infrastructure they are designed to oversee \u2014 a coordination challenge\
    \ that has historically lagged behind market innovation by several years."
