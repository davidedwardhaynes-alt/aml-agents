    \ guidance issued by the Joint Financial Intelligence Unit and the Companies Registry's\
    \ oversight of registered charities \u2014 distinguishes between small community\
    \ drives and larger organised fundraising. A HK$20,000 target sits well below\
    \ thresholds that would ordinarily trigger enhanced scrutiny, and the publicly\
    \ visible, named-organiser model the Society is using aligns with FATF's indicators\
    \ of legitimate humanitarian activity.\n\nFor receiving banks and remittance operators\
