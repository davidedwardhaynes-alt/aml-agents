  full_article: "Broadridge Financial Solutions has joined Anthropic's Project Glasswing,\
    \ an industry consortium deploying frontier AI models to harden cybersecurity\
    \ defences across critical financial infrastructure \u2014 a development with\
    \ direct implications for operational resilience obligations that regulators in\
    \ Singapore, the United Kingdom, and the United States have been tightening steadily\
    \ since 2023.\n\nProject Glasswing assembles organisations that build or maintain\
