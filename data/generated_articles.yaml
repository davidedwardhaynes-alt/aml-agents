  full_article: "At EBAday 2026, the convergence of agentic AI and digital assets\
    \ dominated the agenda's closing sessions, signalling that European transaction\
    \ banking's most consequential compliance challenge is no longer theoretical:\
    \ autonomous AI systems are beginning to execute payment and settlement decisions\
    \ without continuous human authorisation, raising immediate questions about accountability\
    \ chains under existing AML frameworks.\n\nThe timing is instructive. The European\
    \ Banking Authority has spent the past two years embedding AI governance expectations\
    \ into its supervisory convergence work, while the EU's AI Act\u2014applicable\
    \ to high-risk financial system applications from August 2026\u2014creates binding\
    \ obligations around transparency, human oversight, and auditability. Simultaneously,\
    \ the Markets in Crypto-Assets Regulation (MiCA) has brought a first layer of\
    \ digital asset oversight into scope for EU-licensed entities, though gaps in\
    \ travel rule implementation and DeFi coverage remain a live concern for FATF-standard\
    \ jurisdictions.\n\nFor MLROs and heads of financial crime compliance, the shift\
    \ from AI-as-tool to AI-as-agent is not a product question but a control architecture\
    \ question. When an autonomous agent initiates or routes a transaction, the conventional\
    \ three-lines-of-defence model assumes a human decision that can be reviewed after\
    \ the fact. Agentic systems compress or eliminate that reviewable moment. Compliance\
    \ functions will need to determine where in the agent's decision logic a suspicious\
    \ activity indicator is generated, whether that logic is sufficiently explainable\
    \ to satisfy a regulator or court, and who bears accountability if the agent acts\
    \ on a compromised instruction\u2014questions that neither the EU AI Act nor FATF\
    \ Recommendation 16 fully resolves in their current form.\n\nOn the digital assets\
    \ side, panellists reportedly emphasised custody arrangements and cross-border\
    \ settlement flows, areas where beneficial ownership opacity continues to frustrate\
    \ transaction monitoring. The interaction between MiCA's CASP obligations and\
    \ FATF's updated virtual asset guidance creates an uneven compliance landscape\
    \ for institutions operating across EU and non-EU corridors, particularly in Asia,\
    \ where MAS Notice PSN02 and Hong Kong's AMLO amendments impose materially different\
    \ travel rule thresholds.\n\nThe practical implication for compliance teams is\
    \ that both themes demand investment in explainability and audit trail infrastructure\
    \ before regulators formalise expectations, rather than after. Institutions that\
    \ treat EBAday's agenda as a directional signal rather than a horizon event will\
    \ be better positioned when supervisory guidance catches up with operational reality."
