    \ of volume without genuine economic substance \u2014 a dynamic that supervisors\
    \ under MAS Notice PSN02 and equivalent regimes are required to assess when evaluating\
    \ whether a virtual asset service provider's surveillance framework remains fit\
    \ for purpose.\n\nFor compliance functions at exchanges and OTC desks, a buyer\
    \ drought concentrated against record holder supply raises several concrete operational\
    \ questions. Transaction monitoring systems calibrated to volume-based thresholds\
    \ may generate false negatives in low-liquidity conditions, missing structuring\
    \ behaviour that would be visible in more active markets. Similarly, the risk\
    \ typologies associated with long-duration holders \u2014 including dormant wallet\
    \ reactivation, cohort-based exit timing, and the potential use of over-the-counter\
    \ channels to avoid on-exchange reporting \u2014 warrant a review of existing\
