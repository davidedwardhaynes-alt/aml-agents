  full_article: "Bizcap's decision to raise its maximum single-loan exposure to Singapore\
    \ SMEs from an undisclosed lower threshold to S$1 million, just twelve months\
    \ after market entry, signals a meaningful escalation in the alternative lending\
    \ sector's appetite for larger-ticket credit risk \u2014 and raises corresponding\
    \ questions about the adequacy of customer due diligence frameworks calibrated\
    \ for smaller loan books.\n\nAlternative lenders operating in Singapore fall under\
    \ the Moneylenders Act or, where structured as exempt arrangements, may engage\
    \ with MAS's broader licensing perimeter under the Payment Services Act or the\
