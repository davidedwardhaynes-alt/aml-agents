    \ virtual asset service providers engaging in lending or collateral arrangements\
    \ carry full customer due diligence, transaction monitoring, and suspicious transaction\
    \ reporting obligations equivalent to those applied to traditional credit institutions.\
    \ The entry of a chartered bank into this space does not relax those obligations;\
    \ it concentrates them within an entity already subject to examination.\n\nFor\
    \ MLROs at banks now contemplating Bitcoin-collateralised loan books, the material\
    \ questions are structural. Loan origination workflows must address the source-of-wealth\
    \ problem specific to crypto: coins may represent years of accumulated holdings\
    \ whose provenance is difficult to reconstruct, particularly where wallets have\
    \ interacted with mixers, privacy protocols, or sanctioned addresses. Blockchain\
    \ analytics integration at the collateral-acceptance stage is no longer optional\
    \ \u2014 it is the functional equivalent of a property valuation in a mortgage\
    \ context. Supervisors including the MAS under MAS Notice 626 and FinCEN under\
    \ the Bank Secrecy Act expect that risk-based controls are calibrated to the asset\
    \ class, not simply mapped from fiat lending templates.\n\nFrom a systemic perspective,\
    \ institutional participation introduces interconnections that did not previously\
    \ exist between Bitcoin price volatility and regulated balance sheets, raising\
    \ questions that prudential supervisors \u2014 the PRA, OCC, and HKMA among them\
    \ \u2014 are already examining through stress-testing and capital adequacy lenses.\
    \ The AML and prudential dimensions are not separable: a forced liquidation of\
    \ collateral may itself generate suspicious activity reporting obligations if\
    \ the underlying borrower's identity or source of funds was inadequately verified\
    \ at origination.\n\nThe institutional era SVB describes may well arrive. Whether\
    \ compliance infrastructure scales commensurately with ambition will determine\
    \ how regulators receive the next cycle of credit stress."
