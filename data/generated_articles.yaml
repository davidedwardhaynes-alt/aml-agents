  full_article: "At EBAday 2026 in Copenhagen, Euro Banking Association chairman Wolfgang\
    \ Ehrmann used the conference's opening session to sketch a vision of European\
    \ financial services by 2030, implicitly placing compliance infrastructure \u2014\
    \ real-time transaction monitoring, AI-driven customer due diligence, and interoperable\
    \ payment rails \u2014 at the centre of any credible future architecture. For\
    \ MLROs and heads of financial crime compliance, the subtext is consequential:\
    \ the design choices being made now in payments modernisation will either embed\
    \ financial crime controls structurally or treat them as a retrofit problem later.\n\
    \nThe EBA's convening role here reflects a broader European trajectory. The EU's\
    \ AML Package \u2014 including the establishment of the Anti-Money Laundering\
    \ Authority (AMLA), which assumes direct supervisory competence over high-risk\
    \ obliged entities from 2025 onwards \u2014 is reshaping how compliance obligations\
    \ are distributed across correspondent networks, payment processors, and infrastructure\
    \ providers. The Single Rulebook introduced under the AML Regulation is intended\
    \ to reduce the jurisdictional fragmentation that has long allowed financial crime\
