    \ instrument. For supervisors and compliance functions alike, that fragmentation\
    \ is precisely the condition under which illicit-finance risk migrates fastest\
    \ \u2014 into the interstices between regimes, instruments, and chains before\
    \ policy can consolidate. The prudent posture is to begin mapping that exposure\
    \ now, before settlement volumes make remediation prohibitively complex."
