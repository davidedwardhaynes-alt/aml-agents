    \ 15 and its Interpretive Note on virtual assets, obligated institutions handling\
    \ the counterparty side of such trades must apply enhanced due diligence proportionate\
    \ to transaction size and client risk profile. In jurisdictions such as Singapore,\
    \ MAS Notice PSN02 imposes explicit transaction-monitoring obligations on digital\
