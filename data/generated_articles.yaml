    \ For MLROs and heads of financial crime compliance, the immediate implication\
    \ is structural: custody of digital assets is migrating from specialist fintech\
    \ perimeter to core banking balance sheet, and the compliance architecture must\
    \ follow.\n\nZodia was established in 2021 as a custody venture between Standard\
    \ Chartered and Northern Trust, specifically to operate within the FCA's existing\
    \ e-money and safeguarding framework while pursuing dedicated crypto-asset regulatory\
    \ permissions. That heritage matters. The entity was designed from inception to\
    \ sit within a regulated perimeter rather than alongside one, meaning its transaction\
    \ monitoring obligations, travel rule implementation under the FATF Recommendation\
    \ 16 framework, and beneficial ownership verification protocols were built to\
    \ institutional-grade specification rather than retrofitted. Standard Chartered's\
    \ full absorption of that capability signals a conviction that digital asset custody\
    \ is no longer an ancillary product line requiring ring-fencing.\n\nFor compliance\
    \ functions at peer institutions, Julian Sawyer's assertion that every bank will\
