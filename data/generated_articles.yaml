  full_article: "The dominant fraud vector confronting Asia-Pacific banks in mid-2026\
    \ is no longer the technical exploit but the socially engineered victim: scams\
    \ that circumvent institutional controls entirely by manipulating customer behaviour\
    \ at the point of authorisation. That shift has material implications for how\
    \ financial institutions calibrate transaction monitoring, customer due diligence,\
    \ and their obligations under frameworks ranging from Singapore's MAS Notice 626\
    \ to Australia's AML/CTF Act and Hong Kong's AMLO.\n\nFor much of the post-pandemic\
    \ period, financial crime teams prioritised hardening system perimeters \u2014\
    \ identity verification at onboarding, real-time fraud scoring on card transactions,\
    \ and network-level anomaly detection. Those investments were necessary and, by\
    \ most measures, effective against automated, system-directed attacks. What they\
    \ were not designed to catch is a customer who, fully authenticated and acting\
    \ within normal behavioural parameters, authorises a payment to a mule account\
    \ because a criminal has spent three weeks cultivating their trust. This is the\
    \ operational reality that panels such as the LexisNexis Risk Ready 2026 forum\
    \ are surfacing across markets from Singapore to the Philippines.\n\nThe compliance\
    \ implications cut in several directions simultaneously. For transaction monitoring\
    \ teams, the challenge is that authorised push payment fraud generates clean signals:\
    \ the customer is genuine, the device is known, the instruction is deliberate.\
    \ Typologies built around account takeover or card-not-present fraud offer limited\
    \ detection value. Supervisors including MAS \u2014 whose Guidelines on Provision\
    \ of Digital Payment Token Services and revised Notice 626 amendments both emphasise\
    \ holistic customer risk assessment \u2014 are increasingly expecting institutions\
    \ to demonstrate friction that is proportionate to payment risk, not merely authentication\
    \ risk. FATF Recommendation 16 on wire transfers similarly presses correspondent\
    \ banks to interrogate purpose, not just identity.\n\nThere is also a structural\
    \ question about where regulatory liability sits. Singapore's Shared Responsibility\
    \ Framework, which came into force in late 2024, allocates liability between banks\
    \ and telecoms providers based on defined failure points. As human-compromise\
    \ scams become the predominant vector, the framework's assumptions about which\
    \ party failed \u2014 and when \u2014 will face their first serious stress tests\
    \ in dispute adjudication and supervisory review.\n\nThe near-term pressure on\
    \ compliance functions is to develop typologies and customer intervention protocols\
    \ that are grounded in behavioural psychology as much as transaction analytics.\
    \ Institutions that treat social engineering fraud as a customer-education problem\
    \ rather than a financial crime control gap are likely to find supervisory tolerance\
    \ for that position diminishing as loss data accumulates through 2026."
