  full_article: 'The preferred shares of Strategy (formerly MicroStrategy) designated
    STRC traded below their $25 par value for a sustained period in mid-2026, raising
    material questions about the adequacy of disclosures to retail investors who purchased
    the instruments on the basis of their ostensibly fixed-income characteristics.


    Strategy''s aggressive pivot to bitcoin treasury accumulation, funded in part
    through successive preferred-stock issuances, created a capital structure in which
    the underlying asset base is almost entirely correlated to a single volatile digital
    asset. For compliance professionals, this concentration risk echoes concerns long
    articulated under FATF Recommendation 15 on virtual assets, and more specifically
    the due-diligence obligations supervisors expect firms distributing such instruments
    to retail counterparties to satisfy. In several jurisdictions, including Singapore
    under MAS Notice SFA 04-N02 and Hong Kong under the SFC''s suitability framework,
    distributors are required to assess whether complex instruments with embedded
    crypto exposures are appropriate for the clients to whom they are sold.


    The STRC dislocation matters beyond market mechanics. If preferred shares structured
    partly around bitcoin collateral trade at sustained discounts to par, the implied
    credit quality of the issuer''s balance sheet is being re-rated by markets in
    real time. Institutional prime brokers and custodians holding STRC as collateral
    face immediate mark-to-market obligations; those using it in repo or margin structures
    may be required to issue variation-margin calls that could amplify selling pressure.
    From an AML perspective, rapid par dislocation in thinly traded preferred instruments
    can also attract layering activity, and transaction-monitoring parameters calibrated
    for conventional equity volatility may not flag anomalous patterns adequately.


    Regulators reviewing the episode will likely examine whether the offering documents
    provided sufficient stress-scenario disclosure linking bitcoin price deterioration
    to the issuer''s capacity to service preferred dividends. The SEC''s 2024 staff
    bulletin on crypto-asset disclosures for public companies provides a relevant
    benchmark, and enforcement staff have indicated willingness to pursue material-omission
    cases where retail harm is demonstrable.


    The broader lesson for MLROs and compliance heads is structural: when a corporate
    treasury strategy makes a company''s entire capital stack a proxy for a single
    digital asset, every instrument in that stack inherits crypto-asset risk characteristics,
    regardless of how it is labelled at issuance. Supervisors are watching how firms
    and distributors account for that inheritance.'
