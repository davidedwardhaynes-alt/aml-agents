    \ for decades under the Consumer Credit Act 1974.\n\nThe move closes a regulatory\
    \ gap that has attracted sustained criticism since the Woolard Review of February\
    \ 2021 first identified unregulated BNPL as a potential source of consumer detriment.\
    \ The intervening five years saw successive consultation rounds, a change of government,\
    \ and considerable lobbying from fintech incumbents concerned that full FCA authorisation\
    \ requirements would compress margins and exit smaller players from the market.\
    \ The FCA's decision to build its regime on existing consumer credit rules \u2014\
    \ including the Consumer Duty that took effect in July 2023 \u2014 rather than\
