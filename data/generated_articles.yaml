  full_article: "Australia's banking sector moved into a new phase of scam liability\
    \ governance on 28 May 2026 as the federal government released designations, draft\
    \ industry codes, and draft rules under the Scam Prevention Framework (SPF), prompting\
    \ the Australian Banking Association to signal careful scrutiny of the settings\
    \ while reaffirming that loss prevention \u2014 not liability apportionment \u2014\
    \ should remain the primary policy objective.\n\nThe SPF has its legislative roots\
    \ in the Scams Prevention Framework Act, which established a cross-sector duty\
    \ framework applying to banks, telecommunications providers, and digital platforms.\
    \ The regime draws conceptually from the United Kingdom's authorised push payment\
    \ reimbursement model under the Payment Systems Regulator while adapting it to\
    \ Australia's tripartite ecosystem, where scam vectors routinely traverse multiple\
    \ industries before a financial loss is crystallised. The simultaneous release\
    \ of designations, codes, and rules \u2014 alongside a government discussion paper\
    \ \u2014 signals that Treasury is moving toward implementation with some urgency,\
    \ likely informed by persistently elevated scam losses that the Australian Competition\
    \ and Consumer Commission has documented in successive Targeting Scams reports.\n\
    \nFor MLROs and financial crime compliance heads at designated institutions, the\
    \ draft codes and rules will warrant close reading on at least three dimensions:\
    \ the allocation of reimbursement obligations where a scam traverses more than\
    \ one regulated sector; the evidentiary standards banks must meet to demonstrate\
    \ they discharged their SPF duties; and the interaction with existing AML/CTF\
    \ Act obligations, particularly customer due diligence and transaction monitoring\
    \ requirements under the AUSTRAC regime. Where a bank's SPF compliance program\
    \ overlaps with its AML/CTF program \u2014 for instance, in detecting mule accounts\
    \ used to receive scam proceeds \u2014 institutions will need to ensure governance\
    \ structures avoid siloed accountability.\n\nThe ABA's framing around prevention\
    \ rather than reimbursement reflects a real tension in the policy design. Reimbursement-led\
    \ frameworks risk creating moral hazard among consumers while placing disproportionate\
    \ operational burden on banks for losses that originate outside the banking channel.\
    \ Industry codes that impose specific friction requirements \u2014 confirmation\
    \ of payee, delay periods, or enhanced warnings \u2014 distribute that burden\
    \ more directly toward the point of intervention.\n\nWith consultation on the\
    \ draft instruments now open, supervised institutions should treat this period\
    \ as the critical window to shape code obligations that will likely remain in\
    \ place for a decade or more, particularly as the SPF is expected to extend to\
    \ additional sectors through subsequent designation rounds."
