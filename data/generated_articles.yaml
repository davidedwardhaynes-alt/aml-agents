    \ \u2014 will require compliance functions to maintain documented contingency\
    \ arrangements for CTP-linked services.\n\nAs the first supervisory cycle progresses,\
    \ regulators are likely to use the findings to calibrate the designation criteria\
    \ further. Firms with significant dependencies on as-yet undesignated vendors\
