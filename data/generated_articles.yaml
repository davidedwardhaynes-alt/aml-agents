  full_article: "The International Swaps and Derivatives Association and the Securities\
    \ Industry and Financial Markets Association have submitted a joint comment letter\
    \ to the US Securities and Exchange Commission urging recalibration of the de\
    \ minimis thresholds that determine when a firm must register as a security-based\
    \ swap dealer (SBSD) \u2014 a designation that carries substantial compliance\
    \ obligations under Dodd-Frank Title VII, including transaction reporting, business\
    \ conduct standards, and, critically for financial crime officers, counterparty\
    \ due diligence and recordkeeping requirements aligned with FinCEN's customer\
    \ identification programme rules.\n\nThe threshold question is not a new one.\
    \ The SEC first established the SBSD registration framework in 2019, setting the\
    \ de minimis dealing threshold at $25 million in notional outstanding with any\
    \ single counterparty over a 12-month period, or $500 million in aggregate. Industry\
    \ participants have argued since implementation that those figures were calibrated\
    \ against market conditions that no longer reflect current volumes or product\
    \ structures, particularly as single-name credit default swap markets have evolved\
    \ and cross-border activity with non-US dealers has grown. FATF Recommendation\
    \ 26, which governs regulation and supervision of financial institutions, provides\
    \ the international standard that national regulators \u2014 including the SEC\
    \ \u2014 are expected to meet in ensuring that entities conducting material financial\
    \ activity are subject to appropriate oversight.\n\nFor compliance and financial\
    \ crime professionals, the registration threshold matters beyond operational cost.\
    \ Firms falling below the de minimis line are not subject to SBSD-level supervisory\
    \ expectations, creating potential gaps in counterparty transparency and trade-level\
    \ AML controls. If thresholds are raised without commensurate enhancement of alternative\
    \ oversight mechanisms, MLROs at registered SBSDs face asymmetric information\
    \ risk when transacting with unregistered counterparties who are nonetheless active\
    \ in the market. Conversely, if thresholds remain static while notional volumes\
    \ rise organically, firms may inadvertently breach registration triggers \u2014\
    \ with attendant regulatory liability \u2014 absent robust internal monitoring.\n\
    \nSIFMA and ISDA's intervention reflects a broader tension in post-crisis derivatives\
    \ regulation: calibrating registration perimeters precisely enough to capture\
    \ systemic risk without imposing compliance infrastructure costs on entities whose\
    \ activity does not warrant them. The SEC's response, and any threshold revision\
    \ it may propose, will be watched closely by global regulators with parallel frameworks\
    \ \u2014 including ESMA under EMIR and MAS under its OTC derivatives reporting\
    \ regime \u2014 as a signal of how US authorities intend to balance supervisory\
    \ reach against market efficiency in a period of increasing cross-jurisdictional\
    \ regulatory divergence."
