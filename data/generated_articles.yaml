    \ 1's risk-based approach principle \u2014 proportionality between regulatory\
    \ burden and demonstrated risk \u2014 is equally applicable, conceptually, to\
    \ prudential design as it is to AML/CFT frameworks.\n\nWhether the current proposal\
    \ advances to a final rule in its present form or is further revised before adoption,\
    \ the trajectory of US Basel III implementation will set the structural parameters\
    \ within which financial crime compliance programmes must operate for the next\
    \ decade."
