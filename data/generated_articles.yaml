    \ Beijing.\n\nRegulators in Singapore, Hong Kong, and Australia have each issued\
    \ guidance in recent years emphasising that geopolitical context is a legitimate\
    \ input into institutional risk appetite assessments. MLROs would be well-advised\
    \ to document any reassessment of DPRK-adjacent exposure corridors prompted by\
    \ this development, ensuring their institutions can demonstrate to supervisors\
    \ that evolving diplomatic conditions are being actively factored into their AML\
    \ and sanctions frameworks rather than treated as background noise."
