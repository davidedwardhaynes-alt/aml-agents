  full_article: "A bipartisan bloc in the United States Congress has moved to direct\
    \ the Internal Revenue Service to formally review de minimis exemption thresholds\
    \ for cryptocurrency transactions, a development that carries material implications\
    \ for transaction monitoring programmes and the calibration of suspicious activity\
    \ report filings across Virtual Asset Service Providers operating in or touching\
    \ the US market.\n\nThe proposal revives a long-standing tension in American crypto\
    \ policy: current IRS guidance treats virtually every disposal of a digital asset\
    \ as a taxable event, including small-value conversions used for everyday payments.\
    \ A statutory de minimis carve-out \u2014 analogous to foreign currency exemptions\
    \ that exist in some jurisdictions \u2014 would reduce the reporting burden on\
    \ retail users but simultaneously introduce a threshold that bad actors could\
    \ exploit through structuring, a concern directly addressed under FATF Recommendation\
    \ 16 and the Bank Secrecy Act's anti-structuring provisions at 31 U.S.C. \xA7\
    \ 5324. Financial intelligence units will note that any fixed exemption level\
    \ creates a natural layering boundary.\n\nFor compliance officers at centralised\
    \ exchanges and custodial wallet providers, the practical stakes are twofold.\
    \ First, if exemptions are enacted, transaction surveillance systems must be reconfigured\
    \ to distinguish tax-exempt micro-transactions from structuring patterns \u2014\
    \ a non-trivial tuning exercise given current rule-set architectures. Second,\
    \ the IRS review process itself is likely to generate interagency consultation\
    \ with FinCEN, potentially producing updated guidance on how de minimis thresholds\
    \ interact with Currency Transaction Report and SAR obligations. Firms should\
    \ begin scenario-mapping now rather than waiting for final rulemaking.\n\nThe\
    \ proposal also has indirect relevance beyond US borders. MAS-regulated Digital\
    \ Payment Token service providers with US customer flows, and Australian entities\
    \ subject to the AML/CTF Act 2006 obligations administered by AUSTRAC, may find\
    \ that a US de minimis standard influences client behaviour and transaction volumes\
    \ in ways that affect their own risk assessments. FATF's 2023 updated guidance\
    \ on virtual assets explicitly flagged threshold-based exemptions as a typology\
    \ risk requiring enhanced monitoring controls.\n\nWhether Congress advances the\
    \ measure through the reconciliation process or as standalone legislation remains\
    \ unclear, and the IRS review itself could take years to produce binding output.\
    \ The more immediate obligation for compliance professionals is to ensure that\
    \ existing monitoring frameworks are sufficiently documented to defend any threshold-based\
    \ filtering decisions to supervisors \u2014 because regulatory tolerance for calibration\
    \ gaps in this space continues to narrow."
