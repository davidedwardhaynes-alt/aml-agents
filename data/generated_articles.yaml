  full_article: "India's Securities and Exchange Board has issued recovery certificate\
    \ RC9084 of 2026 under Application No. 15456 of 2026 against Ratan Lal Rathi (PAN:\
    \ AJSPR3863P) in connection with the regulator's long-running enforcement action\
    \ concerning illiquid stock options on Indian exchanges. The issuance of a formal\
    \ recovery certificate signals that earlier penalty or disgorgement orders against\
    \ the individual have not been satisfied voluntarily, triggering the coercive\
    \ collection mechanism available to SEBI under Section 28A of the SEBI Act, 1992,\
    \ which empowers the regulator to recover dues as arrears of land revenue.\n\n\
    SEBI's illiquid stock options crackdown has been one of the most extensive enforcement\
    \ exercises in Indian capital markets over the past decade. The regulator identified\
    \ a pattern of manipulative trading in low-liquidity options contracts on the\
    \ BSE, where entities entered into pre-arranged, non-genuine trades to generate\
    \ artificial accounting entries \u2014 effectively fabricating profits or losses\
    \ for tax manipulation or fund layering purposes. Orders under Sections 11, 11B,\
    \ and 11(4) of the SEBI Act, alongside findings under the SEBI (Prohibition of\
    \ Fraudulent and Unfair Trade Practices) Regulations, 2003, have been issued against\
    \ hundreds of individuals and entities. Many cases also carry referrals to income-tax\
    \ authorities and, where patterns suggest layering or integration of proceeds,\
    \ to the Financial Intelligence Unit-India under the Prevention of Money Laundering\
    \ Act, 2002.\n\nFor compliance professionals, recovery certificate proceedings\
    \ carry a specific AML implication. The underlying conduct \u2014 generating fictitious\
    \ gains or losses through circular options trades \u2014 maps closely onto the\
    \ predicate offences contemplated under PMLA's Schedule, and any financial institution\
    \ that processed fund flows associated with such trades faces potential exposure\
    \ under PMLA Section 3 if adequate transaction monitoring and suspicious transaction\
    \ reporting did not occur. FATF Recommendation 3 requires that money laundering\
    \ offences extend to self-laundering, a standard India has incorporated, making\
    \ the tax-manipulation motive legally insufficient as a defence against ML exposure.\n\
    \nThe volume of SEBI recovery certificates being issued in the illiquid options\
    \ matter through 2025 and into 2026 suggests a substantial backlog of unsatisfied\
    \ penalty orders, indicating that deterrence through initial adjudication alone\
    \ has proven inadequate. Supervisors and FCC heads at brokerages and banks should\
    \ treat active recovery certificate lists as a supplementary adverse-media and\
    \ sanctions-adjacent screening input when reviewing onboarding files or periodic\
    \ reviews for clients operating in derivative-heavy segments of the market."
