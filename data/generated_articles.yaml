    \ compliance officers assess counterparty risk and satisfy themselves under FATF\
    \ Recommendation 15's virtual asset due diligence obligations. As legislative\
    \ frameworks such as the US GENIUS Act and the EU's MiCA Regulation impose explicit\
    \ reserve requirements and redemption rights, the collateral backing a stablecoin\
    \ is no longer merely a commercial differentiator \u2014 it is becoming a regulatory\
    \ compliance variable in its own right.\n\nThe trajectory was set in motion following\
    \ the May 2022 collapse of TerraUSD, which prompted FATF, the FSB, and domestic\
    \ regulators including MAS and the FCA to scrutinise whether algorithmic and undercollateralised\
    \ stablecoins met the definition of a reliable store of value for payment or settlement\
    \ purposes. MAS Notice PSN05 and the subsequent Payment Services (Amendment) Act\
    \ framework already require single-currency stablecoin issuers to maintain par-value\
    \ backing in high-quality liquid assets \u2014 precisely the logic now being generalised\
    \ across major jurisdictions.\n\nFor MLROs and heads of financial crime compliance,\
    \ the collateral question carries layered consequences. A stablecoin backed by\
    \ short-duration US Treasuries held at regulated custodians presents a materially\
    \ different risk profile than one relying on commercial paper, affiliated-entity\
    \ loans, or opaque offshore reserves. Where institutional clients or payment service\
    \ providers use stablecoins as a settlement medium, compliance teams must now\
    \ map collateral composition into their virtual asset service provider onboarding\
    \ assessments and ongoing monitoring frameworks. Failure to do so exposes firms\
    \ to the argument that their customer risk assessment was incomplete \u2014 a\
    \ point increasingly likely to arise in supervisory reviews conducted under AMLA\
    \ 2024 powers in the EU or under FinCEN's proposed VASP rule in the United States.\n\
    \nThere is also a transaction monitoring dimension. Stablecoins whose collateral\
    \ reserves are opaque or subject to rapid compositional change create attribution\
    \ uncertainty that complicates blockchain analytics. If the value peg drifts or\
    \ breaks, on-chain flows may exhibit patterns \u2014 accelerated redemptions,\
    \ bridge transactions, wallet clustering \u2014 that existing rule sets may not\
    \ adequately capture.\n\nThe regulatory direction is consistent: collateral adequacy\
    \ is converging with AML adequacy. Compliance functions that treat stablecoin\
    \ selection as a treasury matter rather than a financial crime risk matter are\
    \ likely to find that distinction increasingly difficult to sustain before their\
    \ supervisors."
