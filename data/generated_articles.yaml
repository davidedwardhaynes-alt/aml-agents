    \ facilitating structured threat-intelligence sharing among member institutions,\
    \ a development that carries direct implications for financial crime controls\
    \ at a time when MAS Notice 655 (on technology risk management) and the broader\
    \ MAS Technology Risk Management Guidelines already place explicit obligations\
    \ on banks to assess emerging threat vectors.\n\nThe concern is not entirely new.\
    \ FATF's 2023 report on ML/TF risks in the digital economy flagged AI-enabled\
    \ exploitation of financial system weaknesses as an emerging typology, noting\
    \ that automated vulnerability scanning could compress the window between discovery\
    \ and criminal use. Within Singapore, the Monetary Authority has steadily raised\
    \ the bar on operational resilience: revisions to MAS Notice 644 and the Technology\
    \ Risk Management Guidelines published in 2021 require financial institutions\
    \ to maintain robust patch management, penetration testing, and incident-response\
    \ capabilities \u2014 precisely the controls most relevant to AI-accelerated attack\
    \ surfaces.\n\nFor MLROs and heads of financial crime compliance, the threat is\
    \ not purely a technology-risk matter. Successful exploitation of banking infrastructure\
    \ can compromise transaction monitoring systems, corrupt audit trails, or facilitate\
    \ unauthorised access to customer data used in sanctions screening and KYC processes\
    \ \u2014 each carrying potential breaches of MAS Notice 626 on anti-money laundering\
    \ obligations. Cyber-enabled fraud that bypasses detection controls also intersects\
    \ directly with Predicate Offence schedules under Singapore's Corruption, Drug\
    \ Trafficking and Other Serious Crimes (Confiscation of Benefits) Act, meaning\
