    \ impose customer due-diligence and suspicious-transaction-reporting obligations\
    \ on digital-payment-token service providers, yet genuinely decentralised protocols\
    \ continue to occupy a grey zone that enforcement actions have not fully resolved.\
    \ Hyperliquid itself has previously drawn scrutiny over its approach to sanctions\
    \ screening following the exploitation of its JELLY token market in early 2025.\n\
    \nFor compliance officers at institutions with any indirect exposure\u2014through\
