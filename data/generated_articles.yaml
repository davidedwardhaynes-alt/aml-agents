  full_article: "The Financial Conduct Authority has launched a review into whether\
    \ Annual Percentage Rates effectively support consumer decision-making in credit\
    \ markets, publishing accompanying research that reveals a significant comprehension\
    \ gap: when a lower APR does not translate into lower total repayment costs \u2014\
    \ as can occur with shorter-term products \u2014 fewer than one in five consumers\
    \ correctly identified the cheaper borrowing option.\n\nThe APR disclosure regime\
    \ has its roots in the Consumer Credit Act 1974 and was reinforced through successive\
    \ EU directives subsequently retained in UK law. The representative APR requirement,\
    \ under which at least 51% of accepted applicants must receive the advertised\
    \ rate or better, has long been the cornerstone of standardised credit comparison\
    \ in the United Kingdom. Yet critics within consumer finance have argued for years\
    \ that the metric's mathematical construction, while theoretically neutral, can\
    \ mislead borrowers comparing products with materially different structures \u2014\
    \ instalment loans against revolving facilities, or secured against unsecured\
    \ credit, for instance.\n\nFor compliance and product teams at consumer lenders,\
    \ the review carries direct operational implications. The FCA's simultaneous proposal\
    \ to simplify the Consumer Credit advertising rulebook \u2014 removing requirements\
    \ it considers duplicated by the Consumer Duty's overarching expectation that\
    \ firms support good consumer outcomes \u2014 signals a potential rebalancing\
    \ of prescriptive rules in favour of principles-based obligations. Firms should\
    \ not interpret simplification as a reduction in accountability; under the Consumer\
    \ Duty, the burden of demonstrating that communications produce genuine understanding\
    \ sits firmly with the firm.\n\nFor MLROs and financial crime compliance functions,\
    \ the indirect relevance lies in product design transparency. Opaque or poorly\
    \ understood credit terms have, in documented cases, created vulnerability to\
    \ mis-selling and consumer harm that subsequently intersects with complaint-driven\
    \ regulatory scrutiny.\n\nThe FCA's research does affirm that APRs retain utility\
    \ for like-for-like product comparisons, and the regulator has not signalled an\
    \ intention to abandon the metric. The more consequential question emerging from\
    \ this consultation is whether supplementary disclosure \u2014 total repayment\
    \ figures, cost-of-credit summaries \u2014 should be mandated alongside APR in\
    \ specific advertising contexts, or whether firms will be left to determine the\
    \ appropriate format under Consumer Duty principles. The outcome will shape credit\
    \ advertising standards across the UK market for the foreseeable decade."
