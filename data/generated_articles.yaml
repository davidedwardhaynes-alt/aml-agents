    \ banks and depository participants have flagged as a material impediment to timely\
    \ market access. The practical implication is that FPIs caught in PAN processing\
    \ queues \u2014 a prerequisite for registration under the SEBI (Foreign Portfolio\
    \ Investors) Regulations, 2019 \u2014 should face fewer administrative delays\
    \ before commencing trading activity in Indian equity and debt markets.\n\nPAN\
    \ linkage sits at the intersection of India's tax administration and its AML/CFT\
    \ framework. Under SEBI's FPI regime, a valid PAN is mandatory for account opening,\
    \ forming part of the customer due diligence documentation that Designated Depository\
    \ Participants must collect before onboarding under SEBI's KYC requirements and\
    \ the Prevention of Money Laundering Act, 2002. The Income Tax Department issues\
    \ PANs through a separate channel from SEBI registration, and misalignment between\
