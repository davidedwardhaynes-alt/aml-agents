    \ elsewhere. Securities regulators in multiple jurisdictions have long grappled\
    \ with the intersection of public communications and market integrity. The SEC's\
    \ Regulation FD established in 2000 that material non-public information cannot\
    \ be selectively disclosed to favoured market participants; the more nuanced question\
    \ here is whether a paid latency advantage over freely available public posts\
    \ constitutes a form of selective access that regulators will treat as functionally\
    \ equivalent. IOSCO's 2013 principles on market intermediaries and, more recently,\
    \ guidance on algorithmic and high-frequency trading create a comparable analytical\
    \ frame for non-US supervisors.\n\nFor financial institutions, the more immediate\
    \ concern is market manipulation exposure. Under Section 9 of the US Securities\
