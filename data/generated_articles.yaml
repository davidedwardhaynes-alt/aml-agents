    \ brokers, and e-payment operators, the ambiguity is not academic: institutions\
    \ processing payments to prediction market operators without a clear regulatory\
    \ determination risk facilitating either unlicensed dealing or unlicensed gambling.\
    \ The more prudent course, until a definitive ruling or legislative amendment\
