  full_article: "Authorised push payment fraud in the United Kingdom reached \xA3\
    1.28 billion in 2025, a four per cent increase on the prior year, reversing a\
    \ brief decline that had given the industry cautious optimism following the Payment\
    \ Systems Regulator's mandatory reimbursement regime, which came into force in\
    \ October 2024.\n\nThe reversal is significant in regulatory terms. The PSR's\
    \ reimbursement framework was explicitly designed to realign incentive structures\
    \ by placing liability on both sending and receiving payment service providers,\
    \ on the theory that firms bearing financial exposure would invest more aggressively\
    \ in detection and friction. The 2024 dip had been read by some as early evidence\
    \ of deterrence; the 2025 figures complicate that narrative considerably.\n\n\
    For MLROs and financial crime compliance teams, the data carries several operational\
    \ implications. First, it suggests that fraudsters have adapted to the post-October\
    \ 2024 environment more rapidly than the industry has. Social engineering techniques\
    \ \u2014 particularly investment scams and impersonation of government bodies\
    \ \u2014 have historically proven resilient to technical countermeasures precisely\
    \ because the authorised nature of the payment means the customer themselves initiates\
    \ the transfer, creating limited conventional AML red flags under standard transaction\
    \ monitoring parameters calibrated to detect unauthorised activity. Second, firms\
    \ face growing scrutiny of their Consumer Duty obligations under FCA rules, which\
    \ require demonstrable evidence that retail customers are protected from foreseeable\
    \ harm; rising APP volumes will make that demonstration harder. Third, under FATF\
    \ Recommendation 16 and its domestic implementation, the ongoing deployment of\
    \ the UK's Confirmation of Payee regime and the expected expansion of data-sharing\
    \ through the Economic Crime and Corporate Transparency Act 2023 mechanisms remain\
    \ underutilised levers that industry bodies have argued need faster adoption across\
    \ non-bank PSPs.\n\nReceiving institution liability \u2014 firms at the beneficiary\
    \ end absorbing a share of reimbursement costs \u2014 is likely to intensify commercial\
    \ pressure on challenger banks and payments firms whose onboarding and monitoring\
    \ frameworks are less mature than those of tier-one banks, raising the prospect\
    \ of further PSR supervisory action or differential liability thresholds.\n\n\
    The 2026 UK Finance figures, when published, will serve as a cleaner test of whether\
    \ the reimbursement regime produces structural change or merely displaces fraud\
    \ typologies to jurisdictions and payment rails where the regime does not apply."
