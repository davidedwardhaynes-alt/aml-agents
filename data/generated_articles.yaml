    \ with Worldline will need to address data access rights, audit provisions, and\
    \ sub-outsourcing restrictions \u2014 requirements consistent with EBA Guidelines\
    \ on outsourcing arrangements (EBA/GL/2019/02), which apply to credit institutions\
    \ across the EU. Third, the two-year transition window, while commercially practical,\
    \ represents a period of elevated model risk as legacy monitoring systems are\
    \ decommissioned before replacement controls are validated in a live environment.\n\
    \nFrom Worldline's perspective, absorbing card operations at this scale carries\
    \ its own regulatory exposure. As a contracted service provider processing data\
    \ on behalf of a Wwft-obliged institution, Worldline will face contractual and\
    \ potentially regulatory pressure to demonstrate that its platform-level controls\
    \ meet the financial crime standards of its client base, not merely its own regulatory\
    \ floor.\n\nThe DNB will likely expect ICS to maintain a robust outsourcing risk\
    \ assessment and ongoing monitoring programme throughout the transition. Whether\
    \ the staffing reduction affects the composition of the financial crime function\
    \ specifically will be a detail supervisors scrutinise closely \u2014 headcount\
    \ cuts in compliance-adjacent operations have previously attracted examiner attention\
    \ during post-outsourcing reviews."
