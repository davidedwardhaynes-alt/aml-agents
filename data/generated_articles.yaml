  full_article: "The Wang Fuk Court fire of November 2025 \u2014 Hong Kong's deadliest\
    \ in decades, claiming 168 lives and displacing nearly 5,000 residents \u2014\
    \ has drawn renewed attention to the role charitable organisations play in filling\
    \ welfare gaps that formal financial systems are ill-equipped to address quickly.\
    \ When NGOs mobilise significant funds in the immediate aftermath of mass-casualty\
    \ events, they operate in precisely the conditions that elevate financial crime\
    \ risk: urgency, high public sympathy, compressed due diligence timelines, and\
    \ cash-intensive disbursements to vulnerable beneficiaries.\n\nHong Kong's regulatory\
    \ framework for charitable fundraising remains notably fragmented. Unlike incorporated\
    \ financial institutions subject to MAS-equivalent prudential oversight, charities\
    \ in Hong Kong are not governed by a single licensing regime. The Inland Revenue\
    \ Ordinance grants tax-exempt status, but the absence of a dedicated Charities\
    \ Commission \u2014 a gap critics have flagged for over two decades \u2014 means\
    \ that transaction monitoring obligations fall primarily on the receiving banks\
    \ rather than the organisations themselves. Institutions processing high-volume\
    \ donation inflows following a high-profile disaster are expected under the Anti-Money\
    \ Laundering and Counter-Terrorist Financing Ordinance (AMLO) to apply enhanced\
    \ scrutiny where activity deviates materially from established customer profiles,\
    \ even for non-profit account holders.\n\nFATF Recommendation 8 specifically identifies\
    \ non-profit organisations as potentially vulnerable to terrorist financing abuse,\
    \ and its 2023 revised guidance emphasises risk-based supervision rather than\
    \ blanket restriction. Hong Kong's FATF mutual evaluation, last conducted in 2019,\
    \ noted residual gaps in the oversight of the NPO sector. Supervisors will be\
    \ watching whether post-disaster fundraising flows, which by media accounts involved\
    \ direct payments for funeral and burial expenses, were documented with sufficient\
    \ granularity to satisfy audit requirements and demonstrate that funds reached\
    \ intended beneficiaries.\n\nFor MLROs at retail and private banks, the practical\
