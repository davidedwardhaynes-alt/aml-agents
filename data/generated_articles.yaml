    \ ICT third-party risk register with appropriate exit strategies documented.\n\
    \nRegulators across the EU have not yet moved to prescribe cloud-provider concentration\
    \ limits explicitly, but the EBA's ongoing monitoring of systemic reliance on\
    \ a small number of hyperscalers suggests that guidance in this area will tighten.\
    \ Intesa Sanpaolo's migration, given the institution's scale and its role in the\
    \ EU's financial infrastructure, is likely to serve as a reference case \u2014\
