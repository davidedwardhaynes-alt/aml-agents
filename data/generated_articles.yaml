    \ dual-track programmes, absorbing costs without regulatory certainty. For supervisors,\
    \ the gap also limits the effectiveness of risk-based examinations: examiners\
    \ lack a clear statutory baseline against which to benchmark controls.\n\nInternational\
    \ regulators may draw their own conclusions. The EU's Markets in Crypto-Assets\
    \ Regulation entered full application in late 2024, and the UK's Financial Conduct\
    \ Authority has been advancing its own digital-assets registration regime. If\
    \ the United States remains without federal clarity into 2027, regulatory arbitrage\
    \ pressures on capital and talent will intensify, and FATF's mutual evaluation\
    \ assessors may again note the absence of a comprehensive federal VASP supervisory\
    \ framework in any forthcoming review of the US regime."
