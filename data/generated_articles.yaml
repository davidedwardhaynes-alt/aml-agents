  full_article: "The United States Senate Banking Committee is scheduled to convene\
    \ a hearing on digital asset market structure this Thursday, a procedural step\
    \ that signals congressional intent to advance a legislative framework that has\
    \ eluded Washington for the better part of a decade. For compliance officers at\
    \ firms with U.S. nexus or dollar-denominated crypto exposure, the hearing marks\
    \ a potential inflection point in the jurisdictional boundary dispute between\
    \ the Securities and Exchange Commission and the Commodity Futures Trading Commission\u2014\
    a dispute that has left AML programme design in a state of deliberate ambiguity.\n\
    \nThe absence of a coherent federal market structure law has been a persistent\
    \ gap in the U.S. implementation of FATF Recommendation 15, which requires jurisdictions\
    \ to apply a risk-based approach to virtual asset service providers and to designate\
    \ competent supervisory authorities. Without clarity on whether a given token\
    \ is a security or a commodity, VASPs and their institutional counterparties have\
    \ struggled to identify the correct supervisory counterpart, complicating both\
    \ registration obligations and the Travel Rule compliance chains that FinCEN and\
    \ state-level regulators nominally require.\n\nFrom a financial crime compliance\
    \ perspective, the stakes are practical rather than abstract. A market structure\
    \ bill that assigns primary oversight to the CFTC for spot commodity markets would\
    \ expand that agency's AML examination authority into a segment it currently supervises\
    \ only at the derivatives layer. Conversely, a framework that retains SEC jurisdiction\
    \ over a broad class of digital assets would impose broker-dealer-equivalent AML\
    \ obligations on a population of intermediaries that have largely operated under\
    \ money-services-business standards. Either outcome will require firms to revisit\
    \ counterparty due diligence frameworks, particularly where correspondent relationships\
    \ with offshore exchanges are involved.\n\nInternationally, peer regulators will\
    \ be watching closely. MAS has operated under a defined licensing regime since\
    \ the Payment Services Act amendments of 2021, and the EU's MiCA framework entered\
    \ full application in late 2024. A U.S. market structure statute would remove\
    \ a significant regulatory arbitrage argument that has complicated FATF mutual\
    \ evaluation assessments of American oversight. Whether Thursday's hearing produces\
    \ consensus legislative language or merely ventilates familiar disagreements between\
    \ committee members remains to be seen, but the institutional appetite for resolution\
    \ appears, by Washington standards, unusually convergent."
