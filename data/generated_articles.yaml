    \ Singapore similarly treat tokenised securities as in-scope for the full suite\
    \ of AML/CFT controls. The velocity of institutional adoption suggested by the\
    \ survey data implies that compliance teams may now be operationalising these\
    \ obligations at scale for the first time.\n\nThe compliance implications are\
    \ layered. Tokenised assets introduce programmable transfer logic\u2014smart contracts\
    \ that can execute peer-to-peer transactions without an intermediary triggering\
