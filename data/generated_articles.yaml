    \ and FATF Recommendation 26 requires that designated non-bank financial institutions\
    \ applying such services maintain commensurate customer due diligence and transaction\
    \ monitoring controls. In the United States, broker-dealer registration requirements\
    \ under the Securities Exchange Act of 1934 and FINRA rulebooks will govern the\
    \ options and pre-IPO offerings, layering obligations that sit well beyond Coinbase's\
    \ existing FinCEN money-services-business registration and state money-transmission\
    \ licences.\n\nFor MLROs and compliance officers at correspondent institutions,\
