    \ that submitted transitional applications before the 29 February 2024 deadline\
    \ were permitted to continue operating provisionally; NewBX's full approval represents\
    \ a graduation from that transitional status to substantive authorisation, subject\
    \ to the SFC's December 2023 circular requirements on governance, custody, and\
