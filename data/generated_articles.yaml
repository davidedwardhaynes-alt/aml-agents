  full_article: "A Telegram group allegedly used to coordinate trades ahead of Terra/LUNA's\
    \ May 2022 collapse has emerged as the central exhibit in insider-trading allegations\
    \ against Jane Street, according to reporting by CoinDesk. If substantiated, the\
    \ communications would place one of the world's most prominent proprietary trading\
    \ firms at the intersection of two of financial crime compliance's most persistent\
    \ vulnerabilities: encrypted-messaging platforms as coordination infrastructure\
    \ and the regulatory grey zones that surrounded digital-asset markets at the moment\
    \ of one of their worst liquidity crises.\n\nThe Terra implosion\u2014which erased\
    \ approximately $40 billion in market value within days\u2014has already generated\
    \ significant enforcement and litigation activity across multiple jurisdictions.\
    \ South Korean prosecutors pursued Do Kwon under domestic capital-markets statutes,\
    \ while the U.S. SEC brought civil fraud charges grounded in securities law. FATF\
    \ Recommendation 15 and its interpretive note on virtual assets have since pressed\
    \ member states to ensure that market-manipulation and insider-dealing frameworks\
    \ apply to crypto with the same rigour as to conventional securities, an obligation\
    \ that remains unevenly implemented across Asia-Pacific.\n\nFor compliance officers,\
    \ the Telegram dimension is particularly significant. Encrypted and ephemeral\
    \ messaging applications have featured in enforcement actions ranging from the\
    \ FCA's 2021 Gold Fix manipulation case to the DOJ's foreign-exchange spoofing\
    \ prosecutions. Surveillance programmes calibrated for Bloomberg chat or Symphony\
    \ may not ingest signal from Telegram channels, leaving a structural gap that\
    \ regulators including MAS\u2014through its Notice SFA 04-N09 on risk management\
    \ and the broader Securities and Futures Act market-misconduct provisions\u2014\
    have flagged as inadequate. Firms trading digital assets in Singapore, Hong Kong,\
    \ or Australia should treat this case as a prompt to audit whether their electronic-communications\
    \ capture and review policies extend to all platforms used by traders, regardless\
    \ of asset class.\n\nThe allegations also raise conduct-risk questions for prime\
    \ brokers and liquidity providers more broadly. Under OSCO in Hong Kong and Part\
    \ 7.10 of the Corporations Act in Australia, market manipulation and insider dealing\
    \ carry criminal liability that can attach to legal entities as well as individuals.\
    \ Whether Jane Street had effective supervisory controls\u2014written policies,\
    \ attestations, and genuine surveillance rather than paper compliance\u2014will\
    \ likely be central to any regulatory examination that follows.\n\nThe case is\
    \ still at an early evidentiary stage, and no findings of liability have been\
    \ made. However, enforcement agencies that have been building digital-asset market-integrity\
    \ capacity since 2022 now have a high-profile fact pattern around which to test\
    \ both their jurisdiction and their tools."
