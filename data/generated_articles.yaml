  full_article: "Bank Negara Malaysia's introduction of the RM5 billion SME Stabilisation\
    \ Relief Facility, offering individual financing of up to RM750,000 per eligible\
    \ business, creates a material compliance consideration for participating financial\
    \ institutions: accelerated credit deployment under crisis conditions historically\
    \ correlates with elevated financial crime exposure, and MLROs at licensed institutions\
    \ will need to calibrate their risk frameworks accordingly before drawdowns begin.\n\
    \nEmergency and relief financing schemes have a documented vulnerability profile.\
    \ The FATF Guidance on Financial Inclusion and FATF Recommendation 1 both acknowledge\
    \ that simplified due diligence measures, while appropriate for low-risk scenarios,\
    \ require explicit risk-based justification. In Malaysia, the relevant obligations\
    \ flow primarily through BNM's Anti-Money Laundering, Anti-Terrorism Financing\
    \ and Proceeds of Unlawful Activities Act 2001 (AMLA), and BNM Notice on Anti-Money\
    \ Laundering and Counter Financing of Terrorism (AML/CFT) for Financial Institutions.\
    \ Previous crisis-era facilities \u2014 including pandemic-period relief schemes\
    \ across the region \u2014 generated post-disbursement findings around shell entity\
    \ exploitation, loan stacking across multiple institutions, and misrepresentation\
    \ of business eligibility.\n\nFor compliance functions at participating banks\
    \ and development financial institutions, several risk vectors warrant immediate\
    \ attention. First, the West Asia conflict nexus introduces a sanctions dimension:\
    \ institutions must screen applicants against current UN, OFAC, and BNM-published\
    \ designated persons lists, particularly where beneficial ownership chains extend\
    \ to affected jurisdictions. Second, the RM750,000 threshold sits below standard\
    \ enhanced due diligence triggers at many institutions, meaning controls calibrated\
    \ around larger exposures may not automatically activate. Third, microenterprises\
    \ \u2014 explicitly included in the facility \u2014 often carry thinner documentation\
    \ trails, requiring proportionate but robust customer due diligence under Section\
    \ 16 of AMLA.\n\nFrom a supervisory standpoint, BNM will reasonably expect institutions\
    \ to demonstrate that crisis-mode credit origination does not dilute transaction\
    \ monitoring obligations. Suspicious transaction reporting duties under Section\
    \ 14 of AMLA remain unchanged regardless of the policy rationale for a facility.\
    \ Institutions that treated analogous post-pandemic schemes as compliance-lite\
    \ environments subsequently faced examination scrutiny.\n\nThe facility's legitimate\
    \ economic purpose is clear, and the policy rationale for supporting supply-chain-stressed\
    \ SMEs is sound. The compliance question is not whether to participate, but whether\
    \ institutions have updated their risk appetite statements, CDD workflows, and\
    \ STR escalation protocols to reflect a scheme that is simultaneously time-pressured,\
    \ broad in eligible population, and geopolitically adjacent to elevated financial\
    \ crime risk."
