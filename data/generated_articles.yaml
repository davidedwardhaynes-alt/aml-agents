  full_article: "Agentic commerce \u2014 in which autonomous AI systems initiate and\
    \ complete payments on behalf of human principals \u2014 has moved from theoretical\
    \ concern to live operational reality, confronting financial institutions with\
    \ a verification gap that existing customer due diligence frameworks were not\
    \ designed to close.\n\nThe problem is structural. FATF Recommendation 10 obliges\
    \ covered entities to identify and verify the customer and, where applicable,\
    \ the beneficial owner. It says nothing about verifying the delegated machine\
    \ acting in between. When an AI agent executes a purchase, books a service, or\
    \ moves funds within pre-authorised parameters, the transaction record reflects\
    \ an action that is technically customer-initiated but operationally machine-executed.\
    \ The customer identification programme sits at onboarding; the agent operates\
    \ continuously and autonomously thereafter. That temporal gap is where the trust\
    \ layer breaks down. MAS Notice PSN02, for instance, requires payment service\
    \ providers to conduct ongoing monitoring of transactions \u2014 a requirement\
    \ premised on human behavioural patterns that agentic systems will render statistically\
    \ anomalous without necessarily being illicit.\n\nFor MLROs, the immediate compliance\
    \ question concerns the status of an AI agent within existing frameworks for third-party\
    \ reliance and authorised representatives. Neither the MLRO community nor regulators\
    \ have yet produced authoritative guidance on whether an agent acting outside\
    \ sanctioned behavioural parameters triggers a suspicious transaction obligation\
    \ on the part of the firm, or whether liability flows to the technology provider,\
    \ the deploying business, or the account holder. Australia's AML/CTF Act and Singapore's\
    \ CDSA-adjacent reporting obligations under the MACMA framework similarly offer\
    \ no explicit path.\n\nFrom a financial crime risk perspective, agentic commerce\
    \ introduces novel vectors: agents can be compromised or manipulated to execute\
    \ structuring patterns that evade threshold-based monitoring, and the speed of\
    \ autonomous execution compresses the window for human intervention. Transaction\
    \ monitoring models trained on human cadence will produce both false negatives\
    \ and alert fatigue if not recalibrated for machine-generated activity.\n\nRegulators\
    \ in the Asia-Pacific region have signalled interest in AI governance broadly\
    \ \u2014 MAS's recently updated guidelines on AI risk management and ASIC's focus\
    \ on digital advice accountability being proximate examples \u2014 but none has\
    \ yet addressed the agentic payments question with the specificity the industry\
    \ requires. Until that guidance arrives, firms deploying or accepting agentic\
    \ commerce flows would be prudent to document their risk assessments explicitly,\
    \ treat agent-initiated transactions as a distinct customer risk sub-category,\
    \ and engage supervisors proactively rather than wait for enforcement to define\
    \ the boundary."
