  full_article: "The aggregate market capitalisation of stablecoins has contracted\
    \ by approximately $10 billion since May 2026, a decline that, while notable in\
    \ absolute terms, represents a mid-single-digit percentage drawdown against a\
    \ market that had approached $200 billion earlier in the year. For compliance\
    \ professionals, the more material question is not whether the contraction signals\
    \ systemic distress, but what redemption volumes and reserve liquidity disclosures\
    \ reveal about the adequacy of existing supervisory frameworks during periods\
    \ of outflow pressure.\n\nStablecoins have sat at the intersection of payments\
    \ regulation and virtual asset oversight since at least 2019, when FATF revised\
    \ its Recommendations to extend the Travel Rule to virtual asset service providers.\
    \ Subsequent guidance \u2014 including FATF's 2021 updated guidance on VASPs and,\
    \ at the jurisdiction level, MAS Notice PSN02 in Singapore and the EU's Markets\
    \ in Crypto-Assets Regulation \u2014 has progressively tightened issuer obligations\
    \ around reserve transparency, redemption rights, and AML controls. The contraction\
    \ comes as several major jurisdictions, including the United States, are still\
    \ finalising stablecoin-specific legislation, leaving regulatory arbitrage opportunities\
    \ that supervisors have flagged repeatedly.\n\nFrom a financial-crime-compliance\
    \ standpoint, net redemption periods merit particular attention. When holders\
    \ convert stablecoins back to fiat at scale, transaction monitoring systems must\
    \ be capable of distinguishing routine treasury operations from layering activity\
    \ \u2014 a distinction that becomes harder as volumes compress into shorter windows.\
    \ Issuers subject to the EU's Transfer of Funds Regulation and equivalent Travel\
    \ Rule regimes face the added complexity of ensuring originator and beneficiary\
    \ data accompanies each transfer even during high-throughput redemption events.\n\
    \nFor prudential supervisors, the episode reinforces longstanding concerns about\
    \ reserve composition. An issuer holding commercial paper or money-market instruments\
    \ rather than short-duration sovereign debt faces mark-to-market pressures precisely\
    \ when redemption demand peaks \u2014 a dynamic the Basel Committee's work on\
    \ cryptoasset prudential treatment, finalised in its December 2022 standard, was\
    \ designed to address for bank-held exposures.\n\nThe analyst consensus that no\
    \ systemic panic is warranted is plausible, provided that reserve attestations\
    \ are current and redemption queues are clearing at par. The more durable lesson\
    \ for MLROs and supervisors is structural: a $10 billion outflow stress-tests\
    \ operational resilience in ways that benign inflow periods do not, and the compliance\
    \ infrastructure built during the bull phase will now face its more instructive\
    \ examination."
