  full_article: "The EBAday 2026 conference placed the trajectory of digital money\
    \ in Europe squarely at the centre of institutional debate, with Stream 2 afternoon\
    \ sessions devoted entirely to the question of how central bank digital currencies,\
    \ tokenised deposits, and regulated stablecoins will coexist within the continent's\
    \ evolving payments architecture. For compliance professionals, the subtext is\
    \ consequential: each form of digital money carries a distinct AML/CFT risk profile,\
    \ and Europe's supervisory frameworks have yet to fully resolve how obligations\
    \ will be allocated across the new intermediary landscape.\n\nThe backdrop is\
    \ a regulatory environment in rapid transition. The EU's Markets in Crypto-Assets\
    \ Regulation (MiCA), which brought asset-referenced tokens and e-money tokens\
    \ under EBA supervisory convergence from mid-2024, established a baseline for\
    \ stablecoin issuers \u2014 but MiCA's AML provisions operate alongside, rather\
    \ than replacing, the obligations imposed by the Sixth Anti-Money Laundering Directive\
    \ (AMLD6) and the Transfer of Funds Regulation as revised for crypto-assets. Meanwhile,\
    \ the European Central Bank's digital euro project continues its preparation phase,\
    \ with the ECB and European Commission still finalising the legislative framework\
    \ that will determine whether supervised intermediaries or the ECB itself bear\
    \ primary CDD responsibility for retail transactions.\n\nFor MLROs at payment\
    \ institutions and credit institutions, the critical unresolved question is functional\
    \ equivalence: whether a tokenised commercial bank deposit, a MiCA-compliant e-money\
    \ token, and a future digital euro will be treated as equivalent instruments for\
    \ transaction monitoring and suspicious activity reporting purposes. The FATF\
    \ Recommendation 15 framework and its accompanying guidance on virtual assets\
    \ provide a foundation, but the FATF's own assessments have noted inconsistent\
    \ national implementation across EU member states, creating arbitrage risk that\
    \ EBAday delegates are right to flag.\n\nBanks building correspondent relationships\
    \ with digital asset infrastructure providers face an additional layer of complexity\
    \ under FATF's travel rule requirements, now transposed into EU law via the revised\
    \ Transfer of Funds Regulation, which extended wire-transfer obligations to crypto-asset\
    \ transfers from December 2024.\n\nThe direction of EBAday's discussion reflects\
    \ a broader institutional recognition that the architecture of digital money is\
    \ being determined now, and that compliance functions which engage at the design\
    \ stage \u2014 rather than retrofitting controls after launch \u2014 are far better\
    \ positioned to meet supervisory expectations when the ECB's preparation phase\
    \ eventually concludes."
