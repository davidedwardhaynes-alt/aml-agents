  full_article: "The diplomatic visit by North Korean Foreign Minister Choe Son Hui\
    \ to Moscow for talks with Sergei Lavrov, confirmed by state media on 19 July\
    \ 2026, carries direct implications for financial institutions managing exposure\
    \ to DPRK-linked sanctions risk \u2014 particularly those operating across corridors\
    \ where Russian counterparty relationships have already complicated compliance\
    \ frameworks since 2022.\n\nThe meeting deepens a bilateral relationship that\
    \ has attracted sustained regulatory attention. FATF has maintained the DPRK on\
    \ its list of jurisdictions subject to a call for action since 2011, requiring\
    \ member-state financial institutions to apply enhanced due diligence and, in\
    \ many cases, countermeasures under Recommendation 19. Following Russia's full-scale\
    \ invasion of Ukraine, the UN Panel of Experts documented accelerating DPRK arms\
    \ transfers to Russia \u2014 activity that, combined with the reported deployment\
    \ of DPRK troops, has blurred the boundary between politically sensitive engagement\
    \ and sanctions-relevant conduct.\n\nFor compliance officers, the immediate concern\
    \ is layering risk. Russia-domiciled entities already carry heightened scrutiny\
    \ under MAS Notice 626, the Australian AML/CTF Act's correspondent banking provisions,\
    \ and Hong Kong's OSCO framework. Where those entities maintain links \u2014 however\
    \ indirect \u2014 to DPRK state structures or procurement networks, the aggregated\
    \ sanctions exposure is material. UN Security Council Resolutions 1718 and 2270,\
    \ as extended through subsequent resolutions, prohibit a broad range of financial\
