  full_article: "Sapia Partners has agreed to make a voluntary payment of \xA319,637,950\
    \ to clients of collapsed wealth manager WealthTek following an FCA finding that\
    \ the firm materially failed its client money obligations as principal firm \u2014\
    \ an outcome that carries direct implications for any authorised firm operating\
    \ appointed representative networks.\n\nThe FCA's censure centres on a structural\
    \ control failure that compliance professionals will recognise as a foundational\
    \ weakness: Sapia did not adequately segregate the duties of individuals authorised\
    \ to make payments from client money accounts and those responsible for reconciling\
    \ and checking those same accounts. This concentration of function in a small\
    \ number of personnel is precisely the control gap that CASS 7's segregation and\
    \ reconciliation requirements are designed to prevent. Under the FCA's Client\
    \ Assets Sourcebook, principal firms bear ultimate regulatory responsibility for\
    \ client money held or controlled through their appointed representatives, meaning\
    \ Sapia's exposure was not contingent on WealthTek's own conduct but on Sapia's\
    \ supervisory and operational architecture.\n\nThe WealthTek matter has a pronounced\
    \ criminal dimension. In December 2024, the FCA separately charged WealthTek's\
    \ principal partner with multiple criminal offences including fraud and money\
    \ laundering \u2014 allegations that sit alongside, rather than substitute for,\
    \ the regulatory action now taken against Sapia. For financial crime compliance\
    \ officers, the case illustrates how inadequate client money controls can function\
    \ as an enabler of underlying fraud: when reconciliation is not independent, misappropriation\
    \ can persist undetected across reporting cycles.\n\nFor MLROs and compliance\
    \ leads at firms running appointed representative networks, the supervisory lesson\
    \ is unambiguous. The FCA has consistently signalled, through its AR regime reforms\
    \ implemented in 2022, that principal firms must treat ARs as an extension of\
    \ their own control environment rather than a separate risk perimeter. Firms should\
    \ review whether operational staff with payment authority over CASS accounts hold\
    \ concurrent reconciliation responsibilities, and whether their AR oversight frameworks\
    \ provide for independent transaction monitoring rather than relying on AR-level\
    \ self-reporting.\n\nWith the FCA's enforcement pipeline showing continued appetite\
    \ for CASS-related action alongside criminal referrals, principal firms that have\
    \ not recently stress-tested their appointed representative governance arrangements\
    \ face an increasingly narrow window to remediate quietly rather than publicly."
