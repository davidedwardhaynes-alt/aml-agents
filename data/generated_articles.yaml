  full_article: "Fundraising drives organised by diaspora communities in response\
    \ to natural disasters present a low-risk humanitarian profile in most circumstances,\
    \ but they nonetheless activate formal obligations under Hong Kong's anti-money\
    \ laundering and counter-terrorist financing framework that charity organisers\
    \ and receiving institutions alike should not overlook.\n\nThe campaign mounted\
    \ by the Abra Tingguian Ilocano Society \u2014 collecting cash donations outside\
    \ City Hall in Central with a stated target of HK$20,000 \u2014 falls within the\
    \ category of informal value collection that regulators have historically scrutinised\
    \ for transparency and audit-trail deficiencies. Under the Anti-Money Laundering\
    \ and Counter-Terrorist Financing Ordinance (Cap. 615), designated non-financial\
    \ businesses and professions, as well as licensed remittance agents, bear customer\
    \ due diligence and record-keeping obligations when handling funds on behalf of\
    \ third parties. Informal community collections, while not themselves licensed\
