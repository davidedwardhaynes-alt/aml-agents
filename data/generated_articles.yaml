  summary: "The headline alone signals the tension that has quietly sharpened into\
    \ a policy fault line: as jurisdictions from the United Kingdom to Singapore tighten\
    \ age-assurance requirements for online platforms, the compliance infrastructure\
    \ built to satisfy those mandates is generating identity datasets that sit well\
