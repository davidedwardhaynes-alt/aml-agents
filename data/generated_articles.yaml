    \ parties \u2014 rather than resist all challenges \u2014 reflects a pragmatic\
    \ calculation: contested implementation risks producing a patchwork of conflicting\
    \ firm-level outcomes that would ultimately undermine consumer certainty. The\
    \ regulator retains the requirement that firms communicate negative determinations,\
