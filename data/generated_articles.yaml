  full_article: "Deutsche Bank has deployed artificial intelligence to automate elements\
    \ of its third-party vendor risk review process, a move that addresses one of\
    \ the more operationally burdensome obligations facing globally systemically important\
    \ banks under both prudential and financial crime compliance frameworks.\n\nThird-party\
    \ risk management sits at the intersection of several regulatory regimes. FATF\
    \ Recommendation 18 requires financial institutions to apply group-wide AML/CFT\
    \ programmes to branches and subsidiaries, and supervisors increasingly interpret\
    \ that obligation to extend scrutiny upstream to material vendors and outsourced\
    \ service providers. In the European Union, the Digital Operational Resilience\
    \ Act, which became applicable in January 2025, imposes explicit ICT third-party\
    \ risk management requirements on financial entities, mandating register maintenance,\
    \ concentration risk assessments, and contractual due diligence at scale. For\
    \ a bank of Deutsche Bank's footprint \u2014 operating across more than 60 jurisdictions\
    \ \u2014 the manual effort required to conduct, refresh, and document vendor assessments\
    \ across thousands of counterparties is considerable and inherently prone to inconsistency.\n\
    \nThe practical implication of applying AI to this workflow is twofold. First,\
    \ it can standardise the extraction and scoring of risk-relevant information from\
    \ vendor questionnaires, public filings, sanctions lists, adverse media, and regulatory\
    \ databases, reducing the variability that arises when assessments are handled\
    \ by analysts of differing experience levels. Second, it enables more frequent\
    \ refresh cycles; where annual reviews have been the operational norm, continuous\
    \ or triggered monitoring becomes feasible. Both outcomes are directly relevant\
    \ to compliance functions managing correspondent banking networks, cloud infrastructure\
    \ vendors, and data sub-processors \u2014 categories where regulatory exposure\
    \ is acute.\n\nThe approach is not without governance considerations. The European\
    \ Banking Authority's guidelines on outsourcing arrangements and MAS Notice 1014\
    \ in Singapore both require firms to retain adequate oversight of automated decision-support\
    \ tools used in risk-sensitive processes. Regulators will expect model risk management\
    \ frameworks to cover AI-driven vendor scoring, including documentation of training\
    \ data, output validation, and human-in-the-loop escalation protocols. Firms watching\
    \ Deutsche Bank's implementation will be as interested in how it satisfies examiner\
    \ scrutiny as in the efficiency gains it delivers. The broader question for the\
    \ industry is whether AI-assisted third-party risk management moves from competitive\
    \ differentiator to regulatory expectation within the next supervisory cycle."
