    \ itself operates under heightened scrutiny in several jurisdictions, having entered\
    \ into a deferred prosecution agreement with the US Department of Justice in 2019\
    \ over Iran sanctions violations and a subsequent consent order. Regulators have\
    \ historically viewed post-enforcement staffing reductions in compliance functions\
    \ with particular attention.\n\nFrom an MLRO perspective, the critical variable\
