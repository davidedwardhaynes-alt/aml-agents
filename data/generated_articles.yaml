  full_article: "ISDA submitted its response to the European Commission's consultation\
    \ on third-country carbon price calculation methodologies on 10 June 2026, a filing\
    \ that carries direct consequences for how derivatives dealers and their counterparties\
    \ document and evidence carbon costs embedded in cross-border transactions under\
    \ the EU Carbon Border Adjustment Mechanism.\n\nThe CBAM, which entered its definitive\
    \ phase in January 2026, requires importers of covered goods \u2014 steel, aluminium,\
    \ cement, fertilisers, electricity, and hydrogen \u2014 to surrender certificates\
    \ reflecting the carbon price difference between the EU Emissions Trading System\
    \ and the effective price paid in the country of production. The precise methodology\
    \ for calculating that third-country carbon price has remained technically contested\
    \ since the transitional period ended, creating legal uncertainty for structured\
    \ finance desks that hedge commodity exposures with embedded carbon cost components,\
    \ as well as for banks providing trade finance to importers of affected goods.\n\
    \nISDA's intervention reflects the derivatives market's growing stake in carbon\
    \ price integrity. Where a third-country carbon price is overstated or calculated\
    \ inconsistently, the hedge embedded in a commodity swap or a carbon-linked structured\
    \ note can diverge materially from the underlying regulatory liability it is intended\
    \ to offset. From a financial crime compliance standpoint, methodological ambiguity\
    \ also raises concerns: inconsistent carbon price attestations across jurisdictions\
    \ create conditions in which artificial inflation or deflation of declared carbon\
    \ costs could be exploited to manipulate CBAM certificate obligations, an exposure\
    \ that sits at the intersection of market abuse and potential trade-based financial\
    \ crime under frameworks such as the EU's AMLD series and equivalent third-country\
    \ AML regimes.\n\nFor MLROs at institutions active in carbon markets or trade\
    \ finance, the consultation outcome will shape what constitutes adequate due diligence\
    \ on carbon cost documentation provided by counterparties in non-EU jurisdictions.\
    \ FATF's 2023 guidance on the money-laundering risks associated with voluntary\
    \ and compliance carbon markets remains the primary reference point, but it does\
    \ not address CBAM-specific attestation risks in granular terms.\n\nThe Commission\
    \ is expected to publish implementing guidance on the calculation framework before\
    \ the first full CBAM declaratory cycle closes at the end of 2026. How granular\
    \ that guidance proves will determine whether compliance teams can establish defensible,\
    \ consistent standards for reviewing third-country carbon price claims \u2014\
    \ or whether the current interpretive patchwork persists into the next reporting\
    \ year."
