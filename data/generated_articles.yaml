    \ would disproportionately burden residents in outer districts, where public transport\
    \ options are less frequent and fares structurally higher. The first-month data\
    \ does not yet disaggregate trip volumes by district or demographic sub-group,\
    \ which limits any firm conclusion about whether reduced long-haul usage reflects\
    \ genuine behavioural optimisation or constrained mobility for those with fewer\
    \ route alternatives.\n\nFor compliance and financial crime professionals, the\
    \ episode holds a secondary relevance: subsidy schemes with predictable arbitrage\
    \ structures are periodically examined for exposure to organised misuse, including\
