    \ of the EU's Anti-Money Laundering Directives. Unlike licensed credit institutions,\
    \ many RBF platforms do not automatically fall within the scope of obliged-entity\
    \ status under the Sixth AMLD or its predecessor frameworks, raising questions\
    \ about the consistency of customer due diligence, beneficial ownership verification,\
    \ and suspicious transaction reporting obligations across the sector.\n\nFor MLROs\
    \ at traditional lenders and payment institutions, the expansion of well-capitalised\
    \ RBF platforms into SME financing introduces a counterparty risk dimension. Tech\
    \ SMEs frequently exhibit the revenue volatility and complex shareholding structures\
    \ \u2014 including founder equity held through holding vehicles \u2014 that FATF\
    \ Recommendation 24 on beneficial ownership transparency was designed to address.\
    \ Where an RBF platform lacks full obliged-entity status, the CDD burden effectively\
    \ migrates upstream to the banks providing settlement infrastructure or downstream\
    \ to the investors funding the advance portfolios.\n\nFrom a supervisory standpoint,\
    \ the Swedish Finansinspektionen and BaFin in Germany \u2014 the two jurisdictions\
    \ most directly relevant to Float's corporate structure and its lead investor\
    \ \u2014 have both signalled heightened scrutiny of alternative finance models\
    \ following the 2024 FATF Mutual Evaluation findings on non-bank financial intermediaries.\
    \ Platforms scaling quickly on the back of institutional capital rounds will face\
    \ pressure to demonstrate that their transaction monitoring, source-of-funds analysis,\
    \ and SAR filing practices are commensurate with the risk profiles of their SME\
    \ borrowers.\n\nThe broader trajectory suggests that European regulators are unlikely\
    \ to permit the RBF sector to remain in a compliance grey zone indefinitely. The\
    \ European Banking Authority's ongoing work on the perimeter of the Consumer Credit\
    \ Directive and its SME financing analogues may well draw platforms like Float\
    \ into a more prescriptive AML supervisory regime before a Series B conversation\
    \ materialises."
