    \ payment transparency and its ongoing work on virtual assets and new technologies\
    \ have consistently stressed that wire transfer rules and know-your-customer obligations\
    \ attach to the *transaction*, not the channel. Under FATF Recommendation 16 and\
    \ its interpretive note, ordering institutions remain responsible for ensuring\
