    \ to meet robust redemption and reserve standards, and it remains an open question\
    \ whether synthetic instruments of this design satisfy that threshold in key markets.\n\
    \nFor compliance officers at firms considering USDe exposure, the critical lens\
    \ is FATF Recommendation 15, which requires virtual asset service providers and\
    \ their institutional counterparts to conduct thorough risk assessments before\
    \ onboarding novel instruments. MAS Notice SFA 04-N02 and the accompanying MAS\
    \ Guidelines on digital payment token services impose additional obligations on\
    \ Singapore-nexus entities regarding customer due diligence and product-level\
    \ risk classification. In Hong Kong, the SFC's licensing regime for virtual asset\
    \ trading platforms would require any platform distributing USDe to assess whether\
    \ it constitutes a collective investment scheme under the Securities and Futures\
    \ Ordinance.\n\nFor Janus Henderson, the reputational and regulatory stakes are\
    \ non-trivial. As a regulated fund manager operating across the US, UK, EU, and\
    \ Asia-Pacific, its distribution of USDe to underlying clients would engage AML/CTF\
    \ obligations under FinCEN rules, the UK's MLRs 2017, and AUSTRAC's AML/CTF Act\
    \ \u2014 each requiring transaction monitoring calibrated to the specific risk\
    \ profile of synthetic yield instruments, including their exposure to offshore\
    \ derivatives venues that may themselves carry elevated financial-crime risk.\n\
    \nThe broader implication is structural: when a mid-to-large traditional asset\
    \ manager begins distributing a synthetic dollar instrument, the compliance burden\
    \ does not diminish \u2014 it migrates upstream. Supervisors at the FCA, ASIC,\
    \ and MAS will likely be watching Janus Henderson's product governance disclosures\
    \ closely as a precedent for how incumbents frame obligations around instruments\
    \ that do not fit neatly into existing regulatory taxonomies."
