    \ counterparties may be responsible for the price-sensitive flows that shape retail\
    \ investor perception.\n\nFor MLROs at broker-dealers and custodians holding these\
    \ instruments, the practical implication is straightforward: aggregate product-level\
    \ metrics are a poor proxy for the actual risk profile of a book. Customer-level\
    \ segmentation \u2014 distinguishing the tactical arbitrageur from the passive\
    \ pension-aligned allocator \u2014 remains the more defensible basis for ongoing\
    \ due diligence reviews under FATF Recommendation 10 and the corresponding beneficial\
    \ ownership standards embedded in MAS Notice SFA 04-N02 and equivalent regimes.\n\
    \nAs spot Bitcoin ETF markets mature and secondary liquidity deepens, supervisors\
    \ are likely to expect more granular behavioural analytics from regulated venues,\
    \ moving the conversation from product approval to the sustained quality of post-launch\
