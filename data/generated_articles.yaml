    \ consulted on a mass redress mechanism, drawing on powers under the Financial\
    \ Services and Markets Act 2000 to establish consumer redress schemes where widespread\
    \ harm has been identified. Estimated industry liability figures \u2014 cited\
    \ by analysts at anywhere between \xA310 billion and \xA330 billion \u2014 prompted\
    \ a wave of legal challenges from lenders seeking to contest both the scope of\
