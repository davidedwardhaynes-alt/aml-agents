  full_article: "The Hong Kong government recorded HK$69 million in subsidy savings\
    \ during April 2026, the first full month following revisions to the city's concessionary\
    \ public transport fare scheme \u2014 a result that welfare authorities say reflects\
    \ a measurable behavioural shift among elderly and disabled commuters rather than\
    \ any reduction in service access.\n\nThe HK$2 concessionary fare scheme, introduced\
    \ in 2012, was originally designed to encourage older and disabled residents to\
