    \ or mule-account behaviour.\n\nUWB's distinguishing characteristic \u2014 device\
    \ ranging accurate to roughly ten centimetres \u2014 means the system can in principle\
    \ attribute a payment to a specific device and therefore a specific registered\
    \ account, providing a stronger audit trail than legacy contactless cards. For\
    \ Resona, as the banking partner carrying settlement exposure, this traceability\
    \ is an asset for suspicious transaction reporting purposes. For JCB as scheme\
