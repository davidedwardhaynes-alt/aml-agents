  full_article: "The EBAday 2026 conference placed the trajectory of digital money\
    \ in Europe squarely at the centre of institutional debate, with Stream 2 afternoon\
    \ sessions devoted entirely to the question of how central bank digital currencies,\
    \ tokenised deposits, and regulated stablecoins will coexist within the continent's\
