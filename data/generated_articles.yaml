    \ the unfunded nature of the guarantee means credit exposure is contingent rather\
    \ than immediate, but reputational and compliance risk materialises if portfolio-level\
    \ KYC or sanctions screening failures emerge at the originator level. Multilateral\
    \ development banks have tightened integrity due diligence on guarantee beneficiaries\
    \ following high-profile cases involving IFC-backed institutions in other emerging\
    \ markets.\n\nThe broader implication is that risk-sharing facilities of this\
    \ kind may become a standard scaling mechanism for ASEAN digital banks seeking\
    \ to grow SME books without breaching capital adequacy thresholds \u2014 provided\
    \ compliance infrastructure scales in parallel with credit appetite."
