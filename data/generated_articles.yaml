  full_article: "Authorised push payment fraud and social-engineering scams now account\
    \ for a majority of financial crime losses reported by retail banks across several\
    \ Asia-Pacific jurisdictions, a pattern confirmed by panellists at LexisNexis\
    \ Risk Ready 2026 in Hong Kong\u2014a shift that exposes a structural gap in AML\
    \ frameworks designed primarily to detect suspicious transactions rather than\
    \ compromised human decision-making.\n\nThe regulatory architecture across the\
    \ region was built largely around FATF Recommendations 10 through 21, which emphasise\
    \ customer due diligence, transaction monitoring, and suspicious transaction reporting.\
    \ Those controls assume the bank's systems are the primary attack surface. The\
    \ emergence of investment scams, romance fraud, and pig-butchering operations\u2014\
    typologies now extensively documented in FATF's 2023 report on virtual assets\
    \ and related guidance\u2014inverts that assumption entirely. The customer becomes\
    \ both victim and, in the eyes of legacy monitoring systems, the apparent originator\
    \ of seemingly legitimate payment instructions.\n\nFor MLROs, the operational\
    \ consequence is immediate. Existing transaction monitoring rules calibrated to\
    \ flag structuring, layering, or unusual counterparty geography will routinely\
    \ miss authorised transfers to mule accounts, particularly where amounts fall\
    \ below threshold parameters or where the customer has an otherwise clean profile.\
    \ MAS Notice PSN01 and Hong Kong's AMLO-based supervisory expectations both require\
    \ institutions to maintain systems proportionate to the risks they face; regulators\
    \ in both jurisdictions have signalled that proportionality now includes social-engineering\
    \ vectors. The Monetary Authority of Singapore's shared responsibility framework,\
    \ operationalised in late 2024, already imposes phased liability on banks where\
    \ anti-scam controls are demonstrably inadequate.\n\nFor correspondent banks and\
    \ regional financial groups, the cross-border dimension adds further complexity.\
    \ Mule networks in one jurisdiction receive funds from victims in another, fragmenting\
    \ the suspicious activity report trail across multiple FIUs. AMLA in Singapore\
    \ and JFIU in Hong Kong have expanded information-sharing channels, but legal\
    \ barriers under bank secrecy provisions still impede real-time inter-bank intelligence\
    \ exchange at the transaction level.\n\nThe direction of regulatory travel is\
    \ clear. Supervisors across Asia-Pacific are moving toward outcome-based assessments\
    \ of fraud and AML controls, with less tolerance for institutions that treat customer-protection\
    \ obligations as distinct from financial crime compliance. Banks that have not\
    \ yet integrated behavioural analytics, real-time payment intervention capabilities,\
    \ and scam-specific typologies into their financial crime frameworks face a narrowing\
    \ window to do so before those expectations are codified in formal guidance."
