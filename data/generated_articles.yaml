    Rule to virtual asset service providers, and any card-initiated spend that liquidates
    Dogecoin in real time constitutes a crypto-to-fiat conversion event that triggers
    recordkeeping obligations under those rules.


    For MLROs, the central concern is velocity and attribution. Dogecoin''s low unit
    price and high divisibility make it technically straightforward to load large
