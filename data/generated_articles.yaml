    \ thresholds.\n\nThe joint response does not resolve these questions, but its\
    \ timing and authorship suggest that the industry expects the FCA and Bank of\
    \ England to move toward consultative rulemaking rather than sandbox extension\
    \ alone. Compliance functions that have not yet mapped their existing AML control\
    \ frameworks against tokenised asset flows would be prudent to begin that exercise\
