    \nThe EBA's convening role here reflects a broader European trajectory. The EU's\
    \ AML Package \u2014 including the establishment of the Anti-Money Laundering\
    \ Authority (AMLA), which assumes direct supervisory competence over high-risk\
    \ obliged entities from 2025 onwards \u2014 is reshaping how compliance obligations\
    \ are distributed across correspondent networks, payment processors, and infrastructure\
    \ providers. The Single Rulebook introduced under the AML Regulation is intended\
    \ to reduce the jurisdictional fragmentation that has long allowed financial crime\
