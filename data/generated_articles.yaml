    \ assessments since February 2022 \u2014 yet recurring control failures continue\
    \ to generate reportable breaches, even as \xA337 billion in assets remain frozen\
    \ under UK sanctions regimes.\n\nThe review arrives at a moment of sustained regulatory\
    \ pressure. Following Russia's full-scale invasion of Ukraine, the FCA, OFSI,\
    \ and the newly established OTSI \u2014 created under the Trade, Aircraft and\
    \ Shipping Sanctions (Civil Enforcement) Regulations 2024 \u2014 have collectively\
    \ expanded both the perimeter of sanctions law and the enforcement architecture\
    \ around it. Firms operating under the UK's autonomous sanctions framework, consolidated\
    \ in the Sanctions and Anti-Money Laundering Act 2018, are required to maintain\
    \ systems capable of detecting designated persons across an increasingly fragmented\
    \ and frequently updated consolidated list. The breadth of that obligation has\
    \ grown materially since 2022.\n\nThe FCA's findings point to four persistent\
    \ failure modes: deficiencies in customer and counterparty due diligence; weaknesses\
    \ in name and transaction screening \u2014 including poor fuzzy-matching logic\
    \ and inadequate handling of transliterated names; inadequate alert management\
    \ disciplines, where reasonable grounds to suspect a sanctions nexus are not escalated\
    \ appropriately; and gaps in the governance of frozen assets and licence compliance.\
    \ These are not novel shortcomings. They mirror deficiencies identified in the\
    \ FCA's 2022 and 2023 Dear CEO letters, suggesting that remediation programmes\
    \ at a segment of firms have been superficial rather than structural.\n\nTrade\
    \ sanctions compliance presents a distinct and arguably harder challenge. Unlike\
    \ asset-freezing measures, which map broadly onto existing AML screening infrastructure,\
    \ trade restrictions require firms \u2014 particularly those providing trade finance,\
    \ correspondent banking, or custody services \u2014 to assess the nature of goods,\
    \ end-use declarations, and supply-chain routing. The controls required are qualitatively\
    \ different from standard name-screening and sit less comfortably within legacy\
    \ compliance architectures.\n\nFor MLROs and sanctions officers, the practical\
    \ implication is unambiguous: the FCA is unlikely to treat good-faith effort as\
    \ a sufficient defence where systemic control gaps persist across multiple review\
    \ cycles. Firms with cross-border operations should also note the growing alignment\
    \ between OFSI's civil monetary penalty guidance and OTSI's enforcement posture,\
    \ which together signal that both financial and trade sanctions breaches will\
    \ attract closer scrutiny. Firms that have not conducted a granular gap analysis\
    \ against the FCA's stated root causes since early 2024 should treat this publication\
    \ as a prompt to do so."
