    \ introducing mandatory reserve segregation, capital adequacy thresholds, and\
    \ criminal penalties for unlicensed operation \u2014 placing the jurisdiction\
    \ among the more stringent regulatory environments for digital assets in the Asia-Pacific\
    \ region.\n\nThe move consolidates years of incremental rulemaking that began\
    \ with the FSC's 2018 anti-money laundering registration requirements and accelerated\
    \ following the 2022 collapse of several offshore exchanges that left Taiwanese\
    \ retail investors with significant unrecovered losses. The FSC had issued guidance\
