    \ each representing a potential break in the beneficial ownership tracing that\
    \ AML programmes require. FATF Recommendation 16, which governs information accompanying\
    \ wire transfers and is increasingly interpreted to cover virtual asset transfers,\
    \ and FATF's updated guidance on virtual assets published in 2021, both point\
    \ toward the need for robust counterparty identification at each node in a tokenized\
