  full_article: "India's markets regulator has issued an adjudication order against\
    \ Dinbandhu Construction Private Limited in connection with manipulative trading\
    \ in illiquid stock options on the Bombay Stock Exchange, adding another enforcement\
    \ action to SEBI's sustained campaign targeting a category of misconduct that\
    \ has drawn consistent regulatory attention since at least 2018.\n\nIlliquid stock\
    \ options on Indian exchanges have functioned as a recurring vehicle for layered\
    \ financial crime. Participants exploit the thin order books and wide bid-ask\
    \ spreads characteristic of such contracts to execute matched or reversal trades\
    \ \u2014 transactions that generate artificial profits and losses on paper without\
    \ genuine economic exposure. The resulting accounting entries have been used to\
    \ rotate unaccounted funds into the formal financial system, effectively constituting\
    \ tax evasion and, in more serious iterations, money laundering within the meaning\
    \ of the Prevention of Money Laundering Act, 2002. SEBI's enforcement division\
    \ identified the segment as a systemic vulnerability following investigations\
    \ that culminated in its 2018 and subsequent circular directions restricting participation\
    \ in illiquid options and mandating enhanced broker-level surveillance.\n\nFrom\
    \ a financial crime compliance standpoint, the order against a construction-sector\
    \ entity is significant. Real estate and construction companies appear disproportionately\
    \ in illiquid options enforcement records because the sector historically generates\
    \ cash-intensive revenues that require laundering channels. MLROs at broking firms\
    \ and depository participants should treat construction-company accounts trading\
    \ derivatives \u2014 particularly in low-volume contracts \u2014 as elevated-risk\
    \ relationships under their customer risk-rating frameworks, consistent with FATF\
    \ Recommendation 10 on customer due diligence and Recommendation 22 on designated\
    \ non-financial businesses and professions.\n\nFor market intermediaries, the\
    \ practical compliance implication is transactional pattern monitoring calibrated\
    \ to options turnover against declared business activity. A construction firm\
    \ posting material derivatives volume bears no obvious hedging rationale, a discrepancy\
    \ that should trigger enhanced due diligence and, where suspicion cannot be resolved,\
    \ a suspicious transaction report to the Financial Intelligence Unit\u2013India\
    \ under PMLA obligations.\n\nSEBI has issued hundreds of orders in the illiquid\
    \ options space over the past several years without materially extinguishing the\
    \ conduct, suggesting that monetary penalties alone are insufficient deterrence.\
    \ The more durable regulatory pressure is likely to come from increased coordination\
    \ between SEBI, FIU-IND, and income-tax authorities \u2014 a multi-agency architecture\
    \ that regulators across the FATF network have identified as essential for disrupting\
    \ profit-driven market abuse."
