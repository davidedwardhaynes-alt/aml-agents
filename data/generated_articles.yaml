    \ rated poor or very poor \u2014 a finding that carries direct implications for\
    \ financial inclusion obligations and, notably, for financial crime risk management\
    \ at the margins of the banking system.\n\nBasic bank accounts exist under a legal\
    \ mandate derived from the Payment Accounts Regulations 2015, which transposed\
    \ the EU Payment Accounts Directive and requires designated firms to offer fee-free,\
    \ no-overdraft accounts to consumers who would otherwise be unbanked. The FCA's\
    \ review identified systemic failures: firms were not proactively offering these\
    \ products to eligible customers facing financial hardship or lacking standard\
    \ identification, and those without a fixed address \u2014 a group that includes\
    \ rough sleepers, care leavers, and victims of domestic abuse \u2014 were particularly\
    \ poorly served. Frontline staff frequently directed vulnerable customers toward\
    \ digital application journeys ill-suited to their circumstances.\n\nFor compliance\
    \ and financial crime professionals, the findings present a less-examined dimension.\
    \ Denial of access to legitimate banking does not eliminate financial activity;\
    \ it displaces it toward informal value transfer, unregulated payment channels,\
    \ and cash-intensive arrangements that carry materially higher money laundering\
    \ and fraud exposure. FATF Recommendation 1 and its associated guidance on financial\
    \ inclusion have long recognised that exclusion from the formal financial system\
    \ can itself create AML vulnerabilities. Ensuring basic account access, with proportionate\
    \ customer due diligence calibrated to low-risk profiles \u2014 as explicitly\
    \ permitted under a risk-based approach \u2014 reduces rather than increases systemic\
    \ exposure.\n\nFrom a Consumer Duty perspective, the FCA's findings are pointed.\
    \ The Duty, which came into full effect for existing products in July 2023, requires\
    \ firms to deliver good outcomes for all retail customers, including those in\
