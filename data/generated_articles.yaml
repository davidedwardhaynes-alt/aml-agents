  full_article: "The Monetary Authority of Singapore introduced the Securities and\
    \ Futures (Amendment) Bill at its Second Reading on 7 May 2026, proposing a legislative\
    \ framework to enable companies to pursue simultaneous listings on the Singapore\
    \ Exchange and Nasdaq. The immediate implication for compliance functions is a\
    \ material expansion in the population of dual-jurisdiction issuers subject to\
    \ overlapping AML, disclosure, and beneficial ownership obligations under both\
    \ Singaporean and United States securities regimes.\n\nSingapore's push reflects\
    \ a sustained effort to arrest declining IPO volumes on SGX and to position the\
    \ exchange as a credible gateway for technology and growth-stage companies with\
    \ international shareholder bases. The Securities and Futures Act already provides\
    \ MAS with broad supervisory authority over capital markets intermediaries and\
    \ market operators, and the amendment will need to reconcile Singapore's regime\
    \ \u2014 including MAS Notice SFA 04-N02 on licensing conditions and the existing\
    \ recognised market operator framework \u2014 with Securities and Exchange Commission\
    \ registration requirements and Nasdaq listing rules, which carry their own continuous\
    \ disclosure and corporate governance standards.\n\nFor MLROs and heads of financial\
    \ crime compliance at Singapore-licensed broker-dealers, custodians, and capital\
    \ markets services firms, the dual-listing structure introduces layered customer\
    \ due diligence complexity. Issuers with securities trading simultaneously in\
    \ Singapore and the United States will attract a broader and more geographically\
    \ dispersed shareholder register, increasing exposure to foreign politically exposed\
    \ persons and jurisdictions identified under FATF Recommendations 12 and 13. Firms\
    \ will need to determine whether existing correspondent banking and prime brokerage\
    \ arrangements adequately capture the cross-border settlement flows that dual\
    \ listings generate, particularly where depository receipt structures or nominee\
    \ chains obscure ultimate beneficial ownership in ways that could engage FATF\
    \ Recommendation 24.\n\nFrom a supervisory perspective, MAS will face questions\
    \ about information-sharing protocols with the SEC and FINRA, especially in enforcement\
    \ scenarios involving market manipulation or insider dealing that straddle both\
    \ venues. Singapore's cross-border cooperation mechanisms under Part X of the\
    \ Securities and Futures Act provide a basis for mutual assistance, but operational\
    \ alignment with US agencies on real-time trading surveillance remains underdeveloped\
    \ relative to the ambition of the framework.\n\nThe Bill's passage, anticipated\
    \ later in 2026, will require compliance functions to revisit onboarding procedures,\
    \ transaction monitoring typologies, and correspondent relationship governance\
    \ well before the first dual-listed issuer reaches the market."
