    \ patterns amenable to detection under a well-calibrated fraud-typology ruleset.\
    \ Firms onboarding or processing payments for introduced investment schemes should\
    \ weight adverse-media and Companies House checks heavily, particularly where\
    \ the scheme operator lacks FCA authorisation.\n\nFrom a supervisory standpoint,\
    \ Steve Smart's public statement that the FCA will \"deny fraudsters the profits\
    \ from their crimes\" signals continued institutional appetite for post-conviction\
    \ asset recovery alongside front-end enforcement. If Pugh fails to satisfy the\
    \ order within three months, a default sentence of up to four years and nine months\
    \ applies \u2014 a provision the FCA appears increasingly willing to pursue in\
    \ tandem with primary prosecution rather than as an afterthought. Whether the\
    \ compensatory mechanism proves adequate for victims remains a separate matter;\
    \ the 65% shortfall in recovery suggests that earlier intervention in the payment\
    \ chain, rather than post-conviction confiscation alone, may offer the more reliable\
    \ path to victim redress."
