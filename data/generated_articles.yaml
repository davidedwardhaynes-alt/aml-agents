    \ to sending firms \u2014 translates into systemic behavioural change across the\
    \ payments industry.\n\nThe policy's design drew directly on the contention, long\
    \ advanced by consumer groups and the then-Financial Conduct Authority, that PSPs\
    \ had insufficient commercial incentive to invest in fraud controls when losses\
    \ fell predominantly on victims. The PSR's mandatory scheme, operating under the\
    \ Faster Payments rules administered by Pay.UK, established a \xA385,000 reimbursement\
    \ cap and introduced a 50/50 cost-sharing mechanism between sending and receiving\
    \ institutions \u2014 a structure intended to distribute both the financial exposure\
    \ and the prevention responsibility across the payment chain.\n\nFor compliance\
    \ and financial crime functions, the data carries several practical implications.\
    \ Firms that have reduced their fraud rates are likely benefiting from enhanced\
    \ confirmation of payee implementation, more granular transaction monitoring calibrated\
    \ to social engineering typologies, and friction interventions at the point of\
    \ high-risk payment initiation. Receiving institutions, now carrying explicit\
    \ liability for their role in mule account facilitation, face renewed pressure\
