    \ for compliance leadership is that payments transformation programmes cannot\
    \ be treated as purely operational or commercial initiatives. Embedding financial\
    \ crime risk assessments within the design phase of payment infrastructure changes\
    \ \u2014 rather than retrofitting controls \u2014 will likely become a supervisory\
    \ expectation as AMLA establishes its methodology in the near term."
