  full_article: "The independent committee investigating the Wang Fuk Court fire in\
    \ Tai Po \u2014 Hong Kong's deadliest residential blaze in decades \u2014 has\
    \ heard calls to criminalise bid-rigging in building maintenance contracts, a\
    \ recommendation that carries direct implications for how financial crime supervisors\
    \ and prosecutors approach procurement fraud in the property management sector.\n\
    \nThe proposal, surfacing during closing submissions to the judge-led panel in\
    \ July 2026, reflects a long-standing gap in Hong Kong's competition and anti-corruption\
    \ architecture. While the Competition Ordinance (Cap. 619) prohibits bid-rigging\
    \ as a civil contravention under the First Conduct Rule, it stops short of attaching\
    \ criminal liability to individuals. The Independent Commission Against Corruption\
    \ can pursue conspirators under common law or the Prevention of Bribery Ordinance\
    \ where a corrupt element is present, but standalone cartel conduct \u2014 absent\
    \ a bribery nexus \u2014 has historically attracted civil penalties rather than\
    \ custodial exposure.\n\nFrom a financial crime compliance standpoint, the significance\
    \ extends beyond construction procurement. Building management corporations in\
    \ Hong Kong handle substantial cash flows through maintenance levies, sinking\
    \ funds, and renovation contracts \u2014 pools of money that FATF Recommendation\
    \ 3 and Hong Kong's Organized and Serious Crimes Ordinance (OSCO) identify as\
    \ susceptible to predicate offending and subsequent laundering. Where bid-rigging\
    \ inflates contract values, the surplus can constitute proceeds of crime for the\
    \ purposes of OSCO section 25, yet prosecutions on that theory remain rare in\
    \ the property management context.\n\nCriminalisation would compel banks and professional\
    \ intermediaries to reassess their suspicious transaction reporting obligations\
    \ around building management entities. Payments from owners' corporations to opaque\
    \ maintenance contractors \u2014 particularly where tender processes are poorly\
    \ documented \u2014 could more readily satisfy the \"reasonable grounds to believe\"\
    \ threshold under OSCO section 25A once the underlying conduct is unambiguously\
    \ criminal rather than merely a regulatory breach.\n\nThe committee's final report,\
    \ expected within approximately a month of the closing submissions, will likely\
    \ frame its recommendations in public safety terms. Whether the Securities and\
    \ Futures Commission, the Competition Commission, and the ICAC subsequently coordinate\
    \ a legislative response will depend on the political appetite for expanding Hong\
    \ Kong's criminal predicate offence list \u2014 a step that would, incidentally,\
    \ strengthen the jurisdiction's compliance with FATF's Recommendation 3 criteria\
    \ on predicate offences for money laundering."
