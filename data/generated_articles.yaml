    \ Stability Review has repeatedly identified SMEs as disproportionately susceptible\
    \ to business email compromise, invoice fraud, and social engineering schemes\
    \ \u2014 each of which generates downstream money-laundering typologies that implicate\
    \ the banking sector under Malaysia's Anti-Money Laundering, Anti-Terrorism Financing\
    \ and Proceeds of Unlawful Activities Act 2001 (AMLA). By extending diagnostic\
    \ capability directly to SME clients, RHB is effectively seeking to address a\
