    \ space should note that the technology's commercial rollout is likely to outpace\
    \ rule-making. The more productive near-term intervention is guidance \u2014 clarifying\
    \ how existing customer identification, transaction monitoring, and record-keeping\
    \ obligations apply when the acting party is software operating within a delegated\
    \ authority. The alternative is enforcement action that arrives after the architecture\
