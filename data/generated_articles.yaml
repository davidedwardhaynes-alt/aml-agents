    \ across its retail and wholesale books. Access to large-language model tooling\
    \ available through Google Cloud may also enhance adverse-media screening and\
    \ entity resolution within its KYC lifecycle. Conversely, compliance officers\
    \ will need to satisfy themselves that data residency requirements under Italian\
