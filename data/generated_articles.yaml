    \ SEBI approval but cannot operationalise accounts pending tax authority action\
    \ \u2014 a sequencing problem that has drawn criticism from global asset managers\
    \ and market intermediaries.\n\nFor MLROs and compliance officers at custodians,\
    \ the guidance matters in a specific operational sense: any interim arrangement\
    \ that permits onboarding activity prior to confirmed PAN allotment will require\
