  full_article: "A residential burglary in Fo Tan, Hong Kong, in which 31 pieces of\
    \ jewellery valued at approximately HK$751,000 (US$95,838) were stolen from a\
    \ luxury property while the owners dined downstairs, illustrates a recurring but\
    \ underweighted typology in proceeds-of-crime analysis: the conversion of high-value\
    \ portable assets into cash or further criminal proceeds through secondary markets.\n\
    \nJewellery occupies a structurally awkward position in Hong Kong's anti-money\
    \ laundering framework. While dealers in precious metals and stones became designated\
    \ non-financial businesses and professions (DNFBPs) subject to customer due diligence\
    \ and transaction monitoring obligations under the Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance (Cap. 615) following FATF Recommendation 22 reforms, enforcement\
    \ coverage across the secondary and pawnbroker market remains uneven. Stolen jewellery\
    \ disposed of through informal channels \u2014 private resellers, cross-border\
    \ couriers into Shenzhen, or unlicensed dealers \u2014 can move quickly outside\
    \ the transaction reporting perimeter.\n\nFor compliance professionals, the typology\
    \ is relevant beyond the immediate theft. Pawnbrokers licensed under the Pawnbrokers\
    \ Ordinance (Cap. 166) and jewellery retailers subject to Cap. 615 obligations\
    \ should apply heightened scrutiny to walk-in customers presenting multiple high-value\
    \ gold or gemstone pieces without coherent provenance. Unusual volume, reluctance\
    \ to provide identification, or pricing that implies distressed disposal are established\
    \ red flags under the JFIU's published guidance. Secondary purchasers who later\
    \ attempt to resell, export, or use stolen pieces as collateral may also generate\
    \ downstream exposure under section 25 of the Drug Trafficking (Recovery of Proceeds)\
    \ Ordinance or the equivalent provisions of the Organised and Serious Crimes Ordinance\
