    \ licensees.\n\nThe superapp model is not new to regulators in Asia. Grab, Sea\
    \ Money, and WeChat Pay have already compelled supervisors to adapt licensing\
    \ regimes to platforms that bundle payments, lending, and investment products\
    \ within a single consumer interface. FATF's updated Guidance on Digital Identity\
    \ (2020) and its work on virtual assets acknowledge the layered risk that emerges\
    \ when a single authenticated session can traverse multiple financial product\
    \ categories, each with a distinct risk typology. OpenAI's ambition, if realised\
    \ at the scale its user base suggests, would represent a qualitatively different\
    \ challenge: an AI-native interface where the boundary between product discovery,\
    \ advice, and transaction execution may be deliberately blurred.\n\nFor MLROs\
    \ at banks and payment institutions that could become embedded partners within\
    \ such a platform, the critical question is one of accountability allocation.\
    \ Under Singapore's Payment Services Act 2019, as amended in 2021, and analogous\
