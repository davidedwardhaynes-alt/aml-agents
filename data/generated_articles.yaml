  full_article: "Anchorage Digital, the only federally chartered crypto bank in the\
    \ United States, has withdrawn from the Global Dollar Network \u2014 the stablecoin\
    \ consortium backed by Robinhood, Kraken, and several other digital asset firms\
    \ \u2014 marking a notable shift in institutional alignment within the rapidly\
    \ consolidating stablecoin sector. The departure carries immediate implications\
    \ for custody and compliance infrastructure within a coalition that had positioned\
    \ itself as a credible, bank-grade alternative to Tether and Circle.\n\nThe Global\
    \ Dollar Network, anchored around the USDG stablecoin issued by Paxos, was constructed\
    \ partly on the premise that institutional participants with robust compliance\
    \ frameworks would lend legitimacy to the arrangement. Anchorage's involvement\
    \ had been read by market observers as a signal that federally supervised entities\
    \ could co-exist with exchange-affiliated distributors under a shared governance\
    \ model \u2014 a structure relevant to regulators evaluating stablecoin arrangements\
    \ against FATF Recommendation 15 standards on virtual asset service providers\
    \ and the emerging U.S. federal stablecoin legislative framework being advanced\
    \ through Congress.\n\nFor MLROs and compliance officers at member institutions,\
    \ the withdrawal raises practical questions about the resilience of the network's\
    \ AML and sanctions-screening architecture. A federally chartered bank operating\
    \ under OCC oversight brings with it BSA/AML program obligations that exceed those\
    \ of many state-licensed entities; its absence may reduce the overall compliance\
    \ floor of the consortium, even if remaining members maintain their own programme\
    \ standards. Supervisors assessing stablecoin arrangements under principles analogous\
    \ to MAS Notice PSN02 or the EU's MiCA Title III requirements will note that the\
    \ composition of institutional participants is often treated as a proxy for governance\
    \ quality.\n\nFrom Anchorage's perspective, the decision likely reflects both\
    \ commercial prioritisation and regulatory risk appetite. Maintaining multiple\
    \ consortium relationships carries reputational exposure if any participant encounters\
    \ enforcement action \u2014 a consideration that has become more acute as the\
    \ Department of Justice and FinCEN have intensified scrutiny of stablecoin distribution\
    \ networks following a series of sanctions-related settlements in 2024 and 2025.\n\
    \nThe episode underscores a broader tension in stablecoin market development:\
    \ the institutional credibility that chartered entities provide to consortia is\
    \ also the very thing that makes those entities most sensitive to the compliance\
    \ profiles of their partners. As Congress moves closer to a federal stablecoin\
    \ regime, the composition of networks like Global Dollar will likely face more\
    \ formal supervisory scrutiny rather than less."
