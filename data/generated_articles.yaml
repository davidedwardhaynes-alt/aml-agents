  full_article: "The on-chain redistribution of Bitcoin supply from long-term holders\
    \ (LTHs) \u2014 defined by most analytics providers as wallets dormant for more\
    \ than 155 days \u2014 to newer market entrants represents a structural liquidity\
    \ event with direct implications for transaction monitoring programs. When aged\
    \ coins move after extended dormancy, they generate precisely the behavioural\
    \ signals that typology-based detection scenarios are designed to flag: sudden\
    \ activation of wallets with no recent history, large-value transfers across multiple\
    \ hops, and rapid conversion into fiat or stablecoins through virtual asset service\
    \ providers (VASPs).\n\nRegulators have consistently identified dormant-wallet\
    \ reactivation as a red flag. FATF's updated 2021 Guidance on Virtual Assets and\
    \ VASPs explicitly notes unusual transaction patterns inconsistent with a customer's\
