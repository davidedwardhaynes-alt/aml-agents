    \ general insurance law principles, acceptance of ex gratia or government compensation\
    \ does not automatically extinguish third-party claims, but poorly drafted release\
    \ clauses can do so if signed without independent legal advice.\n\nThe central\
    \ legal difficulty is causation. Standard property and contents policies in Hong\
    \ Kong typically require policyholders to demonstrate that a covered peril caused\
    \ the loss; where negligence by a third party is alleged \u2014 whether a building\
