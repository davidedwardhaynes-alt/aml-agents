    \ compliance with FinCEN's Travel Rule obligations under 31 CFR Part 103.\n\n\
    From a financial crime risk perspective, the critical question for MLROs and counterparty\
    \ compliance teams is how Thunes manages nested access \u2014 the risk that downstream\
    \ participants in its network present layers of intermediaries whose ultimate\
    \ customer base is difficult to verify. This concern is not unique to Thunes;\
    \ it is structural to any wholesale payments network operating in emerging-market\
    \ corridors, and FATF Recommendation 13 on correspondent banking relationships\
    \ applies by analogy. US banks that provide settlement accounts or correspondent\
    \ services to Thunes will be expected to satisfy themselves on this point under\
    \ their own BSA/AML programmes.\n\nThe broader trajectory here is worth watching.\
    \ As payment intermediaries scale their US footprints and compete for enterprise\
    \ clients, compliance infrastructure must grow commensurately rather than lag\
    \ commercial ambition. Regulatory appetite for enforcement against payment facilitators\
    \ \u2014 evidenced by recent FinCEN and DOJ actions \u2014 suggests that firms\
    \ entering the US market at this stage face a heightened expectation of maturity\
    \ from day one, not as a later iteration."
