    \ Recommendation 10 to jurisdiction-specific rules such as MAS Notice 626 and\
    \ the EU's AMLD6 transposition measures.\n\nPrivate credit has expanded rapidly\
    \ as an asset class precisely because it operates outside the secondary market\
    \ transparency requirements that govern listed debt. When that opacity is layered\
    \ onto a permissioned or semi-permissioned blockchain architecture, the beneficial\
    \ ownership picture can become materially harder to reconstruct. FATF's 2023 updated\
    \ guidance on virtual assets explicitly cautions that tokenisation does not inherently\
    \ satisfy the Travel Rule or beneficial ownership transparency requirements under\
    \ Recommendation 25; the technology of the ledger is irrelevant if underlying\
    \ legal ownership chains remain obscured through special purpose vehicles or nominee\
    \ arrangements.\n\nFrom a lender compliance standpoint, the reliance on AI evaluation\
    \ introduces an explainability obligation that many jurisdictions are beginning\
    \ to formalise. MAS's FEAT principles and the EU AI Act's provisions on high-risk\
