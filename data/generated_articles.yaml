  full_article: "Three of the world's most influential financial industry associations\
    \ \u2014 ISDA, SIFMA, and the Institute of International Finance \u2014 filed\
    \ a joint response on 18 June 2026 to the latest US Basel III endgame proposal,\
    \ signalling continued industry resistance to capital requirements that the groups\
    \ argue remain disproportionate relative to actual risk profiles and inconsistent\
    \ with international peer implementation.\n\nThe intervention comes after years\
    \ of contested rulemaking. The original US Basel III endgame notice of proposed\
    \ rulemaking, issued jointly by the Federal Reserve, OCC, and FDIC in July 2023,\
    \ drew an extraordinary volume of critical comment letters before regulators issued\
    \ a substantially revised re-proposal. That re-proposal itself reflected concessions\
    \ on market risk charges and operational risk floors, yet the three associations'\
    \ renewed engagement suggests the current text still departs materially from both\
    \ the Basel Committee's 2017 framework and the calibration adopted by the EU under\
    \ CRR3 and the UK's near-final PRA rules \u2014 creating conditions for regulatory\
    \ arbitrage that compliance and risk functions at globally active banks must actively\
    \ monitor.\n\nFor MLROs and financial crime compliance teams, the capital framework\
    \ debate carries indirect but consequential implications. Higher capital charges\
    \ on trading book exposures and certain securitisation positions affect the economics\
    \ of correspondent banking, trade finance, and derivatives clearing \u2014 business\
    \ lines that already operate under acute de-risking pressure. If US rules impose\
    \ a structurally heavier burden than those applied by European or Asian counterparts,\
    \ decisions about which counterparties, corridors, and products remain commercially\
    \ viable will be shaped partly by that differential, with downstream effects on\
    \ financial inclusion and the concentration of settlement risk.\n\nFrom a supervisory\
    \ perspective, the joint letter will likely reinforce arguments made in parallel\
    \ by Fed Governor Michelle Bowman and others within the US regulatory apparatus\
    \ who have questioned whether the cumulative effect of capital, liquidity, and\
    \ resolution requirements is being assessed holistically. FATF Recommendation\
    \ 1's risk-based approach principle \u2014 proportionality between regulatory\
    \ burden and demonstrated risk \u2014 is equally applicable, conceptually, to\
    \ prudential design as it is to AML/CFT frameworks.\n\nWhether the current proposal\
