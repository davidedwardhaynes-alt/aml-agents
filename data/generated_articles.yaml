  full_article: "The chief technology officer of Ledger, one of Europe's most prominent\
    \ hardware wallet manufacturers, has publicly warned that compliance costs imposed\
    \ by the European Union's Markets in Crypto-Assets Regulation and associated anti-money\
    \ laundering framework are disproportionately burdening smaller digital-asset\
    \ firms, raising the prospect of consolidation toward larger incumbents and regulatory\
    \ arbitrage toward permissive jurisdictions.\n\nThe concern is not novel in structural\
    \ terms. MiCA, which entered full application for crypto-asset service providers\
    \ in December 2024, established a harmonised licensing regime across the EU's\
    \ 27 member states, but its implementation coincides with the sixth Anti-Money\
    \ Laundering Directive and the creation of the new EU Anti-Money Laundering Authority,\
    \ which assumes direct supervisory powers over higher-risk obliged entities from\
    \ 2025. Together, these instruments impose travel rule compliance under FATF Recommendation\
    \ 16, enhanced due diligence requirements, and mandatory transaction monitoring\
    \ obligations that require material investment in compliance infrastructure \u2014\
    \ costs that scale poorly with firm size.\n\nFrom a supervisory standpoint, the\
    \ architecture is defensible. FATF's 2023 targeted update on virtual assets explicitly\
    \ flagged the risks posed by unhosted wallets and pseudonymous transfers, and\
    \ the EU's approach reflects a considered attempt to close gaps that allowed illicit\
    \ flows to exploit jurisdictional inconsistency. Regulators would argue that compliance\
