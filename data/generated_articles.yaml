    \ under UK sanctions regimes.\n\nThe review arrives at a moment of sustained regulatory\
    \ pressure. Following Russia's full-scale invasion of Ukraine, the FCA, OFSI,\
    \ and the newly established OTSI \u2014 created under the Trade, Aircraft and\
