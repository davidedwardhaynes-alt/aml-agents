  full_article: "Authorised push payment fraud and social-engineering scams now account\
    \ for a majority of financial crime losses reported by retail banks across several\
    \ Asia-Pacific jurisdictions, a pattern confirmed by panellists at LexisNexis\
    \ Risk Ready 2026 in Hong Kong\u2014a shift that exposes a structural gap in AML\
    \ frameworks designed primarily to detect suspicious transactions rather than\
    \ compromised human decision-making.\n\nThe regulatory architecture across the\
    \ region was built largely around FATF Recommendations 10 through 21, which emphasise\
    \ customer due diligence, transaction monitoring, and suspicious transaction reporting.\
    \ Those controls assume the bank's systems are the primary attack surface. The\
    \ emergence of investment scams, romance fraud, and pig-butchering operations\u2014\
    typologies now extensively documented in FATF's 2023 report on virtual assets\
    \ and related guidance\u2014inverts that assumption entirely. The customer becomes\
    \ both victim and, in the eyes of legacy monitoring systems, the apparent originator\
    \ of seemingly legitimate payment instructions.\n\nFor MLROs, the operational\
    \ consequence is immediate. Existing transaction monitoring rules calibrated to\
    \ flag structuring, layering, or unusual counterparty geography will routinely\
    \ miss authorised transfers to mule accounts, particularly where amounts fall\
