  full_article: "The inclusion of SpaceX in the Nasdaq 100 index, effective July 2026,\
    \ marks a significant structural moment for a company that has, until now, operated\
    \ largely outside the disclosure obligations that accompany public market participation.\
    \ For compliance and financial crime professionals, the development raises immediate\
    \ questions about beneficial ownership transparency, customer due diligence obligations\
    \ for broker-dealers and prime brokers gaining indirect exposure, and the adequacy\
    \ of existing frameworks for assessing privately-structured entities that enter\
    \ public indices without a conventional IPO.\n\nHistorically, index inclusion\
    \ of non-traditional entities has created compliance blind spots. When sovereign\
    \ wealth fund-backed or founder-controlled structures have entered major benchmarks,\
    \ regulated institutions have found their standard onboarding and ongoing monitoring\
    \ frameworks misaligned with the opacity such structures can carry. FATF Recommendation\
    \ 24 on transparency of legal persons, and its 2022 revision strengthening beneficial\
    \ ownership registers, was partly motivated by precisely these dynamics\u2014\
    the migration of complex, privately-held structures into instruments held by retail\
    \ and institutional investors alike.\n\nFor broker-dealers, custodians, and asset\
    \ managers in jurisdictions such as Singapore, Hong Kong, and Australia, Nasdaq\
    \ 100 index exposure through ETFs or derivatives triggers obligations under MAS\
    \ Notice SFA 04-N02, HKMA guidance on intermediary conduct, and the AML/CTF Act\
    \ 2006 respectively. Where the underlying constituent is a company whose ultimate\
    \ beneficial ownership is concentrated, non-listed, and subject to limited public\
    \ disclosure, transaction monitoring calibration and periodic review schedules\
    \ require revisiting. The US Bank Secrecy Act's customer due diligence rule under\
    \ 31 CFR 1010.230 similarly imposes obligations on covered financial institutions\
    \ with indirect exposure.\n\nHistorical analogues are instructive but imperfect.\
    \ The Nasdaq 100's inclusion of Palantir and similar dual-class, founder-controlled\
    \ technology firms generated internal policy reviews at several major custodians\
    \ regarding enhanced due diligence triggers. SpaceX's additional complexity\u2014\
    government contracting relationships, foreign revenue streams, and an ownership\
    \ structure that includes sovereign and institutional investors with their own\
    \ opacity considerations\u2014compounds that precedent rather than simply repeating\
    \ it.\n\nCompliance functions should treat index inclusion not as a normalisation\
    \ of risk but as a prompt for structured review of exposure, documentation standards,\
    \ and escalation protocols where indirect holdings in such entities cannot yet\
    \ be supported by the same ownership transparency that listed issuers provide."
