    \ to restrict the firm through a voluntary undertaking dated 13 May, which barred\
    \ SB Remit from accepting new customer funds.\n\nThe sequencing matters. The FCA's\
    \ use of a voluntary undertaking as a precursor to insolvency reflects an increasingly\
    \ proactive posture under its Consumer Duty obligations and the Payment Services\
    \ Regulations 2017, which require authorised payment institutions to safeguard\
    \ customer funds. Where safeguarding arrangements are weak or liquidity is impaired,\
    \ the regulator has signalled it will act early rather than wait for formal failure.\
    \ SB Remit's authorisation as a small payment institution under the PSRs placed\
    \ it in a supervisory category that has drawn heightened FCA scrutiny since the\
    \ collapse of firms such as Superpay and the broader post-pandemic stress in the\
    \ remittance corridor sector.\n\nFor compliance professionals at correspondent\
    \ banks and agent networks, the administration is a reminder that ongoing due\
    \ diligence on downstream payment institution relationships cannot rely solely\
    \ on FCA authorisation status. Authorisation confirms regulatory permission, not\
    \ financial soundness. MLROs should note that the FCA's Financial Services Register\
    \ will carry updated restriction details \u2014 monitoring that register for counterparty\
    \ payment institutions should be embedded in periodic review frameworks, particularly\
    \ given the FATF Recommendation 13 expectations around correspondent relationships\
    \ and the UK's own Regulation 33 risk-assessment requirements under the Money\
    \ Laundering Regulations 2017.\n\nThe joint administrators' mandate \u2014 managing\
    \ customer claims and returning funds where possible \u2014 will test the adequacy\
