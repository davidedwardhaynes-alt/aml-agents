    \ a foundation of this standing provides a reference point that supervisors can\
    \ cite, challenge, or incorporate into their own guidance.\n\nFor MLROs and heads\
    \ of financial crime compliance at institutions exploring tokenised deposits,\
    \ on-chain bond settlement, or central bank digital currency interoperability,\
    \ the guide raises immediate practical questions. Use cases endorsed by the Ethereum\
