    \ under Japan's Act on Prevention of Transfer of Criminal Proceeds and the related\
    \ Cabinet Office Ordinance.\n\nPassive or proximity-triggered payments are not\
    \ new to mass transit: Hong Kong's Octopus system and Singapore's account-based\
