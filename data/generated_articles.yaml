    \ tuition payments \u2014 often exceeding HK$500,000 annually per student \u2014\
    \ featured in source-of-wealth assessments conducted by banks under MAS-equivalent\
    \ obligations in Hong Kong, where the Anti-Money Laundering and Counter-Terrorist\
