  full_article: "A Hong Kong grandmother has been charged by the Independent Commission\
    \ Against Corruption with offering a HK$10,000 bribe to a Legal Aid Department\
    \ clerk in exchange for assistance in a child custody matter, according to an\
    \ ICAC press release dated 20 May 2026. Although modest in monetary terms, the\
    \ case illustrates how corruption risk permeates public-sector interactions well\
    \ beyond the financial system \u2014 with tangible implications for institutions\
    \ required to assess the bribery exposure of their customer base.\n\nHong Kong's\
    \ Prevention of Bribery Ordinance (Cap. 201) prohibits offering any advantage\
    \ to a public servant to influence the discharge of official duties, and the LAD,\
    \ as a government department providing publicly funded legal assistance, falls\
    \ squarely within its scope. The ICAC has historically focused on higher-value\
    \ public procurement and corporate misconduct, but its continued prosecution of\
    \ low-value retail bribery signals an unchanged institutional commitment to deterrence\
    \ across all tiers of public administration \u2014 a posture consistent with FATF\
    \ Recommendation 10's call for customer due diligence that remains proportionate\
    \ to actual, not assumed, risk levels.\n\nFor compliance professionals, the case\
    \ raises a narrow but practical concern: predicate offence typology. Under Hong\
    \ Kong's Organised and Serious Crimes Ordinance (Cap. 455) and the Drug Trafficking\
    \ (Recovery of Proceeds) Ordinance (Cap. 405), corruption offences constitute\
    \ specified unlawful conduct capable of generating criminal proceeds. Any subsequent\
    \ movement of funds \u2014 even at the HK$10,000 threshold \u2014 could in principle\
    \ engage money laundering liability under Section 25 of OSCO. Financial institutions\
    \ onboarding or servicing individuals involved in public-sector dealings, however\
    \ peripheral, are reminded that transaction monitoring calibration should not\
    \ be volume-blind.\n\nThe broader supervisory context matters here. The MAS and\
