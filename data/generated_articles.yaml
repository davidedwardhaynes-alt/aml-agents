    \ \u2014 requires originator and beneficiary information to accompany wire transfers,\
    \ and its application to CBDC-based settlements remains untested at scale. Participating\
    \ jurisdictions apply materially different AML/CFT frameworks: Hong Kong's AMLO\
    \ and MAS Notice MAS-626 impose relatively robust requirements, while the equivalence\
    \ of controls in other corridors is less certain. MLROs at institutions that may\
    \ receive funds originating from mBridge settlement flows will face de-risking\
    \ decisions without clear typology guidance.\n\nThe sanctions dimension is equally\
    \ significant. The US Treasury's Office of Foreign Assets Control has not issued\
    \ specific guidance on mBridge, but correspondent banks subject to US jurisdiction\
    \ will need to assess whether processing mBridge-originated flows creates secondary\
    \ sanctions exposure, particularly given that the platform's governance structure\
    \ is now led principally by the People's Bank of China following the BIS withdrawal.\n\
    \nRegulatory clarity is unlikely to precede commercial activity. Compliance functions\
    \ should begin now \u2014 mapping which counterparty institutions are likely mBridge\
    \ participants, reviewing contractual AML representations, and engaging with home\
    \ supervisors on expected transaction monitoring standards for CBDC-settled flows\
    \ before the first live transactions arrive on their books."
