    \ questions that financial crime officers will need to address under emerging\
    \ AI governance frameworks, including the EU AI Act's requirements for high-risk\
    \ system documentation.\n\nThe investor profile is notable primarily for its novelty\
    \ rather than its strategic depth. Neither G\xF6tze nor Szegedy brings direct\
    \ financial crime compliance expertise, and the round's size places Kodesage firmly\
    \ in proof-of-concept territory relative to the scale of transformation required\
    \ at tier-one institutions. Larger legacy modernisation programmes at major banks\
    \ routinely run into hundreds of millions of dollars over multi-year horizons.\n\
    \nWhether niche tooling of this kind can gain traction will depend heavily on\
    \ its ability to demonstrate measurable improvements in the outputs that supervisors\
    \ actually scrutinise: alert quality, false-positive rates, and the integrity\
    \ of suspicious transaction report data. Technical elegance in code refactoring\
    \ is a necessary but insufficient condition for regulatory credibility."
