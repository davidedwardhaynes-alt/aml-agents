  full_article: "The Bank of England has opened a formal consultation on extending\
    \ Real-Time Gross Settlement and CHAPS operating hours toward near 24\xD77 availability,\
    \ marking the most substantive proposed change to UK wholesale payment infrastructure\
    \ in decades. For financial crime compliance functions, the implications are immediate:\
    \ transaction monitoring architectures, suspicious activity reporting timelines,\
    \ and correspondent banking controls built around predictable settlement windows\
    \ will require structured reassessment.\n\nCHAPS currently operates within defined\
    \ business hours, a constraint that has long provided compliance teams with natural\
    \ intervention points. Batch-processing cycles and cut-off times create opportunities\
    \ to apply screening, review queued payments, and act on alerts before funds move\
    \ irrevocably. The Financial Action Task Force's Recommendation 16 on wire transfers\
    \ requires obligated institutions to obtain, hold, and transmit originator and\
    \ beneficiary information in real time \u2014 a standard that becomes operationally\
    \ sharper when settlement itself becomes continuous. The UK's own Money Laundering\
    \ Regulations 2017 and the Proceeds of Crime Act 2002 impose obligations that\
    \ do not pause outside business hours; extended settlement makes that alignment\
    \ more acute.\n\nFrom a risk operations perspective, the shift compresses the\
    \ window between payment instruction and finality. Financial institutions will\
    \ need to move from retrospective or near-real-time transaction monitoring toward\
    \ genuinely pre-settlement screening capable of functioning across all hours without\
    \ degradation in alert quality. Staffing models for financial intelligence units,\
    \ which in many firms remain structured around conventional working days, will\
    \ face pressure. Automated decisioning will need to carry greater weight, raising\
    \ governance questions about model risk, explainability, and the audit trail required\
    \ under POCA's consent regime.\n\nPayment service providers and smaller banks\
    \ that access CHAPS indirectly through agency arrangements face a compounded challenge:\
    \ their own internal controls must remain synchronized with the settlement layer,\
    \ even where direct operational capability is limited. The extension of hours\
    \ could also increase exposure to certain typologies \u2014 time-zone arbitrage,\
    \ rapid layering through correspondent chains \u2014 that rely on gaps between\
    \ jurisdictional operating windows.\n\nThe consultation phase provides compliance\
    \ functions with an uncommon advantage: lead time. Firms that begin mapping control\
    \ dependencies now, rather than waiting for final policy, will be better positioned\
    \ to engage the Bank's process constructively and to build proportionate, auditable\
    \ responses before new operating parameters take effect."
