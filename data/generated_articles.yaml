  full_article: "The Financial Conduct Authority published proposals on 29 June 2026\
    \ to remove genuinely non-UK business from the scope of its Consumer Duty, a move\
    \ with direct procedural implications for wholesale firms whose distribution chains\
    \ span multiple jurisdictions and whose compliance frameworks have had to accommodate\
    \ the Duty's previously ambiguous territorial reach.\n\nThe Consumer Duty, introduced\
    \ under the Financial Services and Markets Act 2023 and applied to existing products\
    \ from July 2024, imposed outcome-focused obligations requiring firms to deliver\
    \ good outcomes for retail customers across four pillars: products and services,\
    \ price and value, consumer understanding, and consumer support. Its application\
    \ to wholesale participants operating at the upstream end of distribution chains\u2014\
    investment banks, asset managers, and platform providers with no direct retail\
    \ relationship\u2014generated sustained industry concern that the framework risked\
    \ conflating sophisticated counterparty transactions with retail consumer protection.\
    \ The FCA's acknowledgment that the Duty \"was never intended to become a Wholesale\
    \ Duty\" is a candid concession that the original perimeter guidance left material\
    \ ambiguity.\n\nFor compliance officers at global wholesale institutions, the\
    \ practical benefit lies in reduced negative-proof burden. Previously, firms engaged\
    \ in cross-border transactions needed to demonstrate affirmatively that a given\
    \ activity fell outside the Duty's scope\u2014a resource-intensive exercise with\
    \ legal risk attached to any mischaracterisation. Clearer carve-outs for business\
    \ with no UK nexus or no reasonable expectation of UK regulatory protection shift\
    \ that calculus, allowing internal frameworks to be calibrated against a more\
    \ defined perimeter rather than a precautionary maximum.\n\nFor MLROs and financial\
    \ crime compliance teams specifically, the recalibration carries indirect relevance.\
    \ Where Consumer Duty obligations previously required extensive mapping of distribution\
    \ chains to identify retail touchpoints, the revised scope boundaries may simplify\
    \ those chain-of-responsibility analyses, reducing duplicative documentation obligations\
    \ and freeing resource for core AML and sanctions controls. Firms will nonetheless\
    \ need to update their Duty policies to reflect the new perimeter and satisfy\
    \ themselves\u2014and their regulators\u2014that any claimed exemption rests on\
    \ a defensible factual basis rather than convenience.\n\nThe FCA has signalled\
    \ this as part of a broader competitiveness agenda. Whether the proposals, once\
    \ finalised, substantively reduce compliance friction or merely redistribute the\
    \ interpretive effort to boundary-testing remains a question that front-line legal\
    \ and compliance teams will answer in practice."
