  full_article: "The two-year-old travel permit scheme allowing non-Chinese Hong Kong\
    \ residents to cross into mainland China using a standardised document has quietly\
    \ introduced a compliance wrinkle that financial crime professionals operating\
    \ across the Greater Bay Area cannot ignore: a growing population of frequent\
    \ cross-border travellers whose identity documentation remains inconsistently\
    \ recognised by front-line officials, creating ambiguity in customer due diligence\
    \ records and transaction monitoring frameworks.\n\nThe permit, introduced to\
    \ ease border friction for foreign passport holders resident in Hong Kong, sits\
    \ in an awkward position within existing AML architectures. Under FATF Recommendation\
    \ 10 and the corresponding Hong Kong requirements embedded in the Anti-Money Laundering\
    \ and Counter-Terrorist Financing Ordinance (AMLO, Cap. 615), reporting institutions\
    \ are obliged to verify customer identity using reliable, independent source documents.\
    \ Where a customer presents the travel permit as a primary or supplementary identifier\
    \ in a mainland Chinese context \u2014 opening a bank account, onboarding with\
    \ a securities firm, or executing a real estate transaction in Shenzhen \u2014\
    \ inconsistent acceptance of the document by receiving institutions creates gaps\
    \ in the documentary trail that correspondent banks and group compliance functions\
    \ must reconcile.\n\nThe practical consequences run in both directions. Hong Kong-licensed\
    \ institutions subject to MAS-equivalent obligations under AMLO, as well as those\
    \ operating under the PBOC's domestic AML framework on the mainland side, face\
    \ situations where the same individual holds multiple reference identifiers across\
    \ jurisdictions \u2014 Hong Kong Identity Card, foreign passport, and now the\
    \ travel permit \u2014 each potentially appearing in isolation in different transaction\
    \ records. Effective customer risk profiling under a risk-based approach requires\
    \ that these identifiers be linked and consistently maintained, a task that is\
    \ straightforward in principle but operationally demanding when front-line recognition\
    \ of the permit itself remains patchy.\n\nFrom a supervisory standpoint, the Hong\
    \ Kong Monetary Authority and the Securities and Futures Commission have not yet\
    \ issued specific guidance addressing the permit's status within CDD workflows,\
    \ leaving institutions to exercise judgement. Industry bodies representing foreign\
    \ business communities have flagged the recognition gap directly with immigration\
    \ authorities, but a formal resolution remains pending.\n\nAs Greater Bay Area\
