    \ was designed with decentralised ledger immutability in mind. Meanwhile, Bank\
    \ Negara Malaysia's Financial Services Act 2013 and the broader push under the\
    \ Financial Sector Blueprint 2022\u20132026 have increasingly emphasised financial\
    \ inclusion for micro-entrepreneurs, a cohort that regulators acknowledge remains\
    \ underserved by formal dispute-resolution channels. Janjilah's proposition \u2014\
    \ that an on-chain record can function as contemporaneous evidence of contractual\
    \ intent \u2014 deserves scrutiny against that legislative backdrop rather than\
    \ uncritical enthusiasm.\n\nFrom a financial crime compliance standpoint, the\
    \ model raises legitimate questions. Micro-transaction platforms structured around\
