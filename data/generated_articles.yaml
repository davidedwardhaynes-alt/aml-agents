    \ gold or gemstone pieces without coherent provenance. Unusual volume, reluctance\
    \ to provide identification, or pricing that implies distressed disposal are established\
    \ red flags under the JFIU's published guidance. Secondary purchasers who later\
    \ attempt to resell, export, or use stolen pieces as collateral may also generate\
    \ downstream exposure under section 25 of the Drug Trafficking (Recovery of Proceeds)\
    \ Ordinance or the equivalent provisions of the Organised and Serious Crimes Ordinance\
