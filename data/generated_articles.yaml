    \ frequently hold client identifying information, transaction records, or internally\
    \ sensitive communications. A misplaced handset that resurfaces in an uncontrolled\
    \ secondary market represents a potential breach of both data-protection statutes\
    \ and AML record-keeping obligations under Hong Kong's Anti-Money Laundering and\
    \ Counter-Terrorist Financing Ordinance (Cap. 615), which mandates the integrity\
    \ and confidentiality of customer due diligence records.\n\nImmediate mitigation\
    \ steps \u2014 remote wipe via Apple's Lost Mode or Android Device Manager, revocation\
