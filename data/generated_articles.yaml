  full_article: "Kodesage, a software modernisation platform backed by footballer\
    \ Mario G\xF6tze and xAI co-founder Christian Szegedy, has raised $6.6 million\
    \ in early-stage funding to deploy on-premise artificial intelligence that refactors\
    \ legacy enterprise code in regulated financial institutions. The immediate implication\
