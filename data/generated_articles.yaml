  full_article: "The Bank of England has opened a formal consultation on extending\
    \ Real-Time Gross Settlement and CHAPS operating hours toward near 24\xD77 availability,\
    \ marking the most substantive proposed change to UK wholesale payment infrastructure\
    \ in decades. For financial crime compliance functions, the implications are immediate:\
