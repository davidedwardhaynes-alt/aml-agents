  full_article: "The emergence of AI agents capable of initiating, executing, and\
    \ settling financial transactions without human authorisation presents a direct\
    \ challenge to the foundational assumption of most AML frameworks: that a natural\
    \ or legal person bears ultimate responsibility for each transaction. Jansen Teng\
    \ of Virtuals Protocol has articulated publicly what many in decentralised finance\
    \ already understand operationally \u2014 that AI agents are no longer passive\
    \ tools but autonomous economic actors capable of holding wallets, signing transactions,\
    \ and managing assets across protocols with minimal human oversight.\n\nThe compliance\
    \ implications are immediate. FATF Recommendation 10 requires financial institutions\
    \ to identify and verify the identity of customers, while Recommendation 16 extends\
    \ similar obligations to originator and beneficiary information in wire transfers.\
    \ Neither framework was designed to accommodate an entity that is neither a natural\
    \ person nor a legal person in any recognised jurisdictional sense. Singapore's\
    \ MAS Notice PSN01 and Hong Kong's AMLO impose customer due diligence obligations\
    \ premised on the same human-actor model, leaving virtual asset service providers\
    \ uncertain how to apply beneficial ownership requirements when an AI agent initiates\
    \ a transaction on behalf of a smart contract that is itself governed by a decentralised\
    \ autonomous organisation.\n\nFor MLROs at VASPs and digital-asset custodians,\
    \ the practical pressure is already visible. Transaction monitoring systems calibrated\
    \ to human behavioural patterns \u2014 timing, velocity, counterparty diversity\
    \ \u2014 may not flag anomalies generated by AI-driven trading or liquidity management,\
    \ since such agents operate at speeds and scales that are themselves statistically\
    \ unusual. The risk of inadvertent layering, where an AI agent optimises across\
    \ pools in ways that structurally resemble placement and layering, deserves particular\
    \ attention under existing suspicious transaction reporting obligations.\n\nRegulators\
    \ are beginning to respond. The EU's MiCA framework and forthcoming guidance from\
    \ IOSCO on AI in capital markets both gesture toward operator liability as the\
    \ default resolution \u2014 attributing responsibility to the developer or deployer\
    \ of the agent rather than the agent itself. That approach has merit but depends\
    \ on clear contractual and technical audit trails that most current agent architectures\
    \ do not yet provide.\n\nThe practical question for compliance functions is not\
    \ whether AI agents will be regulated, but whether the liability attribution mechanisms\
    \ being developed will arrive before autonomous economic actors become a material\
    \ share of on-chain transaction volume. Current trajectories suggest the latter."
