  full_article: "The Financial Stability Board has scheduled a virtual outreach event\
    \ for 7 July 2026 to present its sound practices framework for the responsible\
    \ adoption of artificial intelligence by financial institutions, signalling that\
    \ AI governance is graduating from a supervisory aspiration to a formal expectation\
    \ with cross-border coordination implications for compliance functions.\n\nThe\
    \ FSB's engagement with AI risk is not new. Its 2022 report on AI and machine\
    \ learning in financial services identified model opacity, data dependency, and\
    \ third-party concentration as systemic vulnerabilities. Since then, individual\
    \ jurisdictions have moved at varying speeds: the Monetary Authority of Singapore's\
    \ FEAT principles and subsequent MAS Notice requirements on model risk management,\
    \ the EU AI Act's tiered risk classification \u2014 which places credit-scoring\
    \ and AML transaction-monitoring tools in the high-risk category \u2014 and the\
    \ Basel Committee's consultative work on the prudential treatment of AI-related\
    \ operational risk have collectively raised the regulatory baseline. The FSB event\
    \ signals an attempt to harmonise the upper tier of that baseline.\n\nFor MLROs\
    \ and heads of financial crime compliance, the immediate question is how the FSB's\
    \ sound practices will interact with existing AML/CTF obligations. Where institutions\
    \ deploy AI for customer risk scoring, sanctions screening, or transaction monitoring\
    \ \u2014 activities already subject to FATF Recommendation 1 risk-based approach\
    \ requirements and, in relevant jurisdictions, to rules such as Australia's AML/CTF\
    \ Act or Hong Kong's OSCO-linked supervisory guidance \u2014 the FSB framework\
    \ is likely to impose additional governance expectations around explainability,\
    \ human oversight, and vendor due diligence. Model decisions that affect customer\
    \ risk ratings or generate suspicious transaction reports will need audit trails\
    \ that satisfy both financial crime regulators and, increasingly, AI-specific\
    \ supervisors.\n\nThird-party risk is a particular pressure point. Many institutions\
    \ source transaction-monitoring and name-screening AI from a concentrated pool\
    \ of vendors, a dependency the FSB has previously flagged as a financial stability\
    \ concern. Sound practices are expected to address concentration risk and exit\
    \ strategies, mirroring language already visible in the EBA's outsourcing guidelines\
    \ and MAS TRM Notice requirements.\n\nThe July outreach format \u2014 virtual\
    \ and open to industry \u2014 suggests the FSB is seeking to road-test its drafting\
    \ before finalising any formal report, making it a practical opportunity for compliance\
