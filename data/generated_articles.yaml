  full_article: "The redemption of a rare Casascius physical bitcoin \u2014 a brass\
    \ coin with a tamper-evident hologram concealing a private key \u2014 after twelve\
    \ years of dormancy has resulted in a wallet activation worth approximately $1.78\
    \ million, a transaction that will have drawn automated alerts across blockchain\
    \ analytics platforms and, depending on jurisdiction, may trigger enhanced due\
    \ diligence obligations for any virtual asset service provider facilitating the\
    \ conversion.\n\nPhysical bitcoins of this type occupy an unusual position in\
    \ the financial crime compliance landscape. Produced between 2011 and 2013 by\
    \ hobbyist Mike Caldwell before the Financial Crimes Enforcement Network issued\
    \ guidance requiring him to register as a money services business, Casascius coins\
    \ predate most contemporary VASP licensing regimes. Their long dormancy periods\
    \ mean that when private keys are finally swept, the resulting on-chain movement\
    \ can superficially resemble the activation of a previously unknown wallet \u2014\
    \ a pattern that blockchain surveillance tools flag as potentially consistent\
    \ with the concealment phase of a layering strategy. Under FATF Recommendation\
    \ 16 and its travel rule implementations, any subsequent exchange transaction\
    \ above threshold would require originator and beneficiary information that may\
    \ simply not exist in a form compliant with current standards.\n\nFor compliance\
    \ officers at exchanges or OTC desks receiving such funds, the practical challenge\
    \ is corroborating the provenance narrative. A Casascius coin is a physical artefact\
    \ with auction records, collector communities, and in some cases documented chain\
    \ of custody \u2014 potentially richer provenance documentation than many conventional\
    \ crypto transactions. Where a customer can produce purchase records, numismatic\
    \ appraisals, or prior sale documentation, a risk-based approach under frameworks\
    \ such as MAS Notice PSN02, the EU's MiCA travel rule provisions, or Australia's\
    \ AML/CTF Act would support accepting that evidence as part of a source-of-wealth\
    \ assessment, rather than treating dormancy alone as a red flag.\n\nThe broader\
    \ compliance implication is institutional. As early-era bitcoin holdings \u2014\
    \ whether physical coins, paper wallets, or simply forgotten exchange accounts\
    \ \u2014 continue to be reactivated, compliance functions will encounter an increasing\
    \ volume of transactions where the beneficial owner's identity is genuine but\
    \ the documentary trail is archaic. Supervisors in FATF member jurisdictions have\
    \ not yet issued specific guidance on vintage crypto asset redemptions. The absence\
    \ of that guidance, as multi-million dollar dormant wallets continue to resurface,\
    \ is becoming a material gap."
