  full_article: "The UK Financial Conduct Authority's deputy chief executive, Sarah\
    \ Pritchard, used a May 2026 address to the Investment Association's Private Markets\
    \ Summit to deliver a pointed message: stress in private markets is not inherently\
    \ problematic, but the absence of coordinated, system-wide preparedness is. The\
    \ speech signals that the FCA regards current strains in private credit not as\
    \ an isolated product failure but as a prompt to stress-test the architecture\
