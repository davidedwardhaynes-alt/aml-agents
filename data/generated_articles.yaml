    \ for financial institutions whose regulatory obligations extend well beyond general\
    \ cybersecurity into transaction monitoring, customer due diligence, and suspicious\
    \ activity reporting powered increasingly by AI-driven systems.\n\nThe governance\
    \ gap is not new in principle. FATF Guidance on Digital Identity (2020) and its\
    \ subsequent work on AI in AML contexts have consistently emphasised that automated\
    \ tools used in financial crime controls must be explainable, auditable, and subject\
    \ to human oversight. In Singapore, MAS Notice 626 and its accompanying guidelines\
    \ on risk-based supervision implicitly require that any technology embedded in\
    \ AML/CFT frameworks be subject to documented controls. Where AI is deployed in\
    \ name-screening, transaction monitoring calibration, or adverse media analysis,\
    \ the absence of a governing policy is not merely an operational risk \u2014 it\
    \ is a potential regulatory deficiency.\n\nFor MLROs and heads of financial crime\
    \ compliance, the operational concern is specific: unsanctioned or inadequately\
    \ governed AI tools introduced by business units \u2014 sometimes referred to\
    \ as shadow AI \u2014 may interact with data sets containing personally identifiable\
    \ information or transaction records, creating exposure under both data protection\
    \ regimes and AML documentation requirements. Under the FATF Recommendations,\
    \ particularly Recommendation 11 on record-keeping, and domestic equivalents such\
    \ as Singapore's CDSA or Hong Kong's OSCO, institutions must be able to demonstrate\
