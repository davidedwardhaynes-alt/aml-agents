  full_article: 'MoneyGram has launched a US dollar-denominated stablecoin on the
    Stellar blockchain, issued by Bridge, the stablecoin infrastructure firm acquired
    by Stripe in late 2024. The move positions one of the world''s largest money transfer
    operators as an active participant in the tokenised payments ecosystem rather
    than merely a distribution rail for third-party digital assets, with direct implications
    for how cross-border value flows are monitored by financial intelligence units
    and correspondent banking compliance teams.


    The development arrives at a moment of accelerating regulatory crystallisation
    around stablecoins. In the United States, the GENIUS Act is advancing through
    Congress and would impose reserve, redemption, and AML compliance requirements
    on payment stablecoin issuers. Offshore, MAS Notice PSN02 already subjects digital
    payment token service providers in Singapore to customer due diligence and transaction
    monitoring obligations equivalent to those applied to traditional remittance businesses.
    FATF''s updated Recommendation 15 guidance on virtual assets and virtual asset
    service providers requires jurisdictions to apply the Travel Rule to stablecoin
    transfers, creating a compliance layer that MoneyGram''s existing VASP registration
    footprint will need to accommodate.


    For MLROs, the structural question is where the AML control boundary sits. Bridge,
    as issuer, carries the minting and redemption obligations. MoneyGram, as the customer-facing
    distributor with an established network of 350,000-plus agent locations, retains
    responsibility for CDD on end-users and for filing suspicious transaction reports
    under applicable national frameworks, including FinCEN''s requirements under the
    Bank Secrecy Act and equivalent obligations in the 200-plus jurisdictions where
    it operates. The Stellar blockchain''s public and auditable ledger offers transaction
    monitoring vendors a transparent data substrate, but pseudonymity risks and cross-chain
    bridge exposure remain live concerns that any competent MLRO will need to address
    in updated risk assessments.


    For correspondent banks maintaining relationships with MoneyGram, the launch warrants
    a review of existing de-risking postures. Banks that have tolerated MoneyGram
    as a respondent under traditional remittance typologies must now assess whether
    their own policies adequately cover stablecoin-denominated flows passing through
    that relationship. The interplay between Bridge''s issuance function and MoneyGram''s
    distribution role creates a two-entity structure that mirrors the nested correspondent
    banking arrangements that FATF has long identified as an elevated risk category.
    Supervisors reviewing licence conditions for MoneyGram entities in their jurisdictions
    will likely seek clarity on how the two firms have contractually allocated AML
    obligations before the product scales materially.'
