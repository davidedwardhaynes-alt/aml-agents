  full_article: "Beijing's reported investigation into Futu Securities, Tiger Brokers,\
    \ and Longbridge over alleged facilitation of unlicensed cross-border securities\
    \ trading arrives against the backdrop of what Bloomberg estimates was approximately\
    \ US$1 trillion in capital outflows from China in 2025 \u2014 the largest single-year\
    \ figure since 2006. The immediate compliance implication for firms operating\
    \ similar cross-border retail brokerage models is heightened scrutiny of whether\
    \ their onboarding and transaction monitoring frameworks adequately distinguish\
    \ between permissible and impermissible flows under mainland rules.\n\nThe regulatory\
    \ tension here is not new. China's foreign exchange control regime, administered\
    \ through SAFE, has long restricted mainland residents from directly purchasing\
    \ overseas-listed securities outside approved channels such as the Qualified Domestic\
    \ Institutional Investor scheme. The three brokers under scrutiny built their\
    \ businesses largely serving mainland Chinese clients through Hong Kong-incorporated\
    \ entities \u2014 a structural arbitrage that regulators in Beijing have tolerated\
    \ with varying degrees of patience. Under Hong Kong's Securities and Futures Ordinance\
    \ and the Anti-Money Laundering and Counter-Terrorist Financing Ordinance, licensed\
    \ corporations are required to conduct customer due diligence and apply enhanced\
