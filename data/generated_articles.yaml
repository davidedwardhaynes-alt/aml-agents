    \ \u2014 broker-dealers, futures commission merchants, or MAS-licensed capital\
    \ markets services firms \u2014 begin offering perpetual futures through compliant\
    \ wrappers, the compliance architecture required would be substantially more demanding\
    \ than that applied to spot ETF custody. Surveillance systems would need to address\
    \ wash trading, layering through rapid position reversal, and funding-rate manipulation,\
    \ each of which has distinct typological signatures. Under Hong Kong's AMLO and\
    \ Singapore's MAS Notice PSN02, virtual asset service providers are already required\
    \ to apply risk-based transaction monitoring to derivatives; extending this to\
    \ a retail-accessible structured product amplifies both the obligation and the\
    \ supervisory scrutiny.\n\nFor MLROs, the institutional legitimisation of perpetual\
    \ futures does not dilute the underlying risk \u2014 it repackages it within a\
    \ more complex accountability chain involving prime brokers, clearing members,\
