  full_article: "ING, Worldline and Mastercard completed what the three parties describe\
    \ as Europe's first live end-to-end agentic payment transaction on 2 June 2026,\
    \ a milestone that compresses the human decision layer out of the payment initiation\
    \ chain and raises immediate questions about where AML accountability sits when\
    \ no natural person authorises a transaction in real time.\n\nAgentic AI \u2014\
    \ systems capable of autonomous goal-directed action across multiple steps \u2014\
    \ has been theorised in payments for several years, but deployment in a live,\
    \ multi-party European rail marks a qualitative shift. FATF's 2023 guidance on\
    \ payment transparency and its ongoing work on virtual assets and new technologies\
    \ have consistently stressed that wire transfer rules and know-your-customer obligations\
    \ attach to the *transaction*, not the channel. Under FATF Recommendation 16 and\
    \ its interpretive note, ordering institutions remain responsible for ensuring\
    \ accurate originator and beneficiary information accompanies a transfer regardless\
    \ of how the instruction is generated. The ING-Worldline-Mastercard architecture\
    \ does not, in principle, alter that liability; it does, however, complicate audit\
    \ trail construction and the practical exercise of transaction monitoring.\n\n\
    For MLROs and compliance officers at correspondent and respondent institutions,\
    \ the immediate operational concern is whether existing screening and monitoring\
    \ controls can interrogate agentic-initiated instructions with the same fidelity\
    \ as human-initiated ones. Where an AI agent acts on behalf of a corporate or\
    \ retail customer under a delegated authority framework, the \"customer\" for\
    \ AMLO and AMLA purposes \u2014 and under Article 3 of the EU's Sixth Anti-Money\
    \ Laundering Directive \u2014 remains the legal or natural person who provisioned\
    \ the agent, not the agent itself. That chain of principal accountability must\
    \ be contractually and technically legible at every hop.\n\nRegulators should\
    \ also consider the velocity dimension. Agentic systems can initiate high-frequency,\
    \ low-value transactions across jurisdictions in patterns that may not map neatly\
    \ onto existing rule-based typologies. The EBA's guidelines on transaction monitoring\
    \ and the MAS Notice MAS 626 both contemplate behaviour-based segmentation, but\
    \ calibration of those models against non-human instruction patterns is largely\
    \ untested.\n\nThe more durable compliance question is governance: who signs the\
    \ MLRO's attestation when the transacting entity is an AI runtime? Industry and\
    \ supervisors will need to resolve that question well before agentic payments\
    \ move from proof-of-concept volumes to systemic scale."
