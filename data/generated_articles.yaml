  full_article: 'The IMF''s commendation of Hong Kong''s economic resilience, issued
    on 15 May 2026, carries implications beyond headline growth figures for financial
    institutions operating under the jurisdiction''s AML/CFT framework. Sustained
    economic activity and capital inflows heighten both the opportunity and the obligation
    for licensed banks and intermediaries to maintain proportionate, risk-based controls
    aligned with FATF Recommendations 10 and 26, which govern customer due diligence
    and financial institution supervision respectively.


    Hong Kong completed its third FATF Mutual Evaluation in 2019, receiving a largely
    positive assessment of its technical compliance, though examiners noted areas
    for continued improvement in beneficial ownership transparency and the monitoring
    of higher-risk customer segments. The HKMA has since strengthened its supervisory
    expectations through successive iterations of its Guideline on Anti-Money Laundering
    and Counter-Financing of Terrorism, and the Anti-Money Laundering and Counter-Terrorist
    Financing Ordinance (AMLO) was amended in 2023 to extend the licensing regime
    to virtual asset service providers, signalling the regulator''s intent to close
    perimeter gaps as the financial sector evolves.


    For MLROs and compliance functions, a period of recognised economic buoyancy presents
    a familiar risk: transaction volumes rise, client onboarding pressures intensify,
    and the temptation to de-prioritise enhanced due diligence on commercially attractive
    relationships increases. The HKMA''s Supervisory Policy Manual module CG-2 and
    the associated AML/CFT examination procedures explicitly require institutions
    to demonstrate that growth in business activity does not dilute the quality of
    ongoing monitoring or the timely filing of suspicious transaction reports under
    section 25A of the Drugs Trafficking (Recovery of Proceeds) Ordinance and the
    Organised and Serious Crimes Ordinance.


    From a correspondent banking perspective, a positive IMF assessment reinforces
    Hong Kong''s standing as a low-risk jurisdiction in counterparty risk frameworks,
    which may ease de-risking pressures experienced by some local institutions. However,
    compliance officers at correspondent banks will note that macro-level commendations
    do not substitute for entity-level due diligence and should not prompt a mechanical
    downgrading of monitoring thresholds without documented rationale.


    The fourth round of FATF Mutual Evaluations is scheduled to assess jurisdictions
    on an ongoing basis through the 2030s; Hong Kong''s follow-up reporting cadence
    means that regulators will be attentive to whether institutional controls keep
    pace with the growth the IMF has now publicly acknowledged.'
