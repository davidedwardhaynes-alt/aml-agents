  full_article: "The Asia Securities Industry & Financial Markets Association has\
    \ submitted a formal response to Singapore's Personal Data Protection Commission\
    \ concerning its proposed advisory guidelines on the use of personal data in generative\
    \ AI systems, signalling the financial industry's growing concern that data-governance\
    \ frameworks designed for conventional processing pipelines may not translate\
    \ cleanly to large language model architectures. For compliance functions operating\
    \ under MAS Notice MAS 610, MAS Notice FSG-N16 on outsourcing, and the broader\
    \ obligations of the Personal Data Protection Act 2012, the guidelines carry direct\
    \ operational implications for any firm deploying AI-assisted transaction monitoring,\
    \ customer due diligence, or client-facing advisory tools.\n\nSingapore's PDPC\
    \ has been developing its AI governance posture incrementally, building on the\
    \ voluntary Model AI Governance Framework first published in 2019 and updated\
    \ in 2020, and later complemented by the Advisory Guidelines on the PDPA for AI-generated\
    \ content. The current consultation represents a more targeted effort to address\
    \ how personal data ingested during model training, retrieval-augmented generation\
    \ pipelines, or fine-tuning processes interacts with existing consent, purpose\
    \ limitation, and data minimisation obligations under the PDPA. For financial\
    \ institutions, those obligations sit alongside FATF Recommendation 11 record-keeping\
    \ requirements and MAS's own technology risk guidelines, creating a layered compliance\
    \ environment where a single AI deployment can trigger multiple regulatory touch-points\
    \ simultaneously.\n\nASIFMA's engagement reflects a tension the industry has flagged\
    \ repeatedly: generative AI systems often cannot easily segregate, correct, or\
    \ delete individual data points once absorbed into model weights, complicating\
    \ compliance with PDPA access and correction rights. Financial institutions also\
    \ face the practical question of how purpose limitation applies when a model trained\
    \ on historical client data is later used for a function not explicitly anticipated\
    \ at the point of data collection\u2014a scenario increasingly common in compliance\
    \ automation and fraud detection. Additionally, cross-border data flows inherent\
    \ in models hosted outside Singapore raise questions about how the PDPC guidelines\
    \ interact with Schedule 10 transfer obligation requirements.\n\nHow the PDPC\
    \ responds to industry submissions will determine whether Singapore's generative\
    \ AI governance framework becomes a workable template for the region or an additional\
    \ layer of friction for institutions already navigating the MAS Fairness, Ethics,\
    \ Accountability and Transparency principles. Given that several other APAC jurisdictions\
    \ are watching Singapore's approach closely, the final guidelines will likely\
    \ influence regulatory thinking well beyond Raffles Place."
