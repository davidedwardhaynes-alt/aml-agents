    \ or securities financing.\n\nFor MLROs and heads of financial crime compliance,\
    \ an updated ISDA calendar serves as a prompt to audit whether derivatives-facing\
    \ control gaps exist at the intersection of two regulatory streams. Trade reporting\
    \ obligations under EMIR Refit, MAS Notice TR-1, or CFTC Part 45 generate substantial\
    \ transaction data that, in principle, could enrich transaction monitoring models\u2014\
    yet in practice many institutions maintain siloed workflows where derivatives\
    \ middle-office teams manage regulatory reporting independently of financial crime\
    \ surveillance. Deadlines for margin rule phase-ins or clearing mandate expansions\
