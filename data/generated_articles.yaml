    \ framework applicable to crypto intermediaries operating in or serving US persons,\
    \ with downstream effects on correspondent relationships and travel rule compliance\
    \ globally.\n\nThe legislative effort resumes after the 118th Congress failed\
    \ to advance comparable legislation, leaving US crypto firms operating under enforcement-led\
    \ guidance rather than codified rules. That gap has complicated the FATF Recommendation\
    \ 15 implementation debate, because virtual asset service providers subject to\
    \ inconsistent domestic classification struggle to map their activities cleanly\
    \ onto the Travel Rule requirements that FATF-member jurisdictions \u2014 including\
    \ Singapore under MAS Notice PSN02 and the EU under TFR \u2014 have already embedded\
    \ in national law. Regulatory ambiguity in the world's largest capital market\
    \ creates compliance asymmetry that supervisors in other jurisdictions have noted\
    \ with frustration.\n\nFor MLROs at international banks and payment firms, a successful\
    \ markup and eventual enactment would clarify which US-registered entities qualify\
    \ as VASPs or broker-dealers for correspondent due diligence purposes, reducing\
    \ the current practice of applying conservative blanket de-risking. Crypto-native\
    \ firms, meanwhile, anticipate that statutory certainty could accelerate institutional\
    \ onboarding, raising transaction volumes and with them the suspicious transaction\
    \ monitoring obligations under frameworks such as Australia's AML/CTF Act Part\
    \ 2 and Hong Kong's AMLO.\n\nSupervisors will also watch whether the Clarity Act\
    \ incorporates explicit AML/CFT provisions or defers entirely to existing Bank\
    \ Secrecy Act obligations administered by FinCEN \u2014 a design choice with significant\
    \ consequences for examination scope and enforcement coordination with OFAC. Past\
    \ drafts left that question partially unresolved.\n\nA markup date is a procedural\
    \ step, not enactment, and Senate floor scheduling and House reconciliation remain\
    \ substantial hurdles. Compliance teams would be premature to restructure frameworks\
    \ now, but the prudent posture is to begin gap analyses against both plausible\
    \ outcomes \u2014 CFTC-primary and SEC-primary classifications \u2014 so that\
    \ programme adjustments can be executed without delay if the bill advances to\
    \ conference."
