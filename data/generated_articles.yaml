    \ beyond routine retail banking operations. For financial institutions participating\
    \ in the scheme, bulk coin deposits \u2014 particularly those tendered in large\
    \ volumes by walk-in customers without established account relationships \u2014\
    \ warrant consideration under transaction monitoring frameworks and customer due\
    \ diligence obligations set out in the HKMA's Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance (AMLO) and the associated Guideline on Anti-Money Laundering\
    \ and Counter-Financing of Terrorism.\n\nCoin-based transactions have historically\
    \ occupied a grey zone in AML typology work. While individually low-value, aggregated\
