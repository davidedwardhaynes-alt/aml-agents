    \ the risk frameworks that compliance officers apply to crypto-asset business\
    \ relationships.\n\nFrom a regulatory standpoint, large-scale corporate bitcoin\
    \ treasury programmes occupy an increasingly scrutinised space. Under FATF Recommendation\
    \ 15 and its 2023 updated guidance on virtual assets, jurisdictions are expected\
    \ to ensure that virtual asset service providers and their institutional counterparties\
    \ apply commensurate customer due diligence. When a single corporate entity accumulates\
    \ a position of this size, the concentration of wallet-level exposure raises transaction\
    \ monitoring calibration questions for the exchanges, OTC desks, and prime brokers\
