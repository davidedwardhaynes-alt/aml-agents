    The HKMA publishes reserve figures monthly in accordance with the International
    Monetary Fund''s Special Data Dissemination Standard, a transparency commitment
    that underpins market confidence in the currency peg first established in 1983.
    Reserve adequacy is not merely a macroeconomic metric; under the HKMA''s risk-based
    supervisory framework, systemic monetary stability informs the threat environment
    that feeds into institutional money-laundering and sanctions-risk assessments
    required by the Anti-Money Laundering and Counter-Terrorist Financing Ordinance
