    \ 10: incoming CASPs cannot simply inherit Binance's KYC files and treat onboarding\
    \ as complete. Each migrated customer technically constitutes a new business relationship,\
    \ requiring independent verification, sanctions screening, and an initial risk\
    \ assessment calibrated to the firm's own risk appetite \u2014 not the departing\
    \ platform's. Regulators in Germany, the Netherlands, and France have historically\
    \ scrutinised crypto onboarding quality closely, and a spike in low-quality bulk\
