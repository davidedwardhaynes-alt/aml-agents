    widens the transaction monitoring perimeter for compliance teams across acquiring
    banks and merchant processors.


    The development arrives as travel-money and e-money institutions in the European
    Union operate under the Markets in Crypto-Assets Regulation, which came into full
    effect in late 2024, and as the UK''s Financial Conduct Authority has embedded
