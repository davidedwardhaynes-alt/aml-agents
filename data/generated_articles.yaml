  full_article: "The Trump administration's refusal to sign legislation containing\
    \ a federal CBDC prohibition has introduced fresh legislative uncertainty into\
    \ the timeline for the GENIUS Act's companion measure, the Clarity for Payment\
    \ Stablecoins Act, with implications for the broader digital asset regulatory\
    \ framework that compliance professionals have been anticipating for several years.\n\
    \nThe Clarity Act has been the primary vehicle through which US legislators sought\
    \ to establish a domestic stablecoin licensing regime, including anti-money laundering\
    \ obligations aligned broadly with FATF Recommendation 15 on virtual assets and\
    \ virtual asset service providers. A functioning federal framework would have\
    \ obliged stablecoin issuers to implement customer due diligence, suspicious transaction\
    \ reporting, and travel rule compliance \u2014 requirements that currently exist\
    \ only patchwork across state money transmitter licensing regimes and FinCEN guidance,\
    \ creating supervisory gaps that international counterparts, including MAS under\
    \ its Payment Services Act and the EU under MiCA, have moved to close.\n\nFor\
    \ financial crime compliance officers operating in correspondent banking and digital\
    \ asset settlement, the stall matters in concrete terms. Without federal legislation\
    \ clarifying which entities bear AML/CTF obligations for stablecoin issuance and\
    \ redemption, the de-risking calculus for banks considering custody or settlement\
    \ relationships with stablecoin issuers remains uncomfortable. Examiners applying\
    \ the Bank Secrecy Act framework to these relationships lack clear statutory anchors,\
    \ and enforcement discretion \u2014 however pragmatically exercised \u2014 is\
    \ not a substitute for primary legislation.\n\nFrom a geopolitical standpoint,\
    \ the delay weakens a US negotiating position in ongoing FATF discussions on Recommendation\
    \ 16 implementation for virtual assets, where other jurisdictions are pressing\
    \ for greater consistency in travel rule application across borders. A credible\
