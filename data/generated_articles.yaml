  full_article: 'The UK Financial Conduct Authority has moved to permit authorised
    mutual funds to hold up to 10% of their portfolios in crypto-denominated exchange-traded
    notes, a measured liberalisation that signals a deliberate recalibration of the
    FCA''s approach to retail-facing digital asset exposure rather than an abrupt
    opening of the gates.


    The decision sits within a broader trajectory. The FCA''s earlier prohibition
    on the sale of crypto ETNs to retail investors, maintained from 2021 until its
    partial reversal in 2024, reflected concerns about valuation opacity, liquidity
    mismatches, and consumer harm risks that the regulator had flagged in successive
    consultation papers. The 10% cap is consistent with the kind of concentration
    limits familiar from UCITS-equivalent frameworks, where exposure to non-standard
    or higher-risk assets is ring-fenced to preserve the overall risk profile of diversified
    vehicles. FATF Recommendation 15 and its 2023 updated guidance on virtual assets
    continue to require jurisdictions to apply risk-based supervisory expectations
    to entities handling crypto exposures, obligations that will now flow directly
    to fund managers and their appointed depositaries.


    For MLROs at asset managers, the practical implications are immediate. Funds acquiring
    crypto ETNs must ensure their issuers and underlying asset custodians are subject
    to adequate AML/CFT controls, including travel rule compliance where digital asset
    transfers occur. Counterparty due diligence frameworks will need updating, and
    risk appetite statements will require board-level sign-off reflecting the amended
    mandate. Depositaries, who bear independent oversight obligations, face analogous
    questions about their capacity to verify NAV calculations and monitor underlying
    crypto reference prices for manipulation risk.


    Fund distributors face a complementary challenge: suitability assessments for
    retail clients must now explicitly address crypto volatility and the structural
    features of ETNs, which carry issuer credit risk that physical ETFs do not. Consumer
    Duty obligations under the FCA''s 2023 framework reinforce this requirement, demanding
    that firms demonstrate positive investor outcomes rather than simply disclosure
    compliance.


    The 10% threshold is unlikely to remain static. As the FCA progresses its crypto
    asset admissions and disclosures regime and as global standard-setters including
    IOSCO refine guidance on crypto-asset market integrity, supervisors will be watching
    whether fund-level controls prove adequate before any further expansion of permitted
    exposure is contemplated.'
