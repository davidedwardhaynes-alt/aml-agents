  full_article: "In a speech delivered at techUK's Agents of Change conference on\
    \ 24 June 2026, FCA Chief Executive Nikhil Rathi framed artificial intelligence\
    \ not as an operational convenience for regulated firms but as a structural challenge\
    \ to the foundational assumptions underpinning financial regulation itself \u2014\
    \ a framing with direct implications for how compliance functions approach model\
    \ governance, algorithmic decision-making, and AML controls.\n\nRathi's remarks\
    \ arrive at a moment when the pace of AI adoption has materially outrun the supervisory\
    \ architecture designed to contain its risks. The FCA's own data suggest more\
