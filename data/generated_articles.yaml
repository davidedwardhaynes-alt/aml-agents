    \ MLROs at dual-registrant firms will need to assess whether revised margin frameworks\
    \ alter the risk profile of client accounts in ways that require updates to their\
    \ firm's BSA/AML programme under 31 U.S.C. \xA7 5318, or affect suspicious activity\
    \ reporting thresholds under FinCEN's SAR rules.\n\nCross-border institutions\
