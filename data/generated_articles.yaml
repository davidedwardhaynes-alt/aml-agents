    \ development for financial crime oversight. Products listed on regulated exchanges\
    \ and held through registered custodians brought virtual asset exposure within\
    \ the perimeter of existing broker-dealer obligations under the Bank Secrecy Act,\
    \ FinCEN guidance, and FATF Recommendation 15's virtual asset service provider\
    \ framework. The implicit assumption was that institutional intermediation would\
    \ improve beneficial ownership transparency and reduce the pseudonymous transfer\
    \ risk associated with self-custodied wallets.\n\nThe current outflow pattern\
    \ tests a different dimension of that assumption. Large-scale redemptions processed\
    \ through authorised participants involve the same know-your-customer and suspicious\
    \ activity reporting infrastructure as any other securities transaction. However,\
