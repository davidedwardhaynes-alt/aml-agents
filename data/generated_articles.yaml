  full_article: "The Depository Trust & Clearing Corporation's decision to incorporate\
    \ the Stellar network into its securities tokenisation infrastructure marks a\
    \ significant shift in how systemically important financial market infrastructures\
    \ are approaching distributed ledger technology \u2014 and raises immediate questions\
    \ for compliance officers around counterparty risk, settlement finality, and the\
    \ adequacy of existing AML controls in a hybrid on-chain environment.\n\nDTCC\
    \ processes the vast majority of US equity and fixed-income settlements, clearing\
    \ roughly $2.5 quadrillion in securities transactions annually. Its engagement\
    \ with blockchain infrastructure is not new \u2014 the organisation piloted Project\
    \ Ion on a private DLT stack as early as 2021 \u2014 but the selection of a public,\
    \ permissionless-adjacent network such as Stellar represents a meaningful escalation\
    \ in ambition. Stellar's existing footprint in cross-border payment corridors\
    \ and its ISO 20022-aligned messaging architecture appear to have been material\
    \ factors in its selection, alongside its relatively low transaction costs and\
    \ established tokenised asset frameworks.\n\nFor MLROs and AML supervisors, the\
    \ architecture raises layered compliance considerations. Under FATF Recommendation\
    \ 16 \u2014 the Travel Rule \u2014 virtual asset service providers and financial\
    \ institutions transmitting value across Stellar's ledger will need to ensure\
    \ originator and beneficiary information travels with tokenised security transfers,\
    \ a requirement that existing institutional messaging standards do not automatically\
    \ satisfy in a public-chain context. US broker-dealers operating through DTCC's\
    \ infrastructure remain subject to FinCEN's Customer Due Diligence rule and Bank\
    \ Secrecy Act obligations regardless of the settlement layer beneath them, but\
    \ the interoperability between on-chain wallets and legacy custodian accounts\
    \ creates attribution gaps that supervisors in the SEC and CFTC perimeter are\
    \ only beginning to map. Jurisdictions such as Singapore, where MAS Notice SFA04-N02\
    \ and the broader PS Act licensing regime apply to digital payment token services,\
    \ will similarly need to assess whether tokenised security flows transit regulated\
    \ or unregulated nodes.\n\nThe more immediate operational question is settlement\
    \ finality. Common law and UCC Article 8 frameworks define when a securities transfer\
    \ is legally irrevocable; Stellar's probabilistic finality model, while fast,\
    \ will require legal opinions and rule amendments before DTCC can assert equivalence\
    \ with its current guaranty structure.\n\nAs tokenisation moves from pilot to\
    \ infrastructure, compliance functions risk being consulted after architectural\
    \ decisions are made rather than during them. The DTCC-Stellar development illustrates\
    \ why financial crime teams need a seat at the table when network selection, not\
    \ just product onboarding, is on the agenda."
