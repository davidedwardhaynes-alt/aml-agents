    \ that the agency plans to move beyond enforcement-as-policy toward a formal rulemaking\
    \ posture on digital assets and automated finance.\n\nThe shift carries immediate\
    \ compliance implications. Broker-dealers, investment advisers, and the growing\
    \ cohort of firms operating tokenised securities platforms have been navigating\
    \ an enforcement-defined landscape since at least 2018, with guidance pieced together\
    \ from no-action letters, Wells notices, and litigation outcomes rather than codified\
    \ rules. For AML/CFT practitioners specifically, the absence of clear perimeter\
    \ definitions has complicated the application of Bank Secrecy Act obligations\
    \ and FinCEN's money-transmission rules to decentralised protocols, a gap FATF\
    \ flagged in its updated Recommendation 15 guidance on virtual assets and Virtual\
    \ Asset Service Providers.\n\nFor compliance officers, the practical stakes are\
    \ considerable. If the SEC moves to classify certain on-chain market participants\
