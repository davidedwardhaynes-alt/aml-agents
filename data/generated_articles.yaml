  full_article: "The United States Congress passed the Digital Asset Market Clarity\
    \ Act in May 2026 with bipartisan support, but a last-minute amendment inserted\
    \ during committee reconciliation has drawn quiet concern from compliance professionals\
    \ and decentralised finance participants alike. The provision in question appears\
    \ to extend broker-dealer registration and reporting obligations to certain categories\
    \ of DeFi protocol operators \u2014 a definitional expansion that, depending on\
    \ subsequent rulemaking by the SEC and CFTC, could require automated market makers\
    \ and liquidity pool administrators to satisfy customer identification requirements\
    \ that their architectures were not designed to accommodate.\n\nThe regulatory\
    \ backdrop is not new. FATF's updated Guidance on Virtual Assets and Virtual Asset\
    \ Service Providers, first issued in 2019 and revised in 2021, explicitly flagged\
    \ DeFi arrangements as potentially subject to AML/CFT obligations where a controlling\
    \ person or entity can be identified. The United States, as an FATF member, has\
    \ long faced pressure to translate that guidance into enforceable domestic law.\
    \ Previous legislative attempts \u2014 including earlier drafts of the Clarity\
    \ Act itself \u2014 drew the line at software developers and non-custodial interfaces,\
    \ treating them analogously to open-source publishers. The amended text blurs\
    \ that line considerably.\n\nFor compliance officers at centralised exchanges\
    \ and digital asset custodians, the immediate operational question is counterparty\
    \ risk: if DeFi protocols feeding into their liquidity infrastructure are deemed\
    \ non-compliant intermediaries under the new framework, institutions may face\
    \ pressure to restrict or document those interactions under existing Bank Secrecy\
    \ Act obligations and FinCEN's 2019 guidance on convertible virtual currency.\
    \ The amendment also creates jurisdictional asymmetry. Protocols operating without\
    \ a US nexus \u2014 or migrating governance structures offshore \u2014 may simply\
    \ route around the requirement, leaving domestically-anchored participants at\
    \ a structural disadvantage without meaningfully reducing illicit finance exposure.\n\
    \nAdvocates of the amendment argue that some DeFi protocols exercise sufficient\
    \ administrative control over fee parameters, upgrade keys, and treasury functions\
    \ to constitute de facto intermediaries \u2014 a position broadly consistent with\
    \ the substance-over-form principle embedded in FATF Recommendation 15. Critics\
    \ counter that the drafting is imprecise enough to sweep in genuinely decentralised\
    \ systems, creating liability without corresponding AML benefit.\n\nThe coming\
