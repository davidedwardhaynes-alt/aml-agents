    \ dynamic transaction monitoring systems capable of adjusting behavioural baselines\
    \ as market conditions shift. A firm whose typologies were calibrated when Bitcoin\
    \ traded at $90,000 may be generating materially different alert volumes today,\
    \ creating both false-positive fatigue and genuine detection gaps. Similarly,\
