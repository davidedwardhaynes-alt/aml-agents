    \ technology-neutral obligations, meaning firms cannot claim regulatory shelter\
    \ simply because an attack method is novel. The joint communiqu\xE9 implicitly\
    \ reinforces that principle.\n\nFor MLROs and Heads of Financial Crime Compliance,\
