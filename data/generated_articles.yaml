  full_article: "The International Swaps and Derivatives Association (ISDA) and the\
    \ Association for Financial Markets in Europe (AFME) have submitted a joint response\
    \ to the European Commission's consultation on the Market Risk Delegated Act,\
    \ pressing for technical adjustments to the Fundamental Review of the Trading\
    \ Book (FRTB) framework before its transposition into binding EU law. The response\
    \ signals continuing friction between the industry and regulators over the calibration\
    \ of capital charges under the revised market risk rules, with material implications\
    \ for trading book profitability and risk model governance across EU-authorised\
    \ institutions.\n\nThe FRTB, developed by the Basel Committee on Banking Supervision\
    \ and embedded in the EU Capital Requirements Regulation through CRR3, represents\
    \ the most comprehensive overhaul of market risk capital since the original 1996\
    \ Basel Market Risk Amendment. The Delegated Act consulted upon by the Commission\
    \ is the mechanism through which the European Banking Authority's technical standards\
    \ and the Commission's own implementing measures translate the high-level CRR3\
    \ text into operational requirements governing the Internal Models Approach (IMA)\
    \ and the Standardised Approach (SA). Firms had already absorbed significant compliance\
    \ investment ahead of the January 2025 reporting start date, making further recalibration\
    \ at this stage both operationally complex and commercially sensitive.\n\nFrom\
    \ the perspective of compliance and financial crime control functions, the stakes\
    \ extend beyond capital optimisation. The IMA's reliance on robust data lineage,\
    \ model documentation, and desk-level profit-and-loss attribution feeds directly\
    \ into the control environment that MLROs depend upon when assessing whether unusual\
    \ trading patterns represent genuine market activity or potential manipulation.\
    \ Weaknesses in model governance flagged during IMA approval processes can surface\
    \ as concurrent concerns for market abuse surveillance teams operating under MAR\
    \ obligations.\n\nFor supervisors \u2014 including the ECB's Single Supervisory\
    \ Mechanism and national competent authorities \u2014 the ISDA-AFME submission\
    \ reinforces a pattern of industry engagement that, while technically substantive,\
    \ also functions as a lobbying instrument to soften output floors and risk-weight\
    \ floors before they crystallise in delegated legislation. Authorities will need\
    \ to weigh legitimate calibration concerns against the Basel Committee's stated\
    \ intent to limit RWA variability across jurisdictions.\n\nThe Commission's finalisation\
    \ timeline for the Delegated Act will be closely watched; any significant divergence\
    \ from the Basel text risks reigniting the equivalence and level-playing-field\
    \ debates that complicated earlier phases of EU-UK post-Brexit regulatory alignment."
