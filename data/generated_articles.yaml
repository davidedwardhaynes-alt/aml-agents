  full_article: "The Bank of England's routine publication of index-linked Treasury\
    \ Stock data on 17 June 2026 serves as a reminder that inflation-linked sovereign\
    \ instruments occupy a distinctive and occasionally under-scrutinised position\
    \ within financial crime compliance frameworks. These gilts, whose semi-annual\
    \ coupon payments are indexed to the Retail Price Index, present a comparatively\
    \ low but non-negligible money-laundering typology that warrants periodic reassessment\
    \ by compliance functions holding or transacting in them.\n\nIndex-linked gilts\
    \ have existed in the UK since 1981, introduced initially to provide institutional\
    \ investors \u2014 pension funds and insurers in particular \u2014 with a hedge\
    \ against inflation. Their characteristically long durations and sovereign-grade\
    \ credit quality have historically made them attractive to legitimate long-term\
    \ investors. However, that same profile \u2014 predictable, government-backed\
    \ cash flows that adjust with inflation \u2014 can appeal to those seeking to\
    \ layer illicit funds through ostensibly conservative fixed-income portfolios,\
    \ particularly when markets are experiencing elevated inflationary periods that\
    \ amplify coupon variability.\n\nFrom a compliance standpoint, firms operating\
    \ under the UK's Proceeds of Crime Act 2002 and the Money Laundering, Terrorist\
    \ Financing and Transfer of Funds Regulations 2017 are required to apply risk-sensitive\
    \ due diligence to all asset classes, including sovereign securities. FATF Recommendation\
    \ 1 calls explicitly for risk assessments that account for product-specific vulnerabilities;\
    \ index-linked instruments with variable cash flows can complicate the detection\
    \ of structured layering activity if transaction monitoring thresholds are calibrated\
    \ solely against fixed nominal values. Firms should ensure their systems capture\
    \ RPI-adjusted redemption and coupon amounts rather than static par values when\
    \ applying monitoring rules.\n\nFor MLROs at asset managers, custodians, and gilt-edged\
