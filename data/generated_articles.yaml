    \ estate-related financial crime.\n\nThe regulatory backdrop is relevant. Bank\
    \ Negara Malaysia's ongoing efforts to strengthen financial consumer protection\
    \ sit alongside its broader anti-money laundering architecture, anchored in the\
    \ Anti-Money Laundering, Anti-Terrorism Financing and Proceeds of Unlawful Activities\
    \ Act 2001 (AMLA). Insurers and takaful operators are reporting institutions under\
    \ AMLA, obligated to file suspicious transaction reports and maintain rigorous\
    \ customer due diligence. Unclaimed insurance proceeds have historically presented\
    \ a monitoring challenge: without a mechanism for beneficiaries to assert claims,\
    \ funds can remain dormant indefinitely, eventually transferred to the Registrar\
    \ of Unclaimed Moneys under the Unclaimed Moneys Act 1965 \u2014 a process that,\
