  full_article: "The Hong Kong Monetary Authority has enlisted 21 banks in a structured\
    \ pilot \u2014 dubbed Cargox \u2014 that routes cargo and logistics data through\
    \ the city's Commercial Data Interchange (CDI) infrastructure to support SME credit\
    \ assessments in trade finance. The immediate implication is that alternative\
