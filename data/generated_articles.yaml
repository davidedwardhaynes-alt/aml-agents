  full_article: "Only 17% of high-net-worth individuals across 27 markets report receiving\
    \ genuinely personalised service from their wealth managers, according to Capgemini's\
    \ World Wealth Report 2026, which surveyed 6,510 HNWIs alongside 144 senior executives\
    \ and 1,317 relationship managers. For financial crime compliance officers, the\
    \ finding carries an implication that extends well beyond client satisfaction\
    \ metrics: a personalisation deficit at this scale suggests that the client understanding\
    \ underpinning effective know-your-customer frameworks may be considerably shallower\
    \ than institutions assume.\n\nFATF Recommendation 10 requires firms to conduct\
    \ ongoing due diligence and scrutinise transactions to ensure they are consistent\
    \ with the institution's knowledge of the customer, their business, and risk profile.\
    \ MAS Notice 1014 and equivalent instruments across major jurisdictions operationalise\
    \ that standard into documented, living customer profiles. The implicit promise\
    \ of these frameworks is that wealth managers maintain sufficiently granular understanding\
    \ of client circumstances to detect anomalies. A figure of 17% effective personalisation,\
    \ drawn from the clients themselves rather than from compliance self-assessments,\
    \ invites scepticism about whether that promise is being kept in practice.\n\n\
    The gap has structural origins. Relationship managers in the survey cohort are\
    \ managing growing books while simultaneously absorbing digital tools that remain\
    \ incompletely integrated into advisory workflows. Where client data sits across\
    \ fragmented systems \u2014 portfolio platforms, CRM tools, onboarding repositories\
    \ \u2014 relationship managers lack the consolidated view necessary either to\
    \ personalise advice or to identify behavioural deviations that might warrant\
    \ a suspicious transaction report. The compliance function and the front office\
    \ are, in effect, working from different and incomplete versions of the same client.\n\
    \nThe report's findings on AI adoption are relevant here. Firms investing in AI-assisted\
    \ client intelligence to close the personalisation gap will, as a by-product,\
    \ construct richer and more current customer risk profiles. Supervisors including\
    \ MAS, the FCA, and AUSTRAC have each signalled openness to AI-augmented transaction\
    \ monitoring and customer risk scoring, provided model governance and explainability\
    \ standards are met. The commercial incentive to personalise and the regulatory\
    \ obligation to know the customer are, for once, pointing in the same direction.\
    \ Whether compliance teams are invited into AI deployment decisions early enough\
    \ to shape those tools toward dual-purpose use remains the more uncertain variable."
