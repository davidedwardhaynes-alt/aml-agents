  full_article: "The International Swaps and Derivatives Association submitted a formal\
    \ response on 1 July to the Reserve Bank of India's consultation on the Standardised\
    \ Approach for Counterparty Credit Risk, signalling that global derivatives market\
    \ participants are closely watching how one of Asia's largest banking regulators\
    \ transposes the Basel III framework into domestic rules. The RBI's proposed adoption\
    \ of SA-CCR carries direct implications for how Indian banks and their foreign\
    \ counterparties measure, report, and manage exposure at default on over-the-counter\
    \ derivatives books.\n\nSA-CCR replaced the Internal Model Method and the Current\
    \ Exposure Method under the Basel Committee on Banking Supervision's 2014 standard,\
    \ offering a more risk-sensitive methodology for calculating replacement cost\
    \ and potential future exposure. For institutions operating across jurisdictions,\
    \ calibration inconsistencies between the RBI's final rules and the versions already\
    \ implemented by the Monetary Authority of Singapore, the European Banking Authority,\
    \ and US prudential regulators create real operational friction: netting set calculations,\
    \ collateral recognition thresholds, and supervisory delta formulas that diverge\
    \ even modestly can produce materially different capital charges for economically\
    \ identical trades.\n\nISDA's response likely addresses three recurring concerns\
    \ the association has raised in comparable consultations elsewhere \u2014 the\
    \ treatment of margined versus unmargined trades, the recognition of eligible\
    \ collateral under Indian law given constraints in the domestic ISDA Master Agreement\
    \ and Credit Support Annex landscape, and the aggregation rules for commodity\
    \ and equity derivatives where RBI's draft may depart from BCBS intent. Each of\
    \ these has downstream consequences for anti-money laundering and financial crime\
    \ compliance professionals: compressed margins under inflated capital requirements\
    \ can alter the economics of correspondent banking relationships and affect which\
    \ counterparties Indian banks elect to maintain, with attendant de-risking pressures\
    \ that FATF has repeatedly flagged as a financial inclusion and transparency concern.\n\
    \nFor MLROs at institutions with Indian bank counterparties, the RBI's final SA-CCR\
    \ rules will reshape the risk appetite frameworks and counterparty due diligence\
    \ economics that sit upstream of transaction monitoring calibration. If the RBI\
    \ adopts a conservative local variant \u2014 as several emerging-market regulators\
    \ have done \u2014 the resulting capital premium may accelerate consolidation\
    \ of derivatives clearing toward a smaller set of global dealers, concentrating\
    \ exposure and potentially reducing the granularity of suspicious transaction\
    \ detection across the market. The RBI is expected to publish finalised guidelines\
    \ before the close of the 2026 fiscal year."
