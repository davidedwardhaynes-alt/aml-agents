  full_article: "The Financial Conduct Authority launched a consultation on 2 July\
    \ 2026 to overhaul cost and charges disclosure across platforms, advisers, and\
    \ wealth managers, consolidating fragmented requirements into a single, simplified\
    \ framework. The immediate implication for compliance and product teams is a structural\
    \ review of how firms present total investment costs to retail clients \u2014\
    \ a process that will require coordinated input from legal, technology, and client-facing\
    \ functions well before any final rules take effect.\n\nThe reform follows years\
    \ of industry criticism that the retained MiFID II disclosure regime \u2014 transplanted\
    \ into UK domestic law post-Brexit \u2014 produced dense, poorly understood cost\
    \ disclosures that confused rather than informed retail investors. The FCA's own\
    \ consumer research underpins the concern: 30% of non-advised platform users reported\
    \ being unaware of what they pay for investing. Earlier product-level disclosure\
    \ reforms, including the replacement of PRIIPS KIDs with the UK's bespoke Consumer\
    \ Composite Investments regime, had already signalled the regulator's intent to\
    \ build a more coherent, layered disclosure architecture. This consultation extends\
    \ that logic to distribution and advice costs, creating end-to-end consistency.\n\
    \nFor MLROs and compliance officers, the proposals carry implications beyond product\
    \ governance. Clearer cost communication reduces the information asymmetry that\
    \ can mask conflicts of interest \u2014 an area the FCA has historically linked\
    \ to fair treatment obligations under the Consumer Duty, which requires firms\
    \ to deliver good outcomes and avoid foreseeable harm. Firms operating under the\
    \ Senior Managers and Certification Regime should anticipate renewed scrutiny\
    \ on whether disclosure sign-off chains are adequately governed at senior manager\
    \ level.\n\nWealth managers and platform operators face operational questions\
    \ about how to redesign client-facing cost summaries while preserving the flexibility\
    \ the FCA explicitly wants to encourage \u2014 firms will be permitted to test\
    \ and innovate in how they present information, provided disclosures remain accurate\
