    \ more concentrated property buy-back exercises the city has seen in recent years,\
    \ and carries financial crime compliance implications that warrant attention from\
    \ practitioners in real estate and conveyancing sectors.\n\nBulk government acquisitions\
    \ of residential property sit at an intersection of vulnerabilities long flagged\
    \ by the Financial Action Task Force. FATF Recommendation 22 extends customer\
    \ due diligence obligations to designated non-financial businesses and professions,\
    \ including real estate agents and legal professionals handling purchase or sale\
    \ transactions. When a single counterparty \u2014 here, the government \u2014\
