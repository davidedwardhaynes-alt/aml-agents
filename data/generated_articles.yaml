  full_article: "The accelerating migration of major banks from permissioned blockchain\
    \ infrastructure toward public or semi-public networks for tokenised cash settlement\
    \ marks a material shift in the risk topology that financial crime compliance\
    \ teams must now assess. Where private chains once offered closed-loop participant\
    \ controls and bespoke governance, public infrastructure introduces pseudonymous\
    \ validator sets, open composability, and smart-contract interoperability \u2014\
    \ each carrying distinct money-laundering and sanctions-evasion exposure that\
    \ existing frameworks were not designed to address at scale.\n\nThe context is\
    \ important. FATF's updated Recommendation 15 guidance on virtual assets, finalised\
    \ in 2023 and incorporated into national regimes including MAS Notice PSN02 and\
    \ Australia's AML/CTF Act amendments, places Travel Rule obligations squarely\
    \ on Virtual Asset Service Providers but leaves substantive gaps when the entity\
    \ facilitating a transfer is a smart contract rather than a licensed intermediary.\
    \ Banks building tokenised deposit or e-money networks on public rails will need\
    \ to determine whether their own on-chain activity constitutes VASP-equivalent\
    \ conduct under local law \u2014 a question that several jurisdictions, including\
    \ Hong Kong under AMLORAO and Singapore under the Payment Services Act, have yet\
    \ to resolve definitively for bank-issued instruments.\n\nFor MLROs, the operational\
    \ implications are layered. First, transaction monitoring systems calibrated to\
    \ correspondent-banking patterns or card-network velocity rules are structurally\
    \ misaligned with on-chain settlement finality and programmable fund flows. Second,\
    \ the composability of public infrastructure means that a tokenised deposit issued\
    \ by a regulated institution can, without the issuer's direct involvement, be\
    \ routed through decentralised protocols that obscure beneficial ownership \u2014\
    \ a scenario that triggers obligations under FATF's Interpretive Note to Recommendation\
    \ 16 but for which most banks lack detection capability. Third, cross-chain bridge\
    \ activity, already cited by FinCEN and the UK's National Crime Agency as a preferred\
    \ obfuscation mechanism, becomes a first-order concern rather than a peripheral\
    \ one once public-chain infrastructure underpins wholesale settlement.\n\nThe\
    \ Sygnum observation that no single stablecoin has captured the institutional\
    \ settlement layer is analytically useful: it suggests a period of fragmented,\
    \ multi-token co-existence rather than a clean regulatory perimeter around one\
    \ instrument. For supervisors and compliance functions alike, that fragmentation\
    \ is precisely the condition under which illicit-finance risk migrates fastest\
    \ \u2014 into the interstices between regimes, instruments, and chains before\
    \ policy can consolidate. The prudent posture is to begin mapping that exposure\
    \ now, before settlement volumes make remediation prohibitively complex."
