    \ shaped final calibration discussions.\n\nFrom a financial crime compliance standpoint,\
    \ the letter carries indirect but important implications. Supervisory fragmentation\
    \ at the EU level \u2014 with responsibilities distributed across ESMA, national\
    \ competent authorities, and, prospectively, the new Anti-Money Laundering Authority\
    \ (AMLA) \u2014 creates jurisdictional ambiguity over who bears primary responsibility\
