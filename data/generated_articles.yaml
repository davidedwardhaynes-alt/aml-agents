    \ illustrates a persistent governance gap in religious institution finances \u2014\
    \ one that carries direct implications for anti-money laundering frameworks across\
    \ South and Southeast Asia.\n\nReligious and charitable organisations have long\
    \ occupied an ambiguous space in financial crime typologies. FATF Recommendation\
    \ 8 specifically identifies non-profit organisations as potentially vulnerable\
    \ to abuse, including the misuse of cash donation flows, and its revised 2016\
    \ guidance calls on jurisdictions to apply a risk-based approach rather than treating\
    \ all NPOs as high-risk. India's Prevention of Money Laundering Act 2002 (PMLA)\
    \ and the Foreign Contribution (Regulation) Act 2010 provide the primary legislative\
    \ architecture for scrutinising fund flows into registered entities, but cash-based\
    \ donation systems \u2014 common at major temples, mosques, churches, and gurudwaras\
    \ \u2014 generate opacity that neither framework fully resolves. Tying transactions\
    \ to natural persons remains operationally difficult when offerings are made anonymously\
