  full_article: "Beijing's reported investigation into Futu Securities, Tiger Brokers,\
    \ and Longbridge over alleged facilitation of unlicensed cross-border securities\
    \ trading arrives against the backdrop of what Bloomberg estimates was approximately\
    \ US$1 trillion in capital outflows from China in 2025 \u2014 the largest single-year\
    \ figure since 2006. The immediate compliance implication for firms operating\
    \ similar cross-border retail brokerage models is heightened scrutiny of whether\
    \ their onboarding and transaction monitoring frameworks adequately distinguish\
    \ between permissible and impermissible flows under mainland rules.\n\nThe regulatory\
    \ tension here is not new. China's foreign exchange control regime, administered\
    \ through SAFE, has long restricted mainland residents from directly purchasing\
    \ overseas-listed securities outside approved channels such as the Qualified Domestic\
    \ Institutional Investor scheme. The three brokers under scrutiny built their\
    \ businesses largely serving mainland Chinese clients through Hong Kong-incorporated\
    \ entities \u2014 a structural arbitrage that regulators in Beijing have tolerated\
    \ with varying degrees of patience. Under Hong Kong's Securities and Futures Ordinance\
    \ and the Anti-Money Laundering and Counter-Terrorist Financing Ordinance, licensed\
    \ corporations are required to conduct customer due diligence and apply enhanced\
    \ measures where cross-border flows present elevated risk. The SFC has itself\
    \ previously reminded intermediaries of their obligations when serving clients\
    \ whose home jurisdictions impose capital controls.\n\nFor compliance officers\
    \ at affected and peer institutions, the probe raises several concurrent concerns.\
    \ First, whether client source-of-funds documentation is sufficient to demonstrate\
    \ that invested capital entered Hong Kong through lawful channels \u2014 a standard\
    \ consistent with FATF Recommendation 10 on customer due diligence. Second, whether\
    \ transaction monitoring systems are calibrated to detect patterns indicative\
    \ of layering through retail brokerage accounts, a typology increasingly flagged\
    \ in FATF's work on virtual assets and capital-flight corridors. Third, the reputational\
    \ and licensing exposure under MAS Notice SFA04-N02 for Singapore-incorporated\
    \ affiliates of these groups, where parallel regulatory inquiries remain possible.\n\
    \nThe unwinding of offshore positions by retail investors \u2014 reportedly already\
    \ under way \u2014 will itself generate large-value redemption flows that compliance\
    \ teams must treat with appropriate scrutiny rather than as routine client activity.\
    \ How Hong Kong's SFC and Singapore's MAS engage with Chinese counterparts through\
    \ bilateral information-sharing arrangements established under their respective\
    \ memoranda of understanding with CSRC will likely determine the territorial reach\
    \ of any enforcement outcome. Firms with material mainland Chinese retail exposure\
    \ would be prudent to commission independent reviews of their cross-border client\
    \ acceptance policies before regulators request them."
