  full_article: "The push to reframe sports betting as a financial product rather\
    \ than a gambling activity has moved from academic debate into regulatory lobbying,\
    \ with at least one aspiring prediction market operator formally advocating for\
    \ the reclassification before US policymakers. The immediate implication is straightforward:\
    \ if successful, such a shift would transfer oversight from state gaming commissions\
    \ to federal financial regulators \u2014 most plausibly the CFTC, which already\
    \ supervises event contracts under the Commodity Exchange Act \u2014 fundamentally\
    \ altering the AML/CFT obligations applicable to these platforms.\n\nThe argument\
    \ is not without precedent. Prediction markets such as Kalshi and Polymarket have\
    \ spent the past several years litigating and lobbying to bring political and\
    \ economic event contracts within the CFTC's remit, with Kalshi prevailing in\
    \ federal court in 2024 on election contracts. FATF Recommendation 22 requires\
    \ designated non-financial businesses and professions \u2014 including casinos\
    \ \u2014 to apply customer due diligence and suspicious transaction reporting\
    \ obligations, but the specific calibration of those requirements differs markedly\
    \ from the regime applied to regulated financial institutions under Recommendations\
    \ 10 through 21. Reclassification would therefore not eliminate AML exposure;\
    \ it would migrate it into a different, and in some respects more demanding, framework.\n\
    \nFor compliance officers at banks and payment processors, the practical stakes\
    \ are considerable. Sports betting platforms currently sit within the Bank Secrecy\
    \ Act's definition of money services businesses or, in some state frameworks,\
    \ as licensed gaming operators with bespoke reporting obligations. A move toward\
    \ CFTC-regulated designated contract markets would require these platforms to\
    \ implement futures-industry-grade KYC, position-limit surveillance, and market\
    \ manipulation controls \u2014 capabilities that most sports betting technology\
    \ stacks are not currently built to support.\n\nRegulators in other jurisdictions\
    \ will watch closely. The UK Gambling Commission and MAS \u2014 whose Notice MAS\
    \ 626 governs financial advisers but whose broader approach to regulatory perimeter\
    \ questions is instructive \u2014 have both grappled with hybrid products that\
    \ straddle gambling and derivatives law. The risk in any reclassification is regulatory\
    \ arbitrage: operators seeking the label that carries the lighter supervisory\
    \ touch rather than genuinely aligning their risk controls with the underlying\
    \ activity.\n\nWhether US federal regulators have appetite for this expansion\
    \ of their perimeter, particularly given CFTC resource constraints, remains the\
    \ central uncertainty. The lobbying effort reveals less about the likely outcome\
    \ than about a maturing prediction market industry seeking the legitimacy \u2014\
    \ and the lighter state-by-state licensing burden \u2014 that federal financial\
    \ regulation would confer."
