  summary: The U. S.
  full_article: "The U.S. cryptocurrency industry is mounting a coordinated lobbying\
    \ effort on tax treatment of mining and staking rewards, seeking to establish\
    \ that such income should not be recognised at the point of receipt but rather\
    \ upon disposal \u2014 a position with direct implications for how compliance\
    \ teams model taxable events and, by extension, how financial institutions calibrate\
    \ transaction monitoring thresholds and suspicious activity reporting.\n\nThe\
    \ debate is not new. The Internal Revenue Service's 2023 guidance under Revenue\
    \ Ruling 2023-14 confirmed that staking rewards constitute gross income at fair\
    \ market value upon receipt, a position the industry has contested through both\
    \ litigation and legislative channels. What has shifted is the scale of organised\
    \ advocacy: industry bodies are now explicitly linking tax classification arguments\
    \ to broader assertions about U.S. competitiveness, framing punitive tax treatment\
    \ as an accelerant of offshore migration \u2014 a concern that resonates with\
    \ FATF's longstanding emphasis, most recently reinforced in its 2023 Virtual Assets\
    \ Guidance update, on ensuring that tightening domestic frameworks do not simply\
    \ displace activity to less-regulated jurisdictions.\n\nFor compliance officers\
    \ at virtual asset service providers and their banking counterparts, the stakes\
    \ are practical. If Congress were to legislate a realisation-based model for mining\
    \ and staking income, the effect would be to defer taxable events, altering the\
    \ frequency and materiality of reportable transactions. Under the Bank Secrecy\
    \ Act's Currency Transaction Report and Suspicious Activity Report frameworks,\
    \ that shift could affect baseline typologies built around income receipt patterns.\
    \ Institutions operating across jurisdictions will also need to reconcile any\
    \ U.S. legislative change against existing regimes: Australia's AML/CTF Act and\
    \ AUSTRAC guidance, MAS Notice PSN02 in Singapore, and the EU's MiCA framework\
    \ each embed assumptions about when crypto-asset value is constructively received.\n\
    \nMining adds a separate layer of complexity. Proof-of-work operators argue that\
    \ treating newly minted coins as income before a liquid market exists for a particular\
    \ block reward distorts economic reality and creates cash-flow liabilities that\
    \ favour large, well-capitalised miners over smaller participants. Whether that\
    \ argument gains legislative traction will depend heavily on the trajectory of\
    \ the broader reconciliation bill currently moving through Congress.\n\nThe outcome\
    \ will set a durable precedent. Tax classification and AML classification are\
    \ legally distinct, but in practice they converge: how regulators and courts define\
    \ the moment of value receipt shapes everything from KYC trigger points to the\
    \ parameters of enhanced due diligence obligations for high-volume validators."
