    \ for a rising share of financial crime losses across Asia-Pacific, according\
    \ to industry practitioners convened at LexisNexis Risk Solutions' Risk Ready\
    \ 2026 forum in mid-2026 \u2014 a shift that challenges compliance functions still\
    \ calibrated primarily around system-level intrusion and typology-based transaction\
    \ monitoring.\n\nFor much of the past decade, banks in the region have oriented\
    \ their defences around network-layer attacks: account takeover via credential\
    \ stuffing, SIM-swap fraud, and malware-enabled interception. Supervisory guidance\
    \ has followed suit. MAS Notice 626 and its accompanying guidelines on technology\
    \ risk management, Malaysia's BNM's Risk Management in Technology (RMiT) policy\
    \ document, and Australia's AML/CTF Act obligations around customer due diligence\
    \ all implicitly assume that the primary threat vector runs through the institution's\
    \ own infrastructure. The emerging pattern identified at the forum \u2014 where\
    \ the customer's own judgement is compromised through romance scams, investment\
    \ fraud, and impersonation of officials \u2014 sits uneasily within those frameworks.\n\
    \nThe compliance implication is material. Where a customer is deceived into authorising\
    \ a payment, the transaction is technically compliant with the bank's controls:\
    \ it passes authentication, it originates from the legitimate account holder,\
    \ and it may fall within established behavioural patterns. Detection therefore\
    \ requires a different analytical posture \u2014 one oriented toward anomalous\
    \ recipient profiles, unusual beneficiary jurisdictions, and friction-based intervention\
    \ at the point of authorisation rather than retrospective transaction surveillance.\
    \ FATF Recommendation 16, covering wire transfer transparency, provides one lever,\
    \ but its utility depends on correspondent banks in receiving jurisdictions applying\
    \ equivalent scrutiny to inbound funds.\n\nFor AML teams specifically, the convergence\
    \ of fraud and money laundering typologies creates a classification problem. Proceeds\
    \ of authorised push payment scams frequently move through mule account networks\
    \ that bear the hallmarks of layering under FATF's forty recommendations, yet\
    \ the predicate offence \u2014 fraud against an individual \u2014 may not trigger\
    \ the same Suspicious Transaction Report thresholds as narcotics or sanctions-related\
    \ flows under, for example, Malaysia's Anti-Money Laundering, Anti-Terrorism Financing\
    \ and Proceeds of Unlawful Activities Act 2001 or Hong Kong's Organised and Serious\
    \ Crimes Ordinance.\n\nThe practical question regulators and banks now face is\
    \ whether customer-protection obligations \u2014 including liability frameworks\
    \ for authorised fraud losses, which the United Kingdom's PSR mandatory reimbursement\
    \ model has begun to codify \u2014 will migrate into Asian regulatory architecture\
    \ before the typology outpaces existing AML controls entirely."
