  full_article: "Bitcoin-backed lending has moved quietly from the margins of structured\
    \ finance into treasury discussions at mid-sized corporates and family offices,\
    \ raising questions that compliance and risk functions can no longer defer to\
    \ front-office teams.\n\nThe product mechanics are straightforward: a borrower\
    \ pledges Bitcoin as collateral against a fiat or stablecoin facility, retaining\
    \ economic exposure to the asset while unlocking liquidity without a taxable disposal\
    \ event. What makes the instrument newly relevant to financial crime professionals\
    \ is scale. On-chain data suggest collateralised Bitcoin lending volumes have\
    \ grown materially through 2025, with institutional participants\u2014rather than\
    \ retail speculators\u2014now representing the majority of notional exposure at\
    \ several major venues. Where institutional money flows, so does supervisory attention.\n\
    \nFrom a regulatory standpoint, the product sits at the intersection of multiple\
    \ frameworks simultaneously. Under FATF Recommendation 15 and its 2023 updated\
    \ guidance on virtual assets, lenders originating such facilities are Virtual\
    \ Asset Service Providers subject to the full suite of customer due diligence,\
    \ beneficial ownership verification, and Travel Rule obligations. In Singapore,\
    \ MAS Notice PSN02 and the Payment Services Act impose additional requirements\
    \ on Digital Payment Token service providers. In Hong Kong, the VASP licensing\
    \ regime under the Anti-Money Laundering and Counter-Terrorist Financing Ordinance\
    \ captures platforms offering such products to the public. In Australia, the AML/CTF\
    \ Act designation of digital currency exchange services brings similar obligations.\
    \ The patchwork is not incidental; it reflects genuine jurisdictional uncertainty\
    \ about whether a Bitcoin-backed loan is a lending product, a securities financing\
    \ transaction, or a digital asset service\u2014and in several cases it is all\
    \ three.\n\nFor MLROs, the cost-of-capital framing carries specific risk typology\
    \ implications. Loan proceeds can obscure the ultimate source of funds when the\
    \ collateral itself originates from opaque wallet histories. Margin calls liquidated\
    \ into fiat create conversion events that may not be captured in existing transaction\
    \ monitoring scenarios calibrated for spot trading. Rehypothecation of collateral\
    \ across counterparties compounds beneficial ownership complexity.\n\nThe trajectory\
    \ of regulatory convergence\u2014MiCA's collateral provisions, the Basel Committee's\
    \ cryptoasset exposure rules taking effect, and IOSCO's 2023 crypto recommendations\
    \ being absorbed into national frameworks\u2014suggests that supervisors will\
    \ increasingly expect lenders to have articulated, documented answers to these\
    \ questions before the next examination cycle rather than after it."
