    \ club undergoes a material change in beneficial ownership or management control,\
    \ what obligations does that trigger for regulated institutions with exposure\
    \ to the entity or its members?\n\nThe HKGTA sits within a segment of Hong Kong's\
    \ hospitality and leisure economy that has historically attracted heightened scrutiny\
    \ from the Joint Financial Intelligence Unit and the Hong Kong Monetary Authority.\
    \ Exclusive sports and social clubs \u2014 particularly those with long-tenure\
    \ membership structures, significant membership transfer markets, and opaque fee\
    \ arrangements \u2014 present risk typologies that FATF's guidance on gatekeepers\
    \ and high-value dealers has flagged since at least its 2012 revised Recommendations.\
    \ Membership interests that can be bought, sold, or transferred carry economic\
    \ value that, in certain structures, may not be adequately reflected in beneficial\
    \ ownership registers.\n\nFor banks and other deposit-taking institutions maintaining\
