  full_article: "Hong Kong's taxi licence market is approaching a fresh stress point,\
    \ with industry representatives warning that roughly 10 per cent of cab owners\
    \ face mortgage default as licence valuations continue their long decline \u2014\
    \ urban red-cab licences now trade at approximately HK$2.62 million, down 66 per\
    \ cent from the 2009 peak of HK$7.66 million. The proximate trigger is the government's\
