  full_article: "India's securities regulator has moved to enforce a monetary penalty\
    \ against I Zone Academy Private Limited (PAN: AACCI0592E) through a General Remittance\
    \ Order issued on 1 June 2026 under Recovery Certificate No. 9078 of 2026, signalling\
    \ that earlier adjudication proceedings in the illiquid stock options segment\
