    \ reliability and, by extension, the operational risk assumptions embedded in\
    \ firms' internal control frameworks under Basel operational risk standards.\n\
    \nThe broader implication for supervisors is structural. Regulators have tolerated\
    \ a degree of governance ambiguity in foundational blockchain protocols on the\
    \ assumption that their open-source, decentralised character distributes systemic\
    \ risk. Persistent instability at the Ethereum Foundation may prompt renewed discussion\
    \ \u2014 already beginning in ESMA working papers and FSB crypto-asset monitoring\
    \ reports \u2014 about whether informal governance bodies for major public blockchains\
    \ warrant some form of engagement or disclosure expectations analogous to those\
    \ placed on critical financial infrastructure operators."
