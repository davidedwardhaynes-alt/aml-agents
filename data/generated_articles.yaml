  full_article: "The Hong Kong Monetary Authority issued a scam alert on 22 May 2026\
    \ warning the public of fraudulent communications impersonating licensed banks,\
    \ a reminder that authorised institutions operating under the Banking Ordinance\
    \ remain among the most systematically mimicked entities in social-engineering\
    \ fraud campaigns targeting retail customers and, increasingly, business accounts.\n\
    \nHong Kong's exposure to impersonation scams has escalated in step with the city's\
    \ digitalisation of financial services. The HKMA's Supervisory Policy Manual and\
    \ its associated circulars have long required authorised institutions to maintain\
    \ robust customer authentication controls and to publicise fraud awareness through\
    \ the Hang Seng Index-era Scameter tool, operated in conjunction with the Hong\
    \ Kong Police Force. Under the Anti-Money Laundering and Counter-Terrorist Financing\
    \ Ordinance (AMLO), institutions are also expected to embed fraud typology awareness\
    \ into their ongoing customer due diligence and transaction monitoring frameworks,\
    \ given that proceeds of scam activity constitute an unlawful conduct predicate\
    \ under the Organised and Serious Crimes Ordinance (OSCO) Section 25.\n\nFor MLROs\
    \ and heads of financial crime compliance, such alerts carry operational weight\
    \ beyond public communications. A confirmed uptick in bank-impersonation activity\
    \ should prompt a review of Suspicious Transaction Report (STR) thresholds for\
    \ mule-account indicators, since victim funds transferred under false pretences\
    \ typically transit retail accounts within hours of deception. Institutions with\
    \ retail and SME books should consider whether their staff scripting for inbound\
    \ customer calls adequately distinguishes genuine HKMA or bank contact from spoofed\
    \ equivalents, particularly given the growing use of AI-generated voice cloning\
    \ in regional fraud typologies identified by the FATF in its 2024\u20132025 work\
