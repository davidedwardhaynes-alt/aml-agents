    \ with divergent monetary policy stances\u2014a risk category FATF Recommendation\
    \ 14 and associated guidance address directly.\n\nThe hold decision itself is\
    \ unlikely to trigger immediate supervisory action, but MLROs would be prudent\
    \ to document their consideration of the macro environment within their annual\
    \ MLRO reports and firm-wide risk assessments, particularly as the FCA has signalled\
    \ greater scrutiny of the quality of risk assessment methodology rather than its\
    \ mere existence."
