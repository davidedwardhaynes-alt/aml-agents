  full_article: "The accelerating adoption of tokenised real-world assets is reshaping\
    \ the compliance perimeter for financial institutions in ways that existing AML\
    \ frameworks were not designed to anticipate. As blockchain-native representations\
    \ of bonds, money-market funds, and private credit instruments begin to trade\
    \ with the liquidity characteristics once associated only with exchange-traded\
    \ funds, the transaction monitoring and customer due diligence obligations attached\
    \ to those assets do not diminish \u2014 they multiply across a more fragmented\
    \ and pseudonymous infrastructure.\n\nThe analogy to the ETF revolution is instructive\
    \ precisely because of what that earlier structural shift revealed about regulatory\
    \ lag. When ETFs democratised access to institutional-grade asset classes through\
    \ the 1990s and 2000s, supervisors in major jurisdictions spent years recalibrating\
    \ their market conduct and custody frameworks to match the new distribution architecture.\
    \ Tokenisation presents a compressed version of that challenge. FATF's updated\
    \ Guidance on Virtual Assets and Virtual Asset Service Providers, alongside Recommendation\
    \ 15 obligations on new technologies, already requires countries to assess and\
    \ mitigate risks before new products are deployed, not after market structure\
    \ has hardened.\n\nFor MLROs at traditional asset managers and custodian banks\
    \ now being pulled into tokenisation pilots, the immediate compliance tension\
    \ is jurisdictional. A tokenised money-market fund that settles on a permissioned\
    \ distributed ledger may pass through wallet addresses in Singapore, Luxembourg,\
    \ and the Cayman Islands within a single redemption cycle. MAS Notice SFA 04-N02\
    \ and the relevant provisions of the Payment Services Act create obligations at\
    \ the Singapore node; AMLD6 equivalents attach elsewhere. Determining which obligated\
    \ entity owns the suspicious transaction report at each hop is not a hypothetical\
    \ \u2014 it is already a live question in several cross-border pilots.\n\nSecondary\
    \ market liquidity, the precise feature that makes tokenisation structurally analogous\
    \ to ETFs, also introduces the velocity problem familiar from crypto-asset monitoring:\
    \ assets that previously turned over quarterly can now move in seconds, compressing\
    \ the window for transaction screening against sanctions lists maintained under\
    \ frameworks such as OFAC's SDN regime or the UN-derived lists embedded in jurisdictional\
    \ AML legislation.\n\nSupervisors including MAS, the FCA, and ESMA have signalled\
    \ openness to innovation through sandbox and pilot frameworks, but none has yet\
    \ produced durable, asset-class-specific AML guidance for secondary tokenised-asset\
    \ markets. Institutions building compliance architectures today are therefore\
    \ writing internal policy against a regulatory baseline that remains provisional\
    \ \u2014 a position that demands conservative assumptions and close engagement\
    \ with supervisors before liquidity, and risk, scale."
