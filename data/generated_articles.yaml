  full_article: "From 13 July 2026, Amazon Web Services EMEA SARL, Google Cloud EMEA\
    \ Limited, Microsoft Ireland Operations Ltd, and Oracle Corporation UK Limited\
    \ will fall under direct regulatory oversight by the Bank of England, the Prudential\
    \ Regulation Authority, and the Financial Conduct Authority \u2014 the first exercise\
    \ of powers established under the Financial Services and Markets Act 2023, which\
    \ created the Critical Third Party (CTP) framework. The immediate implication\
    \ is that, for the first time, systemic technology concentration risk in UK financial\
    \ services will be subject to enforceable standards rather than voluntary best\
    \ practice.\n\nThe designation fills a structural gap that regulators and the\
    \ Financial Policy Committee had flagged repeatedly since the 2017 Bank of England\
    \ Discussion Paper on operational resilience. Under existing firm-level frameworks\
    \ \u2014 including the PRA and FCA's operational resilience rules that took full\
    \ effect in March 2025 \u2014 regulated entities were required to map and stress-test\
    \ their important business services, including dependencies on cloud infrastructure.\
    \ However, the regulator's reach stopped at the boundary of the financial firm\
    \ itself. The CTP regime extends supervisory jurisdiction upstream, directly to\
    \ the provider, addressing what FATF Recommendation 18 and the broader international\
    \ operational resilience agenda have identified as a systemic blind spot in third-party\
    \ risk governance.\n\nFor MLROs and financial crime compliance functions, the\
    \ development carries indirect but material consequences. Cloud infrastructure\
    \ underpins transaction monitoring systems, sanctions screening engines, and data\
    \ analytics platforms. A disruption to a designated CTP affecting those capabilities\
    \ would not, of itself, suspend a firm's obligations under the Proceeds of Crime\
    \ Act 2002 or the Money Laundering Regulations 2017; firms would still be expected\
    \ to maintain adequate controls and evidence-based decision-making throughout\
    \ any outage. Compliance leaders should therefore review their important business\
    \ service mapping to confirm that CTP-provided infrastructure is explicitly scoped\
    \ within their resilience testing, and that contingency arrangements address regulatory\
    \ reporting continuity.\n\nFor the four designated entities, the regime introduces\
    \ a proportionate but direct supervisory relationship, including information-gathering\
    \ powers and, ultimately, directions the regulators may issue to address systemic\
    \ risk. The model draws conceptually from approaches taken in Singapore under\
    \ MAS Notice 654 on technology risk and the EU's Digital Operational Resilience\
    \ Act, suggesting growing international convergence on direct oversight of critical\
    \ service providers rather than reliance solely on bilateral contractual obligations.\n\
    \nThe four initial designations are unlikely to represent the ceiling of the programme.\
    \ Treasury retains discretion to designate further entities, and as AI-driven\
    \ infrastructure and data analytics providers deepen their penetration of core\
    \ financial services, the perimeter of the CTP framework will face continuing\
    \ pressure to expand."
