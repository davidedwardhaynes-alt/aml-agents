    \ MLRO would need to resolve before integration. Kalshi, by contrast, operates\
    \ under CFTC oversight with KYC requirements aligned to existing derivatives frameworks,\
    \ presenting a more tractable compliance profile, though not without complexity.\
    \ Any merger filing in a regulated jurisdiction would likely trigger scrutiny\
    \ from prudential and conduct supervisors regarding fitness of the combined entity's\
    \ financial crime controls.\n\nFrom a supervisory perspective, consolidation could\
    \ paradoxically improve AML outcomes if it channels fragmented, lightly-regulated\
    \ volume onto platforms with robust transaction monitoring and suspicious activity\
    \ reporting obligations. The counterfactual\u2014continued fragmentation across\
