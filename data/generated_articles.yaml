    \ attrition from the traditional fleet and compressing the income streams that\
    \ service those loans.\n\nThe financial-crime compliance dimension is not immediately\
    \ obvious but is consequential. Taxi licences have for decades functioned as collateral\
    \ assets in Hong Kong's informal lending ecosystem, with some transactions historically\
    \ structured outside licensed deposit-taking institutions. Under the Anti-Money\
    \ Laundering and Counter-Terrorist Financing Ordinance (Cap. 615), money lenders\
    \ are subject to customer due diligence and suspicious transaction reporting obligations,\
    \ yet enforcement coverage across smaller, non-bank lenders has been uneven. A\
    \ wave of distressed licence sales \u2014 assets whose valuations are declining\
    \ rapidly and whose market liquidity is thinning \u2014 creates conditions that\
    \ FATF Recommendation 1 would identify as elevated risk: motivated sellers, compressed\
    \ transaction timelines, and reduced arm's-length price discovery.\n\nFor licensed\
    \ banks carrying taxi-licence-secured loan books, the immediate concern is credit\
    \ provisioning rather than financial crime per se. However, secondary market activity\
    \ during a distressed selldown warrants scrutiny. Rapid transfers of depreciating\
    \ assets between connected parties, or transactions structured to extract residual\
    \ value ahead of default, can exhibit layering characteristics that trigger reporting\
    \ obligations under section 25A of the Organised and Serious Crimes Ordinance\
    \ (OSCO). Institutions should ensure their real-asset collateral monitoring frameworks\
    \ are calibrated to flag abnormal velocity or pricing in the taxi-licence segment.\n\
    \nThe Monetary Authority of Hong Kong has previously communicated expectations\
    \ around sector-specific risk appetite in property-adjacent lending; similar supervisory\
    \ attention to vehicle-licence collateral books would be a proportionate response\
    \ to current market dynamics. As the ride-hailing transition reshapes Hong Kong's\
    \ point-to-point transport economics over the next 18 to 24 months, compliance\
