  full_article: "The Bank for International Settlements has published findings from\
    \ Project Agora confirming that a functional prototype for programmable, tokenised\
    \ wholesale cross-border payments is technically viable \u2014 a result that carries\
    \ direct implications for how financial institutions design transaction monitoring\
    \ and correspondent banking controls in a tokenised environment.\n\nProject Agora,\
    \ which brought together seven central banks including the Bank of France, Bank\
    \ of Japan, and Bank of Korea alongside a consortium of private financial institutions\
    \ coordinated by the Institute of International Finance, was conceived to test\
    \ whether tokenised commercial bank deposits and central bank money could be unified\
    \ on a single programmable platform. The project sits within a broader BIS agenda\
    \ that includes the mBridge multi-CBDC corridor and responds to longstanding FATF\
    \ concerns \u2014 articulated most sharply in its 2023 targeted update on virtual\
    \ assets \u2014 that programmability and disintermediation in payment rails create\
    \ identifiable gaps in transaction transparency and beneficial ownership traceability.\n\
    \nFor MLROs and heads of financial crime compliance, the findings present a nuanced\
    \ operational question. Programmable payments executed through smart contracts\
    \ can, in principle, embed compliance logic directly into settlement \u2014 automating\
    \ sanctions screening triggers or restricting fund flows to permissioned counterparties.\
    \ That is the optimistic reading. The more cautious view, consistent with guidance\
    \ under FATF Recommendation 16 on the travel rule, is that tokenised wholesale\
    \ flows must still transmit originator and beneficiary information reliably across\
    \ jurisdictions with inconsistent implementation standards. A prototype demonstrating\
    \ technical feasibility does not resolve the legal interoperability problem: a\
    \ payment settled on a unified ledger may still cross between jurisdictions where\
    \ travel rule obligations differ materially, as they do between MAS Notice PSN02,\
    \ the EU's Transfer of Funds Regulation, and frameworks still under development\
    \ across Southeast Asia and Latin America.\n\nSupervisors will also note that\
    \ programmable settlement compresses the window for pre-settlement intervention,\
    \ a point relevant to obligations under correspondent banking due diligence frameworks\
    \ and real-time gross settlement controls operated by national central banks.\
    \ If finality is near-instantaneous, the sequencing assumptions embedded in existing\
    \ AML/CTF controls \u2014 screen, hold, release \u2014 require reconsideration.\n\
    \nThe Agora findings are best understood as a proof of engineering rather than\
    \ a proof of compliance readiness. The harder work of aligning programmable payment\
    \ architecture with FATF standards, domestic AML legislation, and supervisory\
    \ expectations around record-keeping and suspicious transaction reporting is the\
    \ task that now falls to the private sector participants and their regulators."
