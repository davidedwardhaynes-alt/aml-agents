  full_article: "State Street has launched a money market fund explicitly designed\
    \ to capture reserve assets held by stablecoin issuers, positioning one of the\
    \ world's largest custodians and fund administrators directly in the infrastructure\
    \ layer underpinning dollar-denominated digital assets. The move signals that\
    \ institutional asset managers now regard stablecoin reserve mandates as a material,\
    \ bankable revenue line rather than a peripheral custody curiosity.\n\nThe timing\
    \ is deliberate. Global stablecoin supply has expanded considerably since FATF\
    \ updated its guidance on virtual assets in 2023, and several major jurisdictions\
    \ have since enacted or finalised reserve-backing requirements. The EU's Markets\
    \ in Crypto-Assets Regulation mandates that e-money token issuers hold reserves\
    \ in segregated, liquid instruments; Singapore's MAS Notice PSN08 under the Payment\
    \ Services Act imposes comparable reserve asset and custody standards; and pending\
    \ US federal stablecoin legislation has consistently pointed toward high-quality\
    \ liquid assets\u2014including government money market funds\u2014as permissible\
    \ reserve vehicles. State Street's product appears engineered to satisfy multiple\
    \ regulatory frameworks simultaneously.\n\nFor compliance professionals, the development\
    \ sharpens existing obligations rather than creating new ones. Stablecoin issuers\
    \ onboarding to institutional fund structures must demonstrate that reserve assets\
    \ are genuinely segregated, bankruptcy-remote, and free from encumbrance\u2014\
    requirements that map directly onto FATF Recommendation 15's expectation that\
    \ virtual asset service providers maintain adequate safeguards over client assets.\
    \ MLROs at issuer firms will need to revisit their risk assessments to account\
    \ for the additional counterparty and concentration exposures introduced when\
    \ a single fund manager holds a significant portion of reserves. Beneficial ownership\
    \ transparency across fund units will also require scrutiny under applicable AML/CTF\
    \ frameworks, including relevant AMLA provisions and the AML/CTF Act where Australian\
    \ issuers are concerned.\n\nFor supervisors, the institutionalisation of stablecoin\
    \ reserves into regulated fund structures is broadly welcome: it improves auditability,\
    \ shortens the distance between reserve assets and recognised oversight regimes,\
    \ and reduces the opacity that characterised early reserve management practices\
    \ at some issuers. The residual concern is systemic. Concentration of stablecoin\
    \ reserves within a small number of fund complexes creates correlated redemption\
    \ risk; a stress event affecting one major issuer could generate outflows that\
    \ pressure the very instruments used as reserves by others. Regulators designing\
    \ reserve frameworks would be prudent to address concentration limits explicitly,\
    \ rather than assuming diversification will emerge organically from market incentives."
