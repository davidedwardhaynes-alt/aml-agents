    \ sector absorbs trust deficits it did not create.\n\nThe FCA's current response\
    \ is primarily consumer-education focused, directing young drivers to verify broker\
    \ status on the Financial Services Register. That is necessary but insufficient\
    \ at scale. Sustainable mitigation will require closer engagement with platform\
    \ operators on fraudulent financial promotions \u2014 a lever the FCA has used\
    \ with increasing assertiveness since the Online Safety Act 2023 created clearer\
    \ obligations for user-generated content hosting. Whether platforms respond proportionately\
    \ to that pressure, rather than to individual takedown requests, will determine\
    \ how much this distribution channel narrows over the coming supervisory cycle."
