    \ each of which directly undermines customer due diligence controls under Regulation\
    \ 28 of the MLRs. Transaction monitoring systems trained on historical typologies\
    \ are also vulnerable to adversarial inputs that exploit model blind spots, a\
    \ risk that Skilled Person reviews under FCA Section 166 powers may increasingly\
    \ scrutinise.\n\nAML supervisors face a parallel challenge. The joint alert implicitly\
    \ raises the question of whether current supervisory examination frameworks adequately\
    \ assess firms' resilience to AI-generated financial crime, as distinct from conventional\
    \ cyber risk. The Prudential Regulation Authority's operational resilience rules,\
