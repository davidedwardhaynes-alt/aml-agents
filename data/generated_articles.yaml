    \ environment.\n\nThe expectation that AI would render large segments of the financial\
    \ workforce redundant gained significant traction between 2022 and 2025, as generative\
    \ and agentic AI tools were rapidly adopted across transaction monitoring, name-screening,\
    \ and adverse media review. Regulators were not indifferent to the trend: MAS\
    \ Notice 626 and its equivalents across FATF member jurisdictions implicitly require\
    \ that automated systems be subject to adequate human oversight, and FATF Recommendation\
    \ 1 \u2014 the risk-based approach \u2014 demands contextual judgement that static\
    \ algorithmic outputs cannot fully replicate. The compliance function, in particular,\
    \ was never a plausible candidate for full automation precisely because it carries\
    \ personal accountability obligations under regimes such as Singapore's AMLA,\
    \ Hong Kong's OSCO, and Australia's AML/CTF Act.\n\nFor MLROs and Heads of FCC,\
    \ the survey's conclusions are likely to reinforce a governance posture many have\
    \ already adopted: AI as a force-multiplier for investigators rather than their\
    \ substitute. The practical implication is a recalibration of headcount strategy\
    \ away from pure reduction toward role redesign \u2014 fewer alert-review analysts\
    \ performing mechanical triage, more specialists capable of interrogating model\
    \ outputs, challenging false-negative rates, and constructing the narrative judgement\
    \ that suspicious transaction reports require. Regulators in Hong Kong, Singapore,\
    \ and the EU have each signalled, through thematic reviews and inspection findings,\
    \ that they expect firms to demonstrate explainability in automated decisions\
    \ and clear human escalation pathways.\n\nThe survey also has implications for\
    \ talent and training investment. If AI is compressing the lower tiers of compliance\
    \ work without eliminating the function, the skills gap at mid and senior levels\
    \ is likely to widen rather than narrow. Firms that treated AI adoption primarily\
    \ as a cost-reduction exercise may find themselves under-resourced precisely where\
    \ supervisory scrutiny \u2014 and material financial crime risk \u2014 concentrates.\
    \ The more durable institutional posture appears to be one in which technology\
    \ and experienced practitioners are treated as complements, a conclusion that\
    \ regulators promoting human-in-the-loop frameworks have implicitly anticipated\
    \ for some time."
