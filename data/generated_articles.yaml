  full_article: "UBS and blockchain engineering firm Nethermind have completed two\
    \ proofs of concept demonstrating that compliance screening \u2014 including sanctions\
    \ filtering and transaction monitoring \u2014 can be embedded directly into the\
    \ settlement layer of the public Ethereum network, without routing activity through\
    \ a permissioned sidechain. The immediate implication is that a systemically important\
    \ bank has moved meaningfully closer to treating a public blockchain as viable\
    \ infrastructure for regulated financial activity, rather than a conceptual aspiration.\n\
    \nThe backdrop matters. FATF's updated guidance on virtual assets, most recently\
    \ reinforced in its 2023 targeted update, has long required that financial institutions\
    \ applying the Travel Rule identify both originator and beneficiary information\
    \ before a virtual asset transfer is executed. On public blockchains, pseudonymity\
    \ and the absence of a central intermediary have made pre-transaction screening\
    \ structurally difficult. Regulators including MAS \u2014 under Notice PSN02 and\
    \ the Payment Services Act regime \u2014 and FINMA, which directly supervises\
    \ UBS, have expected institutions to resolve this tension before deploying public-chain\
    \ infrastructure at scale.\n\nThe UBS-Nethermind work suggests the tension may\
    \ be technically resolvable. By integrating compliance logic at the smart-contract\
    \ or node level \u2014 effectively building screening checkpoints that can query\
    \ sanctions lists and assess transaction risk before finality \u2014 the model\
    \ attempts to replicate the gatekeeping function that correspondent banks and\
    \ CSDs currently perform in traditional settlement. For MLROs at institutions\
    \ considering tokenised asset programmes, the practical question shifts from whether\
    \ public-chain compliance is possible to whether their own sanctions-screening\
    \ vendors and internal risk frameworks can be adapted to operate at the speed\
    \ and finality characteristics of on-chain settlement.\n\nThe model also raises\
    \ governance questions that the proofs of concept will not have fully resolved.\
    \ Who bears liability when a smart contract executes a transaction that a screening\
    \ oracle failed to flag? How are false positives handled when on-chain finality\
    \ is near-instantaneous? Under AMLA obligations in Switzerland, or equivalent\
    \ suspicious transaction reporting duties in other jurisdictions, the auditability\
    \ of automated compliance decisions will face scrutiny from supervisors accustomed\
    \ to human-reviewed alert queues.\n\nWhether UBS pursues production deployment\
    \ will depend as much on regulatory comfort letters from FINMA and coordinated\
    \ guidance from FATF on embedded compliance architectures as on further technical\
    \ iteration. The proofs of concept are a credible signal that public-chain infrastructure\
    \ can be compliance-aware; they are not yet evidence that supervisors are prepared\
    \ to accept it as compliance-sufficient."
