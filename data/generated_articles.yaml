    \ estate agents and solicitors in particular \u2014 as a sector requiring stronger\
    \ AML/CFT controls. The subsequent revisions to the Anti-Money Laundering and\
    \ Counter-Terrorist Financing Ordinance (AMLO), alongside the Estate Agents Authority's\
