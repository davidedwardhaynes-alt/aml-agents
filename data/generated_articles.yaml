    \ by a regulated institution can, without the issuer's direct involvement, be\
    \ routed through decentralised protocols that obscure beneficial ownership \u2014\
    \ a scenario that triggers obligations under FATF's Interpretive Note to Recommendation\
    \ 16 but for which most banks lack detection capability. Third, cross-chain bridge\
    \ activity, already cited by FinCEN and the UK's National Crime Agency as a preferred\
