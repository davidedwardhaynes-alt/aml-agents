    \ yet the UK's existing regulatory perimeter \u2014 built around principles-based\
    \ conduct obligations, SYSC senior manager accountability frameworks, and static\
    \ risk-based AML models \u2014 was not designed for environments where autonomous\
    \ agents execute decisions in milliseconds and retrain on live market data. The\
    \ FATF Recommendations, similarly, were conceived around human-supervised transaction\
    \ monitoring; Recommendation 10 on customer due diligence and Recommendation 20\
