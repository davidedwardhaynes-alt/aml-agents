  full_article: "Vietnam's National Citizen Commercial Joint Stock Bank (NCB) has\
    \ launched VietQR Global, a cross-border QR payment service enabling international\
    \ visitors to transact with local merchants using home-country banking apps and\
    \ digital wallets \u2014 a development that extends the country's domestic interbank\
    \ QR infrastructure into the correspondent payments space and brings with it a\
    \ set of AML compliance considerations that financial crime officers will need\
    \ to address systematically.\n\nVietQR was established under the State Bank of\
    \ Vietnam's (SBV) broader push toward a cashless economy, building on the National\
    \ Payment Corporation of Vietnam (NAPAS) infrastructure. Cross-border QR linkages\
    \ have precedent across the region \u2014 ASEAN's Project Nexus and bilateral\
    \ arrangements connecting Singapore's PayNow with Thailand's PromptPay, Malaysia's\
    \ DuitNow, and India's UPI have progressively normalised the model. NCB's integration,\
    \ which currently supports Chinese payment applications, follows a pattern in\
    \ which inbound tourism flows drive demand for frictionless retail payment acceptance\
    \ before the compliance architecture has fully matured.\n\nFor MLROs at correspondent\
