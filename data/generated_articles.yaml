  full_article: "The Financial Stability Board published final guidance on 29 April\
    \ 2026 clarifying which insurers fall within the scope of recovery and resolution\
    \ planning requirements under its Key Attributes of Effective Resolution Regimes,\
    \ the 2011 framework that has long served as the global standard for managing\
    \ the orderly failure of systemically important financial institutions. The guidance\
    \ establishes explicit criteria for national authorities to apply when assessing\
    \ individual insurers and identifies circumstances in which recovery and resolution\
    \ planning must apply without exception \u2014 closing an interpretive gap that\
    \ has allowed materially different implementation approaches across FSB member\
    \ jurisdictions.\n\nThe Key Attributes were extended to insurers following the\
    \ designation of Global Systemically Important Insurers under the IAIS methodology,\
    \ a process that itself underwent significant revision between 2019 and 2022 when\
    \ the G-SII framework was replaced by the Holistic Framework. That transition\
    \ shifted supervisory focus toward activity-based systemic risk assessment rather\
    \ than entity-based designation alone, but left residual ambiguity about which\
    \ non-G-SII insurers warranted full resolution planning discipline. The FSB's\
    \ final report directly addresses that ambiguity by providing criteria \u2014\
    \ including balance sheet size, cross-border interconnectedness, substitutability\
    \ of products, and the complexity of group structures \u2014 that mirror the proportionality\
    \ logic embedded in the IAIS Insurance Core Principles, particularly ICP 12 on\
    \ winding-up and ICP 25 on supervisory cooperation.\n\nFor MLROs and financial\
    \ crime compliance officers, the immediate operational relevance lies in counterparty\
    \ and correspondent risk assessment. Insurers now subject to formal recovery and\
    \ resolution planning are likely to face heightened scrutiny of their group-wide\
    \ governance, data integrity, and liquidity stress frameworks \u2014 disciplines\
    \ that intersect directly with AML/CFT programme robustness under FATF Recommendation\
    \ 18, which requires financial groups to implement group-wide compliance programmes.\
    \ Resolution planning exercises, when conducted rigorously, frequently expose\
    \ deficiencies in legal entity mapping and beneficial ownership data that are\
    \ equally material to financial crime risk management.\n\nFor prudential supervisors\
    \ and resolution authorities, the guidance reduces the risk of coordination failures\
    \ in a cross-border insurer stress scenario \u2014 a concern the FSB has flagged\
    \ repeatedly since the near-failure of certain monoline and reinsurance entities\
    \ during the 2008 crisis. Whether jurisdictions with less developed insurance\
    \ resolution regimes, particularly across Southeast Asia and parts of the Middle\
    \ East, will legislate the necessary statutory powers within a meaningful timeframe\
    \ remains the central implementation question."
