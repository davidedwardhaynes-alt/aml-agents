    \ young-adult customer segments, which present distinct detection challenges given\
    \ lower baseline transaction volumes.\n\nThe broader trajectory warrants attention.\
    \ As Australian authorities pursue charges at earlier stages of alleged planning,\
    \ the evidentiary role of financial intelligence in prosecutions is likely to\
    \ grow, placing greater weight on the quality and timeliness of SMR submissions.\
    \ Compliance functions that treat terrorism financing reporting as residual to\
