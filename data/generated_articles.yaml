    \ Act 2002 and the Money Laundering, Terrorist Financing and Transfer of Funds\
    \ Regulations 2017.\n\nCaptives\u2014insurance subsidiaries established by corporates\
    \ to underwrite their own risks\u2014have historically clustered in jurisdictions\
