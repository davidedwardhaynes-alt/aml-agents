    \ dual burden. Entering a new jurisdiction triggers obligations under home-country\
    \ frameworks \u2014 PCMLTFA requirements for Canadian-chartered banks, AMLA provisions\
    \ for entities regulated under Hong Kong's Securities and Futures Ordinance and\
    \ OSCO, or Part 7 of the UK's Proceeds of Crime Act for FCA-authorised firms operating\
    \ cross-border \u2014 while simultaneously requiring rapid build-out of local\
    \ customer due diligence, suspicious transaction reporting, and sanctions screening\
    \ capabilities calibrated to the host regulator's expectations. Where expansion\
    \ is achieved through branches or representative offices rather than locally incorporated\
    \ entities, the supervisory perimeter and accountability mapping become correspondingly\
