    \ increasing both false-positive rates and the risk of missing genuinely anomalous\
    \ flows that constitute a smaller proportion of a shrinking total. Firms subject\
    \ to AUSTRAC reporting obligations under the Anti-Money Laundering and Counter-Terrorism\
    \ Financing Act 2006, or to FinCEN's Bank Secrecy Act requirements, should review\
