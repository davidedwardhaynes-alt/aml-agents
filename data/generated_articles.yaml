    \ \u2014 a development with direct implications for how regulated firms approach\
    \ AI governance obligations under the FCA and PRA's joint model risk management\
    \ expectations set out in SS1/23.\n\nThe deployment sits within a regulatory environment\
    \ that has grown considerably more prescriptive around model risk. The FCA's Consumer\
    \ Duty, in force since July 2023, requires firms to evidence good outcomes at\
    \ the individual customer level, creating demand for AI tooling that can process\
