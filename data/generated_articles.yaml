    \ financial crime risk assessments that factor in institutional stability. Separately,\
    \ supervisors will note that prolonged consumer detriment and eroded trust in\
    \ credit intermediaries historically correlate with elevated fraud and mis-selling\
    \ risk in adjacent markets.\n\nFrom an investor and market-conduct perspective,\
