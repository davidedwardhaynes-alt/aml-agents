    \ by HM Treasury under the Financial Services and Markets Act 2023. The move marks\
    \ the first time UK financial regulators have exercised statutory supervisory\
    \ authority over entities that are not themselves regulated firms, closing a long-identified\
    \ gap in the operational resilience framework.\n\nThe CTP regime was introduced\
    \ through FSMA 2023 in direct response to systemic risk concerns exposed by cloud\
    \ concentration risk and a series of high-profile third-party outages affecting\
    \ multiple financial institutions simultaneously. HM Treasury holds designation\
    \ powers, but day-to-day supervisory activity \u2014 including the ability to\
    \ gather information, conduct testing, and ultimately recommend sanctions \u2014\
    \ passes to the tripartite regulatory authorities. The framework draws conceptual\
    \ parallels with the EU's Digital Operational Resilience Act (DORA), which has\
    \ applied to financial entities and their critical ICT providers across the bloc\
    \ since January 2025, though the UK regime is broader in that it extends beyond\
    \ ICT to any third party deemed systemic.\n\nFor MLROs and financial crime compliance\
