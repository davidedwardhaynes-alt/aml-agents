  full_article: "Coinbase has launched a dedicated account infrastructure allowing\
    \ autonomous AI agents to hold balances, execute trades, and initiate payments\
    \ without real-time human authorisation \u2014 a product configuration that places\
    \ customer due diligence, transaction monitoring, and beneficial ownership attribution\
    \ under immediate pressure across every jurisdiction where the exchange operates.\n\
    \nThe development arrives as the Financial Action Task Force's guidance on virtual\
    \ assets already struggles to keep pace with programmable finance. FATF Recommendation\
    \ 16 on wire transfers and its 2021 updated Virtual Assets guidance both presuppose\
    \ a human originator capable of being identified and held accountable. AI-agent-initiated\
    \ transactions complicate that assumption materially: where the legal and beneficial\
    \ owner of a wallet is a natural person but the transacting entity is software\
    \ acting on delegated logic, the chain of accountability that Travel Rule compliance\
    \ depends upon becomes genuinely ambiguous. MAS Notice PSN02 and its accompanying\
    \ guidelines similarly anchor CDD obligations to identifiable persons behind each\
    \ instruction.\n\nFor MLROs at exchanges and payment institutions with Coinbase\
    \ connectivity, the first-order question is whether incoming transactions originating\
    \ from agent accounts can be distinguished at the protocol level, and whether\
    \ the account holder's KYC status can be reliably inherited by agent-initiated\
    \ flows. Transaction monitoring systems calibrated to human behavioural baselines\
    \ \u2014 velocity thresholds, time-of-day patterns, counterparty clustering \u2014\
    \ may generate significant false-negative rates against the high-frequency, deterministic\
    \ patterns that algorithmic agents produce. AUSTRAC has noted analogous risks\
    \ in automated crypto arbitrage contexts under the AML/CTF Act 2006, and the FCA's\
    \ 2025 guidance on cryptoasset financial promotions gestured at the accountability\
    \ gap created by intermediating software.\n\nA secondary concern is sanctions\
    \ screening latency. Agent accounts can execute in milliseconds; OFAC, UN, and\
    \ EU consolidated-list screening integrated into human-approval workflows may\
    \ not be architecturally capable of blocking or flagging transactions at that\
    \ speed without re-engineering the screening stack.\n\nCoinbase's product almost\
    \ certainly passes legal muster in the United States under existing FinCEN MSB\
    \ registration \u2014 the account holder remains the registered customer \u2014\
    \ but regulatory tolerance for that interpretation is unlikely to be uniform.\
    \ The Hong Kong SFC's VASP licensing conditions and Singapore's MAS licensing\
    \ framework both vest compliance responsibility with the licensed entity, meaning\
    \ Coinbase bears the residual obligation to demonstrate that agent-driven activity\
    \ is as controllable and auditable as human-driven activity. Whether current rule-sets\
    \ are adequate to that task is a question supervisors in those jurisdictions will\
    \ be asking sooner rather than later."
