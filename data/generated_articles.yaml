    \ \u2014 implemented through EMIR and EMIR Refit in Europe, the Dodd-Frank Act\
    \ in the United States, and equivalent frameworks in Asia-Pacific including MAS\
    \ Notice SFA 04-N12 in Singapore and the ASIC Derivative Transaction Rules in\
    \ Australia. FATF's guidance on financial institutions' exposure to complex instruments\
    \ further underscores that derivatives desks remain a supervisory focus area,\
    \ particularly where product complexity can obscure beneficial ownership or facilitate\
    \ layering.\n\nFor MLROs and heads of financial crime compliance, the ISDA calendar\
