  full_article: "Hong Kong's national security certification framework has gained\
    \ renewed attention following the enactment of subsidiary legislation clarifying\
    \ procedural requirements for non-national security offences that nonetheless\
    \ engage national security considerations \u2014 a distinction with direct consequences\
    \ for how financial institutions and their compliance functions navigate customer\
    \ risk assessments and suspicious transaction reporting obligations.\n\nThe 2020\
    \ National Security Law granted the Chief Executive authority to issue certificates\
    \ determining whether specific acts involve national security matters, effectively\
    \ placing that gateway determination within the executive branch rather than the\
    \ judiciary. This architecture mirrors approaches adopted in other common law\
    \ jurisdictions, including the United Kingdom's use of public interest immunity\
    \ certificates and Singapore's Internal Security Act framework, where executive\
    \ discretion over national security classification has long been accepted as constitutionally\
    \ coherent, if politically contested.\n\nFor MLROs operating in Hong Kong, the\
    \ practical implication is layered. Under the Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance (Cap. 615) and the HKMA's Supervisory Policy Manual AML/CFT\
    \ guidance, institutions are already required to screen for proceeds connected\
    \ to serious crimes, a category that explicitly includes offences under the NSL.\
    \ Where executive certification determines whether a matter crosses the national\
    \ security threshold, compliance teams face a structural information asymmetry:\
    \ the certification is an executive instrument, not a public judicial finding,\
    \ limiting the evidentiary basis on which internal risk committees can document\
    \ and defend their assessments. The FATF Recommendation 1 risk-based approach\
    \ requires proportionate responses calibrated to assessed risk, but calibration\
    \ depends on accessible risk indicators.\n\nFrom a regulatory supervision perspective,\
    \ the SFC and HKMA retain their respective sector-level AML mandates regardless\
    \ of how national security classifications are handled at the executive level.\
    \ Institutions cannot treat executive ambiguity as a compliance safe harbour;\
    \ the obligation to file suspicious transaction reports under Section 25A of the\
    \ Organised and Serious Crimes Ordinance persists irrespective of whether a matter\
    \ has been formally certificated.\n\nThe broader question for compliance professionals\
    \ is less about the constitutional propriety of executive certification \u2014\
    \ courts across multiple jurisdictions have consistently upheld analogous powers\
    \ \u2014 and more about whether the procedural subsidiary legislation now in force\
    \ will generate sufficient transparency for regulated entities to embed defensible,\
    \ auditable decisions into their financial crime frameworks. That guidance remains,\
    \ at present, incomplete."
