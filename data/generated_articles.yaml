    \ III framework require banks to hold capital against market risk exposures calculated\
    \ from fair-value positions, the accuracy and timeliness of that pricing feeds\
    \ directly into regulatory reporting cycles. Latency in valuation has long been\
    \ a practical constraint on how frequently intraday risk positions can be recalculated.\n\
