  full_article: "Autonomous AI agents are now being deployed by criminal networks\
    \ to orchestrate fraud campaigns at scale, according to a BioCatch survey of 1,440\
    \ fraud management and financial crime professionals published in June 2026 \u2014\
    \ a development that materially complicates the behavioural and transactional\
    \ monitoring frameworks that most financial institutions built for human-paced\
    \ threat actors.\n\nThe emergence of agentic AI in fraud follows a recognisable\
    \ escalation curve. Earlier generative AI applications enabled more convincing\
    \ phishing lures and synthetic identity documents; agentic systems go further\
    \ by executing multi-step attack sequences \u2014 account enumeration, social\
    \ engineering, mule recruitment, and fund movement \u2014 with minimal human intervention.\
    \ This shifts the threat from opportunistic to systematic, and from detectable\
    \ anomalies to coordinated patterns that can be tuned in near real-time to evade\
    \ static rule sets. FATF's 2023 report on *Illicit Finance Risks of AI* flagged\
    \ precisely this trajectory, noting that automation would compress the time between\
    \ fraud conception and execution.\n\nFor MLROs and heads of financial crime compliance,\
    \ the operational implications are immediate and layered. Transaction monitoring\
    \ systems calibrated to human behavioural baselines \u2014 velocity thresholds,\
    \ time-of-day clustering, device consistency \u2014 are poorly suited to detecting\
    \ agent-driven activity, which can be deliberately throttled to remain below alert\
    \ triggers. MAS Notice 626 requires Singapore-licensed banks to maintain systems\
    \ commensurate with their risk exposure; if the threat model has materially changed,\
    \ the adequacy of existing controls is a supervisory question, not merely a technical\
    \ one. Similarly, institutions operating under Australia's AML/CTF Act or the\
    \ UK's Proceeds of Crime Act face analogous obligations to keep detection capabilities\
    \ current.\n\nThe mule-recruitment dimension deserves particular attention. Agentic\
    \ systems can automate outreach to potential money mules across social platforms\
    \ at a volume no human operation could sustain, widening the pool of unwitting\
    \ facilitators and generating SAR obligations that compliance teams may lack the\
    \ capacity to process meaningfully.\n\nThe practical response will require closer\
    \ convergence between cybersecurity and financial crime functions \u2014 a structural\
    \ separation that persists in many institutions despite longstanding regulatory\
    \ encouragement to integrate them. Vendors offering AI-based behavioural biometrics\
    \ argue, with some justification, that continuous behavioural signals are more\
    \ resilient to agent-driven fraud than transactional rules alone. Whether supervisors\
    \ will begin treating the adoption of such controls as a baseline expectation,\
    \ rather than a differentiator, is the more consequential question heading into\
    \ 2027 planning cycles."
