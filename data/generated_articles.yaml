    \ entities operating under MAS Notice PSN02, the EU's MiCA framework, or Australia's\
    \ AML/CTF Act obligations now hold or custody meaningful positions in both asset\
    \ classes, meaning that a single macro trigger propagates through compliance-relevant\
    \ flows simultaneously.\n\nFor MLROs, the immediate concern is layering detection.\
    \ When legitimate de-risking by institutional holders produces large, rapid movements\
    \ across both gold-linked products and virtual asset service providers, the volume\
    \ and velocity thresholds embedded in automated monitoring systems can generate\
    \ false-positive surges. Resources diverted to clearing that noise carry a direct\
    \ opportunity cost against genuinely suspicious activity. Supervisors under the\
