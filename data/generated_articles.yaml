    \ their MLROs to begin assessing operational and governance adjustments well ahead\
    \ of any final text.\n\nMMFs came under sustained supervisory scrutiny after the\
    \ March 2020 \"dash for cash\" episode, during which liquidity buffers at several\
    \ Low Volatility Net Asset Value and Short-Term Variable Net Asset Value funds\
    \ were tested to near-threshold levels, prompting emergency central bank intervention\
    \ across major markets. The Financial Stability Board and IOSCO subsequently issued\
    \ revised policy recommendations in 2021 calling for structural reforms \u2014\
    \ including revisiting liquidity thresholds, redemption tools, and the mechanistic\
    \ link between breaching liquidity minimums and fee or gate triggers \u2014 frameworks\
    \ that have since informed the EU's own MMF reform consultations and are now clearly\
    \ shaping the UK's approach.\n\nFor compliance and financial crime professionals\
    \ specifically, the reform trajectory carries distinct obligations. Changes to\
    \ fund structure, eligible assets, or liquidity classification can alter the customer\
    \ risk profile of MMFs used as cash-equivalent instruments by institutional clients,\
    \ potentially requiring updates to product-level risk assessments under the FCA's\
    \ existing financial crime systems and controls expectations set out in SYSC 6.3.\
    \ Firms using MMFs as short-term repositories for client money should also consider\
    \ whether revised fund categories affect their obligations under CASS or trigger\
    \ enhanced due diligence reviews for underlying investor flows.\n\nAsset managers\
    \ will face the more immediate structural burden: the FCA's commitment to issue\
    \ its own rules \u2014 rather than simply onshoring any Government legislation\
    \ verbatim \u2014 signals a period of parallel consultation in which the precise\
    \ calibration of liquidity requirements, stress-testing obligations, and disclosure\
    \ standards remains unsettled. The FCA has a history of diverging materially from\
    \ EU equivalents on fund regulation post-Brexit, as seen with the Long-Term Asset\
    \ Fund regime.\n\nWith the Government's legislation still at the pre-laying stage\
    \ and the FCA's accompanying rulebook yet to be consulted upon, compliance teams\
    \ would be prudent to engage early in any forthcoming consultation process rather\
    \ than wait for final text \u2014 a period that, based on prior FCA reform cycles,\
    \ could extend well into 2027."
