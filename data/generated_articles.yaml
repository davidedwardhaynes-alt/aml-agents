    \ Basel Committee's consultative work on the prudential treatment of AI-related\
    \ operational risk have collectively raised the regulatory baseline. The FSB event\
    \ signals an attempt to harmonise the upper tier of that baseline.\n\nFor MLROs\
    \ and heads of financial crime compliance, the immediate question is how the FSB's\
    \ sound practices will interact with existing AML/CTF obligations. Where institutions\
