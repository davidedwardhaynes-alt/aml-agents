    \ when the Markets in Crypto-Assets Regulation is consolidating the compliance\
    \ bar for digital-asset firms operating in Europe.\n\nThe licence adds to Zodia's\
    \ existing footprint, which includes registration with the UK Financial Conduct\
    \ Authority and operational presence in Ireland, and reflects a broader institutional\
    \ custody trend: firms seeking layered regulatory authorisations rather than relying\
    \ solely on crypto-specific regimes. MiCA, fully applicable since December 2024,\
    \ introduced a harmonised authorisation pathway for Crypto-Asset Service Providers,\
    \ but its scope does not fully overlap with payment services. A PI licence under\
    \ PSD2 \u2014 and its anticipated successor PSD3 \u2014 governs fund transfers,\
    \ account information services, and payment initiation, granting Zodia the legal\
    \ basis to handle fiat legs of crypto settlement flows, a capability increasingly\
