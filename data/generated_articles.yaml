  full_article: "Deployments of artificial intelligence in financial institutions\
    \ are generating measurable operational improvements in narrow use cases, but\
    \ a persistent gap between proof-of-concept enthusiasm and enterprise-scale risk\
    \ management remains a central preoccupation for compliance leaders, according\
    \ to discussion at EBAday 2026 in June.\n\nThe panel session reflected a broader\
    \ industry trajectory that regulators have been tracking closely. The European\
    \ Banking Authority's guidelines on internal governance, alongside the EU AI Act's\
    \ risk-based classification framework that came fully into force for high-risk\
    \ systems in 2026, have imposed explicit obligations on institutions to document\
    \ model purpose, validate outputs, and maintain human oversight \u2014 requirements\
    \ that sit uncomfortably with the speed at which business units have been piloting\
    \ generative and predictive AI tools. For AML and financial crime functions specifically,\
    \ FATF's guidance on the use of digital identity and data analytics, updated in\
    \ its 2023 Recommendation 1 interpretive note, signals that supervisors expect\
    \ explainability to be a condition of reliance, not an afterthought.\n\nFor MLROs\
    \ and heads of financial crime compliance, the practical tension is familiar.\
    \ AI-assisted transaction monitoring and name-screening can reduce false-positive\
    \ rates materially \u2014 figures cited in industry implementations have ranged\
    \ from 20 to 60 percent reduction \u2014 but those gains are contingent on clean,\
    \ well-governed training data and ongoing model validation. Where data lineage\
    \ is poor or model drift goes undetected, the compliance benefit can reverse,\
    \ creating liability under frameworks such as the UK's Proceeds of Crime Act,\
    \ Hong Kong's OSCO, or MAS Notice 626, all of which hold institutions to a standard\
    \ of adequate systems regardless of the technology underpinning them.\n\nEthics\
    \ governance has emerged as an equally live concern. Panellists at EBAday noted\
    \ that algorithmic bias in customer risk-scoring models carries potential conduct\
    \ and fair-treatment implications beyond the AML function, touching obligations\
    \ under consumer protection and non-discrimination regimes. Institutions that\
    \ deploy AI to assign enhanced due diligence triggers without auditable rationale\
    \ face questions not only from prudential supervisors but from data protection\
    \ authorities operating under GDPR and its national equivalents.\n\nThe trajectory\
    \ suggests that 2026 will be a year of consolidation rather than acceleration.\
    \ Institutions that invested in model risk management infrastructure \u2014 governance\
    \ committees, third-party validation, SR 11-7-equivalent model lifecycle controls\
    \ \u2014 are better positioned to satisfy both internal audit and supervisory\
    \ scrutiny as examination teams across the EU, UK, and Asia-Pacific continue to\
    \ develop AI-specific inspection methodologies."
