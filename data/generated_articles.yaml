    \ signal that the FSB regards the present reform cycle as a foundation rather\
    \ than a terminus.\n\nThe G20 Cross-Border Payments Roadmap, adopted in 2020,\
    \ set quantitative targets for cost, speed, transparency, and access to be achieved\
    \ by end-2027. Progress has been uneven. While wholesale corridors between major\
    \ financial centres have seen measurable throughput improvements through SWIFT's\
    \ ISO 20022 migration and interlinking of instant payment systems, retail and\
    \ remittance corridors serving emerging markets have lagged, with average transaction\
    \ costs remaining above the G20's 3 percent target in many corridors. The FSB's\
    \ own annual progress reports have consistently flagged data fragmentation, inconsistent\
    \ API standards, and compliance friction \u2014 particularly around correspondent\
    \ banking \u2014 as structural impediments.\n\nFor MLROs and financial crime compliance\
    \ teams, the call for a \"next chapter\" carries direct operational implications.\
    \ Cross-border payment reform intersects unavoidably with FATF Recommendation\
    \ 16 obligations on payment message data and the Recommendation 10 customer due\
    \ diligence framework. The persistent de-risking problem in correspondent banking\
    \ \u2014 documented in successive FATF typologies reports \u2014 is as much a\
    \ compliance cost and liability question as a commercial one. Any successor framework\
    \ that seeks to expand access will need to resolve how originator and beneficiary\
    \ data travels with transactions in real time across jurisdictions with materially\
    \ different AML/CFT supervisory standards, including those governed by MAS Notice\
