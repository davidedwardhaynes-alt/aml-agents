    \ subject to comprehensive sanctions \u2014 warrant a temporary uplift in transaction\
    \ monitoring sensitivity, particularly for OTC desks and P2P platforms where Iranian\
    \ nexus indicators may be obscured through layering via third-country wallets.\
    \ Second, under the travel rule obligations embedded in FATF Recommendation 15\
