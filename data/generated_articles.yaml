  full_article: "The prediction market sector in the United States faces a fragmented\
    \ and escalating legal landscape as of mid-2026, with Kalshi and its peers contesting\
    \ regulatory jurisdiction, contract classification, and consumer protection obligations\
    \ across multiple federal and state venues simultaneously. The immediate implication\
    \ for compliance officers is that the sector's AML and KYC obligations remain\
    \ structurally unresolved, creating material onboarding and monitoring risk for\
    \ any financial institution considering correspondent or custodial relationships\
    \ with these platforms.\n\nPrediction markets occupy an uncomfortable regulatory\
    \ seam in the United States. Designated contract markets registered with the Commodity\
    \ Futures Trading Commission, such as Kalshi, have long argued that their event\
    \ contracts fall under CFTC exclusive jurisdiction, insulating them from state\
    \ gaming laws and, critically, from the broker-dealer and money-transmission frameworks\
    \ that would otherwise trigger more prescriptive AML programme requirements under\
    \ the Bank Secrecy Act. The FATF Recommendations \u2014 particularly Recommendation\
    \ 15 on new technologies and virtual assets \u2014 have consistently called on\
    \ jurisdictions to ensure that novel financial products are not structured so\
    \ as to fall between supervisory regimes. The current U.S. litigation environment\
    \ suggests that gap has widened rather than narrowed.\n\nFor MLROs at banks, payment\
    \ processors, and digital-asset custodians, the practical consequence is one of\
    \ uncertainty compounding risk. Where a prediction market platform's supervisory\
    \ status is actively contested, a correspondent institution cannot rely on the\
    \ platform's own compliance programme satisfying the \"covered financial institution\"\
    \ standards under 31 CFR Part 1010. Enhanced due diligence, including source-of-funds\
    \ verification and transaction monitoring calibrated to the binary, event-driven\
    \ cash flows characteristic of these instruments, becomes a baseline prudential\
    \ expectation rather than an optional overlay.\n\nState attorneys general have\
    \ added a further dimension by challenging whether CFTC registration pre-empts\
    \ consumer protection and unlicensed-gambling statutes \u2014 arguments that,\
    \ if successful in any jurisdiction, could trigger reporting obligations under\
    \ state money-transmission licensing regimes with their own, often less harmonised,\
    \ AML requirements.\n\nThe resolution of these disputes will materially shape\
    \ whether prediction markets evolve into a regulated asset class with clear supervisory\
    \ homes or persist as a compliance liability for the broader financial ecosystem.\
    \ Supervisors in comparator jurisdictions \u2014 including MAS, which has taken\
    \ a measured approach to novel derivatives under the Securities and Futures Act\
    \ \u2014 will be watching whether U.S. courts and regulators ultimately opt for\
    \ jurisdictional clarity or continued ambiguity."
