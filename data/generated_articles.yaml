    \ 10 and its interpretive notes, reliance on publicly available information \u2014\
    \ including exchange filings \u2014 is a recognised component of CDD on corporate\
    \ customers. Any reduction in the granularity of mandated disclosures, particularly\
    \ around beneficial ownership, related-party transactions, or risk factors, could\
    \ narrow the evidentiary value of public filings as a CDD source, requiring institutions\
    \ to compensate through enhanced proprietary screening.\n\nSecurities regulators\
    \ and AML supervisors operate in parallel but not always coordinated frameworks.\
    \ The SEC's mandate centres on investor protection and market efficiency; FinCEN's\
