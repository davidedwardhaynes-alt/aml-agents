  full_article: "Legacy's launch of a consolidated charitable giving platform aggregating\
    \ more than 11,000 UK-registered charities into a single application raises immediate\
    \ questions about the customer due diligence and transaction monitoring obligations\
    \ that apply when a fintech intermediary sits between donors and recipient organisations\
    \ \u2014 many of which operate in high-risk jurisdictions or sectors flagged by\
    \ the Financial Action Task Force.\n\nThe non-profit and charitable sector has\
    \ occupied an uncomfortable position in the global AML architecture since FATF\
    \ revised Recommendation 8 in 2016, explicitly recognising that not-for-profit\
    \ organisations can be exploited for terrorist financing or funds diversion. In\
    \ the UK, the Charity Commission exercises supervisory oversight, but the AML\
    \ obligations on payment intermediaries are governed separately under the Money\
    \ Laundering, Terrorist Financing and Transfer of Funds (Information on Payers)\
    \ Regulations 2017, administered by HMRC for most payment firms, and the FCA for\
    \ those holding electronic money or payment institution licences. A platform processing\
    \ aggregated donor flows across thousands of counterparties must determine which\
    \ of those frameworks applies to its own licence permissions before it can define\
    \ the scope of its CDD programme.\n\nFrom a compliance perspective, the structural\
    \ challenge is layering. When a donor transacts through Legacy rather than directly\
    \ with a charity, the platform becomes a payment intermediary subject to transaction\
    \ monitoring obligations, while the charity \u2014 as the ultimate beneficiary\
    \ \u2014 may have limited capacity to conduct its own AML checks on donor source\
    \ of funds. Regulators and FIUs have consistently noted that aggregation models\
    \ compress the audit trail available to both the platform and the recipient. The\
    \ FATF June 2023 guidance on beneficial ownership and transparency explicitly\
    \ cautions supervisors about intermediated structures where beneficial ownership\
    \ of funds may not be visible at the point of disbursement.\n\nFrom a market integrity\
    \ standpoint, consolidating 11,000 charities also concentrates geographic and\
    \ sector risk onto a single platform. Charities engaged in overseas humanitarian\
    \ operations \u2014 particularly those active in conflict-affected or sanctioned\
    \ territories \u2014 require enhanced scrutiny under the UK's sanctions regime\
    \ administered by OFSI and, separately, under the Terrorism Act 2000's proscription\
    \ list. A platform of this scale will need a risk-based tiering framework that\
