  full_article: "The Financial Conduct Authority and the Bank of England published\
    \ a joint discussion paper on 18 May 2026 setting out a coordinated vision for\
    \ tokenisation in UK wholesale markets, signalling that the two regulators intend\
    \ to move in lockstep rather than allowing fragmented rulemaking to emerge across\
    \ securities settlement, payments infrastructure, and asset management. The immediate\
    \ implication for financial crime compliance officers is that wholesale market\
    \ participants will soon need to reconcile on-chain transaction monitoring with\
    \ obligations under the Proceeds of Crime Act 2002 and the Money Laundering, Terrorist\
    \ Financing and Transfer of Funds (Information on Payers) Regulations 2017, before\
    \ final rules are even in place.\n\nThe paper arrives against a backdrop of incremental\
    \ but cautious progress. The Bank's Digital Securities Sandbox, launched under\
    \ powers granted by the Financial Services and Markets Act 2023, has allowed a\
    \ small number of firms to test tokenised bond issuance and repo settlement under\
    \ modified regulatory conditions. FATF's updated guidance on virtual assets \u2014\
    \ and the associated Recommendation 15 travel rule obligations \u2014 already\
