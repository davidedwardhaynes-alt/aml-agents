    \ risk management lineage that satisfies both prudential and financial-crime supervisors.\
    \ In jurisdictions such as Singapore, where MAS Notice 1124 and the accompanying\
    \ Guidelines on Risk Management Practices already require documented model validation,\
    \ the FSB framework could add a cross-border interoperability dimension that currently\
