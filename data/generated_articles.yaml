  full_article: "The share of US Treasury repo transactions routed through central\
    \ counterparties has become a measurable compliance variable, not merely a market-structure\
    \ preference, following the SEC's expanded clearing mandate under amendments to\
    \ Rule 17Ad-22(e). ISDA's June 2026 indicators report, produced in collaboration\
    \ with Actrix, provides the first systematic public dataset tracking adoption\
    \ rates across dealer and non-dealer participants \u2014 giving compliance officers\
    \ a concrete benchmark against which to assess their institutions' progress and\
    \ counterparty exposure profiles.\n\nThe clearing mandate's trajectory dates to\
    \ December 2023, when the SEC finalised rules requiring eligible secondary market\
    \ transactions in US Treasury securities, including repo and reverse repo, to\
    \ be submitted to a covered clearing agency. The phased implementation timeline\
    \ placed cash transactions first, with repo obligations following. For financial\
    \ crime compliance professionals, the structural shift matters because centralised\
    \ clearing concentrates settlement risk, netting exposure, and \u2014 critically\
    \ \u2014 transaction visibility in ways that alter both the typology landscape\
    \ and the data available for suspicious transaction monitoring under frameworks\
    \ such as the Bank Secrecy Act and FinCEN's implementing rules.\n\nFor MLROs at\
    \ broker-dealers and prime brokers, the ISDA-Actrix indicators serve a dual function.\
    \ First, they establish an industry baseline that supervisors, including FINRA\
    \ and the SEC's examination staff, may reference when assessing whether a firm's\
    \ clearing participation rate reflects genuine operational progress or deliberate\
    \ avoidance. Second, higher clearing rates compress bilateral counterparty opacity:\
    \ transactions processed through the Fixed Income Clearing Corporation generate\
    \ standardised records that, in principle, support more consistent application\
    \ of transaction monitoring thresholds and behavioural analytics than fragmented\
    \ bilateral confirmations.\n\nFor buy-side participants \u2014 hedge funds, asset\
    \ managers, and foreign banking organisations with US repo desks \u2014 the indicators\
    \ highlight residual exposure in segments where clearing adoption remains incomplete.\
    \ Bilateral repo outside clearing still presents the layering and placement risks\
    \ associated with less transparent settlement chains, a concern consistent with\
    \ FATF Recommendation 40 on international cooperation and the expectation that\
    \ financial institutions maintain adequate visibility into the beneficial economic\
    \ substance of secured financing transactions.\n\nAs clearing participation rates\
    \ consolidate through 2026 and into the mandate's later phases, supervisory expectations\
    \ around transaction monitoring calibration for cleared versus non-cleared repo\
    \ are likely to diverge. Compliance functions that have not yet aligned their\
    \ risk appetite statements and monitoring rule-sets with the clearing status of\
    \ repo counterparties may find themselves behind the curve when examination cycles\
    \ resume."
