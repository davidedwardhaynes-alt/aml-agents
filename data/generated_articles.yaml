  full_article: "The convergence of cross-border payment infrastructure reform, shifting\
    \ customer behaviour, and embedded finance \u2014 discussed across three afternoon\
    \ panels at EBAday 2026 in June \u2014 carries direct implications for financial\
    \ crime compliance frameworks that risk being outpaced by the velocity of structural\
    \ change in correspondent banking and retail payment rails.\n\nThe backdrop is\
    \ well-established. The G20's cross-border payments roadmap, coordinated through\
    \ the Financial Stability Board and underpinned by FATF's revised Recommendation\
    \ 16 on payment transparency, has pushed institutions toward richer, faster data\
    \ flows \u2014 most visibly through the global migration to ISO 20022. Yet richer\
    \ data and faster settlement are a dual-edged instrument: they enhance transaction\
    \ monitoring capabilities while simultaneously compressing the detection windows\
    \ that compliance teams have historically relied upon to intervene before value\
    \ is transferred irrecoverably.\n\nFor MLROs and heads of financial crime compliance,\
    \ embedded finance presents a particular governance challenge. As payment initiation\
    \ migrates into non-bank environments \u2014 retail platforms, supply-chain applications,\
    \ vehicle operating systems \u2014 the originator and beneficiary data that underpins\
    \ FATF Recommendation 16 obligations and, in Southeast Asian jurisdictions, MAS\
    \ Notice PSN02 and equivalent AML/CFT frameworks, may be generated and held outside\
    \ the regulated perimeter. Determining who owns the Travel Rule obligation in\
    \ a multi-layered embedded payment flow is no longer a theoretical question; it\
    \ is an audit and enforcement exposure.\n\nCustomer behaviour shifts compound\
    \ this. Panels at EBAday consistently noted the acceleration of payment disaggregation\
    \ \u2014 consumers and corporates routing transactions across a wider set of providers\
    \ simultaneously. From a financial crime perspective, this fragments the transactional\
    \ picture available to any single obligated entity, weakening the behavioural\
    \ baselines on which anomaly detection depends and raising genuine questions about\
    \ the adequacy of entity-level suspicious activity reporting regimes relative\
    \ to network-level risk.\n\nRegulators have signalled awareness. The European\
    \ Banking Authority's work on its AML/CFT supervisory convergence agenda, and\
    \ equivalent efforts by the Monetary Authority of Singapore on inter-entity data\
    \ sharing under controlled circumstances, suggest that supervisory expectations\
    \ will move toward requiring institutions to account for the ecosystems in which\
    \ their rails operate, not merely their own book of business. Compliance functions\
    \ that treat embedded finance as a product question rather than a risk architecture\
    \ question are likely to find themselves exposed at the next supervisory review\
    \ cycle."
