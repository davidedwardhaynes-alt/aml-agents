    \ investigations involving beneficiaries who have limited recourse.\n\nAs pilot\
    \ volumes grow, the adequacy of India's Prevention of Money Laundering Act obligations\
    \ as applied to CBDC intermediaries \u2014 and the supervisory capacity to enforce\
