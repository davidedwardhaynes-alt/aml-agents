  full_article: "The convergence of large language model agents with payment rails\
    \ is beginning to move from proof-of-concept to live deployment, with OpenAI's\
    \ Instant Checkout inside ChatGPT and Google's Agent Payments Protocol both active\
    \ in mid-2026 \u2014 a development that places customer due diligence, transaction\
    \ monitoring, and liability attribution under immediate pressure for financial\
    \ institutions and their compliance functions.\n\nAgentic payments are not, structurally,\
    \ a new problem. The underlying challenge \u2014 authenticating an instruction\
    \ when the initiating party is not the account holder acting in real time \u2014\
    \ is familiar from standing orders, third-party mandates, and open banking APIs.\
    \ What changes materially is the opacity and autonomy of the instructing layer.\
    \ A traditional payment instruction carries a clear principal chain; an AI agent\
    \ executing a purchase on behalf of a user may traverse multiple model providers,\
    \ orchestration frameworks, and merchant integrations before a transaction is\
    \ submitted to a card scheme or bank. FATF Recommendation 16 on wire transfers,\
    \ and its associated Interpretive Note requiring originator and beneficiary information\
    \ to travel with the transaction, was not designed with that architecture in mind.\n\
    \nVisa's public position \u2014 that defined trust frameworks, credential standards,\
    \ and human-override mechanisms must precede broad deployment \u2014 reflects\
    \ a liability calculus as much as a consumer-protection argument. Under most jurisdictions'\
    \ payment services legislation, including the EU's PSD2 regime and Singapore's\
    \ Payment Services Act, the institution holding the account retains exposure for\
    \ unauthorised transactions regardless of whether the instruction was initiated\
    \ by a human or an agent acting on delegated authority. The question of whether\
    \ an agent acting outside its authorised scope constitutes an unauthorised transaction,\
    \ a fraud event, or a system failure remains unresolved in most regulatory frameworks.\n\
    \nFor MLROs, the more immediate concern is transaction monitoring calibration.\
    \ Agentic payment flows are likely to exhibit behavioural patterns \u2014 high\
    \ frequency, low friction, consolidated merchant categories \u2014 that existing\
    \ rule sets will misclassify in both directions, generating false positives on\
    \ legitimate autonomous purchasing while potentially suppressing alerts on genuine\
    \ layering conducted through compromised agents. The absence of explicit FATF\
    \ typology guidance on AI-initiated payment fraud as a predicate for money laundering\
    \ adds further uncertainty.\n\nRegulatory attention in 2026 is expected to sharpen\
    \ around agent credential standards and audit trail requirements. Institutions\
    \ that begin now to map their agent-payment exposure, assess gaps in their transaction\
    \ monitoring logic, and engage supervisors proactively will be better positioned\
    \ than those waiting for formal guidance to crystallise."
