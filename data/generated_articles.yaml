    \ supervisors will be expected to scrutinise for group-wide risk contagion and\
    \ consolidated customer due diligence governance.\n\nFrom an AML perspective,\
    \ the central concern for compliance professionals is the adequacy of group-level\
    \ controls when a regulated deposit-taking institution holds meaningful equity\
    \ in a VASP operating at scale. FATF Recommendation 15 requires countries to ensure\
    \ VASPs are subject to AML/CFT regulation proportionate to their risk profile,\
    \ but group consolidation creates additional obligations: financial groups must\
    \ apply enterprise-wide programmes, and the higher-risk VASP subsidiary cannot\
    \ operate in a supervisory silo. MLROs at Hana entities will need to assess whether\
    \ shared customer data flows, referral arrangements, or co-branded products could\
    \ create layering vulnerabilities or obligations under correspondent-relationship\
    \ provisions.\n\nFor regulators, the deal also tests the FSC's evolving appetite\
    \ for bank-VASP integration at a time when peer jurisdictions \u2014 notably Singapore\
    \ under MAS Notice PSN02 and the EU under MiCA's group supervision provisions\
    \ \u2014 are actively constructing frameworks to manage precisely this structural\
    \ complexity. Korean authorities have historically maintained a cautious posture\
    \ toward crypto, making the FSC's response to this filing a meaningful indicator\
    \ of the sector's trajectory. Whether this transaction accelerates a formal consolidated\
    \ supervision framework for bank-affiliated VASPs in Korea, or proceeds under\
    \ existing siloed oversight, will define the compliance architecture others in\
    \ the region watch closely."
