    \ Rule 6c-11 under the Investment Company Act of 1940 in 2019. That rule streamlined\
    \ approval for conventional ETFs but deliberately excluded certain product types\
    \ \u2014 including those holding digital assets, leveraged or inverse structures\
    \ with exotic exposures, and funds employing complex derivatives overlays. The\
