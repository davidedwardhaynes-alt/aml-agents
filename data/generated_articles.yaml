    \ 2012 \u2014 trading on or facilitating trades predicated on known price-sensitive\
    \ social media posts can attract liability if intent to distort can be inferred.\
    \ Firms operating systematic strategies that ingest Truth Social feeds will need\
    \ to document that their surveillance frameworks capture this data source explicitly,\
