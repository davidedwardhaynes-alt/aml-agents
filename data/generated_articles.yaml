  full_article: "The Hong Kong Mortgage Corporation Limited priced a HK$12 billion\
    \ equivalent multi-tranche digital bond on 12 June 2026 under its existing US$30\
    \ billion Medium Term Note Programme, becoming both the largest digital bond issuance\
    \ globally by size and the first public sector entity in Hong Kong to execute\
    \ such a transaction. The immediate implication for financial crime compliance\
    \ professionals is straightforward: as tokenised debt securities move from pilot\
    \ stage to benchmark-scale sovereign-adjacent issuance, the AML/CFT frameworks\
    \ governing their distribution, secondary trading, and custody can no longer be\
    \ treated as works in progress.\n\nHong Kong's regulatory groundwork for this\
    \ moment has been methodical. The Securities and Futures Commission and the Hong\
    \ Kong Monetary Authority have progressively extended existing obligations under\
    \ the Anti-Money Laundering and Counter-Terrorist Financing Ordinance (AMLO) to\
    \ virtual asset service providers and, by extension, to licensed platforms handling\
    \ tokenised securities. The government's own HK$800 million tokenised green bond\
    \ in February 2023 established that digital bond mechanics were operationally\
    \ viable; the HKMC transaction at fifteen times that size signals institutional\
    \ normalisation.\n\nFor MLROs and heads of financial crime compliance at participating\
    \ financial institutions, the scale introduces proportionate scrutiny. Distributed\
    \ ledger settlement compresses the time available for transaction monitoring and\
    \ sanctions screening, particularly where cross-border tranches involve investors\
    \ in multiple FATF-member jurisdictions. Institutions must satisfy themselves\
    \ that their customer due diligence and beneficial ownership procedures under\
    \ AMLO Schedules 2 and 3 apply with equal rigour to on-chain transfers as to conventional\
    \ book-entry movements. Smart contract logic that automates coupon payments or\
    \ transferability conditions does not, of itself, constitute a compliance control.\n\
    \nSupervisors will also be attentive to the custody layer. Where tokenised securities\
    \ are held through licensed intermediaries operating under SFC conditions, the\
    \ obligations mirror those applicable to conventional securities. Where self-custody\
    \ or third-party wallet arrangements are used, the chain of accountability for\
    \ FATF Recommendation 16 \u2014 travel rule compliance for virtual asset transfers\
    \ \u2014 becomes materially harder to demonstrate.\n\nThe HKMC transaction will\
    \ function as a reference point for comparable issuances across the region. Singapore's\
    \ MAS, which has run Project Guardian with similar ambitions, and regulators in\
    \ Australia operating under the AML/CTF Act will watch closely. The compliance\
    \ infrastructure must now scale at the same pace as the market it governs."
