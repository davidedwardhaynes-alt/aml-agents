    \ carries direct implications for how regulators and compliance professionals\
    \ should think about systemic risk: banks are simultaneously household-owned enterprises\
    \ and critical national infrastructure, a tension that shapes obligations well\
    \ beyond consumer protection.\n\nThe framing is not new, but its emphasis matters\
    \ in the current environment. AUSTRAC's administration of the *Anti-Money Laundering\
    \ and Counter-Terrorism Financing Act 2006* has long recognised that financial\
    \ institutions occupying infrastructure-like positions carry heightened exposure\
    \ to exploitation by illicit actors precisely because of their systemic centrality.\
    \ The AML/CTF Act's risk-based framework, reinforced through AUSTRAC's revised\
    \ *AML/CTF Rules* and ongoing consultation around the *AML/CTF Amendment Act 2024*\
    \ Tranche 2 expansion, presupposes that banks with critical infrastructure status\
    \ must maintain proportionately robust financial crime controls \u2014 not merely\
    \ adequate ones.\n\nFor MLROs and heads of financial crime compliance, Birmingham's\
    \ infrastructure characterisation cuts in a specific direction. Critical infrastructure\
    \ designations under the *Security of Critical Infrastructure Act 2018* impose\
    \ positive security obligations, risk management programme requirements, and government\
    \ assistance powers that sit alongside, and occasionally intersect with, AUSTRAC's\
    \ regime. Compliance functions that have not yet mapped those intersection points\
    \ \u2014 particularly around cyber-enabled financial crime, operational resilience\
    \ during disruptions, and mandatory reporting obligations under both frameworks\
    \ \u2014 carry a governance gap that regulators are unlikely to overlook in supervisory\
    \ reviews.\n\nThe household ownership dimension adds a separate layer of sensitivity.\
    \ With a significant proportion of Australians holding bank equity through superannuation\
    \ funds, reputational and financial penalties arising from AML failures translate\
    \ directly into retail investment losses, a factor that APRA has noted in its\
    \ prudential risk appetite discussions and that is increasingly visible in board-level\
    \ risk committee deliberations.\n\nAs Tranche 2 of Australia's AML/CTF reforms\
    \ brings lawyers, accountants, and real estate professionals into the regulated\
    \ population from 2026, banks will face both competitive pressure from newly compliant\
    \ entities and a more complex customer-due-diligence environment. The industry's\
    \ self-presentation as infrastructure will need to be matched by the robustness\
    \ of the controls that characterisation implicitly demands."
