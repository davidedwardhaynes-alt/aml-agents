    \ reinforces the case for robust stress-testing of indirect exposures. Interconnectedness\
    \ with banks and insurers means that a liquidity event in a large private credit\
    \ fund could transmit rapidly through repo and credit facilities, with AML and\
    \ sanctions implications if counterparties begin to fail or restructure under\
    \ distress.\n\nSupervisors across FSB member jurisdictions will likely translate\
    \ this advisory into targeted thematic reviews over the coming 12 to 18 months.\
    \ Firms that can demonstrate granular mapping of their private credit exposure\
    \ chains \u2014 including third-party fund administrators and sub-advisers \u2014\
    \ will be better positioned when those reviews arrive."
