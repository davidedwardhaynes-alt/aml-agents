  full_article: "The Financial Conduct Authority launched a consultation on 22 June\
    \ 2026 proposing codified due diligence standards and strengthened asset-handling\
    \ requirements for self-invested personal pension operators, signalling that the\
    \ regulator views voluntary best-practice convergence in the sector as insufficient\
    \ and intends to anchor minimum standards in binding rules.\n\nThe SIPP market\
    \ has long occupied an awkward regulatory position. Its open architecture, permitting\
    \ investment in a wide range of non-standard assets, has driven genuine consumer\
    \ value but has also been a persistent vector for pension fraud and unsuitable\
    \ investment arrangements. The FCA's own supervisory work over the preceding decade\
    \ identified recurring failures: inadequate assessment of underlying investment\
    \ risk before acceptance, deficient client money and custody arrangements, and\
    \ record-keeping that left consumers exposed when operators exited the market.\
    \ The Consumer Duty, which took effect for open products in July 2023, provided\
    \ a principles-based overlay but stopped short of prescribing what adequate due\
    \ diligence in this context actually looks like.\n\nFor SIPP operators and their\
    \ compliance functions, the proposals create both clarity and obligation. Firms\
    \ that have already aligned internal frameworks to FCA guidance and Financial\
    \ Ombudsman Service determinations may find codification broadly consistent with\
    \ existing practice; the compliance burden falls hardest on smaller operators\
    \ whose controls remain informal. The explicit treatment of scheme money and asset\
    \ segregation addresses a structural vulnerability that materialised in several\
    \ operator insolvencies, where client assets were difficult to identify and return\
    \ promptly \u2014 an outcome Consumer Duty outcomes-testing frameworks are ill-equipped\
    \ to prevent after the fact.\n\nFor MLROs and financial crime compliance officers\
    \ specifically, stronger due diligence requirements on accepted investments have\
    \ an indirect but material bearing on financial crime risk. Non-standard assets\
    \ routed through SIPPs have featured in a number of pension liberation and fraud\
    \ typologies documented by both the FCA and Action Fraud; clearer operator-level\
    \ gatekeeping obligations reduce the surface area for such schemes to operate.\
    \ Firms should consider whether enhanced investment due diligence procedures align\
    \ with existing suspicious activity reporting workflows under the Proceeds of\
    \ Crime Act 2002.\n\nThe consultation closes in autumn 2026, with final rules\
    \ expected to form part of the broader Consumer Duty implementation review. Whether\
    \ the FCA pursues a standalone SIPP sourcebook or embeds requirements within COBS\
    \ will determine how operators structure their compliance architecture \u2014\
    \ and how supervisors assess adequacy going forward."
