    \ participation from CFTC-registered intermediaries and state securities regulators\
    \ as well, given the cross-agency jurisdictional complexity these products routinely\
    \ generate. How the SEC weighs innovation facilitation against investor protection\
    \ and financial integrity obligations in its eventual guidance will set a de facto\
