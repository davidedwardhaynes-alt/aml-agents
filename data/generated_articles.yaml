  full_article: "The Securities and Futures Commission has signalled that prediction\
    \ market contracts offered by at least one internationally licensed brokerage\
    \ operating in Hong Kong may constitute \"financial products\" under the Securities\
    \ and Futures Ordinance, a designation that would bring such platforms within\
    \ the SFC's regulatory perimeter and trigger corresponding anti-money laundering\
    \ obligations under the Anti-Money Laundering and Counter-Terrorist Financing\
    \ Ordinance (AMLO).\n\nPrediction markets \u2014 platforms that allow participants\
    \ to trade contracts whose payouts are tied to the outcome of real-world events,\
    \ from election results to macroeconomic indicators \u2014 have expanded rapidly\
    \ since US-based Kalshi secured a legal victory against the Commodity Futures\
    \ Trading Commission in 2024, encouraging operators to test other jurisdictions.\
    \ Hong Kong's existing framework presents an unresolved tension: the Gambling\
    \ Ordinance (Cap. 148) prohibits betting arrangements not licensed by the Hong\
    \ Kong Jockey Club or the Lotteries Fund, while the SFO's definition of \"futures\
    \ contracts\" and \"structured products\" could, depending on product design,\
    \ capture the same instrument. Legal practitioners are divided on which statute\
