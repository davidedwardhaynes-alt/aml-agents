  full_article: "The United States Securities and Exchange Commission proposed on\
    \ 11 June 2026 to rescind Rules 611 and 610(e) of Regulation NMS, effectively\
    \ dismantling the Order Protection Rule and its associated access-fee cap that\
    \ have governed equity market structure for nearly two decades \u2014 a move with\
    \ direct implications for best-execution obligations, surveillance frameworks,\
    \ and the cross-border regulatory expectations placed on broker-dealers operating\
    \ in multiple jurisdictions.\n\nRule 611, adopted in 2005 as part of the broader\
    \ Regulation NMS package, was designed to prevent trade-throughs \u2014 the execution\
    \ of orders at prices inferior to protected quotations displayed by other trading\
    \ centres. In practice, the rule accelerated the fragmentation of US equity markets\
    \ across dozens of venues and contributed to the proliferation of complex order-routing\
    \ logic that compliance and surveillance teams have long struggled to monitor\
    \ transparently. Rule 610(e), the linked access-fee cap, capped fees at $0.003\
    \ per share, a ceiling that shaped the maker-taker rebate ecosystem now under\
    \ sustained regulatory scrutiny globally.\n\nFor financial crime compliance professionals,\
    \ the proposed rescission carries implications that extend beyond market microstructure.\
    \ Best-execution policies maintained by registered broker-dealers under SEC and\
    \ FINRA rules, and by entities with cross-border obligations under MiFID II equivalents\
    \ or MAS Notice SFA 04-N13, will require reassessment if protected-quote hierarchies\
    \ are removed. Where best-execution documentation has relied on Rule 611 compliance\
    \ as a proxy for demonstrating price priority, that analytical shortcut disappears.\
    \ Surveillance systems calibrated to detect trade-throughs as potential indicators\
    \ of manipulative routing \u2014 relevant under Section 9 and Section 10(b) of\
    \ the Securities Exchange Act of 1934 \u2014 may need recalibration to reflect\
    \ a more principles-based routing environment.\n\nAsset managers and prime brokers\
    \ will face pressure to demonstrate that order-routing decisions absent Rule 611\
    \ protections are not susceptible to conflicts of interest that regulators in\
    \ FATF member jurisdictions increasingly treat as conduct-risk precursors to market\
    \ abuse. IOSCO's principles on market intermediaries and the FATF Recommendation\
    \ 24 framework on beneficial ownership transparency both bear on the governance\
    \ structures that sit behind routing arrangements.\n\nThe SEC's proposal enters\
    \ a public comment period, and rescission is not assured. Whether it proceeds\
    \ or not, the exercise signals a broader regulatory appetite in Washington for\
    \ structural simplification \u2014 and compliance functions would be prudent to\
    \ begin scenario-planning now rather than awaiting a final rule."
