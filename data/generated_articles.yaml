  full_article: "On 7 May 2026, the International Swaps and Derivatives Association\
    \ submitted its response to the European Union's Anti-Money Laundering Authority\
    \ consultation on customer due diligence requirements under the Anti-Money Laundering\
    \ Regulation, signalling that the derivatives industry intends to push back on\
    \ elements of the draft framework before it takes binding effect across EU obliged\
    \ entities.\n\nThe response arrives at a pivotal moment in the EU's AML architecture.\
    \ The AMLR, which entered into force in 2024 alongside the recast Anti-Money Laundering\
    \ Directive (AMLD6) and the regulation establishing AMLA itself, represents the\
    \ most comprehensive overhaul of the bloc's financial crime rulebook in two decades.\
    \ Unlike its directive-based predecessors, the AMLR applies directly and uniformly\
    \ across member states, removing the implementation discretion that had produced\
    \ persistent supervisory fragmentation. AMLA, which assumes direct supervisory\
    \ responsibility for the highest-risk cross-border financial institutions from\
    \ 2028, is now consulting on Level 2 technical standards that will operationalise\
    \ the regulation's CDD provisions \u2014 making this consultation one of the more\
    \ consequential exercises in the authority's early life.\n\nFor derivatives dealers\
    \ and their compliance functions, the core tension is familiar: CDD obligations\
    \ designed primarily around retail and commercial banking relationships sit awkwardly\
    \ against the legal entity-dominated, documentation-heavy world of OTC derivatives.\
    \ ISDA's intervention likely addresses how concepts such as beneficial ownership\
    \ identification, ongoing monitoring triggers, and the treatment of professional\
    \ counterparties interact with existing EMIR documentation standards and the established\
    \ ISDA Master Agreement framework. Proportionality \u2014 ensuring that enhanced\
    \ due diligence thresholds and business-relationship definitions reflect the genuine\
    \ risk profile of institutional derivatives activity \u2014 is expected to be\
    \ a central theme.\n\nFrom a supervisory standpoint, AMLA will need to balance\
    \ coherence across obliged entity categories against the risk of drafting rules\
    \ so bank-centric that capital markets firms face structural compliance costs\
    \ disproportionate to their actual money-laundering exposure. The FATF Recommendations,\
    \ particularly R.10 on CDD and R.17 on reliance on third parties, provide a risk-based\
    \ foundation that the technical standards should, in principle, honour.\n\nHow\
    \ AMLA incorporates industry input before finalising the standards will serve\
    \ as an early indicator of the authority's consultative culture \u2014 and of\
    \ whether the AMLR's uniformity ambition can be reconciled with the operational\
    \ realities of wholesale markets."
