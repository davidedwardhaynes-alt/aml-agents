    \ matter. FATF Recommendation 35 requires countries to ensure that legal and financial\
    \ sanctions are effective, proportionate, and dissuasive across the full spectrum\
    \ of designated offences.\n\nAs Australia's AML/CTF reform process progresses\
    \ toward tranche-two entity coverage, compliance functions in legal, accounting,\
    \ and real-estate sectors will need threat-financing typologies embedded in their\
    \ risk assessments from day one \u2014 cases such as this one illustrating precisely\
    \ why the predicate-offence perimeter cannot be drawn narrowly."
