    \nThe practical implication for MLROs is that scenario planning should begin now,\
    \ even as the diplomatic timeline remains opaque. The gap between a political\
    \ agreement and the compliance infrastructure needed to operationalise it safely\
    \ has historically been measured in years, not weeks."
