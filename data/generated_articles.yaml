  full_article: "The reinvigoration of high-level diplomatic ties between Beijing\
    \ and Pyongyang, formalised through Xi Jinping's state visit to North Korea, carries\
    \ direct consequences for financial institutions managing correspondent banking\
    \ relationships, trade finance exposures, and customer portfolios with any nexus\
    \ to Chinese entities operating near the DPRK border economy.\n\nNorth Korea remains\
    \ among the most comprehensively sanctioned jurisdictions globally. UN Security\
