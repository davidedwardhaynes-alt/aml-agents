  full_article: "The Project Eleven research group has concluded that Bitcoin's cryptographic\
    \ infrastructure may already be insufficiently positioned to complete a safe migration\
    \ to quantum-resistant algorithms before capable quantum computers emerge \u2014\
    \ a finding with direct implications for virtual asset service providers (VASPs)\
    \ operating under obligations tied to the integrity and finality of blockchain-based\
    \ settlement.\n\nThe concern centres on Bitcoin's reliance on the Elliptic Curve\
    \ Digital Signature Algorithm (ECDSA), which underpins wallet ownership and transaction\
    \ authorisation. Cryptographers have long acknowledged that sufficiently powerful\
    \ quantum machines running Shor's algorithm could derive private keys from exposed\
    \ public keys, particularly those associated with reused or legacy Pay-to-Public-Key\
    \ (P2PK) addresses. The National Institute of Standards and Technology (NIST)\
    \ finalised its first post-quantum cryptographic standards in 2024, creating a\
    \ reference point against which existing digital asset infrastructure is increasingly\
    \ being measured. FATF Recommendation 15 requires jurisdictions to apply a risk-based\
    \ approach to virtual assets, and the prospect of cryptographic compromise is\
    \ precisely the kind of systemic vulnerability that should inform those assessments.\n\
    \nFor compliance professionals, the implications operate on several levels. AML/CTF\
    \ obligations under frameworks such as Australia's AML/CTF Act, Singapore's MAS\
    \ Notice PSN02, and Hong Kong's AMLO require VASPs to maintain reliable transaction\
    \ monitoring and customer due diligence records, both of which depend on blockchain\
    \ immutability. If address-level key compromise became technically feasible \u2014\
    \ even probabilistically \u2014 the evidentiary value of on-chain data used in\
    \ suspicious transaction reporting and law enforcement requests would come under\
    \ challenge. Custodians holding client assets in ECDSA-protected wallets would\
    \ face direct fiduciary and regulatory exposure.\n\nThere is also a market-integrity\
    \ dimension. Large institutional holders, sovereign wealth vehicles, and regulated\
    \ funds that treat Bitcoin as a reserve asset are beginning to ask their custodians\
    \ and prime brokers for quantum-risk disclosures, a request that existing risk\
    \ frameworks are largely unprepared to address in a structured way.\n\nThe Bitcoin\
    \ developer community has debated quantum migration pathways, including soft-fork\
    \ proposals to deprecate vulnerable address types, but achieving the network consensus\
    \ required for such a change remains politically and technically uncertain. For\
    \ regulators considering how to apply technology-neutral AML standards to virtual\
    \ assets, the timeline question Project Eleven raises \u2014 whether migration\
    \ can be completed before the threat matures \u2014 is no longer a theoretical\
    \ annex to a risk assessment. It is becoming a line item in operational risk registers."
