  full_article: "The joint response by ISDA, SIFMA, and the Institute of International\
    \ Finance to the 2026 US G-SIB surcharge proposal, submitted on 18 June, signals\
    \ coordinated industry resistance to capital calibration methodology that the\
    \ three bodies argue imposes disproportionate buffers relative to systemic risk\
    \ actually posed by the affected institutions. The immediate implication for compliance\
    \ and financial crime professionals is structural: higher capital charges constrain\
    \ the risk appetite and operational bandwidth of precisely those global banks\
    \ whose correspondent networks and transaction-monitoring infrastructure underpin\
    \ much of the international AML architecture.\n\nThe G-SIB surcharge framework,\
    \ introduced under Basel III and operationalised in the US through the Federal\
    \ Reserve's Regulation Q, applies additional Common Equity Tier 1 requirements\
    \ of between 1.0 and 4.5 percentage points to institutions scoring above defined\
    \ thresholds across five systemic indicator categories, including cross-jurisdictional\
    \ activity and complexity. The 2025 Basel Committee review of the scoring methodology,\
    \ which feeds into the current US proposal, adjusted indicator weightings in ways\
    \ that several large US banks contend unfairly penalise their market-making and\
    \ custody activities relative to European and Asian peers subject to different\
    \ national implementation schedules.\n\nFrom a financial crime compliance standpoint,\
    \ the stakes extend beyond balance-sheet optimisation. Institutions facing elevated\
    \ surcharges have historically responded by de-risking correspondent relationships\
    \ and exiting higher-cost jurisdictions \u2014 a pattern well-documented in FATF's\
    \ 2016 and 2021 analyses of correspondent banking decline and its adverse effects\
    \ on financial inclusion and AML coverage in emerging markets. If the proposed\
    \ calibration induces further de-risking, supervisors in jurisdictions already\
    \ flagged under FATF's enhanced follow-up process may find their access to compliant\
    \ correspondent channels further constrained.\n\nThe industry coalition's response\
    \ will likely emphasise recalibration of the cross-jurisdictional activity indicator\
    \ and request extended transition timelines, consistent with positions taken in\
    \ prior comment letters on the Basel III endgame rules. The Federal Reserve is\
    \ expected to publish a revised notice of proposed rulemaking in Q3 2026, with\
    \ final rules potentially effective from January 2028. How the Fed balances macroprudential\
    \ stability objectives against the demonstrable second-order effects on AML infrastructure\
    \ will determine whether this exercise in capital adequacy reform quietly reshapes\
    \ the geography of compliant finance once again."
