  full_article: "At EBAday 2026 in June, senior payments executives and regulators\
    \ converged on a consensus that has been forming for several years: Europe's payments\
    \ architecture is being shaped less by market innovation than by regulatory mandate,\
    \ with consumer-facing outcomes increasingly used as the political justification\
    \ for that intervention. The immediate implication for compliance functions is\
    \ that the regulatory perimeter is widening faster than many institutions' governance\
    \ frameworks can absorb.\n\nThe backdrop is a dense and interlocking European\
    \ rulebook. The revised Payment Services Directive (PSD3) and the accompanying\
    \ Payment Services Regulation (PSR), both moving through final legislative stages,\
    \ sit alongside the Instant Payments Regulation \u2014 which took effect in stages\
    \ from January 2025 \u2014 and the EU's prospective digital euro framework. Taken\
    \ together, these instruments impose obligations that span transaction monitoring\
    \ architecture, fraud liability reallocation, and open-finance data access. FATF\
    \ Recommendation 16, governing payment transparency and the travel rule, threads\
    \ through all of them, requiring firms to ensure that originator and beneficiary\
    \ information travels with transfers in a manner compatible with each new payment\
    \ rail as it is introduced.\n\nFor MLROs and heads of financial crime compliance,\
    \ the panels at EBAday surfaced a tension that supervision has not yet resolved:\
    \ consumer experience mandates \u2014 faster payments, frictionless authentication,\
    \ reduced false-positive friction \u2014 can cut directly against the risk-based\
    \ controls that AML frameworks demand. Instant payment finality, in particular,\
    \ compresses the intervention window that transaction monitoring systems rely\
    \ upon, a challenge regulators in the UK and Singapore have already acknowledged\
    \ in their respective Payment Systems Regulator reviews and MAS Notice PSN01 consultations.\n\
    \nPayment institutions operating cross-border within the EU must also reckon with\
    \ the Anti-Money Laundering Regulation (AMLR) and the establishment of AMLA, the\
    \ new Frankfurt-based supervisory authority, which will assume direct oversight\
    \ of the highest-risk obliged entities from 2027. AMLA's supervisory methodology\
    \ is expected to stress-test precisely how firms have balanced customer friction\
    \ reduction against transaction monitoring efficacy \u2014 a question EBAday panels\
    \ acknowledged but did not fully answer.\n\nThe regulatory trajectory suggests\
    \ that compliance teams will need to engage product and payments colleagues far\
    \ earlier in design cycles. Embedding AML controls into payment infrastructure\
    \ after the commercial architecture is set has never been adequate; under the\
    \ forthcoming European rulebook, it will be neither adequate nor, in certain cases,\
    \ permissible."
