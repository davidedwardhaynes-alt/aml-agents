    \ assess risk on an ongoing basis. For retail and SME lenders operating across\
    \ the Singapore-Malaysia corridor, the persistent gap in cross-border credit visibility\
    \ has created asymmetric information problems: a borrower with adverse credit\
    \ behaviour in one jurisdiction could present as a clean profile in the other.\
    \ The proposed service, structured around individual consent, would begin to close\
    \ that gap.\n\nFrom a lender's perspective, the arrangement strengthens the evidentiary\
    \ basis for credit decisions and, by extension, supports more granular customer\
    \ risk profiles. Under MAS Notice 626 and Bank Negara Malaysia's Anti-Money Laundering\
    \ and Counter Financing of Terrorism Policy Document, institutions are already\
