    \ that can artificially create the appearance of support levels \u2014 and their\
    \ deliberate puncturing. An isolated price event proves nothing, but it provides\
    \ a useful prompt for surveillance teams to review order-book data around the\
    \ breach window.\n\nAs more jurisdictions bring spot crypto assets within formal\
    \ market-abuse frameworks \u2014 the EU's Markets in Crypto-Assets Regulation\
    \ being the most developed example \u2014 events of this kind will increasingly\
    \ attract regulatory scrutiny beyond AML/CTF. Compliance functions that have historically\
    \ siloed financial crime risk from market conduct risk may find that boundary\
    \ harder to maintain."
