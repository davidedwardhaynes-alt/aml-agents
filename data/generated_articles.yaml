  full_article: "Bank of America is preparing to launch a cross-border real-time payments\
    \ service for corporate, commercial and financial institution clients, routing\
    \ transactions through Swift or its proprietary CashPro platform \u2014 a development\
    \ that compresses the settlement windows that compliance teams have historically\
    \ relied upon to screen and intervene in suspicious transfers.\n\nThe move reflects\
    \ a broader structural shift in correspondent banking infrastructure. Swift's\
    \ GPI initiative, now underpinning the majority of cross-border messages on the\
    \ network, already delivers same-day finality for many corridors, and the Financial\
    \ Stability Board's G20 Roadmap for Enhancing Cross-Border Payments has set 2027\
    \ targets for speed, cost and transparency improvements. BofA's offering aligns\
    \ with that trajectory but pushes execution velocity further, compressing transaction\
    \ lifecycles toward the near-instantaneous settlement familiar from domestic rails\
    \ such as RTP in the United States or FAST in Singapore.\n\nFor MLROs and financial\
    \ crime compliance functions, the central tension is unchanged but intensified.\
    \ FATF Recommendation 16 \u2014 the wire transfer rule \u2014 requires originator\
    \ and beneficiary information to accompany transactions regardless of speed, yet\
    \ real-time finality leaves diminishing room for post-initiation holds. Institutions\
    \ operating under MAS Notice MAS 626, AUSTRAC's AML/CTF Act obligations, or Hong\
    \ Kong's OSCO and AMLA frameworks face the same structural challenge: pre-transaction\
    \ screening must do substantially more work when post-settlement recall is technically\
    \ possible but practically difficult across multiple jurisdictions and legal systems.\n\
    \nFrom a correspondent banking perspective, respondent institutions receiving\
    \ inbound real-time flows will need to satisfy themselves that their own transaction\
    \ monitoring systems can ingest and assess high-velocity data without creating\
    \ de facto processing bottlenecks that defeat the purpose of real-time settlement.\
    \ The risk of alert queues accumulating faster than analysts can clear them is\
    \ not hypothetical \u2014 it has been documented in domestic real-time payment\
    \ rollouts in the United Kingdom and Australia.\n\nBofA's FI client segment introduces\
    \ an additional layer of complexity, since nested correspondent relationships\
    \ can obscure ultimate originator identity, a concern that regulators including\
    \ the Financial Crimes Enforcement Network and the Wolfsberg Group have flagged\
    \ repeatedly in guidance on correspondent banking due diligence.\n\nAs more tier-one\
    \ institutions build out real-time cross-border infrastructure, supervisors will\
    \ face increasing pressure to clarify whether existing transaction monitoring\
    \ and travel rule compliance expectations require recalibration for sub-second\
    \ settlement environments \u2014 a conversation that is overdue and unlikely to\
    \ wait for the G20 roadmap's 2027 horizon."
