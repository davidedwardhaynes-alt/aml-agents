  full_article: "Hong Kong's Labour and Welfare Bureau is reviewing its screening\
    \ criteria for high-risk elderly individuals, with Secretary Chris Sun Yuk-han\
    \ indicating that dementia patients and residents aged over 60 who serve as primary\
    \ carers for severely disabled dependants may be brought within the scope of priority\
    \ community outreach. The policy signal follows the death of a 70-year-old man\
    \ in Kwai Chung, a case that exposed gaps in welfare detection for isolated, high-burden\
    \ households.\n\nThe proposed expansion sits within Hong Kong's broader Community\
    \ Care and Support Services framework, which already deploys district-level social\
    \ work teams to conduct risk stratification among the elderly. Current screening\
    \ tends to weight physical health deterioration and social isolation as primary\
    \ flags, but the bureau's review acknowledges that cognitive decline and carer\
    \ stress constitute distinct and under-captured vulnerability vectors. The distinction\
    \ matters operationally: dementia patients may present as physically stable to\
    \ initial screeners, while elderly carers often actively resist welfare contact,\
    \ regarding it as an admission of incapacity.\n\nFor social welfare operators\
    \ and district social work units, an expanded eligibility set will require commensurate\
    \ resources in assessment capacity and follow-up bandwidth. Priority designation\
    \ without additional staffing risks diluting triage quality across the existing\
    \ caseload. Advocacy groups have long argued that the \"sandwich\" cohort \u2014\
    \ older adults simultaneously managing their own age-related decline while providing\
    \ unpaid care \u2014 represents the most structurally invisible segment of Hong\
    \ Kong's welfare landscape, particularly in high-density public housing estates\
    \ where door-to-door outreach remains logistically constrained.\n\nFrom a governance\
    \ and data-sharing perspective, the review raises questions about how welfare\
    \ agencies will identify eligible individuals proactively. Dementia diagnoses\
    \ flow through the Hospital Authority; disability assessments are administered\
    \ separately through the Social Welfare Department's own processes. Meaningful\
    \ risk stratification at scale would require structured information-sharing protocols\
    \ between these bodies \u2014 an area where Hong Kong has historically operated\
    \ with relatively siloed administrative databases.\n\nWhether the bureau's stated\
    \ intent translates into revised statutory screening criteria or remains a discretionary\
    \ operational adjustment will determine its durable impact. With Hong Kong's population\
    \ aged 65 and above projected to exceed 36 percent of residents by 2046, the adequacy\
    \ of elder welfare detection frameworks will face recurring scrutiny well beyond\
    \ this particular policy review."
