    \ rates that routinely run between 95% and 99% in legacy rule-based systems. For\
    \ firms operating under MAS Notice PSN02 or equivalent AML/CTF frameworks across\
    \ APAC, lower false-positive volumes translate directly into faster settlement\
    \ times and reduced manual review costs. Straight-through processing rates improve,\
    \ which is the metric merchants actually care about at the point of sale.\n\n\
    However, compliance officers should resist treating AI as a turnkey solution.\
    \ Model risk governance requirements \u2014 articulated in MAS's Guidelines on\
    \ Risk Management Practices and analogous guidance from AUSTRAC and Hong Kong's\
    \ HKMA \u2014 require firms to document model assumptions, validate outputs, and\
    \ maintain human oversight of automated decisions. A model that suppresses alerts\
    \ efficiently is not inherently a compliant one; explainability to supervisors\
    \ remains a non-negotiable obligation. There is also a data-quality dependency:\
    \ AI systems trained on poor or geographically unrepresentative transaction data\
    \ will reproduce, and may amplify, existing blind spots in correspondent networks.\n\
    \nThe more substantive regulatory question is whether AI adoption in payment rails\
    \ will eventually prompt FATF and national supervisors to revisit the prescriptive\
    \ data-field requirements in Recommendation 16, moving toward outcomes-based standards\
    \ that acknowledge machine-readable verification. Early signals from the G20 Roadmap\
    \ for Enhancing Cross-Border Payments suggest that interoperability and data standardisation\
    \ \u2014 not AI alone \u2014 are the preconditions supervisors regard as foundational.\
    \ Firms investing in AI capabilities without simultaneously addressing underlying\
    \ data hygiene are unlikely to satisfy either merchants or their next regulatory\
    \ examination."
