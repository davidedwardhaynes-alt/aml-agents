    \ liquid value with limited AML friction.\n\nSupervisors reviewing DNFBP inspection\
    \ outcomes for 2026 may find it worthwhile to test whether secondary jewellery\
    \ dealers and pawnbrokers are applying the source-of-goods enquiries that Cap.\
    \ 615 contemplates, rather than treating customer due diligence as a buyer-only\
    \ obligation."
