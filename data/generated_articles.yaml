  full_article: "AirAsia MOVE's proposed integration of Evo, a tenge-denominated stablecoin\
    \ issued on the Solana blockchain, into its Kazakhstan travel payments platform\
    \ marks a tangible test of whether regulated fiat-backed digital assets can replace\
    \ conventional payment rails in a cross-border consumer context. If the pilot\
    \ proceeds, it would represent one of the first instances of a Southeast Asian\
    \ super-app accepting a Central Asian fiat-pegged stablecoin for retail travel\
    \ transactions \u2014 raising immediate questions about which jurisdiction's AML/CFT\
    \ obligations govern the arrangement and how customer due diligence responsibilities\
    \ are allocated across the three parties.\n\nKazakhstan's regulatory environment\
    \ provides a relatively structured entry point for such an experiment. The Astana\
    \ Financial Services Authority (AFSA), operating within the Astana International\
    \ Financial Centre, has developed a digital assets framework that broadly aligns\
    \ with FATF Recommendation 15 on virtual asset service providers, requiring VASPs\
    \ to register, conduct CDD, and apply travel rule obligations to qualifying transfers.\
    \ The tenge peg also limits one common concern for supervisors: volatility-driven\
    \ value substitution that can complicate transaction monitoring thresholds. Nonetheless,\
    \ Solana's public, permissionless architecture means that wallet-to-wallet transfers\
    \ outside the AirAsia MOVE platform could occur without intermediary oversight,\
    \ a gap that any compliance architecture would need to address explicitly.\n\n\
    For MLROs at financial institutions holding correspondent or settlement relationships\
    \ in the region, the tripartite structure \u2014 a Malaysian travel platform,\
    \ a Kazakh stablecoin issuer, and a US-based blockchain foundation \u2014 creates\
    \ layered counterparty risk. Determining which entity qualifies as the obliged\
    \ party under Kazakhstan's AML law, and whether Malaysian obligations under Bank\
    \ Negara Malaysia's AML/CFT Policy Document extend to digital asset activities\
    \ conducted through foreign subsidiaries, requires careful legal mapping before\
    \ any pilot goes live.\n\nThe settlement mechanics flagged in the feasibility\
    \ assessment are particularly consequential. If Evo redemptions are processed\
