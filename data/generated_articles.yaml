  full_article: "Coinbase's activation of Indian rupee deposits and withdrawals via\
    \ the Immediate Payment Service marks the first time a top-tier global centralised\
    \ exchange has integrated directly with India's real-time retail payment rails,\
    \ creating a fiat-to-crypto on-ramp that is both frictionless and, from a financial\
    \ crime standpoint, consequential at scale.\n\nIndia's virtual digital asset sector\
    \ has operated under a tightening compliance framework since the Finance Act 2022\
    \ brought VDAs into the tax net and the Prevention of Money Laundering Act was\
    \ amended in March 2023 to formally classify crypto exchanges as \"reporting entities\"\
    \ under the Financial Intelligence Unit\u2013India. Exchanges are now required\
    \ to register with FIU-IND, maintain transaction records, file Suspicious Transaction\
    \ Reports, and conduct customer due diligence consistent with FATF Recommendation\
    \ 15 standards for virtual asset service providers. Coinbase, which suspended\
    \ Indian operations briefly in 2022 amid UPI access difficulties, re-enters under\
    \ materially stricter obligations than governed its earlier presence.\n\nFor compliance\
    \ officers at Indian correspondent banks and payment service providers, the IMPS\
    \ integration introduces a direct linkage between the regulated banking layer\
    \ and a high-velocity crypto order book, including perpetual futures. FATF guidance\
    \ consistently flags derivatives and leverage products as elevated risk vectors\
    \ for layering, given the speed at which notional value can be transferred and\
    \ obscured across positions. Banks will need to assess whether existing transaction\
    \ monitoring scenarios adequately capture rapid, repetitive IMPS flows to a single\
    \ VASP counterparty\u2014a pattern that may not trigger legacy rules calibrated\
    \ for traditional retail payments.\n\nFrom Coinbase's own risk posture, operating\
    \ local INR order books implies the accumulation of domestic liquidity and a deeper\
    \ presence in a jurisdiction where beneficiary ownership of crypto wallets remains\
    \ difficult to verify in real time. The Travel Rule obligations under FIU-IND\
    \ registration require originator and beneficiary information to accompany transfers\
    \ above prescribed thresholds, but enforcement consistency across the broader\
    \ Indian VASP population remains uneven, creating chain-of-transfer opacity that\
    \ a well-resourced exchange alone cannot resolve.\n\nIndia's crypto user base\
    \ is estimated in the tens of millions, and formalising INR access through a globally\
    \ compliant exchange could, in net terms, draw activity away from unregistered\
    \ offshore platforms\u2014a supervisory outcome regulators would welcome. Whether\
    \ FIU-IND has the surveillance capacity to monitor the transaction volumes this\
    \ integration may generate is the more pressing operational question as the market\
    \ develops."
