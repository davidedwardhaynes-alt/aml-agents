    \ as well as jurisdiction-specific instruments such as Singapore's MAS Notice\
    \ on Prevention of Money Laundering (MAS Notice PSN01/PSN02), Hong Kong's Organised\
    \ and Serious Crimes Ordinance, and Australia's AML/CTF Act 2006.\n\nThe trajectory\
    \ is not sudden. FATF's 2021 guidance on digital transformation and its 2023 report\
