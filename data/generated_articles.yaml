    \nThe move follows Norway's earlier integration discussions and reflects a broader\
    \ trend of European Economic Area states seeking interoperability with EU financial\
    \ market infrastructure without full monetary union. TIPS, operated by the European\
    \ Central Bank, was launched in 2018 to enable pan-European instant credit transfers\
    \ under the SEPA Instant Credit Transfer scheme. Extending it to a non-euro currency\
    \ requires bespoke technical and legal arrangements, including bilateral agreements\
