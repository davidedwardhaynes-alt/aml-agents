    \ standards.\n\nThe comment period will likely attract input from clearing houses,\
    \ prime brokers, and industry associations focused predominantly on capital efficiency.\
    \ Compliance and financial crime teams would be well advised to engage the process\
    \ proactively \u2014 harmonised margin rules, however technically framed, inevitably\
    \ reshape the risk topology that AML controls are designed to monitor. Regulators\
    \ rarely revisit structural frameworks of this breadth without downstream consequences\
    \ for surveillance obligations."
