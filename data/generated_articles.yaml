    \ the second half of 2026. Simultaneously, the gold death cross \u2014 where the\
    \ 50-day moving average crosses below the 200-day \u2014 historically precedes\
    \ periods of risk-off sentiment that can accelerate correlated selling across\
    \ speculative asset classes. For compliance officers, periods of sharp price dislocation\
    \ in virtual assets have consistently preceded spikes in suspicious transaction\
    \ activity, as leveraged positions unwind and proceeds move rapidly across chains\
    \ and jurisdictions.\n\nFrom a supervisory standpoint, the pattern is familiar.\
    \ FATF Recommendation 15 and its accompanying guidance on virtual assets explicitly\
