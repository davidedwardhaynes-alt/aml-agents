  full_article: "A persistent 7\u201310% premium on Tether (USDT) in the Indian peer-to-peer\
    \ and exchange market \u2014 reported as of 30 June 2026 \u2014 is a textbook\
    \ indicator that compliance officers and financial intelligence units cannot dismiss\
    \ as routine price discovery. When a stablecoin nominally pegged to the US dollar\
    \ trades at a sustained double-digit premium in a single jurisdiction, it signals\
    \ constrained legitimate on-ramps, excess demand from actors seeking dollar exposure\
    \ outside formal channels, or both \u2014 each carrying distinct money-laundering\
    \ risk typologies under FATF Recommendation 15 and its 2023 updated guidance on\
    \ virtual assets.\n\nIndia's regulatory backdrop sharpens the concern. The Financial\
    \ Intelligence Unit\u2013India (FIU-IND) began registering Virtual Asset Service\
    \ Providers under the Prevention of Money Laundering Act (PMLA) from March 2023,\
    \ and several offshore exchanges \u2014 including Binance \u2014 were issued show-cause\
    \ notices for operating without registration. That enforcement action effectively\
    \ compressed compliant rupee-to-crypto liquidity, pushing volume toward less-regulated\
    \ P2P rails. A structural supply squeeze on compliant USDT on-ramps is, therefore,\
    \ partly a regulatory consequence, not simply market mechanics.\n\nExchanges attributing\
    \ the premium solely to supply and demand are not wrong in the narrow economic\
    \ sense, but that framing elides the compliance question of *who* is generating\
    \ the demand and *why*. Sustained fiat-to-stablecoin premiums in jurisdictions\
    \ with capital account restrictions \u2014 India maintains limits under the Liberalised\
    \ Remittance Scheme capped at USD 250,000 annually \u2014 have historically correlated\
    \ with hawala-adjacent flows, trade invoice manipulation, and tax-motivated capital\
    \ flight. FIU-IND and the Enforcement Directorate have precedent in scrutinising\
    \ such corridors; the 2023 action against WazirX referenced layering through crypto\
