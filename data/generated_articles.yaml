  full_article: "The migration of financial crime risk beyond the perimeter of regulated\
    \ banking institutions has become one of the more consequential compliance challenges\
    \ of the mid-2020s. Emma Lindley MBE's keynote at NextGen FinCrime 2026 underscored\
    \ a structural shift that supervisors have been tracking for several years: as\
    \ banks have hardened their defences through layered transaction monitoring, behavioural\
    \ analytics, and mandatory suspicious transaction reporting under frameworks such\
    \ as the FATF Recommendations and domestic AML/CTF legislation, sophisticated\
    \ fraud actors have pivoted toward sectors where controls remain nascent or inconsistently\
    \ applied.\n\nThe regulatory history here is instructive. FATF's 2023 targeted\
    \ update to Recommendation 1 reinforced the expectation that designated non-financial\
    \ businesses and professions \u2014 real estate agents, accountants, legal professionals,\
    \ and increasingly digital asset service providers \u2014 apply genuine risk-based\
    \ controls rather than tick-box compliance. Yet supervisory assessments across\
    \ multiple jurisdictions consistently identify these sectors as exhibiting weaker\
    \ customer due diligence, limited transaction monitoring capability, and fragmented\
    \ suspicious activity reporting compared with their banking counterparts. In Singapore,\
    \ MAS Notice 626 and its sector-specific equivalents set a high benchmark for\
    \ financial institutions; equivalent obligations for non-financial gatekeepers\
    \ remain less uniformly enforced.\n\nFor heads of financial crime compliance in\
    \ banking, the implication is a form of risk displacement. Controls sophisticated\
    \ enough to deflect fraud and money laundering within licensed institutions create\
    \ an incentive for illicit actors to route activity through less-scrutinised sectors\
    \ \u2014 telecommunications providers, e-commerce platforms, and professional\
    \ services firms \u2014 before reintroducing value into the financial system.\
    \ This dynamic complicates correspondent due diligence and increases the burden\
    \ on MLROs to understand the full value chain of their customer relationships\
    \ rather than the transactional surface alone.\n\nFrom a non-financial sector\
    \ perspective, Lindley's argument carries operational weight: the analytical infrastructure\
    \ banks have built \u2014 shared fraud intelligence, device fingerprinting, and\
    \ consortium data models \u2014 is increasingly accessible via third-party vendors\
    \ at a cost point feasible for mid-sized enterprises. The barrier is less technological\
    \ than organisational, requiring senior accountability structures and governance\
    \ frameworks that non-financial firms have historically lacked.\n\nWhether regulators\
    \ will accelerate supervisory convergence across sectors \u2014 harmonising reporting\
    \ thresholds, mandating board-level accountability, and expanding financial intelligence\
    \ unit access \u2014 will likely determine how quickly this capability gap closes.\
    \ The direction of travel is clear; the pace remains the open question."
