  full_article: "Amazon Web Services, in partnership with Coinbase and Stripe, has\
    \ launched an infrastructure layer enabling autonomous AI agents to initiate and\
    \ settle payments in stablecoins without direct human authorisation at the point\
    \ of transaction. The immediate compliance implication is stark: existing AML\
    \ frameworks were designed around the presumption of an identifiable human customer\
    \ or a regulated legal entity as the initiating party, and neither assumption\
    \ holds cleanly when the payer is a software agent executing a pre-programmed\
    \ instruction at machine speed.\n\nThe regulatory backdrop makes this particularly\
    \ consequential. FATF Recommendation 16 \u2014 the so-called Travel Rule \u2014\
    \ requires originating virtual asset service providers to obtain, hold, and transmit\
    \ beneficiary and originator information. When an AI agent is the originator,\
    \ questions arise immediately about whether the agent's operator, the model developer,\
    \ or the cloud infrastructure provider bears the VASP obligation. MAS Notice PSN02\
    \ in Singapore and the EU's Transfer of Funds Regulation impose analogous requirements,\
    \ and none explicitly addresses non-human initiating parties. The Bank Secrecy\
    \ Act's customer identification programme requirements in the United States present\
    \ a similar gap: a \"customer\" is defined in ways that presuppose legal personhood.\n\
    \nFor MLROs at financial institutions and VASPs integrating these rails, the practical\
    \ challenges are layered. Transaction monitoring systems calibrated to human behavioural\
    \ baselines will struggle with agent-generated payment patterns, which may be\
    \ high-frequency, low-value, and algorithmically irregular in ways that confound\
    \ both rules-based and machine-learning detection models. Attribution of beneficial\
    \ ownership \u2014 already complex in DeFi contexts \u2014 becomes more difficult\
    \ when an agent acts across multiple wallets under a single operator without a\
    \ clear audit trail linking each instruction to a human decision-maker. Sanctions\
    \ screening presents an analogous problem: screening must occur in near real-time\
    \ against an entity whose jurisdictional nexus may be ambiguous.\n\nFrom the perspective\
    \ of prudential regulators, the AWS\u2013Coinbase\u2013Stripe arrangement concentrates\
    \ operational risk in a small number of infrastructure providers, raising third-party\
    \ dependency concerns analogous to those addressed in the EBA's outsourcing guidelines\
    \ and MAS TRM Guidelines.\n\nThe more durable question for supervisors is jurisdictional:\
    \ if an agent deployed in one country, running on cloud infrastructure in another,\
    \ transacts with a counterparty in a third, the regulatory perimeter becomes genuinely\
    \ contested. FATF's ongoing work on virtual assets and emerging technology will\
    \ need to address agent-initiated transactions explicitly, or national regulators\
    \ will continue to apply frameworks designed for humans to systems that are deliberately\
    \ not."
