    \ dislocations of this magnitude now carry direct operational consequences: transaction\
    \ monitoring alert volumes tied to behavioural thresholds recalibrate against\
    \ falling fiat-denominated values, and SAR/STR filing decisions must account for\
    \ volatile baseline valuations when assessing whether activity remains consistent\
    \ with customer profiles.\n\nFor VASPs and the financial institutions that bank\
