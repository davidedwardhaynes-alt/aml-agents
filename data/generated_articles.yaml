    \ Third, risk appetite statements and escalation matrices should already contemplate\
    \ geopolitical shock scenarios; if they do not, today's volatility provides a\
    \ defensible basis to trigger a formal review.\n\nThe broader supervisory trajectory\
    \ suggests regulators will scrutinise how VASPs document their real-time response\
