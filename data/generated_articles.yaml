    \ known scam-hub territories.\n\nThe Thailand dimension also warrants attention\
    \ from a cross-border cooperation perspective. The case reinforces longstanding\
    \ calls within the FATF Typologies programme for closer financial intelligence\
    \ unit liaison between Hong Kong, mainland China, and ASEAN members. Hong Kong\
    \ Police have expanded engagement with the Cross-Boundary Crime unit, but the\
    \ speed with which scam proceeds are dissipated across jurisdictions continues\
