    on revised European Sustainability Reporting Standards, signalling Tokyo''s active
    engagement in shaping sustainability disclosure rules that will carry extraterritorial
    consequences for Japanese financial institutions and corporates operating in EU
    markets.


    The intervention reflects a broader pattern of cross-jurisdictional friction emerging
    around sustainability reporting. The EU''s Corporate Sustainability Reporting
    Directive and its attendant ESRS, adopted under the European Green Deal architecture,
    impose disclosure obligations that extend beyond EU-domiciled entities to non-EU
    parents of large EU subsidiaries. For Japanese groups with significant European
    footprints, this creates a dual compliance burden alongside Japan''s own evolving
    sustainability disclosure framework administered through the FSA''s amendments
    to Cabinet Office Ordinances on Disclosure of Corporate Affairs, as well as ISSB-aligned
    standards the FSA has been progressively incorporating into domestic requirements.


