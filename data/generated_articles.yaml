    \ Trading Commission in 2024, encouraging operators to test other jurisdictions.\
    \ Hong Kong's existing framework presents an unresolved tension: the Gambling\
    \ Ordinance (Cap. 148) prohibits betting arrangements not licensed by the Hong\
    \ Kong Jockey Club or the Lotteries Fund, while the SFO's definition of \"futures\
