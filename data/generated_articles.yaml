  full_article: "Three of the world's most influential financial industry associations\
    \ \u2014 the Institute of International Finance, ISDA, and SIFMA \u2014 submitted\
    \ a joint comment letter on 18 June 2026 responding to the Basel III Endgame proposal,\
    \ signalling continued and coordinated industry resistance to elements of the\
    \ capital framework that trade groups argue will constrain market liquidity and\
    \ competitiveness. The alignment of buy-side, sell-side, and dealer-community\
    \ voices in a single submission carries particular weight with prudential regulators,\
    \ given the breadth of institutions each body represents.\n\nThe Basel III Endgame,\
    \ finalised by the Basel Committee on Banking Supervision in 2017 and substantially\
    \ revised through subsequent national transpositions, seeks to standardise risk-weighted\
    \ asset calculations, constrain reliance on internal models, and introduce the\
    \ output floor \u2014 a measure requiring that RWAs produced by internal models\
    \ be no lower than 72.5 percent of standardised-approach outputs. In the United\
    \ States, the Federal Reserve, OCC, and FDIC published their domestic implementing\
    \ notice of proposed rulemaking in mid-2023, drawing over 1,000 comment letters\
    \ before a revised proposal was announced in 2024. Transatlantic divergence in\
    \ implementation timelines and calibration has remained a persistent concern for\
    \ globally active dealers.\n\nFor financial crime compliance professionals, the\
    \ relevance of this submission lies primarily in its downstream effects. Capital\
    \ treatment of derivatives exposures, trading book assets, and correspondent banking\
    \ relationships directly influences banks' risk appetite for certain client segments\
    \ and jurisdictions. More stringent capital requirements applied without careful\
    \ calibration can accelerate de-risking \u2014 a dynamic FATF has repeatedly flagged\
    \ in its guidance on correspondent banking and financial inclusion, noting that\
    \ blunt risk reduction undermines AML transparency rather than enhancing it. If\
    \ the final rule compresses margins on lower-volume or higher-risk corridors,\
    \ compliance officers should anticipate renewed pressure on correspondent banking\
    \ networks, particularly across emerging-market jurisdictions already contending\
    \ with thin coverage.\n\nFrom a prudential-AML interface perspective, regulators\
    \ including the MAS and PRA have emphasised that capital adequacy and financial\
    \ crime risk frameworks must be calibrated in concert rather than treated as independent\
    \ silos. The joint letter's reception in Washington and Basel will therefore be\
    \ watched not only by Treasury and risk desks, but by compliance functions assessing\
    \ whether the final rules create structural incentives that conflict with financial-integrity\
    \ objectives. A final US rule is not expected before late 2026, leaving the implementation\
    \ uncertainty \u2014 and its compliance planning implications \u2014 unresolved\
    \ for at least another two reporting cycles."
