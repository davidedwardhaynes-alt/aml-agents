  full_article: "The Financial Conduct Authority has used ongoing Middle East conflict\
    \ and its knock-on inflationary pressures as the explicit trigger for a reminder\
    \ to regulated firms that Consumer Duty obligations and borrower-protection rules\
    \ are not discretionary in periods of economic stress \u2014 a signal that supervisory\
    \ scrutiny of vulnerable-customer treatment is intensifying rather than abating.\n\
    \nThe FCA's Consumer Duty, which came into full force in July 2023 and was extended\
    \ to closed-book products in July 2024, places an outcomes-based standard on firms:\
    \ retail customers must receive products and services that meet their needs, deliver\
    \ fair value, and be supported by communications they can understand and act upon.\
    \ For borrowers specifically, the FCA's longstanding Mortgage Conduct of Business\
    \ (MCOB) sourcebook and the Consumer Credit sourcebook (CONC) impose targeted\
    \ forbearance expectations \u2014 including proactive identification of financial\
    \ difficulty and the offer of tailored repayment arrangements \u2014 that predate\
    \ Duty but now sit alongside it. The FCA's invocation of geopolitical instability\
    \ as the framing device is deliberate; it positions cost-of-living deterioration\
    \ not as a transient event but as a sustained operating environment that firms\
    \ must plan around structurally.\n\nFor MLROs and financial crime compliance teams,\
    \ the FCA's statement carries an indirect but meaningful implication. Customers\
    \ in financial distress are recognised in FATF Guidance and domestic suspicious\
    \ activity report typologies as a cohort where both vulnerability to exploitation\
    \ and changes in transactional behaviour can intersect. Firms whose front-line\
    \ staff are better calibrated to identify customers struggling with affordability\
    \ are also better placed to distinguish between distress-driven irregular transactions\
    \ and those with a potentially illicit explanation \u2014 reducing both false-positive\
    \ SAR volume and the risk of missing genuine indicators. The FCA's Consumer Duty\
    \ expectation of adequate staff training and monitoring therefore has practical\
    \ utility for AML frameworks as well as conduct ones.\n\nFor retail lenders and\
    \ consumer credit firms, the immediate operational question is whether current\
    \ forbearance governance \u2014 escalation triggers, management information, board\
    \ reporting \u2014 is sufficiently granular to satisfy both CONC requirements\
    \ and the Duty's outcome-testing standard. The FCA has indicated it will use data\
    \ from its Financial Lives survey and firm-level returns to assess whether support\
    \ is reaching customers who need it. Firms that treat this publication as a procedural\
    \ reminder rather than a supervisory forecast do so at some risk."
