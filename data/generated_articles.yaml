    \ paralysed enforcement clarity since the SEC's 2017 DAO Report and the CFTC's\
    \ subsequent assertions of jurisdiction over bitcoin and ether.\n\nThe bill's\
    \ significance for financial crime compliance professionals lies less in its market-structure\
    \ provisions and more in what jurisdictional assignment implies for AML/CFT obligations.\
    \ Under existing U.S. law, broker-dealers and futures commission merchants carry\
    \ distinct supervisory relationships with FinCEN under the Bank Secrecy Act. If\
    \ the Clarity Act formally designates the majority of digital assets as commodities\
    \ under CFTC oversight, the compliance obligations flowing to exchanges and intermediaries\
    \ \u2014 suspicious activity reporting thresholds, customer due diligence standards,\
    \ and travel rule implementation \u2014 will depend critically on whether Congress\
