    \ Concentration of cross-chain volume on a smaller number of well-documented protocols\
    \ makes it easier to build and maintain detection rules, provided analytics vendors\
    \ prioritise CCIP integration. Fragmentation across a dozen competing bridges\
    \ has historically been more corrosive to monitoring quality than any single protocol's\
    \ design choices.\n\nThe forward question for supervisors is whether this migration\
    \ pattern accelerates regulatory clarity around bridge operators as obligated\
    \ entities. FATF's current guidance leaves considerable ambiguity on whether decentralised\
