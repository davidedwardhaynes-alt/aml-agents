    \nThe autonomous-agent dimension adds a layer of longer-term concern. If Near\
    \ Protocol's infrastructure enables AI-directed wallet interactions \u2014 executing\
    \ transactions without direct human instruction \u2014 this raises unresolved\
    \ questions around beneficial ownership attribution, a cornerstone of FATF Recommendation\
    \ 10. Who constitutes the \"customer\" when an autonomous agent initiates a transfer?\
    \ Regulators from the FCA to AUSTRAC have not yet issued definitive guidance on\
    \ AI-agent-originated transactions, leaving VASPs to apply existing frameworks\
    \ by analogy.\n\nThe Near Protocol development is, in this sense, a microcosm\
    \ of a broader regulatory lag. Autonomous on-chain agents are arriving faster\
    \ than the policy architecture designed to govern them, and the window between\
    \ technological deployment and supervisory response is precisely where financial\
    \ crime risk accumulates."
