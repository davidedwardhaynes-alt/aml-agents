    \ exchanges. FATF's updated Recommendation 15 guidance on virtual assets requires\
    \ that jurisdictions apply AML/CFT obligations to DeFi arrangements where a controlling\
    \ party can be identified\u2014a threshold that project shutdowns make acutely\
