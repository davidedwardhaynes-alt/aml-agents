  full_article: "Citadel Securities' US$400 million investment in Crypto.com, valuing\
    \ the exchange at US$20 billion, signals a meaningful shift in how institutional\
    \ market makers are positioning themselves within regulated digital-asset infrastructure\
    \ \u2014 and raises a distinct set of compliance obligations that both parties\
    \ will need to navigate carefully.\n\nThe transaction is notable in part because\
    \ of its timing. Global standard-setter FATF has progressively tightened expectations\
