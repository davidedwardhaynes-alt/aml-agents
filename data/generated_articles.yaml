    \ a meaningful shift in institutional risk appetite rather than retail sentiment\
    \ alone.\n\nThe outflows carry particular weight because spot Bitcoin ETFs, approved\
    \ by the SEC in January 2024 following years of litigation, were widely regarded\
    \ as the mechanism that would embed digital assets more durably into regulated\
