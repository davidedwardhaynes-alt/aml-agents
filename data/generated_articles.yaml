    \ encountering flows with characteristics that straddle sports betting, derivatives\
    \ trading, and speculative crypto activity simultaneously.\n\nHong Kong's current\
    \ regime treats these activities under separate legislative pillars. The Gambling\
    \ Ordinance (Cap. 148) prohibits unauthorised bookmaking and betting with unlicensed\
    \ operators, while the Betting on Lotteries Ordinance (Cap. 160) governs pools\
    \ betting. Separately, VASP licensing under the Anti-Money Laundering and Counter-Terrorist\
    \ Financing Ordinance (Cap. 615) targets centralised virtual asset exchanges.\
    \ Decentralised, non-custodial protocols that settle via smart contracts fall\
    \ awkwardly across all three frameworks without being cleanly captured by any,\
    \ mirroring the regulatory ambiguity FATF flagged in its 2021 updated guidance\
    \ on virtual assets, which noted that peer-to-peer transactions and DeFi arrangements\
    \ can circumvent standard obliged-entity controls.\n\nThe AML exposure is material.\
    \ Prediction market winnings paid in stablecoins are fungible, pseudonymous at\
    \ the wallet level, and easily bridged to other chains before reaching fiat off-ramps.\
    \ For transaction-monitoring teams, the layering risk is analogous to casino chip-washing,\
    \ a typology well-documented by the Joint Financial Intelligence Unit. Banks and\
    \ licensed money service operators that process fiat conversion for retail users\
    \ cycling winnings through crypto wallets face potential liability under sections\
    \ 25 and 25A of the Organized and Serious Crimes Ordinance if they fail to identify\
    \ and report suspicious proceeds, regardless of whether the upstream platform\
    \ is itself licensed.\n\nFrom a supervisory standpoint, the Securities and Futures\
    \ Commission has yet to formally opine on whether outcome contracts referencing\
    \ external events constitute regulated investment products under the Securities\
    \ and Futures Ordinance\u2014a determination that would dramatically alter the\
    \ enforcement landscape. The Betting Duty Office and the Hong Kong Jockey Club's\
    \ monopoly position add political economy considerations that complicate any move\
    \ toward a licensed prediction-market framework.\n\nWith the Financial Action\
    \ Task Force's mutual evaluation of Hong Kong scheduled within the current review\
    \ cycle, the absence of a coherent supervisory answer to decentralised prediction\
    \ markets is unlikely to pass without examiner scrutiny."
