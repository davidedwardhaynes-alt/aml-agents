    \ Financial Transaction Information\u2014broadly analogous in function to FATF\
    \ Recommendation 10's customer due diligence requirements\u2014will apply to CBDC\
    \ transactions, though regulators have yet to publish definitive guidance on how\
    \ wallet-level monitoring satisfies existing suspicious transaction reporting\
    \ obligations under that statute.\n\nFor MLROs at the nine participating banks,\
    \ the operational challenge is layered. Retail CBDC wallets may be held directly\
