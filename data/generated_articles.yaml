  full_article: "The $355 million funding round closed by Digital Asset on 12 June\
    \ 2026, backed by BNP Paribas, HSBC, Coinbase and a cohort of institutional investors,\
    \ signals that permissioned-adjacent blockchain infrastructure for capital markets\
    \ has moved decisively past the proof-of-concept stage. For compliance officers,\
    \ the immediate implication is that tokenised securities settlement on the Canton\
    \ Network will require AML and market integrity controls built into the plumbing,\
    \ not retrofitted after adoption.\n\nCanton occupies an unusual position in the\
    \ distributed-ledger landscape. Unlike fully permissioned enterprise chains such\
    \ as early iterations of R3 Corda, it presents as a public, permissionless network\
    \ while embedding privacy partitioning at the protocol layer \u2014 a design intended\
    \ to let regulated entities share settlement finality without exposing confidential\
    \ transaction data across participants. That architecture directly intersects\
    \ with FATF Recommendation 15 obligations on virtual asset service providers and\
    \ the travel rule requirements under FATF Guidance updated in 2023, since data\
    \ segregation must not become a mechanism for fragmenting the information chains\
    \ that transaction monitoring depends upon.\n\nFrom a regulatory perspective,\
    \ the participation of HSBC and BNP Paribas introduces entities already operating\
    \ under stringent AML frameworks \u2014 MAS Notice MAS 626 in Singapore, the EU's\
