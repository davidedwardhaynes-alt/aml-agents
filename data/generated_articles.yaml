    \ enhanced due diligence for higher-risk customers, and ongoing transaction monitoring.\
    \ A doubling or trebling of maximum loan size is precisely the kind of business\
    \ model change that should trigger an internal AML risk assessment under those\
    \ frameworks.\n\nFrom a financial crime risk perspective, the shift matters for\
    \ several reasons. SME lending at ticket sizes approaching S$1 million enters\
    \ territory where trade-based money laundering, invoice fraud, and beneficial\
    \ ownership obfuscation become materially more attractive to bad actors. FATF's\
    \ guidance on money laundering through the real estate and corporate lending sectors\
    \ notes that larger credit facilities extended with limited collateral verification\
    \ or compressed underwriting timelines present elevated layering risk. Alternative\
    \ lenders competing on speed \u2014 Bizcap's stated differentiator \u2014 must\
    \ demonstrate that accelerated decisioning does not come at the cost of substantive\
    \ beneficial ownership checks under ACRA records and corroborating source-of-funds\
    \ analysis.\n\nFor MLROs at banks that may take referral risk or participate in\
