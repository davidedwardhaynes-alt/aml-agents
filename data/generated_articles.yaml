    \ computers are five, fifteen, or fifty years away, regulated entities face the\
    \ uncomfortable task of calibrating migration timelines and disclosure obligations\
    \ against a deeply uncertain threat horizon.\n\nThe regulatory backdrop makes\
    \ that uncertainty consequential. FATF's updated Recommendation 15 guidance on\
    \ virtual assets requires jurisdictions to ensure VASPs manage technology risks\
