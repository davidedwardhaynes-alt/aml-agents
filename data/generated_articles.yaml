    \ \u2014 information that has historically been opaque for privately held fintechs.\
    \ Simultaneously, institutional shareholders will apply their own financial-crime\
    \ due-diligence standards, effectively creating a market-based accountability\
    \ mechanism that supplements AMLC supervision. Anchor investors subject to FATF\
    \ Recommendation 16 obligations and MAS Notice MAS 626 \u2014 given several likely\
    \ Singapore-domiciled shareholders \u2014 will need to satisfy themselves on the\
