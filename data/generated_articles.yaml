    \ set to be eliminated in the process. For compliance officers, the transaction\
    \ raises immediate questions about continuity of transaction monitoring, suspicious\
    \ transaction reporting, and the allocation of AML obligations across a materially\
    \ restructured operational chain.\n\nThe outsourcing of payment card processing\
    \ to third-party technology providers is not novel \u2014 major European issuers\
    \ have pursued similar arrangements with processors including Worldline, FIS,\
    \ and TSYS for over a decade. What has sharpened regulatory scrutiny of such structures\
    \ is the guidance that has accumulated since FATF Recommendation 18 established\
    \ group-wide programme requirements, and DNB's own supervisory expectations under\
    \ the Dutch Anti-Money Laundering and Anti-Terrorist Financing Act (Wwft), which\
    \ place explicit obligations on regulated institutions to ensure that outsourced\
    \ functions do not dilute the effectiveness of their financial crime controls.\n\
    \nFor ICS and its parent ABN Amro, the compliance implications are layered. First,\
    \ any outsourcing arrangement involving transaction-level data must preserve the\
