  full_article: "Visa's announcement that it will construct a technology layer enabling\
    \ banks to convert traditional deposits into programmable digital money marks\
    \ a significant shift in wholesale payment infrastructure, with direct consequences\
    \ for how financial institutions will need to think about transaction monitoring\
    \ and customer due diligence obligations.\n\nTokenised deposits occupy a regulatory\
    \ grey zone that supervisors are still demarcating. Unlike stablecoins, which\
    \ represent a claim on an issuer outside the conventional banking system, tokenised\
    \ deposits remain a liability of a licensed deposit-taking institution, preserving\
    \ deposit insurance treatment in most jurisdictions. Yet the programmability that\
    \ Visa is marketing \u2014 smart-contract-triggered, always-on settlement \u2014\
    \ introduces automation that existing AML frameworks, built around human-reviewed\
    \ transaction flows, were not designed to interrogate. FATF's updated guidance\
    \ on virtual assets and VASPs, while not squarely applicable to bank-issued tokenised\
    \ deposits, signals the expectation that wire-transfer rules and travel rule obligations\
    \ follow value regardless of its technical form. MAS Notice MAS 626 and its equivalents\
    \ in major markets impose transaction monitoring requirements on the underlying\
    \ institution; the question compliance officers must now confront is whether monitoring\
    \ logic calibrated for batch-settled ACH or SWIFT flows can keep pace with atomic,\
    \ programmable settlement at any hour.\n\nFor banks considering integration with\
    \ Visa's layer, the operational AML implications are considerable. Programmable\
    \ money executing conditional transfers autonomously creates scenarios in which\
    \ the \"transaction\" \u2014 as defined under instruments such as Hong Kong's\
    \ OSCO, Australia's AML/CTF Act, or the EU's AMLD framework \u2014 may be initiated\
    \ without a discrete human instruction at the point of execution. Existing suspicious-transaction-report\
    \ trigger logic, which typically requires a staff member to form a suspicion,\
    \ may need to be re-engineered around rule-execution events rather than payment\
    \ orders. Correspondent banking due diligence adds another layer of complexity:\
    \ if Visa's infrastructure acts as an intermediary technology provider rather\
    \ than a regulated entity in the payment chain, delineating FATF Recommendation\
    \ 13 obligations between the originating bank, the token platform, and the receiving\
    \ institution will require explicit contractual and supervisory clarity.\n\nThe\
    \ pace at which central banks and prudential supervisors formalise tokenised deposit\
    \ frameworks \u2014 the Bank of England's digital securities sandbox and MAS's\
    \ Project Guardian being the most advanced reference points \u2014 will determine\
    \ how quickly banks can move from pilot to production. Visa's positioning as a\
    \ neutral infrastructure provider rather than a deposit issuer is strategically\
    \ deliberate, but compliance teams should not mistake the architectural distance\
    \ from the balance sheet for a reduced obligation to ensure the rails cannot be\
    \ exploited."
