    \ dual listings or managing cross-border fund structures. IOSCO's multilateral\
    \ memorandum of understanding mechanisms depend, in part, on member-regulator\
    \ proactivity.\n\nThe public comment period provides compliance functions an opportunity\
    \ to advocate for clear articulation of where securities-law enforcement and financial-crime\
    \ prevention responsibilities intersect within the revised strategic framework.\
