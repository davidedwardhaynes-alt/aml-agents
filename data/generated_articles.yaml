    \ the existence of a structured complaints body with evidence-preservation requirements\
    \ strengthens the audit trail available to compliance functions.\n\nThe longer-term\
    \ question is whether the OSC's operational data will inform typologies. Aggregated\
    \ patterns of online harassment linked to financial scams or corporate espionage\
    \ could, in time, feed into the risk-intelligence frameworks maintained by the\
    \ Suspicious Transaction Reporting Office, adding a dimension to threat assessment\
    \ that current AML guidance does not yet explicitly address."
