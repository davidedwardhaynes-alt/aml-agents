- id: 64c1344d
  title: "BSP Circular 1022 \u2014 annual AML/CFT independent compliance check"
  description: Annual independent compliance check of the AML/CFT programme by Internal
    Audit or accredited external auditor; findings reported to the BSP-mandated AML/CFT
    Committee and the board.
  jurisdiction: Philippines (AMLC)
  statute_or_notice: BSP Circular 1022 + BSP MORB Part 9
  due_date: '2026-12-31'
  status: Open
  owner: Head of Internal Audit + MLRO
  notes: BSP examiners increasingly probe sample selection methodology and the rigour
    of EDD-on-PEP testing. Coordinate scope with AML/CFT Committee in Q1.
  full_text: "BSP Circular 1022 (the *Updated Anti-Money Laundering / Combating the\
    \ Financing of Terrorism Regulations*) requires BSP-supervised financial institutions\
    \ to subject their AML/CFT programme to independent compliance checking on a regular\
    \ basis. Industry practice \u2014 confirmed by BSP supervisory expectations \u2014\
    \ is annual.\n\nScope must cover the framework end-to-end: customer due diligence\
    \ including beneficial-ownership identification, ongoing monitoring rule effectiveness,\
    \ screening (sanctions, PEP, adverse media), STR and CTR filing governance, training\
    \ adequacy, MLRO independence, and record-keeping (5-year retention).\n\nIndependence\
    \ is a BSP focus. Internal Audit may perform the check provided it has not designed\
    \ or operated any of the controls being tested. Where Internal Audit lacks specialist\
    \ capability (e.g. KYT for VASP-licensed institutions, EDD testing for high-net-worth\
    \ private banking), external co-source is expected.\n\nFindings, management response\
    \ and remediation plan are tabled at the AML/CFT Committee and the board. Open\
    \ items carry into the BSP supervisory examination cycle."
  deadline_explanation: Annual. BSP supervises on a calendar-year basis. Audit fieldwork
    typically completes by 30 November so the report lands at the December AML/CFT
    Committee and board meeting. The 31 December year-end deadline reflects this practical
    anchor.
  evidence: Independent compliance check engagement letter; risk-based audit plan;
    sample selection methodology; testing workpapers; report to AML/CFT Committee
    and board; minute extracts; remediation tracker.
