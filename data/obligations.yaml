  penalties: ''
  common_mistakes: ''
- id: 95e27291
  title: "AML/CFT Act 2009 s.59 \u2014 biennial independent audit"
  description: "Biennial independent audit of the AML/CFT programme \u2014 scope,\
    \ control effectiveness, training, governance \u2014 by Internal Audit, external\
    \ auditor, or qualified consultant. Findings to senior management and the supervisor."
  jurisdiction: New Zealand (FIU NZ)
  statute_or_notice: AML/CFT Act 2009 s.59 + AML/CFT Regulations
  due_date: '2026-12-31'
  status: Open
  owner: Internal Audit + AML/CFT Compliance Officer
  notes: "Biennial cadence under s.59 \u2014 but most reporting entities elect annual\
    \ cycle to align with the AML/CFT Annual Report (s.60). RBNZ / FMA / DIA inspections\
    \ expect either way."
  full_text: 'Section 59 of the AML/CFT Act 2009 requires every reporting entity to
    ensure its AML/CFT programme is audited at least every 2 years. The audit must
    be carried out by an appropriately qualified person who is independent of the
    function being audited. Internal Audit may perform the audit provided it has not
    designed or operated any of the controls being tested.


    Scope must cover the full AML/CFT programme: institutional risk assessment; CDD
    and EDD; ongoing monitoring; PTR + SAR governance with goAML reconciliation; sanctions
    and PEP screening; training; record-keeping. Sectoral supervisor expectations
    (RBNZ for banks/NBDTs/life insurers; FMA for FMA-supervised entities; DIA for
    casinos / remittance / DNFBPs) layer on additional testing focus.


    Audit findings are reported to senior management; supervisors expect the audit
    report to be provided on request and are entitled under the Act to require its
    production. The s.60 Annual Report (separate obligation) incorporates the auditor''s
    findings.'
  deadline_explanation: Biennial minimum. Most reporting entities elect annual audit
    cycle to align with the s.60 Annual Report (due 31 August each year for entities
    with March balance date, 30 November for June balance date, etc.). The 31 December
    anchor reflects the calendar-year supervisory examination cycle.
  evidence: Audit charter / engagement letter; risk-based audit plan; sample selection;
    testing workpapers; audit report; remediation tracker; supervisor's audit-report
    request file.
  source_url: https://www.legislation.govt.nz/act/public/2009/0035/latest/whole.html
  priority: Standard
  entities_impacted: ''
  penalties: ''
