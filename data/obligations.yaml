- id: f88d1d7e
  title: "AMLA s.9 / AMLC Registration \u2014 STR + CTR continuous filing"
  description: 'Continuous obligation to file Suspicious Transaction Reports and Covered
    Transaction Reports with AMLC within 5 working days of suspicion / threshold breach.
    STR threshold: reasonable ground to suspect. CTR threshold: PHP 500,000 single-day
    cash.'
  jurisdiction: Philippines (AMLC)
  statute_or_notice: AMLA RA 9160 s.9 + AMLA-IRR Rule 9 + BSP Circular 1022
  due_date: '2026-12-31'
  status: In progress
  owner: Compliance Officer / MLRO
  notes: "Continuous obligation tracked via STR + CTR governance KPI: median alert-to-filing\
    \ latency target \u22645 working days; CTR completeness reconciled monthly against\
    \ branch cash logs."
  full_text: "Section 9 of the Anti-Money Laundering Act of 2001 (RA 9160, as amended)\
    \ imposes the core STR and CTR filing obligations on all covered persons. The\
    \ STR obligation is continuous and crystallises when the institution has reasonable\
    \ ground to suspect that a transaction relates to one of the predicate offences\
    \ listed in s.3(i). The CTR obligation is bright-line: any single-day cash transaction\
    \ at PHP 500,000 or above must be reported.\n\nReports are filed to AMLC via the\
    \ AMLC Portal. Designated Compliance Officers / MLROs are accountable. The 5-working-day\
    \ filing window applies to both STR and CTR (AMLA-IRR Rule 9.1).\n\nFailure to\
    \ file is sanctionable under AMLA s.14 \u2014 administrative fines per violation\
    \ per day plus criminal penalties for officers found responsible. Late filings\
    \ are treated as non-compliant unless a documented systems-failure exception applies.\n\
    \nBSP Circular 1022 reinforces the obligation for BSP-supervised institutions\
    \ and adds expectations on transaction-monitoring rule effectiveness, EDD on PEPs\
    \ and high-risk customers, and AML compliance officer independence. The compliance\
    \ officer reports the STR filing-latency dashboard to the board quarterly."
  deadline_explanation: 'Continuous obligation. The 31 December year-end deadline
    shown here is a tracking anchor for the annual STR + CTR governance KPI: zero
    AMLA s.9 timeliness exceptions outstanding at year-end, and CTR-completeness reconciliation
    closed.'
  evidence: AMLC Portal submission log; STR + CTR reference numbers; alert-to-filing
    latency dashboard; CTR-vs-branch-cash-log reconciliation; tipping-off log (zero
    entries expected); compliance officer quarterly board pack.
  source_url: https://www.amlc.gov.ph/
