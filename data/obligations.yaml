- id: c85af21c
  title: "FSC Supervisory Regulation \u2014 annual AML/CFT independent audit"
  description: Annual independent audit of the AML/CFT programme covering CDD, EDD,
    transaction monitoring, sanctions screening, STR governance, and training. Findings
    reported to the board and Audit Committee.
  jurisdiction: Korea (KoFIU)
  statute_or_notice: FSC Supervisory Regulation on AML/CFT + FSS Inspection Manual
  due_date: '2026-12-31'
  status: Open
  owner: Internal Audit + Junseo Tamdang Imja
  notes: FSS inspections post-2021 emphasise voice-phishing transaction-monitoring
    rule effectiveness. Coordinate scope with Audit Committee in Q1.
  full_text: 'FSC Supervisory Regulations and the FSS Inspection Manual require FSC/FSS-supervised
    financial institutions to conduct annual independent audits of their AML/CFT programmes.
    Scope must cover: institutional risk assessment; CDD and EDD; ongoing transaction
    monitoring with specific testing of voice-phishing-mule and BCM-investment-scam-mule
    pattern detection; sanctions and PEP screening; STR + CTR governance and KoFIU
    reconciliation; VASP-specific FTRA Article 5-2 obligations where applicable (travel-rule
    data exchange, high-risk wallet screening); training; record-keeping.


    Independence is a FSS supervisory expectation. Internal Audit may perform the
    audit provided it has not designed or operated any of the controls being tested.
    External co-source is expected for VASP testing and complex sanctions exposure
    (DPRK / North Korea nexus).


    Findings are reported to the Audit Committee and the board. Open items carry into
    the FSS supervisory inspection cycle. The 2021 FTRA amendments raised the bar
    for VASP audits significantly.'
  deadline_explanation: Annual. FSC supervises on a calendar-year basis. Audit fieldwork
    typically completes by November so the report lands at the December board / Audit
    Committee meeting. The 31 December deadline reflects this practical anchor.
  evidence: Audit Committee-approved audit plan; testing workpapers; audit report;
    board minute extract; remediation tracker; FSS supervisory examination response
    file.
  source_url: https://www.fsc.go.kr/eng/
  priority: Standard
