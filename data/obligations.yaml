- id: ccd5c59a
  title: "FSA AML/CFT Inspection Manual \u2014 annual independent review"
  description: Annual independent review of the AML/CFT programme by Internal Audit
    or external auditor, with findings reported to the board (*torishimari-yakukai*)
    and the FSA-mandated AML committee.
  jurisdiction: Japan (JAFIC)
  statute_or_notice: FSA AML/CFT Inspection Manual + APTCP Act
  due_date: '2026-12-31'
  status: Open
  owner: "Internal Audit + H\u014Dkoku Sekinin-sha"
  notes: FSA inspections post-2022 have probed the rigour of tokushu-sagi mule-victim
    transaction-monitoring. Coordinate scope with audit committee in Q2.
  full_text: "The FSA AML/CFT Inspection Manual obliges FSA-supervised financial institutions\
    \ to conduct an annual independent review of their AML/CFT programme. Scope includes:\
    \ institutional risk assessment; CDD (Honnin Tokutei Jik\u014D Kakunin); enhanced\
    \ due diligence on PEPs and high-risk customers; ongoing monitoring rule effectiveness\
    \ with specific testing of tokushu-sagi mule-victim red-flag indicators; sanctions\
    \ and PEP screening; STR governance and JAFIC reconciliation; training; record-keeping\
    \ (7-year retention under APTCP Act).\n\nThe reviewer must be independent of the\
    \ function being reviewed. Internal Audit may perform the review provided it has\
    \ not designed or operated any of the controls being tested. External co-source\
    \ is expected for specialist scope (e.g., crypto-asset exchange service provider\
    \ AML/CFT, trade-finance sanctions screening).\n\nFindings are reported to the\
    \ board (torishimari-yakukai) and any FSA-mandated AML committee. Open items at\
    \ year-end are tracked through to closure and disclosed in the bank's FSA supervisory\
    \ examination response."
  deadline_explanation: Annual. Most Japanese financial institutions follow a March-end
    fiscal year. Audit fieldwork typically completes by January-February so the report
    can be tabled at the March board meeting. The 31 December deadline shown here
    reflects the standard FSA-aligned calendar-year review anchor for foreign-bank
    branches and FSA-supervised institutions on a December year-end.
  evidence: Independent review charter; risk-based audit plan; sample selection methodology;
    testing workpapers; board minute extracts; FSA inspection-response file; remediation
    tracker.
  source_url: https://www.fsa.go.jp/en/laws_regulations/index.html
  priority: Standard
  entities_impacted: ''
  penalties: ''
  common_mistakes: ''
- id: dbf77ef3
  title: "FTRA Article 4 \u2014 STR continuous filing obligation"
  description: Continuous obligation to file Suspicious Transaction Reports with KoFIU
    without delay (jichae-eobsi) once reasonable suspicion is formed. Tipping-off
    prohibited under FTRA Article 12.
  jurisdiction: Korea (KoFIU)
  statute_or_notice: FTRA Article 4 + FTRA Enforcement Decree + FSC Notice
  due_date: '2026-12-31'
  status: In progress
  owner: Junseo Tamdang Imja (designated Compliance Officer)
  notes: 'Continuous obligation. Median STR filing latency target: 30 days. KoFIU
    publishes quarterly Sangye Sarye (suspicious-pattern case examples); align internal
    red-flag library.'
  full_text: "Article 4 of the Act on Reporting and Use of Specific Financial Transaction\
    \ Information (FTRA) imposes the core STR filing obligation on every Bogo Gigwan\
    \ (reporting institution). The obligation is continuous and crystallises when\
    \ the institution has reasonable suspicion that a transaction relates to a predicate\
    \ offence under the Act on Regulation and Punishment of Concealment of Criminal\
    \ Proceeds, that the customer's identity may be false, or that the transaction\
    \ may be related to terrorism financing.\n\nReports are filed to KoFIU via the\
    \ electronic reporting system. 'Without delay' (jichae-eobsi) is the standard;\
    \ industry practice targets within 30 days for routine STRs and immediate filing\
    \ for terrorism-financing-suspected transactions.\n\nArticle 12 prohibits disclosure\
    \ of the STR to the customer or to any unauthorised party. Articles 17-18 prescribe\
    \ administrative fines up to KRW 30 million and criminal penalties (imprisonment\
    \ up to 1 year and/or fines up to KRW 10 million) for officers found responsible.\
    \ The 2021 amendments substantially raised penalties for VASPs.\n\nCTR (Currency\
    \ Transaction Report) for cash transactions \u2265 KRW 10 million in a single\
    \ banking day is filed automatically and separately. STR is filed in addition\
    \ where suspicion exists; both obligations apply."
  deadline_explanation: 'Continuous obligation. The 31 December year-end deadline
    shown here is the annual KPI tracking anchor: zero FTRA Article 4 timeliness exceptions
    outstanding at year-end.'
  evidence: KoFIU electronic-reporting submission log; STR reference numbers; alert-to-filing
    latency dashboard; tipping-off log (zero entries); Compliance Officer quarterly
    board pack; FSC/FSS inspection-response file.
  source_url: https://www.kofiu.go.kr/
