- id: 6e348f85
  title: "Tranche 2 \u2014 phased commencement of new reporting entities"
  description: Pre-commencement registration with AUSTRAC for Tranche 2 obligations
    (legal practitioners, accountants, real estate professionals, conveyancers, dealers
    in precious metals and stones, and trust and company service providers).
  jurisdiction: Australia (AUSTRAC SMR)
  statute_or_notice: AML/CTF Amendment (Reform) Act 2024 + AUSTRAC implementation
    schedule
  due_date: '2026-06-30'
  status: Open
  owner: Managing Partner + appointed AML/CTF Compliance Officer
  notes: 'Phased: registration window opens early 2026, full obligations commence
    1 July 2026 for in-scope sectors per AUSTRAC schedule.'
  full_text: "The Anti-Money Laundering and Counter-Terrorism Financing Amendment\
    \ (Tranche 2) Act 2024 extends Australia's AML/CTF regime to designated non-financial\
    \ businesses and professions (DNFBPs). The reform brings Australia into alignment\
    \ with FATF Recommendation 22 \u2014 a gap that has been a recurring finding in\
    \ successive FATF mutual evaluations of Australia.\n\nIn-scope sectors: legal\
    \ practitioners, accountants and registered tax/BAS agents, real estate professionals,\
    \ conveyancers, dealers in precious metals and stones, and trust and company service\
    \ providers (TCSPs).\n\nImplementation is phased. Registration windows opened\
    \ progressively from early 2026; full AML/CTF Program implementation, customer-identification,\
    \ ongoing-monitoring and Suspicious Matter Report (SMR) obligations commence on\
    \ 1 July 2026 for the largest cohort.\n\nPre-commencement actions for in-scope\
    \ firms: (1) appoint an AML/CTF Compliance Officer; (2) draft Parts A and B of\
    \ the AML/CTF Program; (3) implement a customer-identification procedure for new\
    \ and existing clients (with risk-based look-back for existing); (4) register\
    \ with AUSTRAC; (5) implement the Independent Review timetable from year 2."
  deadline_explanation: "30 June 2026 is the AUSTRAC pre-commencement registration\
    \ deadline for the first cohort. Some sub-sectors and smaller firms have later\
    \ phase-in dates \u2014 check the AUSTRAC implementation schedule for your specific\
    \ sector."
  evidence: AUSTRAC registration confirmation; AML/CTF Compliance Officer appointment
    letter; draft AML/CTF Program; CIP policy; existing-client risk-based look-back
    plan; staff training register.
  source_url: https://www.austrac.gov.au/business/new-to-the-regime-tranche-2-reforms
  priority: Standard
  entities_impacted: ''
  penalties: ''
  common_mistakes: ''
- id: ab74dfd2
  title: "AML/CTF Rules Part 13 \u2014 annual compliance report"
  description: Annual compliance report to AUSTRAC summarising the reporting entity's
    compliance with the AML/CTF Act and Rules over the preceding 12 months.
  jurisdiction: Australia (AUSTRAC SMR)
  statute_or_notice: AML/CTF Act s.47 + AML/CTF Rules Part 13
  due_date: '2026-03-31'
  status: Closed
  owner: AML/CTF Compliance Officer
  notes: FY2025 cycle closed; FY2026 cycle opens January 2027 for lodgement by 31
    March 2027.
  full_text: 'Section 47 of the AML/CTF Act and AML/CTF Rules Part 13 require all
    reporting entities (other than those expressly exempt) to lodge an annual compliance
    report with AUSTRAC. The report is lodged through the AUSTRAC Online portal using
    the prescribed online form.


    Coverage period is the preceding calendar year (1 January to 31 December). The
    report attests to the reporting entity''s compliance with each applicable AML/CTF
    obligation and identifies any non-compliance, with explanation and remediation.


    Wilfully or recklessly making a false or misleading statement in the annual compliance
    report attracts criminal penalties under AML/CTF Act s.137. AUSTRAC''s compliance
    team uses the report as a primary input into supervisory prioritisation; discrepancies
    between the report and observed activity (SMR patterns, threshold transaction
    reports, IFTI reports) are a common trigger for enforcement engagement.'
  deadline_explanation: 31 March each year, covering the preceding calendar year.
    AUSTRAC Online opens lodgement around mid-January. No routine extensions; technical-issue
    extensions handled case-by-case.
  evidence: AUSTRAC Online lodgement confirmation; supporting evidence binder for
    each attestation; board / governance committee endorsement of the report before
    lodgement.
  source_url: https://www.austrac.gov.au/business/how-comply-and-report-guidance-and-resources/reporting/compliance-reports
  priority: Standard
