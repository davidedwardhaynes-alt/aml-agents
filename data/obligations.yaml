- id: 8b81654f
  title: "APTCP Act Article 8 \u2014 STR continuous filing (without delay)"
  description: Continuous obligation to file Suspicious Transaction Reports with JAFIC
    without delay (ichihaku-naku) once suspicion is formed. Tipping-off prohibited
    under Article 8(3).
  jurisdiction: Japan (JAFIC)
  statute_or_notice: APTCP Act Article 8 + FSA Inspection Manual + Cabinet Order
  due_date: '2026-12-31'
  status: In progress
  owner: "H\u014Dkoku Sekinin-sha (designated AML reporter)"
  notes: "Continuous obligation. Median STR filing latency target: 30 days from internal\
    \ escalation. JAFIC publishes Sank\u014D Jirei (reference cases) annually; align\
    \ internal red-flag library."
  full_text: "Article 8(1) of the Act on Prevention of Transfer of Criminal Proceeds\
    \ (APTCP Act) imposes the core STR filing obligation on every Tokutei Jigy\u014D\
    sha (specified business operator). The obligation is continuous and crystallises\
    \ when the institution has suspicion that the transaction relates to criminal\
    \ proceeds under the Sotaih\u014D or Mayaku tokurei-h\u014D predicate offence\
    \ framework.\n\nReports are filed to JAFIC (within the National Police Agency)\
    \ via the JAFIC online portal. The standard is 'without delay' (ichihaku-naku)\
    \ \u2014 for FSA-supervised institutions, supervisory expectations target median\
    \ filing within 30 days of internal MLRO determination, with same-day filing for\
    \ high-risk patterns.\n\nArticle 8(3) prohibits disclosure of the STR to the customer\
    \ or to any unauthorised party. Articles 25-26 prescribe administrative fines\
    \ up to JPY 1 million and criminal penalties (imprisonment up to 6 months and/or\
    \ fines up to JPY 500,000) for officers found responsible for non-filing or for\
    \ tipping-off.\n\nFSA-supervised institutions additionally face supervisory expectations\
    \ from the FSA AML/CFT Inspection Manual on STR governance \u2014 quarterly MLRO\
    \ review, tipping-off log (zero entries), and reconciliation against JAFIC acknowledgements."
  deadline_explanation: 'Continuous obligation. The 31 December year-end deadline
    shown here is the annual KPI tracking anchor: zero APTCP Article 8 timeliness
    exceptions outstanding at year-end.'
  evidence: JAFIC online-portal submission log; STR reference numbers; alert-to-filing
    latency dashboard (30-day target); tipping-off log (zero entries); MLRO quarterly
    board pack; FSA inspection-readiness file.
  source_url: https://www.npa.go.jp/sosikihanzai/jafic/
  priority: Standard
