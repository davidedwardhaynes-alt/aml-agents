- id: 11f1d4a8
  title: "UU TPPU 2010 Article 23 \u2014 LTKM continuous filing (3-day window)"
  description: Continuous obligation to file LTKM (Suspicious Financial Transaction
    Reports) with PPATK via GRIPS within 3 working days of suspicion crystallisation.
    Tipping-off prohibited under Article 12.
  jurisdiction: Indonesia (PPATK)
  statute_or_notice: UU TPPU 2010 Article 23 + POJK 12/POJK.01/2017 + PPATK Head Reg
    series
  due_date: '2026-12-31'
  status: In progress
  owner: Pejabat Penanggung Jawab APU-PPT (MLRO equivalent)
  notes: "Continuous obligation tracked via LTKM governance KPI: median alert-to-filing\
    \ latency target \u22643 working days; tighter window than SG / HK / MY peers."
  full_text: 'Article 23 of Law No. 8 of 2010 on Prevention and Eradication of Money
    Laundering Crimes (UU TPPU) imposes the core LTKM filing obligation on all *Pihak
    Pelapor* (reporting parties). The obligation is continuous and crystallises when
    the institution knows or has reasonable suspicion that a transaction relates to
    one of the predicate offences listed in Article 2.


    Reports are filed to PPATK via GRIPS (Gathering Reports & Information Processing
    System) within 3 working days. This window is materially shorter than peer jurisdictions
    (5 days in SG and PH, ''as soon as practicable'' in HK and MY) and drives Indonesian
    banks to invest in same-day MLRO triage capacity.


    Article 12 prohibits *Pihak Pelapor* and its officers from disclosing the existence
    of an LTKM to the *Pengguna Jasa* (customer). Article 27 prescribes criminal penalties
    (imprisonment up to 5 years and/or fines up to IDR 1 billion) for officers found
    responsible for non-filing or for tipping-off.


    POJK 12/POJK.01/2017 and PBI 23/6/PBI/2021 layer additional transaction-monitoring,
    EDD-on-PEP, and customer-due-diligence expectations onto the underlying UU TPPU
    obligation.'
  deadline_explanation: 'Continuous obligation. The 31 December year-end deadline
    shown here is the annual KPI tracking anchor: zero UU TPPU Article 23 timeliness
    exceptions outstanding at year-end.'
  evidence: GRIPS submission log; LTKM reference numbers; alert-to-filing latency
    dashboard (3-day target); tipping-off log (zero entries); MLRO quarterly board
    pack; reconciliation against PPATK acknowledgements.
  source_url: https://www.ppatk.go.id/
  priority: Standard
  entities_impacted: ''
  penalties: ''
  common_mistakes: ''
- id: a7887fe6
  title: "POJK 12/POJK.01/2017 \u2014 annual AML/CFT programme review + audit"
  description: Annual review of the AML/CFT programme by Internal Audit with findings
    to the Risk Oversight Committee and the Board of Commissioners. Independent assurance
    on CDD, monitoring, screening, LTKM governance, training.
  jurisdiction: Indonesia (PPATK)
  statute_or_notice: POJK 12/POJK.01/2017 (as amended) + Surat Edaran OJK related
  due_date: '2026-12-31'
  status: Open
  owner: Internal Audit + Pejabat Penanggung Jawab APU-PPT
  notes: Coordinate with Risk Oversight Committee on testing scope by end-Q1. OJK
    examiners focus on EDD-on-PEP rigour and BI-FAST transaction-monitoring rule effectiveness.
  full_text: 'POJK 12/POJK.01/2017 (Penerapan Program Anti Pencucian Uang dan Pencegahan
    Pendanaan Terorisme di Sektor Jasa Keuangan), as amended, is the foundational
    AML/CFT regulation for OJK-supervised financial institutions in Indonesia. It
    mandates annual independent review of the institution''s AML/CFT programme.


    Scope is end-to-end: institutional risk assessment; CDD (including beneficial-ownership
    *Pemilik Manfaat* identification under PPATK Head Regulation requirements); EDD
    on PEPs, foreign customers, and customers in higher-risk sectors; transaction
    monitoring including BI-FAST and RTGS rule effectiveness; screening (sanctions,
    PEP, adverse media); LTKM and LTKT governance; training; record-keeping (5-year
    retention); MLRO independence.


    Independent Audit reports findings to the Risk Oversight Committee (RoC) and the
    Board of Commissioners (Dewan Komisaris). The two-tier governance structure means
    the Board of Commissioners must record active engagement with the findings rather
    than pro forma acknowledgement.


    OJK examination teams routinely sample-test the audit workpapers as part of their
    supervisory examination, with particular focus on whether the testing of EDD-on-PEP
    and the rigour of transaction-monitoring rule calibration are robust.'
  deadline_explanation: Annual. OJK supervises on a calendar-year basis. Audit fieldwork
    typically completes by 30 November so the report lands at the December RoC / Board
    of Commissioners meeting. The 31 December year-end deadline reflects this practical
    anchor.
  evidence: Risk-based audit plan (RoC-approved); sample selection methodology; testing
    workpapers; Internal Audit report; RoC + Dewan Komisaris minute extracts; remediation
    tracker; OJK supervisory examination response file.
  source_url: https://www.ojk.go.id/
