- id: bd7d15d3
  title: "MAS Notice 626 \xA713 \u2014 FY2025 annual independent AML/CFT audit"
  description: Annual independent audit of the AML/CFT framework covering the FY2025
    calendar year. Findings tabled at the December 2025 board / audit committee. Many
    institutions completed the audit but did not close out the prior-year findings.
  jurisdiction: Singapore (STRO)
  statute_or_notice: "MAS Notice 626 \xA713 + MAS thematic review on AML/CFT 2024"
  due_date: '2025-12-31'
  status: Overdue
  owner: Head of Internal Audit + MLRO
  notes: "Where prior-year findings remain open, supervisory letters in MAS's Q1 2026\
    \ cycle have been escalating to S$100k\u2013500k administrative fines."
  full_text: "MAS Notice 626 \xA713 obliges every bank to subject its AML/CFT framework\
    \ to a regular independent audit. Industry standard and MAS supervisory expectation\
    \ is annual.\n\nFY2025 fieldwork was expected to complete by 30 November 2025\
    \ with the report tabled at the December 2025 audit-committee and board meeting.\
    \ Institutions that completed the fieldwork but failed to track FY2024 prior-year\
    \ findings to closure are non-compliant on the substance of \xA713 even if the\
    \ calendar audit happened.\n\nMAS's thematic review programme has, since 2024,\
    \ added specific testing of: (i) PEP and high-risk customer EDD evidence quality;\
    \ (ii) the integrity of beneficial-owner verification on legal-entity customers;\
    \ and (iii) the operational effectiveness of transaction-monitoring rules tuned\
    \ for retail mule-account detection."
  deadline_explanation: "Annual cycle anchored on MAS's calendar-year supervision.\
    \ FY2025 audit was due by 31 December 2025. Once past that date, the obligation\
    \ is 'overdue' until the FY2025 report is tabled and prior-year findings are closed\
    \ \u2014 which is what MAS examines in the Q1 2026 inspection cycle."
  evidence: FY2025 audit charter; risk-based audit plan; testing workpapers; report
    to audit committee; board minutes; FY2024 prior-year-findings closure evidence;
    MAS S140 supervisory-information return where requested.
  source_url: https://www.mas.gov.sg/regulation/notices/notice-626
  priority: Critical
  entities_impacted: "All MAS-licensed banks (full banks, wholesale banks, merchant\
    \ banks, finance companies). Also captures Digital Full Banks and Digital Wholesale\
    \ Banks. Sister \xA713-equivalents in MAS Notice 1014 (DPT service providers),\
    \ MAS Notice 824 (insurers), MAS Notice 314 (CMS licensees) carry the same expectation.\
    \ Foreign-bank branches are captured by the \xA713 obligation in addition to the\
    \ parent's global audit."
  penalties: "Administrative fines up to S$1 million per breach under MAS Act s.165\
    \ + civil penalties under the AML/CFT framework. Officer-level sanctions: prohibition\
    \ orders barring named officers from re-employment in the regulated sector. Recent\
    \ precedent \u2014 MAS's 2023 S$3.7m AML control-deficiency fine on a wholesale\
    \ bank, with the \xA713 audit-deficiency as a contributing finding. Secondary\
    \ consequences: correspondent-bank de-risking by US/EU correspondents, Basel rating\
    \ downgrade, and exclusion from MAS's Sandbox-Express and Cybersecurity Toolkit\
    \ programmes."
  common_mistakes: "1. Treating the \xA713 audit as a tick-box exercise \u2014 running\
    \ the same testing scope year after year without re-baselining to MAS's current\
    \ thematic priorities.\n\n2. Failing to close prior-year findings before the next\
    \ audit fires; MAS examiners read prior-year-finding closure as a leading indicator\
    \ of programme maturity.\n\n3. Allowing Internal Audit to test controls that Internal\
    \ Audit's own staff have helped design \u2014 breaches the independence requirement.\n\
    \n4. Sample sizes too small to detect the patterns MAS is specifically asking\
    \ about (mule-account detection, EDD documentation quality on PEPs).\n\n5. Audit\
    \ report discussing controls in vendor-product language ('Actimize tuned to AUM\
    \ thresholds') instead of regulator-defensible language tied back to MAS's red-flag\
    \ indicators and the underlying typology."
- id: 448157d5
  title: "HKMA AML/CFT Guideline \xA711 \u2014 CY 2024 self-assessment return"
  description: Annual self-assessment return covering CY 2024 reporting period. Submitted
    via the HKMA-prescribed Excel template with Internal Audit independent validation.
  jurisdiction: Hong Kong (JFIU)
  statute_or_notice: "HKMA AML/CFT Guideline \xA711 + SPM CG-5 + AMLO Schedule 2"
  due_date: '2025-09-30'
  status: Overdue
  owner: MLRO + Internal Audit
  notes: HKMA accepted the bulk of submissions but issued follow-up deficiency letters
    to ~30% of AIs in Q4 2025. Banks that have not yet responded to the deficiency
    letter are now in escalation territory.
  full_text: "HKMA AML/CFT Guideline \xA711 obliges every Authorised Institution (AI)\
    \ to submit an annual AML/CFT self-assessment return covering the prior calendar-year\
    \ reporting period. The return covers eight control areas: institutional risk\
    \ assessment; CDD; sanctions screening; STR / monitoring; training; record-keeping;\
    \ governance and audit; AMLO Schedule 2 specific obligations.\n\nFor CY 2024 \u2014\
    \ covering 1 January to 31 December 2024 \u2014 the return was due by 30 September\
    \ 2025. HKMA's AML Surveillance and Cooperation Division reviewed submissions\
    \ in October-December 2025 and issued deficiency letters in Q4 2025 to AIs whose\
    \ self-rating evidence or remediation plans fell below expectations.\n\nAIs that\
    \ have not yet provided a substantive response to the deficiency letter are now\
    \ non-compliant with \xA711 and exposed to thematic on-site inspection in 2026."
  deadline_explanation: Annual cycle. The CY 2024 return was due by 30 September 2025;
    deficiency-letter responses were typically due 60 days from issuance (i.e., end
    of January 2026). Past that point, HKMA's standard escalation is to a thematic
    on-site.
  evidence: Submitted self-assessment template (Excel + supporting binder); Internal
    Audit independent validation report; HKMA submission acknowledgement; deficiency-letter
    response and remediation plan with closure dates; board minute extract recording
    the response.
  source_url: https://www.hkma.gov.hk/eng/regulatory-resources/regulatory-guides/by-subject-current/aml-cft/
  priority: Critical
  entities_impacted: "All HKMA-supervised Authorised Institutions: licensed banks,\
    \ restricted-licence banks, deposit-taking companies (DTCs), and the eight HKMA-licensed\
    \ virtual banks (ZA Bank, Mox, livi, WeLab, Ant Bank HK, Airstar, Fusion, Welab\
    \ Bank). Foreign-bank branches in HK are captured. SFC AML/CFT Guideline \xA7\
    6 and IA AML/CFT Guideline impose parallel self-assessment obligations on SFC-licensed\
    \ corporations and authorised insurers respectively."
  penalties: "AMLO s.21 \u2014 administrative penalties up to HK$10 million per breach\
    \ + ongoing daily fines. HKMA Banking Ordinance powers: licence-condition variation,\
    \ public reprimand under s.71B, and criminal prosecution of officers under AMLO\
    \ s.5 for systemic non-compliance. Recent precedent: HKMA's HK$18 million fine\
    \ on a virtual bank in early 2026 where \xA711 deficiencies were a contributing\
    \ factor. Secondary consequences: correspondent-bank de-risking, Hong Kong Banking\
    \ Industry CDD Council escalation, and FATF-MEC visibility ahead of the next mutual\
    \ evaluation."
  common_mistakes: "1. Self-rating control areas as 'Effective' without the supporting\
    \ evidence to back it up \u2014 HKMA's deficiency letters routinely cite this\
    \ as the top finding.\n\n2. Treating the Internal Audit independent validation\
    \ as a desktop review rather than substantive sample testing.\n\n3. Submitting\
    \ the template without the supporting evidence binder, then scrambling when the\
    \ HKMA inspector requests it.\n\n4. Inconsistent self-ratings across the eight\
    \ control areas \u2014 HKMA examiners look for self-awareness; uniform 'Effective'\
    \ across all eight is read as lack of rigour.\n\n5. AMLO Schedule 2 specific-requirement\
    \ testing skipped or done thinly. Schedule 2 is the bright-line statutory anchor\
    \ \u2014 failing here is a \xA75 criminal exposure, not a guideline deficiency.\n\
    \n6. Failing to escalate the deficiency-letter response to the board; HKMA expects\
    \ board-level oversight of any rating below 'Effective'."
- id: 0197c3b2
  title: "AUSTRAC AML/CTF Rules Part 13 \u2014 CY 2024 annual compliance report"
  description: Annual compliance report lodged via AUSTRAC Online for the CY 2024
    reporting period. Late lodgement attracts daily civil penalties; misleading attestation
    attracts criminal liability under s.137.
  jurisdiction: Australia (AUSTRAC SMR)
  statute_or_notice: AML/CTF Act 2006 s.47 + AML/CTF Rules Part 13
  due_date: '2025-03-31'
  status: Overdue
  owner: AML/CTF Compliance Officer
  notes: Reporting entities that lodged late or with material inaccuracies have been
    issued AUSTRAC enforceable undertakings in late 2025. Tranche 2 first-cohort entities
    filed for the first time and many got the scope wrong.
  full_text: 'AML/CTF Act s.47 + AML/CTF Rules Part 13 require every reporting entity
    (other than those expressly exempt) to lodge an annual compliance report through
    AUSTRAC Online. The report attests to the reporting entity''s compliance with
    each applicable obligation over the preceding calendar year (1 January to 31 December).


    The CY 2024 lodgement was due 31 March 2025. Entities that lodged late were referred
    for civil-penalty review; entities whose CY 2024 report contained false or misleading
    statements (about SMR governance, IFTI completeness, or threshold transaction
    reporting) face criminal liability under AML/CTF Act s.137.


    AUSTRAC''s Compliance team uses the report as a primary supervisory input. Discrepancies
    between the attestation and observed activity (SMR patterns, threshold-transaction-report
    volumes, IFTI volumes) trigger compliance engagement that has materially escalated
    since the 2024 Crown / Star casino enforcement actions.'
  deadline_explanation: 31 March each year, covering the preceding calendar year.
    AUSTRAC Online opens lodgement around mid-January. Routine extensions are not
    granted; technical-issue extensions are handled case-by-case by the compliance
    team. Any lodgement after 31 March without a documented AUSTRAC technical-issue
    extension is non-compliant.
  evidence: AUSTRAC Online lodgement confirmation with timestamp; supporting evidence
    binder per attestation; board / governance committee endorsement of the report
    content before lodgement; reconciliation of SMR + TTR + IFTI numbers against AUSTRAC
    Online submission logs.
  source_url: https://www.austrac.gov.au/business/how-comply-and-report-guidance-and-resources/reporting/compliance-reports
  priority: High
  entities_impacted: 'All AML/CTF Act-regulated reporting entities: ADIs (banks, credit
    unions, mutuals, neobanks); life and general insurers providing investment-style
    products; designated remittance service providers; gambling service providers
    (casinos, wagering, online platforms); bullion dealers; AUSTRAC-registered DCEs;
    ASIC-licensed securities and derivatives dealers. From 1 July 2026 the population
    expands to include Tranche 2 reporting entities (lawyers, accountants, real estate
    agents, conveyancers, precious metals dealers, TCSPs).'
  penalties: "Civil penalties under AML/CTF Act s.184 \u2014 up to 50,000 penalty\
    \ units (~AUD 16.5 million as of 2026) per contravention for body corporates;\
    \ 10,000 penalty units (~AUD 3.3 million) for natural persons. Late lodgement\
    \ is a continuing offence \u2014 fines accumulate per day. Misleading attestations\
    \ under s.137 carry criminal liability \u2014 up to 10 years' imprisonment for\
    \ officers. Recent precedent: AUSTRAC's enforceable undertakings in 2025 against\
    \ three remittance providers, all of which named CY 2023/2024 compliance-report\
    \ inaccuracies as a driver. Secondary consequences: AML/CTF Act s.236A remediation\
    \ order, ASIC referral for ASIC-licensed entities, and AUSTRAC public 'Compliance\
    \ and Enforcement' publication naming the entity."
  common_mistakes: "1. Attesting 'compliant' on AML/CTF Program Part A when the institution\
    \ has not actually conducted the annual Part A board-level review \u2014 AUSTRAC\
    \ cross-checks against filed Part A versions.\n\n2. Under-reporting Threshold\
    \ Transaction Reports \u2014 IFTIs and TTRs the institution actually filed don't\
    \ reconcile against the compliance-report numbers.\n\n3. Treating the report as\
    \ the AML/CTF Officer's own submission without board / governance committee endorsement\
    \ of the attestations.\n\n4. Filing on 31 March at 23:55 with no time to cure\
    \ any technical lodgement failure \u2014 every late lodgement after midnight is\
    \ a continuing breach.\n\n5. For Tranche 2 first-cohort entities (lawyers, accountants,\
    \ real-estate agents): scoping errors \u2014 treating non-captured client engagements\
    \ as captured, or vice versa. AUSTRAC's first-cohort guidance has explicit scope\
    \ examples and entities that ignored them filed either over-broad or under-broad\
    \ attestations.\n\n6. Missing the cross-reference to s.236 Annual Report Public-Sector\
    \ Disclosure where applicable."
- id: 15fb12a0
  title: "POJK 12/POJK.01/2017 \u2014 CY 2024 annual AML/CFT programme review"
  description: Annual independent review of the AML/CFT programme covering the CY
    2024 reporting period. Findings to the Risk Oversight Committee and the Board
    of Commissioners (Dewan Komisaris).
  jurisdiction: Indonesia (PPATK)
  statute_or_notice: POJK 12/POJK.01/2017 (as amended by POJK 23/2019 and subsequent
    amendments) + Surat Edaran OJK
  due_date: '2025-06-30'
  status: Overdue
  owner: Internal Audit + Pejabat Penanggung Jawab APU-PPT
  notes: OJK supervisory examinations in H2 2025 identified that approximately 40%
    of Bank Umum had completed the review but had not closed out the BI-FAST transaction-monitoring
    rule recalibration findings. Significant penalty exposure.
  full_text: "POJK 12/POJK.01/2017, as amended, mandates annual independent review\
    \ of the AML/CFT programme for OJK-supervised financial institutions. Scope is\
    \ end-to-end: institutional risk assessment; CDD including beneficial-owner identification\
    \ under PPATK Head Regulation requirements; EDD on PEPs and high-risk customers;\
    \ transaction-monitoring rule effectiveness \u2014 with explicit post-2023 testing\
    \ of BI-FAST and RTGS rule calibration; screening; LTKM + LTKT governance; training;\
    \ record-keeping (5-year retention).\n\nThe CY 2024 review cycle was expected\
    \ to complete and report to the Risk Oversight Committee + Board of Commissioners\
    \ by 30 June 2025. OJK examination teams in H2 2025 specifically tested whether\
    \ the review captured: (i) BI-FAST migration impact on rule calibration; (ii)\
    \ Pemilik Manfaat (beneficial-owner) verification rigour on legal-entity customers;\
    \ and (iii) the post-2021 amendment Tipologi BCM (investment-scam mule-victim\
    \ layering) detection capability.\n\nInstitutions that completed the review but\
    \ have not closed the BI-FAST or Tipologi BCM findings are now exposed to OJK\
    \ supervisory action."
  deadline_explanation: Annual cycle. The CY 2024 review was due by 30 June 2025 (industry
    standard for Indonesian banks on a calendar-year cycle). Past that date the obligation
    is overdue until findings are closed and reported to the Dewan Komisaris.
  evidence: Risk-based audit plan (RoC-approved); sample selection methodology; testing
    workpapers; Internal Audit report; RoC + Dewan Komisaris minute extracts; remediation
    tracker showing BI-FAST and Tipologi BCM findings to closure; OJK supervisory
    examination response file.
  source_url: https://www.ojk.go.id/
  priority: High
  entities_impacted: 'All OJK-supervised financial institutions: Bank Umum (commercial
    banks, including the four state-owned banks Mandiri / BRI / BNI / BTN, the syariah
    commercial banks, foreign-bank branches); BPR / BPRS (rural banks); insurers and
    reinsurers (life, general, syariah); securities companies and asset managers;
    fintech P2P lending platforms; multifinance / consumer-finance; pension funds;
    custodian banks. BI-supervised payment-service providers (e-money issuers OVO
    / GoPay / DANA / ShopeePay / LinkAja, payment-system providers, money remitters)
    face equivalent obligations under PBI 23/6/PBI/2021. Bappebti-registered Pedagang
    Aset Kripto are subject to a parallel review obligation under Bappebti regulation.'
  penalties: "OJK administrative sanctions under UU OJK Article 8: warning letter\
    \ (peringatan tertulis); restriction on business activities; written prohibition\
    \ on directors/commissioners; suspension of business; revocation of licence. Administrative\
    \ fines up to IDR 30 billion per violation. Officer-level: prohibition orders\
    \ barring directors and commissioners (the Dewan Direksi and Dewan Komisaris)\
    \ from re-employment in OJK-supervised entities. Criminal exposure under UU TPPU\
    \ 2010 Article 27 if the review failure results in non-detection of an LTKM-required\
    \ transaction \u2014 imprisonment up to 5 years and/or fines up to IDR 1 billion.\
    \ Secondary consequences: OJK's *Daftar Hitam* (black list) registration of officers,\
    \ correspondent-bank de-risking by Singaporean and Hong Kong correspondents, and\
    \ FATF-MEC visibility ahead of Indonesia's mutual evaluation cycle."
  common_mistakes: "1. Treating the review as an audit of the previous year's policies\
    \ without testing whether BI-FAST migration (which substantially changed transaction-volume\
    \ profiles) was reflected in rule recalibration.\n\n2. Pemilik Manfaat (beneficial-owner)\
    \ testing limited to the institution's own register without cross-checking against\
    \ MoU-shared corporate registry data \u2014 OJK examiners explicitly probe this.\n\
    \n3. Tipologi BCM detection logic absent or not refreshed since the 2021 PPATK\
    \ advisory \u2014 institutions that did not update their TM rules are exposed.\n\
    \n4. Reporting findings to the Dewan Direksi but not actively presenting them\
    \ to the Dewan Komisaris (the two-tier governance structure requires both layers).\n\
    \n5. Independent Audit overlap with the design team \u2014 OJK's independence\
    \ test is strict and any prior involvement in the controls being reviewed disqualifies\
    \ the audit.\n\n6. For VASPs (Bappebti-registered Pedagang Aset Kripto): treating\
    \ the OJK POJK 12 review as not applicable when the entity has any OJK-supervised\
    \ parent or sister operation \u2014 the review obligation cascades."
- id: cab47de4
  title: "BSP Circular 1022 \u2014 CY 2024 annual independent compliance check"
  description: Annual independent compliance check of the AML/CFT programme for BSP-supervised
    financial institutions. Findings to the AML/CFT Committee + Board.
  jurisdiction: Philippines (AMLC)
  statute_or_notice: BSP Circular 1022 + BSP MORB Part 9
  due_date: '2025-09-30'
  status: Overdue
  owner: Head of Internal Audit + MLRO
  notes: "BSP examinations in Q4 2025 issued formal findings on EDD-on-PEP testing\
    \ rigour. Many banks have findings open from this cycle that should have been\
    \ closed by March 2026 \u2014 overdue closure exposes to escalation."
  full_text: "BSP Circular 1022 (the Updated AML/CFT Regulations) obliges BSP-supervised\
    \ financial institutions to subject their AML/CFT programme to an annual independent\
    \ compliance check. Scope must be end-to-end: CDD, EDD on PEPs and high-risk customers,\
    \ ongoing transaction-monitoring rule effectiveness, screening, STR + CTR filing\
    \ governance, training, MLRO independence, record-keeping (5-year retention).\n\
    \nThe CY 2024 cycle was due by 30 September 2025 \u2014 industry standard for\
    \ BSP-supervised institutions on a calendar-year cycle. BSP's examination team\
    \ in Q4 2025 specifically probed: (i) EDD-on-PEP documentation quality; (ii) transaction-monitoring\
    \ rule coverage of AMLC's BCM-investment-scam typology; and (iii) the post-amendment\
    \ SARC reconciliation between internal STR logs and AMLC Portal acknowledgements.\n\
    \nInstitutions that completed the compliance check but have not yet closed BSP\
    \ examination findings are non-compliant on the substance even if the calendar\
    \ deliverable was filed."
  deadline_explanation: Annual. BSP supervises on a calendar-year basis. CY 2024 compliance
    check was due by 30 September 2025; examination findings issued in Q4 2025 typically
    have 60-90 day closure windows. Past March 2026, open findings escalate to formal
    supervisory action.
  evidence: Compliance check engagement letter; risk-based audit plan; sample selection
    methodology (covering at minimum 5% of high-risk customers and 100% of PEP relationships);
    testing workpapers; report to AML/CFT Committee and board; minute extracts; BSP
    examination findings file and closure tracker.
  source_url: https://www.bsp.gov.ph/SitePages/Regulations/AML.aspx
  priority: High
  entities_impacted: 'All BSP-supervised financial institutions: universal banks,
    commercial banks (UKBs/KBs), thrift banks, rural and cooperative banks, NSSLAs,
    quasi-banks, money service businesses (MSBs/RTCs), electronic money issuers (EMIs
    incl. GCash, Maya, GrabPay PH), virtual-asset service providers, pawnshops, foreign-exchange
    dealers, and offshore banking units. Sister Circular 1108 series obligations apply
    to EMIs and VASPs; Sister AMLC Resolution series applies to casinos and DNFBPs.'
  penalties: "BSP administrative monetary penalties under MORB Part 9 \u2014 fines\
    \ up to PHP 1 million per violation per day for continuing breaches. Section 14\
    \ of AMLA prescribes criminal penalties for officers found responsible \u2014\
    \ imprisonment from 6 months to 6 years and/or fines from PHP 100,000 to PHP 500,000.\
    \ BSP licensing-related consequences: licence-condition variation, board / senior-officer\
    \ disapproval (BSP officer-fitness framework), and in the most-serious cases public\
    \ censure under MORB. Recent precedent: BSP's PHP 35 million combined fine on\
    \ three EMIs in late 2025 for AML programme deficiencies. Secondary consequences:\
    \ SBC-MAS / HKMA / BSP cross-supervisor information sharing escalation, correspondent-bank\
    \ de-risking, and FATF-MEC visibility ahead of Philippines' next mutual evaluation."
  common_mistakes: "1. EDD-on-PEP documentation thin \u2014 relying on commercial\
    \ PEP-list flag rather than a substantive source-of-wealth narrative. BSP examiners\
    \ specifically probe this.\n\n2. Treating the compliance check as a Q4 deliverable\
    \ and not running rolling continuous-monitoring throughout the year.\n\n3. Internal\
    \ Audit performing the check without independence from the AML programme's design\
    \ \u2014 BSP's independence test is strict.\n\n4. AMLC Portal acknowledgement\
    \ reconciliation not performed \u2014 institutions assume submission = acknowledgement.\n\
    \n5. For EMIs: failing to test whether the e-wallet's rapid-in-and-out monitoring\
    \ rule is calibrated for the AMLC BCM-mule typology \u2014 many EMIs use generic\
    \ thresholds that miss this pattern.\n\n6. For BSP-licensed VASPs: failing to\
    \ integrate KYT (Chainalysis / TRM Labs / Elliptic) alert dispositioning into\
    \ the compliance check \u2014 BSP Circular 1108 requires this and CY 2024 examinations\
    \ specifically test it.\n\n7. Reporting to the AML/CFT Committee but not escalating\
    \ non-Effective ratings to the board."
- id: 384fbfff
  title: "MAS Notice PSN02 \u2014 DPT EDD amendments effective 1 January 2026"
  description: DPT service providers required to implement enhanced EDD on customers
    depositing > SGD 50,000 / 90 days, wallet-screening for darknet/mixer/sanctions-cluster
    exposure, and customer-protection messaging on scam-victim mule patterns.
  jurisdiction: Singapore (STRO)
  statute_or_notice: MAS Notice PSN02 (revised) + MAS Guidelines on AML/CFT for DPT
    service providers
  due_date: '2026-01-01'
  status: Overdue
  owner: MLRO + Head of Crypto-AML
  notes: MAS thematic review in Q1 2026 found that 6 of 11 MAS-licensed DPT providers
    had not fully completed the wallet-screening control. Public censure expected
    for non-compliant institutions in Q2 2026.
  full_text: "MAS Notice PSN02 was revised in H2 2025 (consultation concluded September\
    \ 2025; final notice issued Q4 2025) with three new substantive obligations effective\
    \ 1 January 2026 for MAS-licensed Digital Payment Token (DPT) service providers:\n\
    \n1. **Source-of-funds EDD threshold** lowered to SGD 50,000 / 90 days (from SGD\
    \ 80,000 / 90 days), specifically targeting the BCM-mule layering pattern.\n\n\
    2. **Wallet-screening obligation** \u2014 providers must use a KYT vendor (Chainalysis,\
    \ TRM Labs, Elliptic, or equivalent) to screen all inbound and outbound transactions\
    \ for darknet, sanctions, mixer, and scam-cluster exposure. The screening must\
    \ be operational, not retrospective; alert disposition logs are auditable.\n\n\
    3. **Customer-protection messaging** \u2014 providers must implement in-app messaging\
    \ triggered on detected scam-victim mule patterns, in coordination with the Singapore\
    \ Police Force's Anti-Scam Centre.\n\nMAS's Q1 2026 thematic review of the 11\
    \ MAS-licensed DPT providers found significant non-compliance on the wallet-screening\
    \ control. Six providers had not fully operationalised the KYT vendor integration\
    \ \u2014 three were still in vendor selection, two had selected vendors but not\
    \ gone live, one had gone live but without alert dispositioning."
  deadline_explanation: Effective date 1 January 2026. No grace period. MAS Notice
    amendments take effect on the date specified in the gazetted notice; non-compliance
    from day one is actionable. The thematic review in Q1 2026 (concluded March 2026)
    is the basis for the public censure cycle expected in Q2 2026.
  evidence: KYT vendor contract and integration go-live attestation; alert disposition
    log (last 90 days of operation); EDD threshold-trigger log (samples of customers
    above SGD 50,000 / 90 days); customer-protection messaging screen captures and
    trigger-rule documentation; MLRO attestation; MAS thematic-review response file.
  source_url: https://www.mas.gov.sg/regulation/notices
  priority: Critical
  entities_impacted: "All MAS-licensed DPT service providers under the Payment Services\
    \ Act 2019 (the 11 currently-licensed providers + any additional providers licensed\
    \ in 2026). Sister obligations apply to: MAS-licensed major payment institutions\
    \ handling DPT transfers; FSA-licensed money changers acting as DPT counterparties\
    \ (limited scope); and SFC-equivalent retail brokers offering DPT-linked products.\
    \ Banks holding custody of DPT assets for clients are captured under MAS Notice\
    \ 626 + the cross-reference in PSN02 \xA710."
  penalties: 'MAS Act s.165 administrative fines up to S$1 million per breach + ongoing
    daily fines for continuing breaches. Payment Services Act licence-related consequences:
    licence-condition variation, public censure under PSA s.27, suspension of licence
    (PSA s.28), revocation. Officer-level: prohibition orders. Recent precedent: MAS''s
    2024 enforcement action against a DPT provider for AML control deficiencies (S$2.4
    million fine + two-year prohibition order on the MLRO). Secondary consequences:
    STRO information-sharing escalation, correspondent-bank de-risking by SG banks
    acting as DPT counterparties, and exclusion from MAS''s regulatory sandboxes.'
  common_mistakes: "1. Treating the SGD 50,000 / 90-day threshold as the trigger for\
    \ an alert rather than the trigger for EDD \u2014 the obligation is to PERFORM\
    \ EDD at this threshold, not merely flag.\n\n2. Using KYT vendor scoring without\
    \ dispositioning the alerts \u2014 MAS examiners reviewed alert closure rates\
    \ and many DPT providers had >80% auto-close rates which is unsustainable under\
    \ PSN02.\n\n3. Customer-protection messaging implemented as a generic disclaimer\
    \ rather than triggered on specific scam-victim patterns \u2014 MAS expects pattern-triggered,\
    \ not blanket, messaging.\n\n4. Wallet-screening limited to outbound transactions\
    \ \u2014 PSN02 explicitly requires inbound screening too.\n\n5. KYT vendor integration\
    \ in 'demo mode' (vendor scoring visible but not feeding into TM rules / alert\
    \ queue).\n\n6. Mixed treatment across the provider's various DPT products (e.g.,\
    \ screening in place for the spot product but not for the lending product).\n\n\
    7. Failing to coordinate with the Anti-Scam Centre before launching customer-protection\
    \ messaging \u2014 the PSN02 obligation explicitly contemplates SPF-ASC alignment\
    \ on the messaging content."
- id: c1b219e2
  title: "AML/CFT Act 2009 s.59 \u2014 biennial independent audit (CY 2023-2025 cycle)"
  description: Biennial AML/CFT programme audit for reporting entities on the 2-year
    cycle. CY 2023-2025 audit due by Q4 2025. Many DIA-supervised DNFBPs missed.
  jurisdiction: New Zealand (FIU NZ)
  statute_or_notice: AML/CFT Act 2009 s.59 + AML/CFT Regulations
  due_date: '2025-12-31'
  status: Overdue
  owner: Internal Audit + AML/CFT Compliance Officer
  notes: DIA's Q1 2026 inspection cycle has begun issuing formal warnings to DIA-supervised
    reporting entities (lawyers, real estate agents) that did not commission the audit
    by 31 December 2025.
  full_text: "Section 59 of the AML/CFT Act 2009 requires every reporting entity to\
    \ ensure its AML/CFT programme is audited at least every 2 years. The audit must\
    \ be carried out by a qualified person who is independent of the function being\
    \ audited.\n\nFor reporting entities on the CY 2023-2025 cycle (i.e., those whose\
    \ last audit completed in CY 2023), the next audit was due by 31 December 2025.\
    \ RBNZ, FMA, and DIA supervisors have been clear in published guidance that the\
    \ 2-year clock runs from the prior audit completion date, not the entity's choice\
    \ of cycle.\n\nDIA's Q1 2026 inspection cycle, focusing on lawyers, conveyancers,\
    \ real-estate agents, and accountants in the high-value-property sector, has begun\
    \ issuing formal warnings to entities that did not commission the audit by 31\
    \ December 2025. RBNZ and FMA cycles are running similar testing on RBNZ-supervised\
    \ banks and FMA-supervised issuers respectively.\n\nReporting entities that elected\
    \ the annual audit cycle (s.60 Annual Report path) are not directly captured by\
    \ this obligation \u2014 but the s.59 minimum still applies if the annual cycle\
    \ slips."
  deadline_explanation: Biennial. The 2-year clock runs from the prior audit completion
    date. For entities on the CY 2023-2025 cycle, the deadline was 31 December 2025.
    Entities that elected an annual cycle and met it are exempt; entities that elected
    biennial and missed are now non-compliant.
  evidence: Audit charter / engagement letter dated; risk-based audit plan; sample
    selection; testing workpapers; audit report; remediation tracker; supervisor (RBNZ
    / FMA / DIA) audit-report-availability file.
  source_url: https://www.legislation.govt.nz/act/public/2009/0035/latest/whole.html
  priority: High
  entities_impacted: 'All AML/CFT Act 2009 reporting entities: RBNZ-supervised registered
    banks, NBDTs, life insurers; FMA-supervised issuers, fund managers, FAPs, custodians;
    DIA-supervised casinos (SkyCity, Christchurch, Dunedin, Hamilton, Queenstown),
    money remitters, currency exchanges, lawyers / conveyancers, accountants (captured
    activities), real-estate agents, DHVGs, and TCSPs. The CY 2023-2025 cycle particularly
    captures DIA-supervised DNFBPs that elected biennial after their first 2021 audit.'
  penalties: 'AML/CFT Act ss.91-93: civil penalties up to NZD 200,000 for natural
    persons and NZD 2 million for body corporates per breach; criminal penalties up
    to 2 years'' imprisonment and/or NZD 300,000 (natural) / NZD 5 million (corporate).
    Recent precedent: DIA''s NZD 4 million fine on a real-estate group in 2025 for
    AML programme failures, of which audit deficiencies were a contributing finding.
    Secondary consequences: supervisor''s right to publish non-compliance under s.140;
    correspondent-bank de-risking by Australian and US correspondents; FATF visibility
    ahead of NZ''s mutual evaluation. For lawyers and conveyancers: New Zealand Law
    Society referral for professional conduct review.'
  common_mistakes: "1. Conflating the s.59 biennial audit with the s.60 Annual Report.\
    \ They are separate obligations and the Annual Report does not substitute for\
    \ the audit.\n\n2. Counting from the audit start date rather than the audit completion\
    \ date \u2014 supervisors run the 2-year clock from completion.\n\n3. For DIA-supervised\
    \ lawyers and accountants: treating the audit as not required because the captured\
    \ activities are 'small'. The Act has no minimum-volume exemption.\n\n4. Engaging\
    \ an auditor without specific AML/CFT experience \u2014 supervisors test for auditor\
    \ competence, not just independence.\n\n5. Relying on the parent group's audit\
    \ (for foreign-owned entities). The s.59 obligation is on the NZ reporting entity;\
    \ parent audits do not substitute.\n\n6. Missing the supervisor-availability requirement\
    \ \u2014 supervisors are entitled to require production of the audit report on\
    \ request, and many entities do not have it filed in a way that allows rapid production."
- id: a78ec107
  title: "BNM AMLA s.13 \u2014 FY2024 CTR completeness reconciliation"
  description: Annual reconciliation of cash transaction reports filed under AMLA
    s.13 against BNM's FINS acknowledgement records, plus branch-level un-filed-batch
    close-out for FY2024. Overdue for ~30% of conventional banks per BNM Q1 2026 examination
    findings.
  jurisdiction: Malaysia (FIED)
  statute_or_notice: AMLA 2001 s.13 + BNM AML/CFT Sectoral Guidelines
  due_date: '2025-09-30'
  status: Overdue
  owner: MLRO + Head of Branch Operations
  notes: BNM examiners in Q1 2026 specifically test branch-level un-filed CTR batches;
    overdue closure exposes to s.86 administrative-action escalation.
  full_text: "AMLA s.13 imposes a continuous CTR (Cash Transaction Report) filing\
    \ obligation on every reporting institution for cash transactions equal to or\
    \ exceeding RM 25,000 in a single transaction. Reports are filed via BNM's FINS\
    \ portal, and FY2024 saw ~RM 2.3 billion of CTRs filed across the Malaysian banking\
    \ sector.\n\nThe annual reconciliation closes the loop: every CTR captured by\
    \ the bank's transaction-monitoring system at branch and head-office level must\
    \ reconcile against the FINS acknowledgement record. BNM's Sectoral Guidelines\
    \ set the expectation that this reconciliation completes within 90 days of year-end\
    \ (i.e., 30 September for the calendar-year FY2024 cycle).\n\nBranch-level un-filed\
    \ batches are the most common finding. BNM's Q1 2026 examination cycle has documented\
    \ that approximately 30% of conventional banks had unreconciled branch CTR batches\
    \ from FY2024 \u2014 typically due to manual branch-to-head-office transfer failures,\
    \ over-the-counter thresholds being applied incorrectly, or system-integration\
    \ gaps with newer branch tellers."
  deadline_explanation: Annual cycle. The FY2024 CTR reconciliation was due 30 September
    2025. Past that date, BNM examiners treat any remaining un-reconciled FY2024 CTRs
    as a compliance deficiency. The 31 December 2025 hard-stop reflects the BNM-issued
    grace period for institutions with branch-system migrations underway in 2025.
  evidence: FINS submission log; reconciliation workpapers; branch-by-branch un-filed-batch
    tracker; remediation closure file; MLRO sign-off; BNM examination response file.
  source_url: https://amlcft.bnm.gov.my/
  priority: High
  entities_impacted: 'All BNM-supervised reporting institutions: commercial banks
    (domestic + foreign-bank branches), Islamic banks, investment banks, development
    financial institutions, insurers, takaful operators, money services businesses,
    remittance-agency licensees, and prescribed DNFBPs (legal, accounting, real estate,
    gem and precious-metals dealers, TCSPs). The CTR threshold of RM 25,000 has not
    been revised since 2014 and applies uniformly.'
  penalties: "AMLA s.86 administrative penalties \u2014 up to RM 1 million per breach\
    \ + ongoing daily fines for continuing breaches. Officer-level criminal exposure\
    \ under AMLA s.13(2) \u2014 imprisonment up to 1 year and/or fines up to RM 1\
    \ million. BNM's Securities Commission cross-supervisor coordination channel triggers\
    \ in serious cases. Recent precedent: BNM's RM 8 million combined fine on three\
    \ local banks in Q3 2025 for AMLA s.13/14 deficiencies. Secondary consequences:\
    \ correspondent-bank de-risking by Singaporean and Hong Kong correspondents, FATF-MEC\
    \ visibility ahead of Malaysia's next mutual evaluation."
  common_mistakes: "1. Branch-level CTR batches not flowing through to head-office\
    \ consolidation \u2014 typically due to manual transfer failures or system-integration\
    \ gaps.\n\n2. RM 25,000 threshold applied inconsistently across branches (some\
    \ apply per-transaction, some per-day-per-customer). The s.13 rule is per-transaction;\
    \ aggregation rules are separate under s.14 (structuring).\n\n3. FY2024 reconciliation\
    \ treated as a tick-box rather than substantive sample testing of the reconciled\
    \ records against branch teller logs.\n\n4. CTRs filed but BNM acknowledgements\
    \ not retrieved \u2014 submission \u2260 acknowledgement, and BNM's reconciliation\
    \ test runs the other direction.\n\n5. Foreign-currency-equivalent CTRs (cash\
    \ deposits in USD/SGD that exceed RM 25,000 equivalent) often missed by branch\
    \ tellers using the SGD/USD-denominated thresholds from internal product templates\
    \ rather than the RM-denominated AMLA threshold.\n\n6. Overlap with AMLA s.14\
    \ STR governance mishandled \u2014 where a CTR is filed but the underlying activity\
    \ also triggers STR suspicion, both must be filed."
- id: b52d3836
  title: "FSA CAESP AML/CFT Guideline \u2014 2024-amendment effectiveness review"
  description: Annual review of Crypto-Asset Exchange Service Provider (CAESP) AML/CFT
    controls under the 2024 FSA Guideline amendments. First review cycle covers the
    period from the amendment's effective date in October 2024.
  jurisdiction: Japan (JAFIC)
  statute_or_notice: FSA Crypto-Asset Exchange Service Provider AML/CFT Guidelines
    (2024 amendments) + APTCP Act
  due_date: '2025-10-31'
  status: Overdue
  owner: "Head of Crypto-AML + H\u014Dkoku Sekinin-sha"
  notes: Affects the ~30 FSA-registered CAESPs (bitFlyer, Coincheck, GMO Coin, Bitbank,
    BitTrade, etc.). FSA's Q1 2026 thematic review found ~half had not completed the
    post-amendment review.
  full_text: "The FSA's 2024 amendments to the Crypto-Asset Exchange Service Provider\
    \ (Ansh\u014D K\u014Dkan-gy\u014Dsha) AML/CFT Guidelines introduced three substantive\
    \ new obligations effective 1 October 2024:\n\n1. **Travel-rule data exchange**\
    \ for transactions \u2265 JPY 100,000 between FSA-registered CAESPs and foreign\
    \ counterparty exchanges, aligned with FATF Recommendation 16's travel-rule expectations.\n\
    \n2. **High-risk wallet screening** using KYT vendors (Chainalysis, TRM Labs,\
    \ Elliptic) for inbound and outbound transfers; alert dispositioning logs auditable.\n\
    \n3. **Mandatory reporting of mixer/tumbler exposure** \u2014 any transfer with\
    \ \u2265 2-hop exposure to a designated mixer must be considered for STR filing.\n\
    \nThe first effectiveness review cycle was due by 31 October 2025 \u2014 one year\
    \ after the amendment effective date. FSA's Q1 2026 thematic review found approximately\
    \ half of the registered CAESPs had not completed substantive review of the new\
    \ obligations. Subsequent FSA on-site inspections have begun in Q2 2026."
  deadline_explanation: Annual cycle anchored to the amendment's October 2024 effective
    date. The 31 October 2025 deadline is one year from effective date. Subsequent
    annual reviews fall on the same anchor.
  evidence: "Travel-rule data-exchange sample; KYT vendor alert-disposition log; mixer-exposure\
    \ STR consideration log; review report to FSA + JAFIC; remediation tracker; H\u014D\
    koku Sekinin-sha sign-off; FSA on-site inspection response file."
  source_url: https://www.fsa.go.jp/en/news/index.html
  priority: High
  entities_impacted: "All FSA-registered Crypto-Asset Exchange Service Providers (*Ansh\u014D\
    \ K\u014Dkan-gy\u014Dsha*) \u2014 approximately 30 currently-registered providers\
    \ including bitFlyer, Coincheck, GMO Coin, Bitbank, BitTrade, BITPoint, Liquid\
    \ by FTX (rebranded), and others. Sister obligations apply to FSA-registered Crypto-Asset\
    \ Custodial Service Providers and to Type I and Type II Financial Instruments\
    \ Business Operators (FIBOs) that interact with crypto-assets in their investment-advisory\
    \ or asset-management products."
  penalties: "FSA Banking Act + Payment Services Act administrative penalties \u2014\
    \ fines up to JPY 30 million per breach + ongoing daily fines. Officer-level criminal\
    \ exposure under APTCP Article 25 \u2014 imprisonment up to 6 months and/or fines\
    \ up to JPY 500,000. Critically, the FSA can issue **business-improvement orders**\
    \ (gy\u014Dmu kaizen meirei) under the Payment Services Act, which require the\
    \ CAESP to halt new customer onboarding until remediation is complete \u2014 a\
    \ commercially severe consequence. Recent precedent: FSA's August 2025 business-improvement\
    \ order against a mid-tier CAESP for AML deficiencies including inadequate travel-rule\
    \ implementation. Secondary consequences: JVCEA (Japan Virtual Currency Exchange\
    \ Association) self-regulation review; potential withdrawal of correspondent banking\
    \ support from JPY-onramp banking partners."
  common_mistakes: "1. Travel-rule data-exchange limited to peer FSA-registered CAESPs;\
    \ not extended to foreign counterparties. The 2024-amendment scope explicitly\
    \ includes cross-border transfers where the counterparty CAESP is identifiable.\n\
    \n2. KYT vendor scoring deployed but alerts auto-closed at >85% \u2014 not sustainable\
    \ under FSA expectations. FSA examiners explicitly review alert closure rates.\n\
    \n3. Mixer-exposure STR consideration log is binary (file/don't-file) without\
    \ documented MLRO opinion on each non-filed alert. APTCP Article 8 requires a\
    \ documented MLRO opinion on every alert escalated.\n\n4. JPY 100,000 travel-rule\
    \ threshold treated as the trigger for a check rather than the trigger for the\
    \ actual data exchange. The obligation is to EXCHANGE data above this threshold,\
    \ not merely to flag.\n\n5. Travel-rule data fields incomplete (e.g., physical-address\
    \ field omitted). FATF-RWG specifies the required fields; partial-data exchange\
    \ is non-compliant.\n\n6. JVCEA self-regulation findings ignored \u2014 JVCEA's\
    \ industry-association Q3 2025 thematic review identified the same issues, but\
    \ compliance teams treated the JVCEA findings as advisory rather than substantively\
    \ remediating."
- id: 19a1b120
  title: "HKMA SPM CG-5 \u2014 Q4 2025 STR Quality Thematic Review response"
  description: HKMA issued a Q4 2025 thematic review of STR narrative quality across
    HKMA-supervised AIs, with deficiency letters issued to ~25% of the AI population
    in early 2026. Closure of the Q4 2025 thematic findings is the current obligation.
  jurisdiction: Hong Kong (JFIU)
  statute_or_notice: HKMA SPM CG-5 (Guideline on Anti-Money Laundering and Counter-Financing
    of Terrorism) + AMLO Schedule 2
  due_date: '2026-04-30'
  status: Overdue
  owner: MLRO + Head of FCC
  notes: 'Q4 2025 thematic findings: STR narratives lacking specific reference to
    the predicate-offence indicia, and weak EDD documentation supporting the suspicion
    rationale. ~25% of HKMA AIs received deficiency letters.'
  full_text: "The HKMA's Q4 2025 thematic review of STR quality is the third in a\
    \ multi-year cycle examining STR governance across HKMA-supervised Authorised\
    \ Institutions. Findings issued December 2025 with formal deficiency letters in\
    \ January 2026 to approximately 25% of the AI population.\n\nTwo predominant findings:\n\
    \n1. **STR narrative quality**: many AIs file STRs that describe the activity\
    \ but fail to articulate the specific predicate-offence indicia. The HKMA expects\
    \ every STR to reference the relevant Crimes Ordinance schedule offence(s) by\
    \ name and to explain why the analyst believes the suspicion crystallises against\
    \ that predicate.\n\n2. **EDD documentation supporting suspicion rationale**:\
    \ where the suspicion rationale relies on customer profile deviation or PEP status,\
    \ the supporting EDD documentation is often thin or stale. AMLO Schedule 2 \xA7\
    5(4) requires that EDD information be 'kept up to date and relevant' \u2014 stale\
    \ EDD is a Schedule 2 breach in its own right, independent of the STR.\n\nClosure\
    \ of the deficiency-letter findings was due by 30 April 2026. AIs with open findings\
    \ beyond that date face escalation to thematic on-site inspection in Q3 2026."
  deadline_explanation: "Deficiency-letter closure window: 90 days from issuance (letters\
    \ issued January 2026 \u2192 30 April 2026 closure deadline). HKMA does not grant\
    \ routine extensions; technical-issue extensions are case-by-case."
  evidence: Sample of revised STR narratives demonstrating predicate-offence-specific
    language; EDD-refresh logs for the thematic-review sample customer cohort; deficiency-letter
    response with closure dates; revised internal STR-quality QA scoresheet; MLRO
    sign-off; board / Risk Committee minute extract recording the review.
  source_url: https://www.hkma.gov.hk/eng/regulatory-resources/regulatory-guides/by-subject-current/aml-cft/
  priority: High
  entities_impacted: "All HKMA-supervised Authorised Institutions: licensed banks\
    \ (Tier 1 / 2 / foreign-bank branches), restricted-licence banks, deposit-taking\
    \ companies, the eight HKMA-licensed virtual banks, and Stored Value Facility\
    \ licensees of HKMA. Sister obligations under SFC AML/CFT Guideline \xA76 capture\
    \ SFC-licensed corporations; under IA AML/CFT Guideline capture authorised insurers."
  penalties: "AMLO s.21 \u2014 administrative penalties up to HK$10 million per breach\
    \ + ongoing daily fines. HKMA Banking Ordinance powers: licence-condition variation,\
    \ public reprimand under s.71B, and AMLO s.5 criminal prosecution of officers\
    \ for systemic non-compliance. The HKMA published two enforcement actions in Q1\
    \ 2026 specifically citing STR-quality deficiencies as a contributing finding\
    \ (combined HK$22 million in fines). Secondary consequences: Banking Industry\
    \ CDD Council escalation; correspondent-bank de-risking by US/EU correspondents;\
    \ FATF-MEC visibility."
  common_mistakes: "1. STR narrative describes the activity ('cash deposits totalling\
    \ HK$3 million across 5 days') but does not name the predicate-offence ('possible\
    \ drug-trafficking proceeds layering under Drug Trafficking (Recovery of Proceeds)\
    \ Ordinance Schedule 1 offences').\n\n2. Suspicion rationale relies on PEP status\
    \ without current PEP-list refresh or supporting open-source intelligence.\n\n\
    3. EDD documentation 'on file' is stale \u2014 original source-of-wealth narrative\
    \ dated 2 years ago, not refreshed despite the AMLO Schedule 2 \xA75(4) currency\
    \ requirement.\n\n4. 'Reasonable grounds' element under AMLO insufficiently documented\
    \ \u2014 the analyst's rationale is recorded as a single sentence rather than\
    \ the multi-paragraph narrative HKMA expects.\n\n5. Cross-reference to prior STRs\
    \ on the same customer absent \u2014 HKMA examiners look for awareness of pattern.\n\
    \n6. Deficiency-letter response treated as administrative rather than substantive\
    \ \u2014 many AIs respond with 'we agree, we will improve' without producing the\
    \ revised STR sample, the EDD-refresh evidence, or the QA-scoresheet update."
- id: 28b3dfdb
  title: "FTRA Article 5-2 \u2014 VASP travel-rule second-anniversary compliance review"
  description: "Two years after the FTRA Article 5-2 VASP travel-rule obligations\
    \ took effect (March 2022 \u2192 second anniversary March 2024 \u2192 annual review\
    \ March 2026). VASPs missing the review are exposed to KoFIU + FSC enforcement."
  jurisdiction: Korea (KoFIU)
  statute_or_notice: FTRA Article 5-2 + KoFIU Notice 2021-06 + 2024 amendments
  due_date: '2026-03-31'
  status: Overdue
  owner: VASP Compliance Officer (Junseo Tamdang Imja)
  notes: Affects all four major Korean exchanges (Upbit, Bithumb, Coinone, Korbit)
    and any FTRA-registered foreign-domiciled exchange operating in Korea. KoFIU's
    Q2 2026 thematic review focuses on travel-rule data-exchange completeness.
  full_text: "FTRA Article 5-2 (the VASP-specific obligations introduced in March\
    \ 2021 with first effective date March 2022) imposes:\n\n1. **Customer identification**\
    \ at registration (not just at first transaction).\n\n2. **Travel-rule data exchange**\
    \ for transactions \u2265 KRW 1 million between FTRA-registered VASPs \u2014 sender\
    \ and beneficiary information must be exchanged on the transfer.\n\n3. **High-risk\
    \ wallet screening** for transactions to/from non-FTRA-registered counterparties.\n\
    \n4. **Annual travel-rule effectiveness review** \u2014 KoFIU added this in the\
    \ 2024 amendments. The review tests sample-based completeness of sender/beneficiary\
    \ data, exception logs, and the VASP's compliance with KoFIU's Notice 2021-06\
    \ data-format requirements.\n\nThe first annual review under the 2024 amendments\
    \ was due by 31 March 2026 (the second anniversary of the Article 5-2 first-effective\
    \ date plus the 2024-amendment lead time). KoFIU's Q2 2026 thematic-review programme\
    \ tests this."
  deadline_explanation: Annual review by 31 March each year. The 31 March 2026 deadline
    corresponds to the first annual review under the 2024 FTRA amendments. Past that
    date, VASPs are exposed to KoFIU thematic-review escalation.
  evidence: "Travel-rule data-exchange sample (\u22655% of qualifying transfers);\
    \ exception log; counterparty-VASP-list completeness check; high-risk wallet screening\
    \ logs; review report to FSC + KoFIU; remediation tracker."
  source_url: https://www.kofiu.go.kr/
  priority: High
  entities_impacted: "All FTRA-registered Virtual Asset Service Providers \u2014 the\
    \ four major Korean exchanges (Upbit, Bithumb, Coinone, Korbit), any additional\
    \ FTRA-registered domestic exchange, and FTRA-registered foreign-domiciled exchanges\
    \ operating in Korea. Sister obligations apply to FTRA-registered Custodial VASPs\
    \ and OTC desks. Banks holding VASPs' Real-Name Verification Account (*Sushin\
    \ Hwakin Gyejwa*) cooperation are not directly captured by Article 5-2 but face\
    \ FTRA Article 5 obligations on the VASP relationship."
  penalties: "FTRA Article 17 administrative fines up to KRW 30 million per violation;\
    \ Article 18 criminal penalties (imprisonment up to 1 year and/or fines up to\
    \ KRW 10 million) for officers found responsible. The 2021 amendments specifically\
    \ raised penalties for VASPs \u2014 the FSC has published this as a deliberate\
    \ signal. FSC licensing-related: FTRA registration suspension or revocation, prohibition\
    \ on accepting new customers, freeze on KRW deposits and withdrawals. Recent precedent:\
    \ KoFIU's 2025 enforcement action on a smaller VASP (administrative fine + 6-month\
    \ deposit freeze + officer prohibition order). Secondary consequences: real-name-verification\
    \ banking partner termination \u2014 without a banking partner the VASP cannot\
    \ operate KRW deposits/withdrawals; FATF visibility; Korean Bar Association referral\
    \ for any officer who is also a \uBCC0\uD638\uC0AC (lawyer)."
  common_mistakes: "1. Travel-rule data exchange limited to peer FTRA-registered VASPs\
    \ and not extended to foreign counterparties \u2014 the obligation captures cross-border\
    \ transfers too where the counterparty VASP is identifiable.\n\n2. Sender/beneficiary\
    \ data fields incomplete (e.g., physical address omitted). KoFIU Notice 2021-06\
    \ specifies the required fields; partial data is non-compliant.\n\n3. Exception\
    \ log treating non-Korean counterparties as 'cannot exchange' without documented\
    \ attempt \u2014 KoFIU expects a documented attempt and an exception-rationale\
    \ per transfer.\n\n4. High-risk wallet screening applied only to outbound, not\
    \ inbound \u2014 Article 5-2 covers both.\n\n5. Treating the annual review as\
    \ an audit of the previous year's policies without testing whether the 2024-amendment\
    \ KRW 1 million threshold (lowered from KRW 5 million) is properly captured in\
    \ the trigger logic.\n\n6. Using a US/EU travel-rule provider that does not support\
    \ KoFIU Notice 2021-06 data-format \u2014 leads to data being exchanged but in\
    \ a non-compliant format."
- id: '14911807'
  title: "MAS Notice 626 \u2014 annual independent AML/CFT audit"
  description: Annual independent audit of the bank's AML/CFT policies, procedures
    and controls covering customer due diligence, ongoing monitoring, screening, STR
    filing, training and record-keeping. Findings reported to the board.
  jurisdiction: Singapore (STRO)
  statute_or_notice: "MAS Notice 626 \xA713 \u2014 independent audit"
  due_date: '2026-12-31'
  status: Open
  owner: Head of Internal Audit + MLRO
  notes: Coordinate with FY2026 audit plan; testing periods agreed with audit committee
    in Q2.
  full_text: "MAS Notice 626 \xA713 requires every bank to subject its AML/CFT framework\
    \ to an independent audit on a regular basis. Industry practice \u2014 confirmed\
    \ by MAS thematic findings \u2014 is annual.\n\nScope must cover the framework\
    \ end-to-end: CDD on natural and legal persons, simplified and enhanced due diligence,\
    \ beneficial-ownership identification, screening (sanctions, PEP, adverse media),\
    \ ongoing monitoring rule effectiveness, STR governance, training adequacy, and\
    \ record-keeping (5 years retention).\n\nThe audit must be conducted by persons\
    \ independent of the function being audited. Internal Audit typically runs it;\
    \ co-source with external counsel or Big-4 when sample sizes are high or specialist\
    \ testing is needed (e.g., trade finance sanctions screening).\n\nFindings, management\
    \ response and remediation plan are reported to the audit committee and tracked\
    \ through to closure. Open items at year-end are disclosed in the \xA713 attestation\
    \ cycle."
  deadline_explanation: MAS supervises on a calendar-year basis. Audit fieldwork is
    typically completed by 30 November so the report can land at the December board
    / audit-committee meeting. The 31 December deadline reflects this practical anchor;
    supervisors expect annual cadence rather than a precise calendar date.
  evidence: Audit charter / engagement letter; risk-based audit plan; sample selection
    methodology; testing workpapers; report to audit committee; board minutes recording
    the discussion; remediation tracker; closure evidence for prior-year findings.
  source_url: https://www.mas.gov.sg/regulation/notices/notice-626
  priority: Standard
  entities_impacted: ''
  penalties: ''
  common_mistakes: ''
- id: 678b9abe
  title: "MAS Notice 626 \xA76 \u2014 quarterly STR governance review"
  description: 'Quarterly governance review of all STRs filed: completeness, timeliness,
    escalation effectiveness, and STRO acknowledgement reconciliation.'
  jurisdiction: Singapore (STRO)
  statute_or_notice: "MAS Notice 626 \xA76 + STRO Online filing system"
  due_date: '2026-07-15'
  status: In progress
  owner: MLRO
  notes: Q2 2026 reconciliation. STRO acknowledgement latency ~5 working days. Track
    unacknowledged filings older than 14 days.
  full_text: "MAS Notice 626 \xA76 places the STR obligation under the MLRO's personal\
    \ accountability. The bank's MLRO must be satisfied that STRs are filed without\
    \ delay where there is reason to suspect. Industry practice \u2014 and MAS supervisory\
    \ expectation \u2014 is a quarterly governance review.\n\nThe review covers four\
    \ things. First, completeness: every internal alert that escalated to MLRO consideration\
    \ has either been filed or has a documented MLRO no-file decision. Second, timeliness:\
    \ median time from internal alert to filing, and the tail (the slowest 5%). MAS\
    \ examiners increasingly probe the tail. Third, narrative quality: a sample of\
    \ filed STRs are reviewed for completeness against MAS Notice 626 \xA76 reporting\
    \ schema. Fourth, reconciliation: every internal STR-filed record has a matching\
