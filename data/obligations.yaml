- id: a6b290a4
  title: "AML/CFT Act 2009 s.40 \u2014 SAR continuous filing (3 working days)"
  description: Continuous obligation to file Suspicious Activity Reports with FIU
    NZ via goAML as soon as practicable, and in any event within 3 working days, after
    suspicion is formed. Tipping-off prohibited under s.46.
  jurisdiction: New Zealand (FIU NZ)
  statute_or_notice: AML/CFT Act 2009 s.40 + AML/CFT Regulations + RBNZ/FMA/DIA Sectoral
    Guidance
  due_date: '2026-12-31'
  status: In progress
  owner: AML/CFT Compliance Officer (s.56 nominee)
  notes: "Continuous obligation. 3-working-day window is one of the tighter peer windows\
    \ (with Indonesia at 3 days). FIU NZ publishes Quarterly Typology Reports \u2014\
    \ align internal red-flag library."
  full_text: "Section 40 of the Anti-Money Laundering and Countering Financing of\
    \ Terrorism Act 2009 imposes the core SAR filing obligation on every reporting\
    \ entity. The threshold is reasonable grounds to suspect that a transaction or\
    \ activity is or may be relevant to the investigation or prosecution of money\
    \ laundering, terrorism financing, drug trafficking, or any offence punishable\
    \ by 12+ months' imprisonment.\n\nReports are filed via goAML, the UNODC platform\
    \ deployed by FIU NZ. The standard is 'as soon as practicable' and in any event\
    \ within 3 working days (AML/CFT Regulations).\n\nSection 46 prohibits disclosure\
    \ of the SAR to the customer or to any unauthorised party. Sections 91-93 prescribe\
    \ civil and criminal penalties: up to NZD 200,000 for natural persons and NZD\
    \ 2 million for body corporates (civil); up to 2 years' imprisonment and/or NZD\
    \ 300,000 / NZD 5 million (criminal).\n\nPrescribed Transaction Reports (PTRs)\
    \ are a separate obligation: cash transactions \u2265 NZD 10,000 and international\
    \ wire transfers \u2265 NZD 1,000 are reported via goAML on a near-real-time basis\
    \ (operational standard 10 working days, but supervisors expect faster). PTRs\
    \ do not substitute for SARs where suspicion exists."
  deadline_explanation: 'Continuous obligation. The 31 December year-end deadline
    shown here is the annual KPI tracking anchor: zero AML/CFT Act s.40 timeliness
    exceptions outstanding at year-end and PTR-completeness reconciliation closed.'
  evidence: goAML SAR + PTR submission log; reference numbers; alert-to-filing latency
    dashboard (3-working-day target); tipping-off log (zero entries); AML/CFT Compliance
    Officer quarterly board pack; supervisor (RBNZ / FMA / DIA) inspection-response
    file.
  source_url: https://www.police.govt.nz/about-us/structure/teams-and-units/financial-intelligence-unit
  priority: Standard
