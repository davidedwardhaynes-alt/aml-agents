[theme]
# Apple-style palette — pairs with the SF Pro / frosted-glass CSS in app.py
base = "light"
primaryColor = "#0071E3"
backgroundColor = "#F5F5F7"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1D1D1F"
font = "sans serif"

[server]
runOnSave = true
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
